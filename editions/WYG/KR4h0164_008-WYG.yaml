body:
  text: 古文雅正卷八禮部侍郎蔡世逺編原道韓愈博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂徳仁與義為定名道與徳為虚位故道有君子小人而徳有凶有吉老子之小仁義非毁之也其見者小也坐井而觀天曰天小者非天小也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂徳徳其所徳非吾所謂徳也凡吾所謂道徳云者合仁與義言之也天下之公言也老子之所謂道徳云者去仁與義言之也一人之私言也周道衰孔子没火於秦黄老於漢佛於晉魏梁隋之間其言道徳仁義者不入於楊則入於墨不入於老則入於佛入於彼必出於此入者主之出者奴之入者附之出者汙之噫後之人其欲聞仁義道徳之說孰從而聽之老者曰孔子吾師之弟子也佛者曰孔子吾師之弟子也為孔子者習聞其說樂其誕而自小也亦曰吾師亦嘗云爾不惟舉之於其口而又筆之於其書噫後之人雖欲聞仁義道徳之說其孰從而求之甚矣人之好怪也不求其端不訊其末惟怪之欲聞古之為民者四今之為民者六古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盗也古之時人之害多矣有聖者立然後教之以相生養之道為之君為之師驅其蟲蛇鳥獸而處之中土寒然後為之衣飢然後為之食木處而顛土處而病也然後為之宫室為之工以贍其器用為之賈以通其有無為之醫藥以濟其夭死為之葬埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其湮鬱為之政以率其怠勌為之刑以鋤其强梗相欺也為之符璽斗斛權衡以信之相奪也為之城郭甲兵以守之害至而為之備患生而為之防今其言曰聖人不死大盗不止剖斗折衡而民不争嗚呼其亦不思而已矣如古之無聖人人之類滅久矣何也無羽毛鱗介以居寒熱也無爪牙以争食也是故君者出令者也臣者行君之令而致之民者也民者出粟米麻絲作器皿通貨財以事其上者也君不出令則失其所以為君臣不行君之令而致之民則失其所以為臣民不出粟米麻絲作器皿通貨財以事其上則誅今其法曰必棄而君臣去而父子禁而相生養之道以求其所謂清浄寂滅者嗚呼其亦幸而出於三代之後不見黜於禹湯文武周公孔子也其亦不幸而不出於三代之前不見正於禹湯文武周公孔子也帝之與王其號名殊其所以為聖一也夏葛而冬裘渴飲而飢食其事殊其所以為智一也今其言曰曷不為太古之無事是亦責冬之裘者曰曷不為葛之之易也責飢之食者曰曷不為飲之之易也傅曰古之欲明明徳於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意然則古之所謂正心而誠意者將以有為也今也欲治其心而外天下國家滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事孔子之作春秋也諸侯用夷禮則夷之進於中國則中國之經曰夷狄之有君不如諸夏之亡詩曰戎狄是膺荆舒是懲今也舉夷狄之法而加之先王之教之上幾何其不胥而為夷也夫所謂先王之教者何也博愛之謂仁行而宜之之謂義由是而之焉之謂道足乎已無待於外之謂徳其文詩書易春秋其法禮樂刑政其民士農工賈其位君臣父子師友賓主昆弟夫婦其服麻絲其居宫室其食粟米果蔬魚肉其為道易明而其為教易行也是故以之為已則順而祥以之為人則愛而公以之為心則和而平以之為天下國家無所處而不當是故生則得其情死則盡其常郊焉而天神假廟焉而人鬼饗曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與揚也擇焉而不精語焉而不詳由周公而上上而為君故其事行由周公而下下而為臣故其說長然則如之何而可也曰不塞不流不止不行人其人火其書廬其居明先王之道以道之鰥寡孤獨廢疾者有養也其亦庶乎其可也其文詞則如賈長沙治安策而更出之以變化其論學術治術則如董江都賢良策而更寫之以明暢三代以下能有幾篇文字宋儒議其引大學章只説到誠意不説及致知為没頭學問已有代辨之者矣謂釋氏以明心見性為宗旨對病下砭所引只宜截從誠意以下也今讀上下文信然未可輕議公自言氣盛則言之短長與聲之髙下皆宜熟讀此篇自見師説韓愈古之學者必有師師者所以傳道受業解惑也人非生而知之者孰能無惑惑而不從師其為惑也終不解矣生乎吾前其聞道也固先乎吾吾從而師之生乎吾後其聞道也亦先乎吾吾從而師之吾師道也夫庸知其年之先後生于吾乎是故無貴無賤無長無少道之所存師之所存也嗟乎師道之不傳也久矣欲人之無惑也難矣古之聖人其出人也逺矣猶且從師而問焉今之衆人其下聖人也亦逺矣而恥學於師是故聖益聖愚益愚聖人之所以為聖愚人之所以為愚其皆出於此乎愛其子擇師而教之於其身也則耻師焉惑矣彼童子之師授之書而習其句讀者非吾所謂傳其道解其惑者也句讀之不知惑之不解或師焉或不焉小學而大遺吾未見其明也巫醫樂師百工之人不耻相師士大夫之族曰師曰弟子云者則羣聚而笑之問之則曰彼與彼年相若也道相似也位卑則足羞官盛則近諛嗚呼師道之不復可知矣巫醫樂師百工之人君子不齒今其智廼反不能及其可怪也歟聖人無常師孔子師郯子萇𢎞師襄老􅆅郯子之徒其賢不及孔子孔子三人行則必有我師是故弟子不必不如師師不必賢於弟子聞道有先後術業有專攻如是而已李氏子蟠年十七好古文六藝經傳皆通習之不拘於時學於余余嘉其能行古道作師說以貽之師道立則善人多漢世經學詳明者以師弟子相承故也宋代理學昌明者以師弟子相信故也唐時知道者獨有一韓子而當時又少肯師者即如張文昌李習之皇甫持正韓子得意弟子也然諸人集中亦鮮推尊為師者况其他乎以此知唐時氣習最重故韓子痛切言之唐學不及漢宋者亦以此也吕原明希哲宰相子又與程子年爵不甚相下一見即首以師禮事之原明悳器即此一端非復尋常而程子道學得大明於時未必不由此子進學解韓愈國子先生晨入太學招諸生立館下誨之曰業精於勤荒於嬉行成於思毁於隨方今聖賢相逢治具畢張㧞去凶邪登崇俊良占小善者率以録名一藝者無不庸爬羅剔抉刮垢磨光葢有幸而獲選孰云多而不揚諸生業患不能精無患有司之不明行患不能成無患有司之不公言未既有笑於列者曰先生欺余哉弟子事先生於兹有年矣先生口不絶吟於六藝之文手不停披於百家之編記事者必提其要纂言者必鉤其元貪多務得細大不捐焚膏油以繼晷恒兀兀以窮年先生之業可謂勤矣觝排異端攘斥佛老補苴罅漏張皇幽眇尋墜緒之茫茫獨旁搜而逺紹障百川而東之廻狂瀾於既倒先生之於儒可謂有勞矣沉浸醲郁含英咀華作為文章其書滿家上規姚姒渾渾無涯周誥殷盤佶屈聱牙春秋謹嚴左氏浮誇易竒而法詩正而葩下逮莊騷太史所録子雲相如同工異曲先生之於文可謂閎其中而肆其外矣少始知學勇於敢為長通於方左右具宜先生之於為人可謂成矣然而公不見信於人私不見助於友跋前躓後動輒得咎暫為御史遂竄南夷三年博士冗不見治命與仇謀取敗幾時冬暖而兒號寒年豐而妻啼飢頭童齒豁竟死何禆不知慮此而反教人為先生曰吁子來前夫大木為杗細木為桷欂櫨侏儒椳闑扂楔各得其宜施以成室者匠氏之工也玉札丹砂赤箭青芝牛溲馬勃敗鼓之皮俱収竝蓄待用無遺者醫師之良也登明選公雜進巧拙紆餘為妍卓犖為傑較短量長惟器是適者宰相之方也昔者孟軻好辯孔道以明轍環天下卒老於行荀卿守正大論是𢎞逃讒于楚廢死蘭陵是二儒者吐辭為經舉足為法絶類離倫優入聖域其遇於世何如也今先生學雖勤而不繇其統言雖多而不要其中文雖竒而不濟於用行雖修而不顯於衆猶且月費俸錢嵗縻廩粟子不知耕婦不知織乗馬從徒安坐而食踵常途之促促窺陳編以盗竊然而聖主不加誅宰臣不見斥兹非其幸歟動而得謗名亦隨之投閒置散廼分之宜若夫商財賄之有亡計班資之崇庳忘已量之所稱指前人之瑕疵是所謂詰匠氏之不以杙為楹而訾醫師以昌陽引年欲進其狶苓也此篇辭涉憤激宋儒為已之學定不如此然公自叙其讀書衛道之苦心不可没也且如尋墜緒之茫茫數語誰人能有此志向春秋謹嚴數語誰人能有此識解勿論七發七哀等不足比倫即賓戯解嘲等篇亦相懸絶也惟送窮文全係玩世憤俗之作可不録耳伯夷頌韓愈士之特立獨行適於義而已不顧人之是非皆豪傑之士信道篤而自知明者也一家非之力行而不惑者寡矣至於一國一州非之力行不惑者蓋天下一人而已矣若至於舉世非之力行而不惑者則千百年廼一人而已耳若伯夷者窮天地亘萬世而不顧者也昭乎日月不足為明崒乎泰山不足為髙巍乎天地不足為容也當殷之亡周之興微子賢也抱祭器而去之武王周公聖也從天下之賢士與天下之諸侯而往攻之未嘗聞有非之者也彼伯夷叔齊者廼獨以為不可殷既滅矣天下宗周彼二子廼獨恥食其粟餓死而不顧繇是而言夫豈有求而為哉信道篤而自知明也今世之所謂士者一凡人譽之則自以為有餘一凡人沮之則自以為不足彼獨非聖人而自是如此夫聖人廼萬世之標凖也余故曰若伯夷者特立獨行窮天地亘萬世而不顧者也雖然微二子亂臣賊子接跡于後世矣激昻峻㧞讀之頑夫亷懦夫有立志張中丞傳後叙韓愈元和二年四月十三日夜愈與吳郡張籍閲家中舊書得李翰所為張廵傳翰以文章自名為此傳頗詳宻然尚恨有闕者不為許逺立傳又不載雷萬春事首尾逺雖材若不及廵者開門納廵位本在廵上授之柄而處其下無所疑忌竟與廵俱守死成功名城陷而虜與廵死先後異耳兩家子弟材智下不能通知二父志以為廵死而逺就虜疑畏死而辭服於賊逺誠畏死何苦守尺寸之地食其所愛之肉以與賊抗而不降乎當其圍守時外無蚍蜉蟻子之援所欲忠者國與主耳而賊語以國亡主滅逺見救援不至而賊來益衆必以其言為信外無待而猶死守人相食且盡雖愚人亦能數日而知死處矣逺之不畏死亦明矣烏有城壊其徒俱死獨蒙愧恥求活雖至愚者不忍為嗚呼而謂逺之賢而為之耶說者又謂逺與廵分城而守城之陷自逺所分始以此詬逺此又與兒童之見無異人之將死其臟腑必有先受其病者引繩而絶之其絶必有處觀者見其然從而尤之其亦不達於理矣小人之好議論不樂成人之美如是哉如廵逺之所成就如此卓卓猶不得免其他則又何說當二公之初守也寧能知人之卒不救棄城而逆遁茍此不能守雖避之他處何益及其亡救而且窮也將其創殘餓羸之餘雖欲去必不達二公之賢其講之精矣守一城捍天下以千百就盡之卒戰百萬日滋之師蔽遮江淮沮遏其勢天下之不亡其誰之功也當是時棄城而圖存者不可一二數擅彊兵坐而觀者相環也不追議此而責二公以死守亦見其自比於逆亂設淫辭而助之攻也愈嘗從事於汴徐二府屢道於兩府間親祭於其所謂雙廟者其老人往往說廵逺時事云南霽雲之乞救於賀蘭也賀蘭嫉廵逺之聲威功績出已上不肯出師救愛霽雲之勇且壯不聽其語强留之具食與樂延霽雲坐霽雲慷慨語曰雲來時睢陽之人不食月餘日矣雲雖欲獨食義不忍雖食且不下咽因㧞所佩刀斷一指血淋漓以示賀蘭一座大驚皆感激為雲泣下雲知賀蘭終無為雲出師意即馳去將出城抽矢射佛寺浮圖矢著其上甎半箭曰吾歸破賊必滅賀蘭此矢所以志也愈貞元中過泗州船上人猶指以相語城陷賊以刃脅降廵廵不屈即牽去將斬之又降霽雲雲未應廵呼雲曰南八男兒死耳不可為不義屈雲笑曰欲將以有為也公有言雲敢不死即不屈張籍曰有于嵩者少依於廵及廵起事嵩常在圍中籍大厯中於和州烏江縣見嵩嵩時年六十餘矣以廵初嘗得臨渙縣尉好學亡所不讀籍時尚小粗問廵逺事不能細也云廵長七尺餘鬚髯若神嘗見嵩讀漢書謂嵩曰何為久讀此嵩曰未熟也廵曰吾於書讀不過三遍終身不忘也因誦嵩所讀書盡卷不錯一字嵩驚以為廵偶熟此卷因亂抽他帙以試無不盡然嵩又取架上諸書試以問廵廵應口誦無疑嵩從廵久亦不見廵常讀書也為文章操紙筆立書未嘗起草初守睢陽時士卒僅萬人城中居人户亦且萬數廵因一見問姓名其後亡不識者廵怒鬚髯輙張及城䧟賊縛廵等數十人坐且將戮廵起旋其衆見廵起或起或泣廵曰汝勿怖死命也衆泣不能仰視廵就戮時顔色不亂陽陽如平常逺寛厚長者貌如其心與廵同年生月日後於廵呼廵為兄死時年四十九嵩貞元初死於亳宋間或傳嵩有田在亳宋間武人奪而有之嵩將詣州訟理為所殺嵩無子張籍云氣薄雲霄光争日月李漢叙公文所謂詭然而蛟龍翔蔚然而虎鳯躍鏘然而韶鈞鳴者是也廵逺在地下應掀髯起舞讀者亦掀髯起舞按唐書許逺傳即採公此論南霽雲雷萬春竝附列傳廵傳言廵至睢陽與太守許逺城父令姚誾等合遣將雷萬春南霽雲等領兵戰寧陵北斬賊將二十殺萬餘人萬春傳云霽雲萬春敗賊於寜陵也別將二十有五後皆死廵難竝詳傳中唯四人逸其姓名又廵傳霽雲亦不肯降廼與姚誾雷萬春等三十六人遇害又萬春傳令狐潮圍雍丘萬春為廵偏將立城上與語六矢著面不動廵任之與霽雲均前輩以篇中但及霽雲而不及萬春遂疑前之雷萬春為南霽雲之誤愚謂不載首尾者即雷傳不詳所來也老人畧說既第舉霽雲小時粗問更不細及萬春則昌黎亦竟付之闕如或畧或詳於文義初無礙也愚既為此論恐猶是師心臆說後閲黄太冲有答張爾公書言茅鹿門八家之選其㫖大畧本之荆川遵巖至其批評謬處如昌黎張中丞傳後序云不載雷萬春事首尾與南霽雲乞救賀蘭兩不相䝉而鹿門以為雷萬春疑當作南霽雲若乞救之事照應此句以補李翰之不載則非矣是前人已糾其謬答崔立之書韓愈斯立足下僕見險不能止動不得時顛頓狼狽失其所操持困不知變以至辱於再三君子小人之所憫笑天下之所背而馳者也足下猶復以為可教貶損道徳乃至手筆以問之扳援古昔辭義髙逺且進且勸足下之於故舊之道得矣雖僕亦固望於吾子不敢望於他人者耳然尚有似不相曉者非故欲發余乎不然何子之不以丈夫期我也不能黙黙聊復自明僕始年十六七時未知人事讀聖人之書以為人之仕者皆為人耳非有利乎已也及年二十時苦家貧衣食不足謀於所親然後知仕之不唯為人耳及來京師見有舉進士者人多貴之僕誠樂之就求其術或出禮部所試賦詩策等以相示僕以為可無學而能因詣州縣求舉有司者好惡出於其心四舉而後有成亦未即得仕聞吏部有以博學宏辭選者人尤謂之才且得美仕就求其術或出所試文章亦禮部之類私怪其故然猶樂其名因又詣州府求舉凡二試於吏部一既得之而又黜於中書雖不得仕人或謂之能焉退自取所試讀之乃類於俳優者之辭顔忸怩而心不寧者數月既已為之則欲有所成就書所謂耻過作非者也因復求舉亦無幸焉乃復自疑以為所試與得之者不同其程度及得觀之余亦無甚愧焉夫所謂博學者豈今之所謂者乎夫所謂宏辭者豈今之所謂者乎誠使古之豪傑之士若屈原孟軻司馬遷相如揚雄之徒進於是選必知其懷慙乃不自進而已耳設使與夫今之善進取者競於蒙昧之中僕必知其辱焉然彼五子者且使生於今之世其道雖不顯於天下其自負何如哉肻與夫斗筲者決得失於一夫之目而為之憂樂哉故凡僕之汲汲於進者其小得蓋欲以具裘葛養窮孤其大得蓋欲以同吾之所樂於人耳其他可否自計已熟誠不待人而後知今足下乃復比之獻玉者以為必竢工人之剖然後見知於天下雖兩刖足不為病且無使勍者再尅誠足下相勉之意厚也然仕進者豈舍此而無門哉足下謂我必待是而後進者尤非相悉之辭也僕之玉固未嘗獻而足固未嘗刖足下無為為我戚戚也方今天下風俗尚有未及於古者邉境尚有被甲執兵者主上不得怡而宰相以為憂僕雖不賢亦且潜究其得失致之乎吾相薦之乎吾君上希卿大夫之位下猶取一障而乗之若都不可得猶將耕於寛閒之野釣於寂寞之濱求國家之遺事考賢人哲士之終始作唐之一經垂之於無窮誅姦諛於既死發潜徳之幽光二者將必有一可足下以為僕之玉凡幾獻而足凡幾刖也又所謂勍者果誰哉再剋之刑信如何也士固信於知已微足下無以發吾之狂言吕東萊笑當時父兄無見識以子弟得一第便為成材者今俗下秀才類然至有小試前茅便詡詡有矜氣者斗筲器量亦不宜爾此文可振士子則古稱先之志即不能志於道徳獨不思以好古自豪乃局於科舉耶答李翊書韓愈六月二十六日愈白李生足下生之書辭甚髙而其問何下而恭也能如是誰不欲告生以其道道悳之歸也有日矣况其外之文乎抑愈所謂望孔子之門墻而不入於其宫者焉足以知是且非耶雖然不可不為生言之生所謂立言者是也生所為者與所期者甚似而幾矣抑不知生之志蘄勝於人而取於人耶將蘄至於古之立言者耶蘄勝於人而取於人則固勝於人而可取於人矣將蘄至於古之立言者則無望其速成無誘於勢利養其根而竢其實加其膏而希其光根之茂者其實遂膏之沃者其光􅈌仁義之人其言藹如也抑又有難者愈之所為不自知其至猶未也雖然學之二十餘年矣始者非三代兩漢之書不敢觀非聖人之志不敢存處若忘行若遺儼乎其若思茫乎其若迷當其取於心而注於手也惟陳言之務去戛戛乎其難哉其觀於人不知其非笑之為非笑也如是者亦有年猶不改然後識古書之正偽與雖正而不至焉者昭昭然白黒分矣而務去之乃徐有得也當其取於心而注於手也汩汩然來矣其觀於人也笑之則以為喜譽之則以為憂以其猶有人之說者存也如是者亦有年然後浩乎其沛然矣吾又懼其雜也迎而距之平心而察之其皆醇也然後肆焉雖然不可以不養也行之乎仁義之途游之乎詩書之源無迷其途無絶其源終吾身而已矣氣水也言浮物也水大而物之浮者大小畢浮氣之與言猶是也氣盛則言之短長與聲之髙下者皆宜雖如是其敢自謂幾于成乎雖幾于成其用於人也奚取焉雖然待用於人者其肖於器耶用與舍屬諸人君子則不然處心有道行已有方用則施諸人舍則傳諸其徒垂諸文而為後世法如是者其亦足樂乎其無足樂也有志乎古者希矣志乎古必遺乎今吾誠樂而悲之亟稱其人所以勸之非敢褒其可褒而貶其可貶也問於愈者多矣念生之言不志乎利聊相為言之公生平刻苦肆力本期至于古之立言者因而有見於道遂居然以傳道自命然自叙其躬行實踐之功少有見焉至自道為文工夫本領親切有味如此余嘗謂自秦漢以來惟公集文章之大成此篇自冩得力處尤不可不熟玩也與孟尚書書韓愈愈白行官自南廻過吉州得吾兄二十四日手書數番忻悚兼至未審入秋來眠食何似伏惟萬福來示云有人傳愈近少信奉釋氏此傳之者妄也潮州時有一老僧號大顛頗聰明識道理逺地無可與語者故自山召至州郭留十數日實能外形骸以理自勝不為事物侵亂與之語雖不盡解要自胸中無滯礙以為難得因與來往及祭神至海上遂造其廬及來袁州留衣服為別乃人之情非崇信其法求福田利益也孔子云丘之禱久矣凡君子行已立身自有法度聖賢事業具在方冊可效可師仰不愧天俯不愧人内不愧心積善積惡殃慶自各以其類至何有去聖人之道捨先王之法而從夷狄之教以求福利也詩不云乎愷悌君子求福不囬傳又曰不為威愓不為利疚假如釋氏能與人為禍祟非守道君子之所懼也况萬萬無此理且彼佛者果何人哉其行事類君子耶小人耶若君子也必不妄加禍於守道之人如小人也其身已死其鬼不靈天地神祇昭布森列非可誣也又肯令其鬼行胸臆作威福於其間哉進退無所據而信奉之亦且惑矣且愈不助釋氏而排之者其亦有說孟子云今天下不之楊則之墨楊墨交亂而聖賢之道不明則三綱淪而九法斁禮樂崩而夷狄横幾何其不為禽獸也故曰能言距楊墨者皆聖人之徒也揚子雲云古者楊墨塞路孟子辭而闢之廓如也夫楊墨行正道廢且將數百年以至於秦卒滅先王之法燒除其經坑殺學士天下遂大亂及秦滅漢興且百年尚未知修明先王之道其後始除挾書之律稍求亡書招學士經雖少得尚皆殘缺十亡二三故學士多老死新者不見全經不能盡知先王之事各以所見為守分離乖隔不合不公二帝三王羣聖人之道於是大壞後之學者無所尋逐以至於今泯泯也其禍出於楊墨肆行而莫之禁故也孟子雖賢聖不得位空言無施雖切何補然賴其言而今學者尚知宗孔氏崇仁義貴王賤霸而已其大經大法皆亡滅而不救壞爛而不収所謂存十一於千百安在其能廓如也然向無孟氏則皆服左袵而言侏􅍣矣故愈嘗推尊孟氏以為功不在禹下者為此也漢氏以來羣儒區區修補百孔千瘡隨亂隨失其危如一髪引千鈞綿綿延延寖以微滅於是時也而唱釋老於其間鼓天下之衆而從之嗚呼其亦不仁甚矣釋老之害過於楊墨韓愈之賢不及孟子孟子不能救之於未亡之前而韓愈乃欲全之於已壞之後嗚呼其亦不量其力且見其身之危莫之救以死也雖然使其道由愈而粗傳雖滅死萬萬無恨天地鬼神臨之在上質之在傍又安得因一摧折自毁其道以從於邪也籍湜輩雖屢指教不知果能不叛去否辱吾兄眷厚而不獲承命惟増慚懼死罪死罪愈再拜絶大眼孔絶大抱負語皆驚心動魄出之原道佛骨表孟尚書書張中丞傳後序此四篇尤為韓集絶頂文字亦千古之至文也再與鄂州桞中丞書韓愈愈愚不能量事勢可否比常念淮右以靡弊困頓三州之地蚊蚋蟻蟲之聚感凶竪喣濡飲食之惠提童子之手坐之堂上奉以為帥出死力以抗逆明詔戰天下之兵乘機逐利四出侵暴屠燒縣邑賊殺不辜環其地數千里莫不被其毒洛汝襄荆許潁淮江為之騷然丞相公卿士大夫勞於圖議握兵之將熊羆貙虎之士畏懦䠞蹜莫肯杖戈為士卒前行者獨閤下奮然率先揚兵界上將二州之守親出入行間與士卒均辛苦生其氣勢見將軍之鋒頴凛然有向敵之意用儒雅文字章句之業取先天下武夫闗其口而奪之氣愚初聞時方食不覺棄匕箸起立豈以為閤下真能引孤軍單進與死冦角逐争一旦僥倖之利哉就令如是亦不足貴其所以服人心在行事適機宜而風采可畏愛故也是以前狀輒述鄙誠眷惠手翰還答益増忻悚夫一衆人心力耳目使所至如時雨三代用師不出是道閤下果能充其言繼之以無倦得形便之地甲兵足用雖國家故所失地旬嵗可坐而得况此小冦安足置齒牙間勉而卒之以俟其至幸甚夫逺徵軍士行者有羈旅離別之思居者有怨曠騷動之憂本軍有饋餉煩費之難地主多姑息形迹之患急之則怨緩之則不用命浮寄孤懸形勢銷弱又與賊不相諳委臨敵恐駭難以有功若召募土人必得豪勇與賊相熟知其氣力所極無望風之驚愛䕶鄉里勇於自戰徵兵滿萬不如召募數千閤下以為何如倘可上聞行之否計已與裴中丞相見行營事宜不惜時賜示及幸甚讀原道等篇知公非徒文士也讀上憲宗論淮西事宜篇知公非徒道學也文士而不知道一書篋子耳語道學而不知經濟一書癡耳世人見迂庸一種讀幾行性理全無器識以凡為道學者類然不知實道學人必有實經濟烏得分判哉公此篇古勁雄健字經追琢而出效西漢而無其迹進策亦足覘經濟送孟東野序韓愈大凡物不得其平則鳴草木之無聲風撓之鳴水之無聲風蕩之鳴其躍也或激之其趨也或梗之其沸也或炙之金石之無聲或擊之鳴人之於言也亦然有不得已者而後言其謌也有思其哭也有懷凡出乎口而為聲者其皆有弗平者乎樂也者鬱於中而泄於外者也擇其善鳴者而假之鳴金石絲竹匏土革木八者物之善鳴者也維天之於時也亦然擇其善鳴者而假之鳴是故以鳥鳴春以雷鳴夏以蟲鳴秋以風鳴冬四時之相推敓其必有不得其平者乎其於人也亦然人聲之精者為言文辭之於言又其精也尤擇其善鳴者而假之鳴其在於唐虞咎陶禹其善鳴者也而假以鳴䕫弗能以文辭鳴又自假於韶以鳴夏之時五子以其歌鳴伊尹鳴殷周公鳴周凡載於詩書六藝皆鳴之善者也周之衰孔子之徒鳴之其聲大而逺傳曰天將以夫子為木鐸其弗信矣乎其末也莊周以其荒唐之辭鳴楚大國也其亡也以屈原鳴臧孫辰孟軻荀卿以道鳴者也楊朱墨翟管夷吾晏嬰老聃申不害韓非眘到田駢鄒衍尸佼孫武張儀蘇秦之屬皆以其術鳴秦之興李斯鳴之漢之時司馬遷相知揚雄最其善鳴者也其下魏晉氏鳴者不及於古然亦未嘗絶也就其善者其聲清以浮其節數以急其辭淫以哀其志弛以肆其為言也亂雜而無章將天醜其徳莫之顧耶何為乎不鳴其善鳴者也唐之有天下陳子昻蘇源明元結李白杜甫李觀皆以其所能鳴其存而在下者孟郊東野始以其詩鳴其髙出魏晉不懈而及於古其他浸滛乎漢氏矣從吾遊者李翺張籍其尤也三子者之鳴信善鳴矣抑不知天將和其聲而使鳴國家之盛耶抑將窮餓其身思愁其心腸而使自鳴其不幸耶三子者之命則懸乎天矣其在上也奚以喜其在下也奚以悲東野之役於江南也有若不釋然者故吾道其命於天者以解之世之汩没於時文久矣不但無志于道即肆力于古求可傳者亦少焉故登此文以鼓之至其文之變化離竒獨出格調尤令人有舞蹈之樂送李愿歸盤谷序韓愈太行之陽有盤谷盤谷之間泉甘而土肥草木藂茂居民鮮少或曰謂其環兩山之間故曰盤或曰是谷也宅幽而勢阻隱者之所盤旋友人李愿居之愿之言曰人之稱大丈夫者我知之矣利澤施於人名聲昭於時坐於廟朝進退百官而佐天子出令其在外則樹旗旄羅弓矢武夫前呵從者塞途供給之人各執其物夾道而疾馳喜有賞怒有刑才畯滿前道古今而譽盛徳入耳而不煩曲睂豐頰清聲而便體秀外而惠中飄輕裾翳長袖粉白黛緑者列屋而閒居妒寵而負恃争妍而取憐大丈夫之遇知於天子用力於當世者之所為也吾非惡此而逃之是有命焉不可幸而致也窮居而閒處升髙而望逺坐茂樹以終日濯清泉以自潔採於山美可茹釣於水鮮可食起居無時惟適之安與其有譽於前孰若無毁於其後與其有樂於身孰若無憂於其心車服不維刀鋸不加理亂不知黜陟不聞大丈夫不遇於時者之所為也我則行之伺候於公卿之門奔走於形勢之途足將進而趦趄口將言而囁嚅處穢汚而不羞觸刑辟而誅戮徼倖於萬一老死而後止者其於為人賢不肖何如也昌黎韓愈聞其言而壯之與之酒而為之歌曰盤之中維子之宫盤之土可以稼盤之泉可濯可沿盤之阻誰争子所窈而深廓其有容繚而曲如往而復嗟盤之樂兮樂且無央虎豹逺跡兮蛟龍遁藏鬼神守䕶兮呵禁不祥飲且食兮夀而康無不足兮奚所望膏吾車兮秣吾馬從子於盤兮終吾生以徜徉不下斷制只述其言獨闢一格又無溢美之嫌公之為文變化分寸無所不有也前段可作郭令公像贊中段可作陶靖節像贊末段可作諸追逐勢利全無亷恥者像贊案西平之子李愬之兄亦名愿唐書愿傳愿少謙謹初領夏綏銀宥節度使政簡而嚴至節度鳯翔自是邇聲色而政衰矣史言其以荒侈敗結納權近與篇中所述正復相反明非一人矣又案南宋慶元中建安刋五百家註本此序後附載唐人髙從一跋以証其非西平子蓋以兩人同時其姓名適同恐後人不及致辨耳公又有和盧郎中送盤谷子詩序作於貞元十七年西平子方官環列詩和於元和七年西平子又正擁節旄更非弃官髙蹈者可知送浮屠文暢師序韓愈人固有儒名而墨行者問其名則是校其行則非可以與之遊乎如有墨名而儒行者問其名則非校其行則是可以與之遊乎揚子雲稱在門墻則揮之在夷狄則進之吾取以為法焉浮屠師文暢喜文章其周遊天下凡有行必請於搢紳先生以求咏歌其所志貞元十九年春將行東南柳君宗元為之請解其裝得其所得叙詩累百餘篇非至篤好其何能致多如是邪惜其無以聖人之道告之者而徒舉浮屠之説贈焉夫文暢浮屠也如欲聞浮屠之說當自就其師而問之何故謁吾徒而來請也彼見吾君臣父子之懿文物事為之盛其心有慕焉拘其法而未能入故樂聞其說而請之如吾徒者宜當告之以二帝三王之道日月星辰之行天地之所以著鬼神之所以幽人物之所以蕃江湖之所以流而語之不當又為浮屠之說而瀆告之也民之初生固若禽獸夷狄然聖人者立然後知宫居而粒食親親而尊尊生者養而死者藏是故道莫大乎仁義教莫正乎禮樂刑政施之於天下萬物得其宜措之於其躬體安而氣平堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武文武以是傳之周公孔子書之於冊中國之人世守之今浮屠者孰為而孰傳之邪夫鳥俛而啄仰而四顧夫獸深居而簡出懼物之為已害也猶且不脱焉弱之肉彊之食今吾與文暢安居而暇食優游以生死與禽獸異者寧可不知其所自耶夫不知者非其人之罪也知而不為者惑也恱乎故不能即乎新者弱也知而不以告人者不仁也告而不以實者不信也余既重桞請又嘉浮屠能喜文辭於是乎言此篇小原道也公凡送浮屠詩若文必先斥其非而示以正道此公之兀岸不茍處公于談道之文確有所見與文士大別然于窮理修身謹確細宻處未能如程朱之親切說出也送殷員外使回鶻序韓愈唐受天命為天子凡四方萬國不問海内外無小大咸臣順於朝時節貢水土百物大者特來小者附集元和睿聖文武皇帝既嗣位悉治方内就法度十二年詔曰四方萬國惟回鶻於唐最親奉職尤謹丞相其選宗室四品一人持節往賜君長告之朕意又選學有經法通知時事者一人與之為貳由是殷侯侑自太常博士遷尚書虞部員外郎兼侍御史朱衣象笏承命以行朝之大夫莫不出餞酒半右庶子韓愈執盞言曰殷大夫今人適數百里出門惘惘有離別可憐之色持被入直三省丁寧顧婢子語刺刺不能休今子使萬里外國獨無幾微出於言面豈不真知輕重大丈夫哉丞相以子應詔真誠知人士不通經果不足用於是相屬為詩以道其行云使于四方聖人重之文之簡古蒼老令我玩誦不置送鄭尚書序韓愈嶺之南其州七十其二十二𨽻嶺南節度府其四十餘分四府府各置帥然獨嶺南節度為大府大府始至四府必使其佐啟問起居謝守地不得即賀以為禮嵗時必遣賀問致水土物大府帥或道過其府府帥必戎服左握刀右屬弓矢帕首袴鞾迎郊及既至大府帥先入據館帥守屏若將趨入拜庭之為者大府與之為讓至一再乃敢改服以賓主見適位執爵皆興拜不許乃止䖍若小侯之事大國有大事諮而後行𨽻府之州離府逺者至三千里懸隔山海使必數月而後能至蠻夷悍輕易怨以變其南州皆岸大海多洲島颿風一日踔數千里漫瀾不見踪跡控御失所依險阻結黨仇機毒矢以待將吏撞搪呼號以相和應蜂屯蟻雜不可爬梳好則人怒則獸故常薄其征入簡節而疎目時有所遺漏不究切之長養以兒子至紛不可治乃草薙而禽獮之盡根株痛斷乃止其海外雜國若耽浮羅流求毛人夷亶之州林邑扶南真臘干陀利之屬東南際天地以萬數或時候風潮朝貢蠻胡賈人舶交海中若嶺南帥得其人則一邉盡治不相冦盗賊殺無風雨之災水旱癘毒之患外國之貨日至珠香象犀玳瑁竒物溢於中國不可勝用故選帥常重於他鎮非有文武威風知大體可畏信者則不幸往往有事長慶三年四月以工部尚書鄭公為刑部尚書兼御史大夫往踐其任鄭公常以節鎮襄陽又帥滄景徳棣歴河南尹華州刺史皆有功悳可稱道入朝為金吾將軍散騎常侍工部侍郎尚書家屬百人無數畝之宅僦屋以居可謂貴而能貧為仁者不富之效也及是命朝廷莫不悦將行公卿大夫士茍能詩者咸相率為詩以美朝政以慰公南行之思韻必以來字者所以祝公成政而來歸疾也昌黎公送行序多用議論以疎宕勝此獨叙事古奥詳盡錯落妙在極雕琢極自然明代王李之學左史徒以險澀耳又但見作意而無自然合度之妙胸中典古字亦少似妝㸃輯綴而非内流者公所以絶後也俗子讀韓文但能喜誦其疎宕者此等不究心故全不知古文藩籬而入此篇極有法度易學首叙其權之大足以有為次叙闗係之重勉以處置之宜在言外末規其亷祝其成政而來筆極雅鄭尚書名權千王守澄以得廣州本無可稱者公只叙闗係之重末畧帶勉勵一筆公為文慎許可如此祭十二郎文韓愈年月日季父愈聞汝䘮之七日乃能銜哀致誠使建中逺具時羞之奠告汝十二郎之靈嗚呼吾少孤及長不省所怙惟兄嫂是依中年兄殁南方吾與汝俱㓜從嫂歸葬河陽既又與汝就食江南零丁孤苦未嘗一日相離也吾上有三兄皆不幸早世承先人後者在孫惟汝在子惟吾兩世一身形單影隻嫂常撫汝指吾而言曰韓氏兩世惟此而已汝時尤小當不復記憶吾時雖能記憶亦未知其言之悲也吾年十九始來京城其後四年而歸視汝又四年吾往河陽省墳墓遇汝從嫂䘮來葬又二年吾佐董丞相於汴州汝來省吾止一嵗請歸取其孥明年丞相薨吾去汴州汝不果來是年吾佐戎徐州使取汝者始行吾又罷去汝又不果來吾念汝從于東東亦客也不可以乆圖乆逺者莫如西歸將成家而致汝嗚呼孰謂汝遽去吾而殁乎吾與汝俱少年以為雖暫相別終當久與相處故捨汝而旅食京師以求斗斛之禄誠知其如此雖萬乗之公相吾不以一日輟汝而就也去年孟東野往吾書與汝曰吾年未四十而視茫茫而髪蒼蒼而齒牙動揺念諸父與諸兄皆康强而早世如吾之衰者其能久存乎吾不可去汝不肯來恐旦暮死而汝抱無涯之戚也孰謂少者殁而長者存强者夭而病者全乎嗚呼其信然邪其夢邪其傳之非其真邪信也吾兄之盛徳而夭其嗣乎汝之純明而不克䝉其澤乎少者强者而夭殁長者衰者而存全乎未可以為信也夢也傳之非其真也東野之書耿蘭之報何為而在吾側也嗚呼其信然矣吾兄之盛徳而夭其嗣矣汝之純明宜業其家者不克䝉其澤矣所謂天者誠難測而神者誠難明矣所謂理者不可推而夀者不可知矣雖然吾自今年來蒼蒼者或化而為白矣動揺者或脱而落矣毛血日益衰志氣日益微幾何不從汝而死也死而有知其幾何離其無知悲不幾時而不悲者無窮期矣汝之子始十嵗吾之子始五嵗少而强者不可保如此孩提者又可冀其成立耶嗚呼哀哉汝去年書云比得軟腳病往往而劇吾曰是疾也江南之人常常有之未始以為憂也嗚呼其竟以此而殞其生乎抑別有疾而至斯乎汝之書六月十七日也東野云汝殁以六月二日耿蘭之報無月日葢東野之使者不知問家人以月日如耿蘭之報不知當言月日東野與吾書乃問使者使者妄稱以應之耳其然乎其不然乎今吾使建中祭汝弔汝之孤與汝之乳母彼有食可守以待終䘮則待終䘮而取以來如不能守以終䘮則遂取以來其餘奴婢竝令守汝䘮吾力能改葬終葬汝於先人之兆然後惟其所願嗚呼汝病吾不知時汝殁吾不知日生不能相養以共居殁不得撫汝以盡哀歛不憑其棺窆不臨其穴吾行負神明而使汝夭不孝不慈而不得與汝相養以生相守以死一在天之涯一在地之角生而影不與吾形相依死而魂不與吾夢相接吾實為之其又何尤彼蒼者天曷其有極自今已往吾其無意於人世矣當求數頃之田於伊潁之上以待餘年教吾子與汝子幸其成長吾女與汝女待其嫁如此而已嗚呼言有窮而情不可終汝其知也耶其不知也耶嗚呼哀哉尚饗酸痛慘摰入于五内徹于九霄平淮西碑韓愈天以唐克肖其徳聖子神孫繼繼承承於千萬年敬戒不怠全付所覆四海九州罔有内外悉主悉臣髙祖太宗既除既治髙宗中睿休養生息至於𤣥宗受報收功極熾而豐物衆地大孽牙其間肅宗代宗徳祖順考以勤以容大慝適去稂莠不薅相臣將臣文恬武嬉習熟見聞以為當然睿聖文武皇帝既受羣臣朝乃考圖數貢曰嗚呼天既全付予有家今傳次在予予不能事事其何以見於郊廟羣臣震懾奔走率職明年平夏又明年平蜀又明年平江東又明年平澤潞遂定易定致魏博貝衛澶相無不從志皇帝曰不可究武予其少息九年蔡將死蔡人立其子元濟以請不許遂燒舞陽犯葉襄城以動東都放兵四刼皇帝歴問於朝一二臣外皆曰蔡帥之不廷授于今五十年傳三姓四將其樹本堅兵利卒頑不與他等因撫而有順且無事大官臆决唱聲萬口和附并為一談牢不可破皇帝曰惟天惟祖宗所以付任予者庶其在此予何敢不力况一二臣同不為無助曰光顔汝為陳許帥惟是河東魏博郃陽三軍之在行者汝皆將之曰重𦙍汝故有河陽懷今益以汝維是朔方義成陜益鳯翔延慶七軍之在行者汝皆將之曰𢎞汝以卒萬二千屬乃子公武往討之曰文通汝守夀維是宣武淮南宣歙浙西四軍之行於夀者汝皆將之曰道古汝其觀察鄂岳曰愬汝帥唐鄧隨各以其兵進戰曰度汝長御史其往視師曰度惟汝予同汝遂相予以賞罸用命不用命曰𢎞汝其以節都統諸軍曰守謙汝出入左右汝惟近臣其往撫師曰度汝其往衣服飲食予士無寒無飢以既厥事遂生蔡人賜汝節斧通天御帶衛卒三百凡兹廷臣汝擇自從惟其賢能無憚大吏庚申予其臨門送汝曰御史予憫士大夫戰甚苦自今以往非郊廟祠祀其無用樂顔𦙍武合攻其北大戰十六得柵城縣二十三降人卒四萬道古攻其東南八戰降萬三千再入申破其外城文通戰其東十餘遇降萬二千愬入其西得賊將輒釋不殺用其策戰比有功十二年八月丞相度至師都統𢎞責戰益急顔𦙍武合戰益用命元濟盡并其衆洄曲以備十月壬申愬用所得賊將自文城因天大雪疾馳百二十里用夜半到蔡破其門取元濟以獻盡得其屬人卒辛已丞相度入蔡以皇帝命赦其人淮西平大饗賚功師還之日因以其食賜蔡人凡蔡卒三萬五千其不樂為兵願歸為農者十九悉縱之斬元濟京師冊功𢎞加侍中愬為佐僕射帥山南東道顔𦙍皆加司空公武以散騎常侍帥鄜坊丹延道古進大夫文通加散騎常侍丞相度朝京師道封晉國公進階金紫光禄大夫以舊官相而以其副總為工部尚書領蔡任既還奏羣臣請紀聖功被之金石皇帝以命臣愈臣愈再拜稽首而獻文曰唐承天命遂臣萬邦孰居近土襲盗以狂往在𤣥宗崇極而圯河北悍驕河南附起四聖不宥屢興師征有不能克益戍以兵夫耕不食婦織不裳輸之以車為卒賜糧外多失朝曠不岳狩百𨽻怠官事亡其舊帝時繼位顧曕咨嗟惟汝文武孰恤予家既斬吳蜀旋取山東魏將首義六州降從淮蔡不順自以為强提兵叫讙欲事故常始命討之遂連姦鄰隂遣刺客來賊相臣方戰未利内驚京師羣公上言莫若惠來帝為不聞與神為謀乃相同徳以訖天誅乃敕顔𦙍愬武古通咸統於𢎞各奏汝功三方分攻五萬其師大軍北乘厥數倍之常兵時曲軍士蠢蠢既翦凌雲蔡卒大窘勝之邵陵郾城來降自夏入秋復屯相望兵頓不勵告功不時帝哀征夫命相往釐士飽而歌馬騰於槽試之新城賊遇敗逃盡抽其有聚以防我西師躍入道無留者頟頟蔡城其疆千里既入而有莫不順俟帝有恩言相度來宣誅止其魁釋其下人蔡之卒夫投甲呼舞蔡之婦女迎門笑語蔡人告饑船粟往哺蔡人告寒賜以繒布始時蔡人禁不往來今相從戲里門夜開始時蔡人進戰退戮今旰而起左餐右粥為之擇人以收餘憊選吏賜牛教而不稅蔡人有言始迷不知今乃大覺羞前之為蔡人有言天子明聖不順族誅順保性命汝不吾信視此蔡方孰為不順往斧其吭凡叛有數聲勢相倚吾强不支汝弱奚恃其告而長而父而兄奔走偕來同我太平淮蔡為亂天子伐之既伐而饑天子活之始議伐蔡卿士莫隨既伐四年小大竝疑不赦不疑由天子明凡此蔡功惟斷乃成既定淮蔡四夷畢來遂開明堂坐以治之唐初雖稱燕許大手筆不過閎麗排偶耳視公作猶吹吷也皇甫持正作公墓誌稱公文云茹古涵今無有端涯渾渾灝灝不可窺校及其酣放毫曲快字凌紙怪發鯨鏗春麗驚耀天下然而栗宻窈眇章妥句適精能之至入神出天讀此文益見段文昌改作之文唐文粹載之比此正嬰孩耳以其鋪排而無作手也起筆從尚書周官脱來案唐書藩鎮傳全載此文克肖作克尚無明年平夏句延慶作鄜延寜慶浙西下多徐泗二字四軍作五軍大吏作天吏郊廟祠祀其無用樂節去祠其二字合戰去合字道封作進封下臣愈去臣字乃相作及相釋其作釋于今旰作今眠偕來作來偕至奔走率職作走職疑是脱誤未必省文乃爾和附作利亦誤柳子厚墓誌銘韓愈子厚諱宗元七世祖慶為拓䟦魏侍中封濟隂公曽伯祖奭為唐宰相與禇遂良韓瑗俱得罪武后死髙宗朝皇考諱鎮以事母棄太常博士求為縣令江南其後以不能媚權貴失御史權貴人死乃復拜侍御史號為剛直所與遊皆當世名人子厚少精敏無不通達逮其父時雖少年已自成人能取進士第嶄然見頭角衆謂柳氏有子矣其後以博學宏辭授集賢殿正字儁傑亷悍議論證據今古出入經史百子踔厲風發率常屈其座人名聲大振一時皆慕與之交諸公要人争欲令出我門下交口薦譽之貞元十九年由藍田尉拜監察御史順宗即位拜禮部員外郎遇用事者得罪例出為刺史未至又例貶永州司馬居閒益自刻苦務記覽為詞章汎濫停蓄為深博無涯涘而自肆於山水間元和中嘗例召至京師又偕出為刺史而子厚得柳州既至嘆曰是豈不足為政耶因其土俗為設教禁州人順賴其俗以男女質錢約不時贖子本相侔則没為奴婢子厚與設方計悉令贖歸其尤貧力不能者令書其傭足相當則使歸其質觀察使下其法於他州比一嵗免而歸者且千人衡湘以南為進士者皆以子厚為師其經承子厚口講指畫為文辭者悉有法度可觀其召至京師而復為刺史也中山劉夢得禹錫亦在遣中當詣播州子厚泣曰播州非人所居而夢得親在堂吾不忍夢得之窮無辭以白其大人且萬無母子俱往理請於朝將拜疏願以柳易播雖重得罪死不恨遇有以夢得事白上者夢得於是改刺連州嗚呼士窮乃見節義今夫平居里巷相慕悦酒食遊戲相徵逐詡詡强笑語以相取下握手出肺肝相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髪比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也此宜禽獸夷狄所不忍為而其人自視以為得計聞子厚之風亦可以少媿矣子厚前時少年勇於為人不自貴重顧藉謂功業可立就故坐廢退既退又無相知有氣力得位者推挽故卒死於窮裔材不為世用道不行於時也使子厚在臺省時自持其身已能如司馬刺史時亦自不斥斥時有人力能舉之且必復用不窮然子厚斥不久窮不極雖有出於人其文學辭章必不能自力以致必傳於後如今無疑也雖使子厚得所願為將相於一時以彼易此孰得孰失必有能辨之者子厚以元和十四年十一月八日卒年四十七以十五年七月十日歸葬萬年先人墓側子厚有子男二人長曰周六始四嵗季曰周七子厚卒乃生女子二人皆㓜其得歸葬也費皆出觀察使河東裴君行立行立有節概重然諾與子厚結交子厚亦為之盡竟賴其力葬子厚於萬年之墓者舅弟盧遵遵涿人性謹順學問不厭自子厚之斥遵從而家焉逮其死不去既往葬子厚又將經紀其家庶幾有始終者銘曰是惟子厚之室既固既安以利其嗣人安溪先生云子厚不過因一時依附之失末路悔過遷善又有政事可稱居一官則盡一官之職此乃君子人也豈徒文章與文公鼎峙哉全友陳少林亦云公此篇不為隠䕶而子厚心迹自見末段激昻旋折盡情極致子厚可以瞑目矣中叙朋友一節尤能使澆薄僥負一種人縮首流汗其有闗于世道人心者甚大故登斯選公生平最篤于朋友者故人存没多為薦㧞經紀故末叙裴盧二君特為稱賛不自貴重顧藉藉字句絶從安溪先生讀顧藉猶言顧惜耳韓子又有上鄭相公啟云無一分顧藉心此最為確註鱷魚文韓愈維年月日潮州刺史韓愈使軍事衙推秦濟以羊一豬一投惡溪之潭水以與鱷魚食而告之曰昔先王既有天下列山澤網繩擉刃以除蟲蛇惡物為民害者驅而出之四海之外及後王徳薄不能逺有則江漢之間尚皆棄之以與蠻夷楚越况潮嶺海之間去京師萬里哉鱷魚之涵淹卵育於此亦固其所今天子嗣唐位神聖慈武四海之外六合之内皆撫而有之况禹跡所掩揚州之近地刺史縣令之所治出貢賦以供天地宗廟百神之祀之壤者哉鱷魚其不可與刺史雜處此土也刺史受天子命守此土治此民而鱷魚睅然不安溪潭據處食民畜熊豕鹿麞以肥其身以種其子孫與刺史亢拒争為長雄刺史雖駑弱亦安肯為鱷魚低首下心伈伈睍睍為民吏羞以偷活於此耶且承天子命以來為吏固其勢不得不與鱷魚辯鱷魚有知其聽刺史言潮之州大海在其南鯨鵬之大蝦蠏之細無不容歸以生以食鱷魚朝發而夕至也今與鱷魚約盡三日其率醜類南徙於海以避天子之命吏三日不能至五日五日不能至七日七日不能是終不肯徙也是不有刺史聽從其言也不然則是鱷魚㝠頑不靈刺史雖有言不聞不知也夫傲天子之命吏不聽其言不徙以避之與冥頑不靈而為民物害者皆可殺刺史則選材技吏民操强弓毒矢以與鱷魚從事必盡殺乃止其無悔公至末年道氣益壯厲文益雄擅讀此可見公守潮州潮人思仰之甚故凡山水皆以公姓為號此以見振古人物小用之則小效誠心實政自足感人山水易名流風百世偉哉為裴相公讓官表韓愈臣某言伏奉今日制書以臣為朝議大夫守中書侍郎同中書門下平章事承命驚惶魂爽飛越俯仰天地若無所容臣某誠惶誠恐頓首頓首臣少涉經史粗知古今天與朴忠性惟愚直知事君以道無憚殺身慕當官而行不求利已人以為拙臣行不疑元和之初始拜御史旋以論事過切為宰臣所非移官府廷因佐戎幕陛下恕臣之罪憐臣之心㧞居侍從之中遂掌絲綸之重受恩益大顧已益輕茍耳目所聞知心力所迨及少闗政理輒以陳聞於禆補無㳙埃之微而䜛謗有丘山之積陛下知其孤立賞其微誠獨斷不謀奬待踰量臣誠見陛下具文武之徳有神聖之姿啓中興之宏圖當太平之昌厯勤身以儉與物無私威怒如雷霆容覆如天地實羣臣盡節之日才智效能之時聖君難逢重徳宜報苦心焦思以日繼夜茍利於國知無不為徒欲竭愚未免妄作陛下不加罪責更極寵光既領臺綱又毗邦憲聖君所厚兇逆所讎闕於防虞幾至斃踣恩私曲被性命獲全忝累祖先玷塵班列未知所措祇自内慙豈意陛下擢臣於傷殘之餘委臣以燮和之任忘其陋汙使佐聖明此雖成湯舉伊尹於庖㕑髙宗登傅說於版築周文用吕望於屠釣齊桓起寗戚於飯牛雪耻䝉光去辱居貴以今凖古擬議非倫陛下有四君之明行四君之事微臣無四子之美獲四子之榮豈可叨居以彰非據方今干戈未盡戢夷狄未盡賓麟鳯龜龍未盡游郊藪草木魚鼈未盡被雍熙當大有為之時得非常人之佐然後能上宣聖徳以代天工如臣等類實不克堪伏願博選周行旁及巖穴天生聖主必有賢臣得而授之乃可致理乞廻所授以叶羣情無任懇欵之至文至東漢漸趨簡鍊渾灝之氣不如西京至三國則又加選言之功以韻調勝六朝因而為四六綺靡之文唐初未離此習韓柳始一振之此篇雖以排偶行文然鎔經鑄史兼三國六朝之勝而渾灝流轉直廹西京者也歐蘇王曽謝表俱效此體綺靡之風衰矣論佛骨表韓愈伏以佛者夷狄之一法耳自後漢時流入中國上古未嘗有也昔者黄帝在位百年年百一十嵗少昊在位八十年年百嵗顓頊在位七十九年年九十八嵗帝嚳在位七十年年百五嵗帝堯在位九十八年年百一十八嵗帝舜及禹年皆百嵗此時天下太平百姓安樂夀考然而中國未有佛也其後殷湯亦年百嵗湯孫太戊在位七十五年武丁在位五十九年書史不言其年夀所極推其年數葢亦俱不减百嵗周文王年九十七嵗武王年九十三嵗穆王在位百年此時佛法亦未入中國非因事佛而致然也漢明帝時始有佛法明帝在位纔十八年耳其後亂亡相繼運祚不長宋齊梁陳元魏已下事佛漸謹年代尤促惟梁武帝在位四十八年前後三度捨身施佛宗廟之祭不用牲牢晝日一食止於菜果其後竟為侯景所逼餓死臺城國亦尋滅事佛求福乃更得禍由此觀之佛不足事亦可知矣髙祖始受隋禪則議除之當時羣臣材識不逺不能深知先王之道古今之冝推闡聖明以救斯弊其事遂止臣常恨焉伏惟睿聖文武皇帝陛下神聖英武數千百年已來未有倫比即位之初即不許度人為僧尼道士又不許創立寺觀臣常以為髙祖之志必行於陛下之手今縱未能即行豈可恣之轉令盛也今聞陛下令羣僧迎佛骨於鳯翔御樓以觀舁入大内又令諸寺遞迎供養臣雖至愚必知陛下不惑於佛作此崇奉以祈福祥也直以年豐人樂狥人之心為京都士庶設詭異之觀戲玩之具耳安有聖明若此而肯信此等事哉然百姓愚冥易惑難曉茍見陛下如此將謂真心事佛皆云天子大聖猶一心敬信百姓何人豈合更惜身命焚頂燒指百十為羣解衣散錢自朝至暮轉相倣效惟恐後時老少奔波棄其業次若不即加禁遏更歴諸寺必有斷臂臠身以為供養者傷風敗俗傳笑四方非細事也夫佛本夷狄之人與中國言語不通衣服殊製口不言先王之法言身不服先王之法服不知君臣之義父子之情假如其身至今尚在奉其國命來朝京師陛下容而接之不過宣政一見禮賓一設賜衣一襲衛而出之於境不令惑衆也况其身死已久枮朽之骨凶穢之餘豈冝令入宫禁孔子曰敬鬼神而逺之古之諸侯行弔於其國尚令巫祝先以桃茢祓除不祥然後進弔今無故取朽穢之物親臨觀之巫祝不先桃茢不用羣臣不言其非御史不舉其失臣實恥之乞以此骨付之有司投諸水火永絶根本斷天下之疑絶後代之惑使天下之人知大聖人之所作為出於尋常萬萬也豈不盛哉豈不快哉佛如有靈能作禍祟凡有殃咎宜加臣身上天鑒臨臣不怨悔無任感激懇悃之至無原道一篇不見韓公學問無佛骨一表不見韓公氣節或謂公生平耐不得困苦貶竄似非樂天知命者余謂公見義必為全無戀位素餐之態公初年在京師未免有汲汲求進之心然一為御史絶不顧惜則以諫宫市貶陽山矣既貶之後量移散秩如作送窮文進學解等篇大有牢騷不平之意然及其從平淮西作侍郎優游養望便可作相而公則以諫佛骨貶潮州矣潮州上表有窮蹙卑屈之意然及其再登朝則又身使盧龍面折庭凑更無推托畏懦之狀公之氣節屢挫不折如此所以為有唐葢代人物而配享孔廟不替也不然張禹孔光獨無文學哉請遷𤣥宗廟議韓愈右禮儀使奏謹按周禮天子七廟三昭三穆與太祖之廟而七尚書咸有一徳亦曰七世之廟可以觀徳荀卿子曰有天下者祭七代有一國者祭五代則知天子上祭七廟典籍通規祖功宗徳不在其數國朝九廟之制法周之文太祖景皇帝始為唐公肇基天命義同周之后稷髙祖神堯皇帝創業經始化隋為唐義同周之文王太宗文皇帝神武應期造有區夏義同周之武王其下三昭三穆謂之親廟與太祖而七四時常饗自如禮文伏以今年宗廟遞遷𤣥宗明皇帝在三昭三穆之外是親盡之祖雖有功徳新主入廟禮合祧藏太廟中第一夾室毎至禘祫之嵗合食如常謹議廟祧之禮鄭王異義自晉武遵行外祖之說六朝因之非周之舊矣此文所議最與經合惟祖景而不祖獻禘亦為合食之祭未為盡協耳文之醇懿簡潔誠所謂六經之學絶而復新者案李漢為昌黎門人之最親厚者集序云收拾遺文無所失墜獨不載此議後人始收之外集何也韓愈傳贊新唐書唐興承五代剖分王政不綱文弊質窮䵷蠅混并天下已定治荒剔蠧討究儒術以興典憲薫醲涵浸殆百餘年其後文章稍稍可述至貞元元和間愈遂以六經之文為諸儒倡障隄末流反刓以樸剗偽以真然愈之才自視司馬遷揚雄至班固以下不論也當其所得粹然一出於正刋落陳言横騖別驅汪洋大肆要之無牴牾聖人者其道蓋自比孟軻以荀况揚雄為未醇寧不信然至進諫陳謀排難䘏孤矯拂媮末皇皇於仁義可謂篤道君子矣自晉汔隋老佛顯行聖道不斷如帶諸儒倚天下正議助為怪神愈獨喟然引聖争四海之惑雖䝉訕笑跲而復奮始若未之信卒大顯於時昔孟軻拒楊墨去孔子才二百年愈排二家乃去千餘嵗撥衰反正功與齊而力倍之所以過况雄為不少矣自愈没其言大行學者仰之如泰山北斗云舊唐書贊韓公殊失推崇與輕儇文士初無大異此始極力尊崇山斗之名萬世不易文亦低徊往復鍊氣凝神出之韓公文千載獨步作其贊者幾經說研稱量敢輕下筆耶皇甫持正作韓公墓誌雖推尊其人然贊其文獨至李漢序公文雖提出道字作主然亦是贊其文能合于道耳韓公本因文見道者故二子所稱揚不過如此亦二子之本領則然也此篇造句琢語規步二子而見識議論抑又過之能道出韓公衞道深心古文雅正卷八
