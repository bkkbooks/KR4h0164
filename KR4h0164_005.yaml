body:
  text: 古文雅正卷五禮部侍郎蔡世逺編䇿丞相亮詔蜀漢後主朕聞天地之道福仁而禍淫善積者昌惡積者喪古今常數也是以湯武修德而王桀紂極暴而亡曩者漢祚中微網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡殘剝海內懷無君之心子丕孤竪敢尋亂階盜據神器更姓改物世濟其凶當此之時皇極幽昧天下無主則我帝命隕越於下昭烈皇帝體明睿之德光演文武應乾坤之運出身平難經營四方人鬼同謀百姓與能兆民欣戴奉順符讖建位昜號丕承天緒補弊興衰存復祖業膺誕皇綱不墜於地萬國未靜早世遐殂朕以幼沖繼統鴻基未習保傅之訓而嬰祖宗之重六合壅否社稷不建永惟所以念在匡救光載前緒未有攸濟朕甚懼焉是以夙興夜寐不敢自逸每崇菲薄以益國用勸分務穡以阜民財授方任能以參其聽斷私降意以養將士欲奮劍長驅指討凶逆朱旗未舉而丕復隕喪斯所謂不然我薪而自焚也殘類餘醜又支天禍恣睢河洛阻兵未弭諸葛丞相𢎞毅忠壯忘身憂國先帝託以天下以勗朕躬今授之以旄鉞之重付之以専命之權統領步騎二十萬衆董督元戎龔行天伐除患寧亂克復舊都在此行也昔項籍總一強衆跨州兼土所務者大然卒敗垓下死於東城宗族如焚為笑千載皆不以義陵上虐下故也今賊效尤天人所怨奉時宜速庶憑炎精祖宗威靈相助之福所向必克吳王孫權同恤災患潛軍合謀犄角其後涼州諸國王各遣月支康居胡侯支富康植等二十餘人詣受節度大軍北出便欲率將兵馬奮戈先驅天命既集人事又至師貞勢并必無敵矣夫王者之兵有征無戰尊而且義莫敢抗也故鳴條之役軍不血刃牧野之師商人倒戈今旍麾首路其所經至亦不欲窮兵極武有能棄邪從正簞食壺漿以迎王師者國有常典封寵大小各有品限及魏之宗族支葉中外有能規利害審逆順之數來詣降者皆原除之昔輔果絶親於智氏而蒙全宗之福微子去殷項伯歸漢皆受茅土之慶此前世之明驗也若其迷沉不反將助亂人不式王命戮及妻孥罔有攸赦廣宣恩威貸其元帥弔其殘民它如詔書律令丞相其露布天下使稱朕意焉聲罪致討詞嚴義正當時魏吳非無檄文佳篇然不可傳者國僭詞遁也然則世之以身許國屬筆為文者亦有幸不幸焉是以君子慎所擇隆中對三國志亮躬耕隴畝好為梁父吟身長八尺每自比于管仲樂毅時人莫之許也惟博陵崔州平潁川徐庶元直與亮友善謂為信然時先主屯新野徐庶見先主先主器之謂先主曰諸葛孔明者臥龍也將軍豈願見之乎先主曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之由是先主遂詣亮凡三往乃見因屏人曰漢室傾頽姦臣竊命主上蒙塵孤不度德量力欲信大義於天下而智術短淺遂用猖厥至于今日然志猶未已君謂計將安出亮答曰自董卓以來豪傑並起跨州連郡者不可勝數曹操比於袁紹則名微而衆寡然操遂能克紹以弱為強者非惟天時抑亦人謀也今操已擁百萬之衆挾天子以令諸侯此誠不可與爭鋒孫權據有江東已歷三世國險而民附賢能為之用此可與為援而不可圖也荆州北據漢沔利盡南海東連吳會西通巴蜀此用武之國而其主不能守此殆天所以資將軍將軍豈有意乎益州險塞沃野千里天府之土髙祖因之以成帝業劉璋暗弱張魯在北民殷國富而不知存恤智能之士思得明君將軍既帝室之胄信義著于四海總攬英雄思賢如渴若跨有荆益保其巖阻西和諸戎南撫彛越外結好孫權內修政理天下有變則命一上將將荆州之軍以向宛洛將軍身率益州之衆以出秦川百姓孰敢不簞食壺漿以迎將軍者乎誠如是則霸業可成漢室可興矣先主曰善於是與亮情好日密關侯張飛等不悅先主解之曰孤之有孔明猶魚之有水也願諸君勿復言二人乃止孔明初與潁川石廣元徐元直汝南孟公威等俱遊學人莫窺其抱負一日謂三人曰卿三人可至刺史郡守也或問其所至孔明笑而不言嗚呼規模宏逺矣隆中之對年才二十六嵗天下大勢了了如是厥後先主不能盡用其言以失荆州絶孫權故也孔明之不成天也忠武侯與范文正公皆年少時便以天下為已任者然一則讀書略觀大意不求甚解一則衣不解帶者五年夜或昏怠以水沃面讀書人當參觀之自然有得孔明讀書雖略觀其大意然其言曰夫學須靜也才須學也非學無以廣才非靜無以成學是何等體會但不為口耳記誦之學耳粗浮人安得藉口説孫權三國志先主至於夏口亮曰事急矣請奉命求救於孫將軍時權擁軍在柴桑亮説權曰海內大亂將軍起兵據有江東劉豫州亦收衆漢南與曹操並爭天下今操芟夷大難略已平矣遂破荆州威震四海英雄無所用武故豫州遁逃至此將軍量力而處之若能以吳越之衆與中國抗衡不如早與之絶若不能當何不案兵束甲北面而事之今將軍外托服從之名而內懷猶豫之計事急而不斷禍至無日矣權曰茍如君言劉豫州何不遂事之乎亮曰田橫齊之壯士耳猶守義不辱况劉豫州王室之胄英雄蓋世衆士慕仰若水之歸海若事之不濟此乃天也安能復為之下乎權勃然曰吾不能舉全吳之地十萬之衆受制于人吾計決矣非劉豫州莫可以當曹操者然豫州新敗之後安能抗此難乎亮曰豫州軍雖敗於長阪今戰士還者及關某水軍精甲萬人劉琦合江夏戰士亦不下萬人曹操之衆逺來疲弊聞追豫州輕騎一日一夜行三百餘里此所謂強弩之末勢不能穿魯縞者也故兵法忌之曰必蹶上將軍且北方之人不習水戰又荆州之民附操者逼兵勢耳非心服也今將軍誠能命猛將統兵數萬與豫州協規同力破操軍必矣操軍破必北還如此則荆吳之勢強鼎足之形成矣成敗之機在於今日權大悅即遣周瑜程普魯肅等水軍三萬隨亮詣先主并力拒曹公時操兵情孔明陳其三則公瑾籌其四患然孔明實備於公瑾何者超遂於時未即有異志操豈遂以此為返顧之憂哉至馬無草兵多疾兩事則不習水戰四字足以該之矣孔明䇿操之衆為疲衆荆之民為二卒以疲衆馭二卒而試之素所不習之水戰故曰破操必也公瑾文武籌略萬人之英然以視孔明其智略大小何如哉與法正論治蜀諸葛亮君知其一未知其二秦以無道政苛民怨匹夫大呼天下土崩高祖因之可以𢎞濟劉璋暗弱自焉以來有纍世之恩文法羈縻互相承奉德政不舉威刑不肅蜀土人士專權自恣君臣之道漸以陵替寵之以位位極則賤順之以恩恩竭則慢所以致弊實由於此吾今威之以法法行則知恩限之以爵爵加則知榮榮恩並濟上下有節為治之要於斯而著子産孔明皆千古大人物其忠誠奉國綜核名實亦略相類所處之地不同耳子産局于小國無可措手處孔明當僭魏之時義聲昭著千載下更令人崇仰此篇要當與子産與子太叔論政參看正議時魏臣華歆王朗等有書與亮陳天命人事使舉國稱藩亮不報作正議諸葛亮昔在項羽起不由德雖處華夏秉帝者之勢卒就湯鑊為後永戒魏不審鑒今次之矣免身為幸戒在子孫而二三子各以耆艾之齒承偽旨而進書有若崇竦稱莽之功亦將逼於元禍茍免者邪昔世祖之創迹舊基奮羸卒數千摧莾強旅四十餘萬於昆陽之郊夫據道討淫不在衆寡及至孟德以其譎勝之力舉數十萬之師救張郃於陽平勢窮慮悔僅能自脫辱其鋒鋭之衆遂喪漢中之地深知神器不可妄獲旋還未至感毒而死子桓淫逸繼之以篡縱使二三子多逞蘇張詭靡之説奉進歡兜滔天之辭欲以誣毁唐帝諷解禹稷所謂徒喪文藻煩勞翰墨者矣夫大人君子之所不為也又軍誡曰萬人必死橫行天下昔軒轅氏整卒數萬制四方定海內況以數十萬之衆據道而臨有罪可得而干擬者哉義炳日星辭嚴斧鉞却以羽扇風流出之諸葛君果名士也前出師表諸葛亮先帝創業未半而中道崩殂今天下三分益州疲弊此誠危急存亡之秋也然侍衛之臣不懈於內忠志之士忘身於外者蓋追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺德恢𢎞志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使內外異法也侍中侍郎郭攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能禆補闕漏有所廣益將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵為督愚以為營中之事悉以咨之必能使行陳和睦優劣得所親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍此悉貞良死節之臣願陛下親之信之則漢室之隆可計日而待也臣本布衣躬耕於南陽茍全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂歎恐託付不效以傷先帝之明故五月渡瀘深入不毛今南方已定兵甲已足當奬率三軍北定中原庶竭駑鈍攘除姦凶興復漢室還於舊都此臣所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈若無興德之言則責攸之禕允等之慢以彰其咎陛下亦宜自謀以咨諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕零不知所言須看其引君于道用人當可處置件件周詳故曰謹慎也殷深源輩無論矣張魏公當日忠肝義膽非不炳烈曾有此處置得宜否安溪先生嘗云觀南方已定甲兵已足數語未免涉于骯辭故有街亭之挫即舜當日亦自覺已德無歉故有有苖之逆先生此言非敢輕議聖賢蓋書曰滿招損謙受益孔子曰懼以終始其要無咎此言原徹上徹下也近代有評論有苖一節云當耕歷山時但知已之有罪故雖頑嚚亦可格當征有苖時但知有苖之可伐故不免有逆命之事此言看得極細嗚呼聖賢且然下一等者惕厲戒懼之功烏可一刻怠乎案蜀志公本傳及向朗傳營中之事下並無事無大小句陳承祚自據當時所上之集文選正同今集有此似是後人增加本傳損益文選從董允傳作規益若無興德之言句公傳亦無文選參用董傳今仍之後出師表諸葛亮先帝慮漢賊不兩立王業不偏安故託臣以討賊也以先帝之明量臣之才故知臣伐賊才弱敵強也然不伐賊王業亦亡惟坐待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不可得偏全於蜀都故冒危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵法乘勞此進趨之時也謹陳其事如左髙帝明並日月謀臣淵深然涉險被創危然後安今陛下未及高帝謀臣不如良平而欲以長計取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計動引聖人羣疑滿腹衆難塞胸今嵗不戰明年不征使孫䇿坐大遂并江東此臣之未解二也曹操智計殊絶于人其用兵也倣佛孫吳然困於南陽險於烏巢危於祁連逼於黎陽幾敗北山殆死潼關然後偽定一時耳况臣才弱欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委夏侯而夏侯敗亡先帝每稱操為能猶有此失况臣駑下何能必勝此臣之未解四也自臣到漢中中間期年耳然喪趙雲陽羣馬玉閻芝丁立白壽劉郃鄧銅等及曲長屯將七十餘人突將無前賨叟青羌散騎武騎一千餘人此皆數十年之內所紏合四方之精鋭非一州之所有若復數年則損三分之二也當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及今圖之欲以一州之地與賊持久此臣之未解六也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下已定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吳更違盟關某毁敗秭歸蹉跌曹丕稱帝凡事如此難可逆見臣鞠躬盡力死而後已至於成敗利鈍非臣之明所能逆覩也前表氣較雄有吞曹魏之心後表曉諭多端只是以死濟之公于是時亦知費手做但不得不如此做耳程子云出師表與伊訓説命相表裏讀其書堪與天日並垂也管葛並稱兩人之才亦不相下其治國也或以為管涉功利葛庶幾禮樂此中亦若有辨但所處之地各不同管當日不敢代周天子而君之迫于大義想出伯諸侯已無别法卒為所欲為葛仗義執言只一條鞭論事勢管順手而葛費手論情形管周折而葛直捷諫絶孫權孫權稱尊號其羣臣以並尊二帝來告議者以為名體弗順宜顯明正義絶其盟好亮疏云諸葛亮權有僭逆之心久矣國家所以略其釁情者求犄角之援也今若加顯絶讐我必深便當移兵東戍與之角力須并其土乃議中原彼賢才尚多將相緝穆未可一朝定也頓兵相持坐而須老使北賊得計非算之上者昔孝文卑辭胸奴先帝優與吳盟皆應權通變𢎞思逺益非匹夫之為分者比今議者咸以權利在鼎足不能并力且志望已滿無上進之情推此皆似是而非也何者其智力不侔故限江自保權之不能越江猶魏賊之不能渡漢非力有餘而利不取也若大軍致討彼上當分裂其地以為後規下當略民廣境示武於內非端坐者也若就其不動而睦於我我之北伐無東顧之憂河南之衆不得盡西此之為利亦已深矣權僭之罪未宜明也確守隆中時東和吳會之言先主惟不能忍此故為陸遜折辱耳答李嚴書李平初名嚴與亮書勸亮宜受九賜進爵稱王亮答之諸葛亮吾與足下相知久矣可不復相解足下方誨以光國戒之以勿拘之道是以未得默已吾本東方下士誤用於先帝位極人臣祿賜百億今討賊未效知已未答而方寵齊晉坐自貴大非其義也若滅魏斬睿帝還故居與諸子並升雖十命可受况於九邪語本血誠兼可愧勵僚屬諸葛公短札千載下猶令人心動况身受者乎與李豐教諸葛亮吾與君父子戮力以奬漢室此神明所聞非但人知之也表都護典漢中委君於東關者不與人議也謂至心感動終始可保何圖中乖乎昔楚卿屢絀亦乃克復思道則福應自然之數也願寬慰都護勤追前闕今雖解任形業失故奴婢賓客百數十人君以中郎參軍居府方之氣類猶為上家若都護思負一意君與公琰推心從事者否可復通逝可復還也詳思斯戒明吾丹心臨書長歎涕泣而已諸葛公語語刺人心骨宜乎既沒之後李嚴傷痛不已也讀至䇿後人不能故也一句有心人猶為流涕與羣下教諸葛亮夫參署者集衆思廣忠益也若逺小嫌難相違覆曠闕損矣違覆而得中猶棄敝蹻而獲珠玉然人心苦不能盡惟徐元直處兹不惑又董幼宰參署七年事有不至至於十反來相啓告茍能慕元直之不惑幼宰之殷勤有忠於國則亮可少過矣又昔初交州平屢聞得失後交元直勤見啓誨前參軍於幼宰每言則盡後從事於偉度數有諫止雖姿性鄙暗不能悉納然與此四子終始好合亦足以明其不疑於直言也讀此知剛愎自用者非徒德否亦係才短司馬公諸賢苦口于介甫而不能用人之度量相越豈不逺哉自表後主諸葛亮伏念臣賦性拙直遭時艱難興師北伐未獲全功何期病在膏肓命垂旦夕伏願陛下清心寡欲約已愛民達孝道于先君布仁心于寰宇提拔逸隱以進賢良屏黜姦讒以厚風俗臣家成都有桑八百株薄田十五頃子弟衣食自有餘饒至於臣在外任無别調度隨身衣食悉仰于官不别治生以長尺寸若臣死之日不使內有餘帛外有贏財以負陛下及卒如其所言以諸葛公之才至其自許也但曰謹慎其遺表自明也但以亷耳以此知心粗氣浮人做不得些少事業而利心未斷之人終為小人之歸耳公當國既久專制在外恐不免為庸主所疑且讒間易生故公言及之使對昭烈必不發此言也案本傳成都有桑起無前一段集今有之上諸葛亮文集表陳壽臣壽等言臣前在著作郎侍中領中書監濟北侯臣荀勗中書令關內侯臣和嶠奏使臣定故蜀丞相諸葛亮故事亮毗佐危國負阻不賓然猶存録其言恥善有遺誠是大晉光明至德澤被無疆自古以來未之有倫也輒刪除復重隨類相從凡為二十四篇篇名如右亮少有逸羣之才英霸之器身長八尺容貌甚偉時人異焉遭漢末擾亂隨叔父玄避難荆州躬耕於野不求聞達時左將軍劉備以亮有殊量乃三顧亮於草廬之中亮深謂備雄姿傑出遂解帶寫誠厚相結納及魏武帝南征荆州劉琮舉州委質而備失勢衆寡無立錐之地亮時年二十七乃建竒䇿身使孫權求援吳會權既宿服仰備又覩亮竒雅甚敬重之即遣兵三萬人以助備備得用與武帝交戰大破其軍乘勝克捷江南悉平後備又西取益州益州既定以亮為軍師將軍備稱尊號拜亮為丞相録尚書事及備殂沒嗣子幼弱事無巨細亮皆専之於是外連東吳內平南越立法施度整理戎旅工械技巧物究其極科教嚴明賞罰必信無惡不懲無善不顯至於吏不容姦人懷自厲道不拾遺強不侵弱風化肅然也當此之時亮之素志進欲龍驤虎視苞括四海退欲跨陵邊疆震蕩宇內又自以為無身之日則未有能蹈涉中原抗衡上國者是以用兵不戢屢耀其武然亮才於治戎為長竒謀為短理民之幹優於將略而所與對敵或值人傑加衆寡不侔攻守異體故雖連年動衆未能有克昔蕭何薦韓信管仲舉王子城父皆忖已之長未能兼有故也亮之器能政理抑亦管蕭之亞匹也而時之名將無城父韓信故使功業陵遲大義不及耶蓋天命有歸不可以智力爭也青龍二年春亮帥衆出武功分兵屯田為久駐之基其秋病卒黎庶追思以為口實至今梁益之民咨述亮者言猶在耳雖甘棠之詠召公鄭人之歌子産無以逺譬也孟軻有云以逸道使民雖勞不怨以生道殺人雖死不忿信矣論者或怪亮文彩不艷而過于丁寧周至臣愚以為咎繇大賢也周公聖人也考之尚書咎繇之謨略而雅周公之誥煩而悉何則咎繇與舜禹共談周公與羣下矢誓故也亮所與言盡衆人凡士故其文指不得及逺也然其聲教遺言皆經事綜物公誠之心形于文墨足以知其人之意理而有補于當世伏惟陛下邁縱古聖蕩然無忌故雖敵國誹謗之言咸肆其辭而無所革諱所以明大通之道也謹録寫上詣著作臣壽誠惶誠恐頓首頓首死罪死罪余雅愛慕公凡公之文以及序論公之文皆愛玩不置況此篇極力表揚頓挫曲折尤為千古至文案陳承祚之於諸葛公反復嗟嘆崇闡不遺餘力矣乃晉書傳中或以謂公將略非長無應敵之才議者以此少之至唐裴晉公孫可之猶沿此論不知敵國史臣體自應爾至并為推原出師未捷之故此何異浣花叟之淚滿襟玉溪生之恨有餘耶惟吕東平廟記謂惜其才有餘而見未至不免蚍蜉之撼耳代劉𢎞祭諸葛武侯文李興天子命我於沔之陽聽鼓鼙而永思庶前哲之遺光登隆山以逺望軾諸葛之故鄉蓋神物應機大器無方通人靡滯大德不常故谷風發而騶虞嘯雲雷升而潛鱗驤摰解褐於三聘尼得招而褰裳管豹變於受命貢感激以回莊異徐生之摘寶釋臥龍於深藏偉劉氏之傾蓋嘉吾子之周行夫有知已之主則有竭命之良固所以三分我漢鼎跨帶我邊荒抗衡我北面馳騁我魏強者也英哉吾子獨含天靈豈神之祗豈人之精何思之深何德之清異世通夢恨不同生推子八陳不在孫吳木牛之竒則亦般模神弩之功一何微妙千井齊甃又何祕要昔在顛夭有名無迹孰若吾儕良籌妙畫臧文既沒以言見稱又未若子言行並徴夷吾反坫樂毅不終奚比於爾明哲守沖臨終受寄讓過許由負扆涖事民言不流刑中於鄭教美於魯蜀民知恥河渭安堵匪臯則伊寧比管晏豈徒聖宣慷慨屢嘆昔爾之隱卜惟此宅仁智所處能無規廓日居月諸時隕其夕誰能不沒貴有遺格惟子之勳移風來世咏歌餘典懦夫將厲遐哉邈矣厥規卓矣凡若吾子難可究已疇昔之乖萬里殊途今我來思覿爾故墟漢高歸魂於豐沛太公五世而反周想罔兩以倣佛冀影響之有餘魂而有靈豈其識諸時去諸葛公未久便爾推尊明德逺矣駁諸將田地議趙雲霍去病以胸奴未滅無用家為今國賊非但胸奴未可求安也須天下都定各反桑梓歸耕本土乃其宜耳益州人民初罹兵革田宅皆可歸還令安居復業然後可役調得其歡心子龍身經百戰未嘗敗衄讀此篇知其忠以奉上亷以潔已純臣也諫征孫權趙雲國賊是曹操非孫權也且先滅魏則吳自服操身雖斃子丕篡盜當因衆心早圖關中居河渭上流以討凶逆關東義士必裹糧䇿馬以迎王師不應置魏先與吳戰兵勢一交不得卒解也此與孔明同一髙見蜀漢總坐此害事耳先主既沒之後悔之晚矣管幼安論傅玄寧以衰亂之時世多妄變氏族者違聖人之制非禮命姓之意故著氏姓論以原本世系文多不載每所居姻親知舊鄰里有困窮者家儲雖不盈擔石必分以贍救之與人子言教以孝與人弟言教以弟言及人臣誨以忠貌甚恭言甚順觀其行邈然若不可及即之熙熙然甚柔而溫因其事而導之於善是以漸之者無不化焉寧之亡天下知與不知聞之無不嗟嘆醇德之所感若此不亦至乎幼安事業不概見獨以潛德高千古此論揚闡其意理備于本傳矣其為氏姓論非不能他有論著逢時之難默足以容唐陸忠宣宋趙忠簡既遭廢斥乃以醫方自娛氏姓不猶愈於醫方乎嗣是晉興雅重閥閲又未必非兹論有以啓之也不曰與人臣言而曰言及人臣以見其未嘗與圭組者言特親知鄰舊言偶及於臣道耳東漢自嚴子陵抗節富春故處士高志敦行者最多如黃叔度徐孺子郭有道管幼安其尤也晉有陶靖節唐士多競進故著名者少宋則陳希夷徐仲車最佳邵康節名儒又高一格求存問親戚疏曹植臣聞天稱其高者以無不覆地稱其廣者以無不載日月稱其明者以無不照江海稱其大者以無不容故孔子曰大哉堯之為君惟天為大惟堯則之夫天德之於萬物可謂𢎞廣矣蓋堯之為教先親後疏自近及逺其傳曰克明峻德以親九族九族既睦平章百姓及周之文王亦崇厥化其詩曰刑于寡妻至于兄弟以御于家邦是以雍雍穆穆風人詠之昔周公弔管蔡之不咸廣封懿親以藩屏王室傳曰周之宗盟異姓為後誠骨肉之恩爽而不離親親之義實在敦固未有義而後其君仁而遺其親者也伏惟陛下資帝唐欽明之德體文王翼翼之仁惠洽椒房恩昭九族羣后百寮番休遞上執政不廢於公朝下情得展於私室親理之路通慶弔之情展誠可謂恕己治人推惠施恩者矣至於臣者人道絶緒禁錮明時臣竊自傷也不敢過望交氣類修人事敘人倫近且婚媾不通兄弟乖絶吉凶之問塞慶弔之禮廢恩紀之違甚于路人隔閡之異殊於胡越今臣以一切之制永無朝覲之望至於注心皇極結情紫闥神明知之矣然天實為之謂之何哉退惟諸王常有戚戚具爾之心願陛下沛然垂詔使諸國慶問四節得展以敘骨肉之歡恩全怡怡之篤義妃妾之家膏沐之遺嵗得冉通齊義於貴宗等惠於百司如此則古人之所嘆風雅之所詠復存於聖世矣臣伏自惟省無錐刀之用及觀陛下之所拔授若以臣為異姓竊自料度不後於朝士矣若得辭逺遊戴武辨解朱組佩青紱駙馬奉車趣得一號安宅京室執鞭弭筆出從華蓋入侍輦轂承答聖問拾遺左右乃臣丹誠之至願不離於夢想者也逺慕鹿鳴君臣之宴中詠常棣匪他之誡下思伐木友生之義終懷蓼莪罔極之哀每四節之會塊然獨處左右惟僕𨽻所對惟妻子高談無所與陳發義無所與展未嘗不聞樂而拊心臨觴而嘆息也臣伏以為犬馬之誠不能動人譬人之誠不能動天崩城隕霜臣初信之以臣心况徒虛語耳若葵藿之傾葉太陽雖不為之回光然終向之者誠也臣竊自比葵藿若降天地之施垂三光之明者實在陛下臣聞文子曰不為福始不為禍先今之否隔友于同憂而臣獨倡言者竊不願於聖世使有不蒙施之物有不蒙施之物必有慘毒之懷故柏舟有天只之怨谷風有棄豫之嘆故伊尹恥其君不為堯舜孟子曰不以舜之所以事堯事其君者不敬其君者也臣之愚蔽固非虞伊至於欲使陛下崇光被時雍之美宣緝熙章明之德者是臣慺慺之誠竊所獨守實懷鶴立企佇之心敢復陳聞者兾陛下儻發天聰而垂神聽也當與贈白馬王詩參看文極沉鬱頓挫之致子長報任安書栁子厚與許孟容書與此篇皆嘔心至文也子長語多激子厚語多哀子建語多痛獨登此者以其關倫理之大耳戒子琇從軍入蜀教辛憲英行矣戒之古之君子入則致孝於親出則致節於國在職思其所司在義思其所立不遺父母憂患而已軍旅之間可以濟者其惟仁恕乎汝其慎之簡約無多情文備至仁恕二字無一刻而可忘無所往而不利後羊琇竟免于鍾會之難此戒之力哉誡子書王昶夫人為子之道莫大於寶身全行以顯父母此三者人知其善而或危身破家陷於滅亡之禍者何也由所祖習非其道也夫孝敬仁義百行之首行之而立身之本也孝敬則宗族安之仁義則鄉黨重之此行成於內名著於外者矣人若不篤於至行而背本逐末以陷浮華焉以成朋黨焉浮華則有虛偽之纍朋黨則有彼此之患皆由惑當時之譽昧目前之利故也夫富貴聲名人情所樂而君子或得而不處何也惡不由其道耳知進而不知退知欲而不知足故有困辱之纍悔吝之咎語曰如不知足則失所欲故知足之足常足矣覽往事之成敗察將來之吉凶未有干名要利欲而不厭而能保世持家永全福祿者也欲使汝曹立身行已遵儒者之教履道家之言故以元默沖虛為名欲使汝曹顧名思義不敢違越也古者盤盂有銘几杖有誡俯仰察焉用無過行况在已名可不戒之哉夫物速成則疾亡晚就則善終朝華之草夕而零落松柏之茂隆寒不衰是以大雅君子惡速成戒闕黨也若范丐對秦客至武子擊之折其委笄惡其掩人也夫人有善鮮不自伐有能者寡不自矜伐則掩人矜則陵人掩人者人亦掩之陵人者人亦陵之故三卻為戮於晉王叔負罪於周不惟矜善自伐好爭之咎乎故君子不自稱非以讓人惡其蓋人也夫毁譽愛惡之原而禍福之機也是以聖人慎之孔子曰吾之於人誰毁誰譽如有所譽必有所試又曰子貢方人賜也賢乎哉我則不暇以聖人之德猶尚如此況庸庸之徒而輕毁譽哉昔伏波將軍馬援戒其兄子言聞人之惡當如聞父母之名耳可得而聞口不可得而言也斯戒至矣人或毁已當退而求之於身若已有可毁之行則彼言當矣若已無可毁之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉諺曰救寒莫如重裘止謗莫如自修斯言信矣汝先人世有冠冕惟仁義為名守慎為稱孝弟於閨門務學於師友吾與時人從事雖出處不同然各有所取頴川郭伯益好尚通達敏而有知其為人𢎞曠不足輕貴有餘得其人重之如山不得其人忽之如草吾親之昵之不願兒子為之北海徐偉長不治名髙不求茍得淡然自守惟道是務其有所是非則託古人以見其意當時無所褒貶吾敬之重之願兒子師之若引而伸之觸類而長之汝其庶幾舉一隅耳及其用財先九族其施舍務周急其出入存故老其論議貴無貶其進仕尚忠節其取人務道實其處勢戒驕淫其貧賤慎無戚其進退念合宜其行事如九思如此而已吾復何憂哉反覆周至總不出慎厚二字慎則敬心常存厚則仁心為質立身處世盡于是矣王氏之世昌也宜哉拒操議周瑜操雖託名漢相其實漢賊也將軍以神武雄才兼仗父兄之烈割據江東地方數千里兵精足用英雄樂業尚當橫行天下為漢家除殘去穢况操自送死而可迎之耶請為將軍籌之今使北土已安操無內憂能曠日持久來爭強場又能與我較勝負於船楫可乎今北土既未平安加馬超韓遂尚在關西為操後患且舍鞍馬杖舟楫與吳越爭衡本非中國所長又今盛寒馬無稿草驅中國士衆逺涉江湖之間不習水土必生疾病此數四者用兵之患也而操皆冒行之將軍禽操冝在今日瑜請得精兵三萬人進住夏口保為將軍破之語皆了了雄快之極公瑾破曹千古稱快陸遜破昭烈吕蒙殺壯繆為吳謀非不忠然千載後皆不喜于吕陸此公心也正程子所謂惻隱之心也古文雅正卷五
