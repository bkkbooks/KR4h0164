body:
  text: 古文雅正卷十禮部侍郎蔡世逺編平邊䇿王朴唐失道而失吳蜀晉失道而失幽并觀所以失之之由知所以平之之術當失之時君暗政亂兵驕民困近者姦於內逺者叛於外小不制而至於僭大不制而至於濫天下離心人不用命吳蜀乘其亂而竊其號幽并乘其間而據其地平之之術在乎反唐晉之失而已必先進賢退不肖以清其時用能去不能以審其材恩信號令以結其心賞功罰罪以盡其力恭儉節用以豐其材徭役以時以阜其民俟其倉廩實器用備人可用而舉之彼方之民知我政化大行上下同心力強財足人安將和有必取之勢則知彼情狀者願為之間諜知彼山川者願為之先導彼民與此民之心同是與天意同與天意同則無不成之功攻取之道從易者始當今惟吳易圖東至海南至江可撓之地二千里從少備處先撓之備東則撓西備西則撓東彼必奔走以救其弊奔走之間可以知彼之虛實衆之強弱攻虛擊弱則所向無前矣勿大舉但以輕兵撓之彼人怯弱知我師入其地必大發以來應數大發則民困而國竭一不大發則我獲其利彼竭我利則江北諸州乃國家之所有也既得江北則用彼之民揚我之兵江之南亦不難平之也如此則用力少而收功多得吳則桂廣皆為內臣岷蜀可飛書而召之如不至則四面並進席卷而蜀平矣吳蜀平幽可望風而至惟並必死之冦不可以恩信誘必須以強兵攻力已竭氣已喪不足以為邊患可為後圖方今兵力精練器用具備羣下知法諸將用命一稔之後可以平邊臣書生也不足以講大事至於不達大體不合機宜惟陛下寬之五代惟世宗為第一賢君使假之年削平諸國必矣削平諸國之後其規模豈隋文等比哉王朴此篇天下大勢了了亦與淮陰漢中之言孔明隆中之對相似上半説治國規模尤為深知治體者王景略一流也一行傳論五代史嗚呼五代之亂極矣傳所謂天地閉賢人隱之時歟當此之時臣弒其君子弒其父而搢紳之士安其祿而立其朝充然無復廉恥之色者皆是也吾以謂自古忠臣義士多出於亂世而怪當時可道者何少也豈果無其人哉雖曰干戈興學校廢而禮義衰風俗隳壞至於如此然自古天下未嘗無人也吾意必有潔身自負之士嫉世逺去而不可見者自古材賢有韞於中而不見於外或窮居陋巷委身草莽雖顔子之行不遇仲尼而名不彰况世變多故而君子道消之時乎吾又以謂必有負材能修節義而沉淪於下泯沒而無聞者求之傳記而亂世崩離文字殘缺不可復得然僅得者四五人而已處乎山林而羣麋鹿雖不足以為中道然與其食人之祿俯首而包羞孰若無愧於心放身而自得吾得二人焉曰鄭遨張薦明勢利不屈其心去就不違其義吾得一人焉曰石昻茍利於君以忠獲罪何必自明有至死而不言者此古之義士也吾得一人焉曰程福贇五代之亂君不君臣不臣父不父子不子至於兄弟夫婦人倫之際無不大壞而天理幾乎其滅矣於此之時能以孝悌自修於一鄉而風行於天下者猶或有之然其事迹不著而無可紀次獨其名氏或因見於書者吾亦不敢沒而其略可録者吾得一人焉曰李自倫作一行傳得太史公之神髓可以闡幽可以勵俗先君子極喜誦此篇讀之猶感愴有餘思也伶官傳論五代史嗚呼盛衰之理雖曰天命豈非人事哉原莊宗之所以得天下與其所以失之者可以知之矣世言晉王之將終也以三矢賜莊宗而告之曰梁吾仇也燕王吾所立契丹與吾約為兄弟而皆背晉以歸梁此三者吾遺恨也與爾三矢爾其無忘乃父之志莊宗受而藏之於廟其後用兵則遣從事以一少牢告廟請其矢盛以錦囊負而前驅及凱還而納之方其係燕父子以組函梁君臣之首入于太廟還矢先王而告以成功其意氣之盛可謂壯哉及仇讐已滅天下已定一夫夜呼亂者四應倉皇東出未見賊而士卒離散君臣相顧不知所歸至於誓天斷髮泣下沾襟何其衰也豈得之難而失之易歟抑本其成敗之迹而皆自于人歟書曰滿招損謙受益憂勞可以興國逸豫可以亡身自然之理也故方其盛也舉天下之豪傑莫能與之爭及其衰也數十伶人困之而身死國滅為天下笑夫禍患嘗積于忽微而智勇多困于所溺豈獨伶人也哉唐莊宗自平梁以前英雄俶儻所向無前一小太宗也後來狼狽乃如是逸豫之中人也殆哉世有半生勤勞得第居官後因利心勝逸心萌不旋踵而凌替者多矣况子孫以逸豫承之有不速壞乎成立之難如升天覆墜之易如燎毛正堪痛心刻骨子長論贊文多短簡或論其一二軼事或感慨數語孟堅則是非不茍直下斷制語矣自是以後摹倣二家確守繩墨惟歐公論贊忠君愛國之心形于筆墨欲使人主有所規戒後世有所勸懲其文之短長不拘因此可覘其品識馮道傳論五代史傳曰禮義亷恥國之四維四維不張國乃滅亡善乎管生之能言也禮義治人之大法廉恥立人之大節蓋不廉則無所不取不恥則無所不為人而如此則禍亂敗亡亦無所不至况為大臣而無所不取無所不為則天下其有不亂國家其有不亡者乎豫讀馮道長樂老敘見其自述以為榮其可謂無廉恥者矣則天下國家可從而知也豫於五代得全節之士三死事之臣十有五而怪士之被服儒者以學古自名而享人之祿任人之國者多矣然使忠義之節獨出於武夫戰卒豈於儒者果無其人哉豈非髙節之士惡時之亂薄其世而不肯出歟抑君天下者不足顧而莫能致之歟孔子以謂十室之邑必有忠信豈虛言也哉豫嘗得五代時小説一篇載王凝妻李氏事以一婦人猶能如此則知世固嘗有其人而不得見也凝家青徐之間為虢州司户參軍以疾卒於官凝家素貧一子尚幼李氏攜其子負其遺骸以歸東過開封止旅舍主人見其婦人獨攜一子而疑之不許其宿李氏顧天已暮不肯去主人牽其臂而出之李氏仰天長慟曰我為婦人不能守節而此手為人執邪不可以一手并汚吾身即引斧自斷其臂路人見者環聚而嗟之或為之彈指或為之泣下開封尹聞之白其事於朝官為賜藥封瘡厚恤李氏而笞其主人者嗚呼士不自愛其身而忍恥以偷生者聞李氏之風宜少知愧哉取一絶無恥者與極節烈者同論不加點竄自然成文此等最有關于風教馮道先事燕猶為君臣之分未定也後歸唐相明宗明宗為五季賢主道之進規猶有大臣風度使其遂死豈不為五季名臣哉在郭崇韜安重誨之上矣老而不死遂無恥至此職方考論五代史嗚呼自三代以上莫不分土而治也後世鑒古矯失始郡縣天下而自秦漢以來為國孰與三代長短及其亡也未始不分至或無地以自存焉蓋得其要則雖萬國而治失其所守則雖一天下不能以容豈非一本於道德哉唐之盛時雖名天下為十道而其勢未分既其衰也置軍節度號為方鎮鎮之大者連州十餘小者猶兼三四故其兵驕則逐帥帥強則叛上土地為其世有干戈起而相侵天下之勢自兹而分然唐自中世多故矣其興衰救難常倚鎮兵扶持而侵凌亂亡亦終以此豈其利害之理然歟自僖昭以來日益割裂梁初天下别為十一南有吳浙荆湖閩漢西有岐蜀北有燕晉而朱氏所有七十八州以為梁莊宗初起并代取幽滄有州三十五其後又取梁魏博等十有六州合五十一州以滅梁岐王稱臣又得其州七同光破蜀已而復失惟得秦鳯階成四州而營平二州陷于契丹其增置之州一合一百二十三州以為唐石氏入立獻十有六州于契丹而得蜀金州又增置之州一合一百九州以為晉劉氏之初秦鳯階成復入于蜀隱帝時增置之州一合一百六州以為漢郭氏代漢十州入於劉旻世宗取秦鳯階成瀛漠及淮南十四州又增置之州五而廢者三合一百一十八州以為周宋興因之此中國之大略也其餘外屬者強弱相并不常其得失至于周末閩已先亡而在者七國自江以下二十一州為南唐自劍以南及山南西道四十六州為蜀自湖南北十州為楚自浙東西十三州為吳越自嶺南北四十七州為南漢自太原以北十州為東漢而荆歸峽三州為南平合中國所有二百六十八州而軍不在焉唐之封疆逺矣前史備載而羈縻寄治虛名之州在其間五代亂世文字不完而時有廢省又或陷于夷狄不可考究其詳其可見者具之如譜極繁碎敘得極簡明故曰馬班以後諸史不但學識無歐公比即文墨亦當推第一孟堅諸侯王表序多襲子長原文此則效其體製而變化出之仁宗紀贊宋史贊曰仁宗恭儉仁恕出於天性一遇水旱或密禱禁廷或跣立殿下有司請以玉清舊地為御苑帝曰吾奉先帝苑囿猶以為廣何以是為燕私常服浣濯帷帟衾裯多用繒絁宫中夜飢思膳燒羊戒勿宣索恐膳夫自此戕賊物命以備不時之須大辟疑者皆令上讞嵗常活千餘吏部選人一坐失入死罪皆終身不遷每諭輔臣曰朕未嘗詈人以死况敢濫用辟乎至於夏人犯邊禦之出境契丹渝盟增以嵗幣在位四十二年之間吏治若偷惰而任事蔑殘刻之人刑法似縱弛而決獄多平允之士國未嘗無嬖幸而不足以纍治世之體朝未嘗無小人而不足以勝善類之氣君臣上下惻怛之心忠厚之政有以培壅宋三百餘年之基子孫一矯其所為馴致于亂傳曰為人君止於仁帝誠無愧焉漢文帝宋仁宗三代以下所首推者論贊亦酷效孟堅漢文贊富弼文彥博傳贊宋史論曰國家當隆盛之時其大臣必有耆艾之福推其有餘足芘當世富弼再盟契丹能使南北之民數十年不見兵革仁人之言其利溥哉文彥博立朝端重顧盼有威逺人來朝仰望風采其德望固足以折衝禦侮於千里之表矣至於公直忠亮臨事果斷皆有大臣之風又皆享髙爵於承平之秋至和之末共定大計功成退居朝野倚重熙豐而降弼彥博相繼以老憸人無忌善類淪胥而宋業衰矣書曰畨畨良士旅力既愆我尚有之豈不信然哉宋初三朝宰相朱子推李文靖為第一然二吕二王文正皆賢相也仁宗朝政府名賢推韓范富歐陽然范歐僅為參政未作平章推四賢相其韓富杜文乎杜文人物稍不及韓范富歐然賢相則一論贊凝重得體末一段説得賢人關係國運尤傷感于紹述以後也諫垣存藁序韓琦夫善諫者無諷也無顯也主於理勝而已矣故主於諷者必優柔微婉廣引譬喻冀吾説之可行而不知事不明辨則忽而不聽也主於顯者必暴揚激許恐以危亡謂吾言之能動而不知論或過當則怒而不信也夫欲説而必聽言而必信茍不以理勝之為主難矣哉琦景祐中任三司度支判官以族貧求外補得舒州將行而上以諫官缺擢授右司諫而留之竊惟言責之重非面折廷諍之難蓋知體得宜為難夫得通明端朴髙識博學之士則動必中理日益君聽而使愚不肖者冒而居之固不勝其任矣遂兩上章辭不報乃喟然自謂曰上之知汝任汝之意厚矣汝之所言當顧體酌宜主於理勝而以至誠將之兹所以報陛下知而任之之意若知時之不可行而徒為髙論以賣直取名汝罪不容誅矣在職越三載凡明得失正綱紀辨忠良擊權幸時人所不敢言必昧死論列之上寬而可其奏者十八九卒免重戮進登掖垣實前自為誡之力也其所存藁欲斂而焚之以效古人謹密之義然念詩書所載從諫而聖君之德也衮闕而補臣之忠也前代諫諍之臣嘉言讜議布在方䇿使覽之者知人主從善之美致治之原若皆削而燔之則後世何法焉于是存而録之離為上中下三卷命曰諫垣存藁以藏于家竊思夫上之聰仁大度自三代漢唐以來虛懷納諫甚盛德之主皆所不及復俾子孫傳而閲之知直道之無咎忠教之有迹云時慶厯二年三月十五日秦亭西齋序昔王文正公曽最喜公疏曰他如希文亦未免近名今讀公自序主於理勝而以至誠將之范希文所同特范公氣稍勝耳韓公不賣直取名而又曰時人所不敢言必昧死論列之憤激者當知所取裁庸懦者亦無所藉口矣嶽陽樓記范仲淹慶厯四年春滕子京謫守巴陵郡越明年政通人和百廢俱興乃重修嶽陽樓增其舊制刻唐賢今人詩賦於其上屬豫作文以記之豫觀夫巴陵勝狀在洞庭一湖銜逺山吞長江浩浩湯湯橫無際涯朝暉夕陰氣象萬千此則嶽陽樓之大觀也前人之述備矣然則北通巫峽南極瀟湘遷客騷人多會於此覽物之情得無異乎若夫霪雨霏霏連月不開陰風怒號濁浪排空日星隱曜山嶽潛形商旅不行檣傾楫摧薄暮冥冥虎嘯猿啼登斯樓也則有去國懷鄉憂讒畏譏滿目蕭然感極而悲者矣至若春和景明波瀾不驚上下天光一碧萬頃沙鷗翔集錦鱗遊泳岸芷汀蘭郁郁青青而或長煙一空皓月千里浮光耀金靜影沉璧漁歌互答此樂何極登斯樓也則有心曠神怡寵辱皆忘把酒臨風其喜洋洋者矣嗟夫豫嘗求古仁人之心或異二者之為何哉不以物喜不以已悲居廟堂之髙則憂其民處江湖之逺則憂其君是進亦憂退亦憂然則何時而樂耶其必曰先天下之憂而憂後天下之樂而樂歟噫微斯人吾誰與歸前半設局造句猶是文人手筆末段直達胸臆非文正公不足以當之或問史臣吕本中及朱文公皆以文正公為宋朝人物第一何也曰魏公大矣而本領微不及溫公誠矣而規局微不及堯舜君民之念無日不存于中心事如白日青天公誠絶倫超羣也胡先生墓表歐陽修先生諱瑗字翼之姓胡氏其上世為陵州人後為泰州如臯人先生為人師言行而身化之使誠明者達昏愚者勵而頑傲者革故其為法嚴而信為道久而遵師道廢久矣自景祐明道以來學者有師惟先生暨泰山孫明復石守道三人而先生之徒最盛其在湖州之學弟子去來常數百人各以其經轉相傳授其教學之法最備行之數年東南之士莫不以仁義禮樂為學慶厯四年天子開天章閣與大臣講天下事始慨然詔州縣皆立學於是建太學於京師而有司請下湖州取先生之法以為太學法至今為著令後十餘年先生始來居太學學者自逺而至太學不能容取旁官署以為學舍禮部貢舉嵗所得士先生弟子十常居四五其髙第者知名當時或取甲科居顯仕其餘散在四方隨其人賢愚皆循循雅飭其言談舉止不問可知為先生弟子其學者相語稱先生不問可知為胡公也先生初以白衣見天子論樂拜祕書省校書郎辟丹州軍事推官改密州觀察推官丁父憂去職服除為保寧軍節度推官遂居湖學召為諸王宫教授以疾免已而以太子中舍致仕遷殿中丞於家皇祐中驛召至京師議樂復以為大理評事兼太常寺主簿又以疾辭嵗餘為光祿寺丞國子監直講乃居太學遷大理寺丞賜緋衣銀魚嘉祐元年遷太子中允充天章閣侍講仍居太學已而病不能朝天子數遣使者存問又以太常博士致仕東歸之日太學之諸生與朝廷賢士大夫送之東門執弟子禮路人嗟歎以為榮以四年六月六日卒於杭州享年六十有七以明年十月五日葬於烏程何山之原其世次官邑與其行事莆陽蔡君謨具志于幽堂嗚呼先生之德在乎人不待表而見於後世然非此無以慰學者之思乃揭于其墓之原六年八月三日廬陵歐陽修述銘表推歐公擅長諸大臣銘表如王文正公范文正公等篇以太長故不入選蘇子美梅聖俞等篇文情絶佳又無甚關係此篇贊胡公處只跌宕數處而胡公身分已見篇中如使誠明者逹誠明矣豈猶有未逹者使生于張程理學大明之後必不肯如此下語徂徠先生墓志銘歐陽修徂徠先生姓石氏名介字守道兗州奉符人也徂徠魯東山而先生非隱者也其仕嘗位于朝矣魯之人不稱其官而稱其德以為徂徠魯之望先生魯人之所尊故因其所居山以配其有德之稱曰徂徠先生者魯人之志也先生貌厚而氣完學篤而志大雖在畎畝不忘天下之憂以謂時無不可為為之無不至不在其位則行其言吾言用功利施于天下不必出乎已吾言不用雖獲禍咎至死而不悔其遇事發憤作為文章極陳古今治亂成敗以指切當世賢愚善惡是是非非無所諱忌世俗頗駭其言由是謗議喧然而小人尤嫉惡之相與出力必擠之死先生安然不惑不變曰吾道固如是吾勇過孟軻矣不幸遇疾以卒既卒而姦人有欲以竒禍中傷大臣者猶指先生以起事謂其詐死而北走契丹矣請發棺以驗賴天子仁聖察其誣得不發棺而保全其妻子先生世為農家父諱丙始以仕進官至太常博士先生年二十六舉進士甲科為鄆州觀察推官南京留守推官御史臺辟主簿未至以上書論赦罷不召秩滿遷某軍節度掌書記代其父官於蜀為嘉州軍事判官丁內外艱去官垢面跣足躬耕徂徠之下葬其五世未葬者七十喪服除召入國子監直講是時兵討元昊久無功海內重困天子奮然思欲振起威德而進退二三大臣增置諫官御史所以求治之意甚鋭先生躍然喜曰此盛事也雅頌吾職其可已乎乃作慶厯聖德頌以褒貶大臣分别邪正纍數百言詩出太山孫明復曰子禍始於此矣明復先生之師友也其後所謂姦人作竒禍者乃詩之所斥也先生自間居徂徠後官於南京嘗以經術教授及在太學益以師道自居門人弟子從之者甚衆太學之興自先生始其所為文章曰某集者若干卷其斥佛老時文則有怪説中國論曰去此三者然後可以有為其戒姦臣宦女則有唐鑑曰吾非為一世監也其喜怒哀樂必見於文其辭博辨雄偉而憂思深逺其為言曰學者學為仁義也惟忠能忘其身惟篤於自信者乃可以力行也以是行於已亦以是教於人所謂堯舜禹湯文武周公孔子孟軻楊雄韓愈氏者未嘗一日不誦於口思與天下之士皆為周孔之徒以致其君為堯舜之君民為堯舜之民亦未嘗一日少忘於心至其違世驚衆人或笑之則曰吾非狂癡者也是以君子察其行而信其言推其用心而哀其志先生直講嵗餘杜祁公薦之天子拜太子中允今丞相韓公又薦之乃直集賢院又嵗餘始去大學通州濮州方待次於徂徠以慶厯五年七月某日卒於家享年四十有一友人廬陵歐陽修哭之以詩以謂待彼謗焰熄然後先生之道明矣先生既沒妻子凍餒不自勝今丞相韓公與河陽富公分俸買田以活之後二十一年其家始克葬先生於某所將葬其子師納與其門人薑潛杜默徐遁等來告曰謗焰熄矣可以發先生之光矣敢請銘某曰吾詩不云乎子道自能久也何必吾銘遁等曰雖然魯人之欲也乃為之銘曰徂徠之巖巖與子之德兮魯人之所瞻汶水之湯湯與子之道兮逾逺而彌長道之難行兮孔孟亦云遑遑一世之屯兮萬世之光曰吾不有命兮安在夫桓魋與臧倉自古聖賢皆然兮噫子雖毁其何傷石守道正孔子之所謂狂也信道篤而議論發皇下之可以成就人材上之可以裨補朝廷亦其停蓄不深涵養未至故動多齟齬仁宗為有宋極盛之世猶多謗焰嗚呼難哉歐公極力推尊文筆健暢讀之能令頑廉懦立胡安定孫明復石守道李太伯皆范文正公所奬借成就者嘗延與其子純仁同學而守道乃明復之門人也程子又安定之門人也余嘗謂宋學將興之際有范文正公以為宗主及諸儒輩出之時有吕正獻公為之薦揚蓋周程張邵正獻公皆嘗薦之于朝者也學術之興人才之茂必由于為大臣者有知人之特識有好善之盛心其關係也如此瀧岡阡表歐陽修嗚呼惟我皇考崇公卜吉於瀧岡之六十年其子修始克表於其阡非敢緩也蓋有待也修不幸生四嵗而孤太夫人守節自誓居窮自力於衣食以長以教俾至於成人太夫人告之曰汝父為吏廉而好施與喜賔客其俸祿雖薄常不使有餘曰母以是為我纍故其亡也無一瓦之覆一壠之植以庇而為生吾何恃而能自守耶吾於汝父知其一二以有待於汝也自吾為汝家婦不及事吾姑然知汝父之能養也汝孤而幼吾不能知汝之必有立然知汝父之必將有後也吾之始歸也汝父免於母喪方逾年嵗時祭祀則必涕泣曰祭而豐不如養之薄也間御酒食則又涕泣曰昔常不足而今有餘其何及也吾始一二見之以為新免於喪適然耳既而其後常然至其終身未嘗不然吾雖不及事姑而以此知汝父之能養也汝父為吏常夜燭治官書屢廢而歎吾問之則曰此死獄也我求其生不得爾吾曰生可求乎曰求其生而不得則死者與我皆無恨也矧求而有得耶以其有得則知不求而死者有恨也夫常求其生猶失之死而世常求其死也回顧乳者抱汝而立於旁因指而歎曰術者謂我嵗行在戌將死使其言然吾不及見兒之立也後當以我語告之其平居教他子弟常用此語吾耳熟焉故能詳也其施於外事吾不能知其居於家無所矜飾而所為如此是真發於中者耶嗚呼其心厚於仁者耶此吾知汝父之必將有後也汝其勉之夫養不必豐要於孝利雖不得博於物要其心之厚於仁吾不能教汝此汝父之志也修泣而志之不敢忘先公少孤力學咸平三年進士及第為道州判官泗綿二州推官又為泰州判官享年五十有九葬沙溪之瀧岡太夫人姓鄭氏考諱德儀世為江南名族太夫人恭儉仁愛而有禮初封福昌縣太君進封樂安安康彭城三郡太君自其家少微時治其家以儉約其後常不使過之曰吾兒不能茍合於世儉薄所以居患難也其後修貶彛陵太夫人言笑自若曰汝家故貧賤也吾處之有素矣汝能安之吾亦安矣自先公之亡二十年修始得祿而養又十有二年列官于朝始得贈封其親又十年修為龍圖閣直學士尚書吏部郎中留守南京太夫人以疾終於官舍享年七十有二又八年修以非才入副樞密遂參政事又七年而罷自登二府天子推恩褒其三世蓋自嘉祐以來逢國大慶必加寵錫皇曽祖府君纍贈金紫光祿大夫太師中書令曽祖妣纍封楚國太夫人皇祖府君纍贈金紫光祿大夫太師中書令兼尚書令祖妣纍封吳國太夫人皇考崇公纍贈金紫光祿大夫太師中書令兼尚書令皇妣纍封越國太夫人今上初郊皇考賜爵為崇國公太夫人進號魏國於是小子修泣而言曰嗚呼為善無不報而遲速有時此理之常也惟我祖考積善成德宜享其隆雖不克有於其躬而賜爵受封顯榮褒大實有三朝之錫命是足以表見於後世而庇賴其子孫矣乃列其世譜具刻於碑既又載我皇考崇公之遺訓太夫人之所以教而有待於修者並揭於阡俾知夫小子修之德薄能鮮遭時竊位而幸全大節不辱其先者其來有自熙寧三年嵗次庚戌四月十有五日男修表忠孝之文起人歌泣余每讀出師表及瀧岡阡表未嘗不涕涔涔下也袁州學記李覯皇帝二十有三年制詔州縣立學惟時守令有哲有愚有屈力殫慮祇順德音有假官借師茍具文書或連數城亡誦弦聲倡而不和教尼不行三十有二年范陽祖君無擇知袁州始至進諸生知學宫闕狀大懼人才放失儒效闊疏亡以稱上意旨通判頴川陳君侁聞而是之議以克合相舊夫子廟狹隘不足改為乃營治之東厥土燥剛厥位面陽厥材孔良殿堂門廡黝堊丹漆舉以法故生師有舍庖廩有次百爾器備並手偕作工善吏勤晨夜展力越明年成舍菜且有日旴江李覯諗於衆曰惟四代之學考諸經可見已秦以山西鏖六國欲帝萬世劉氏一呼而關門不守武夫健將賣降恐後何耶詩書之道廢人惟見利而不聞義焉耳孝武乘豐富世祖出戎行皆孳孳學術俗化之厚延於靈獻草茅危言者折首而不悔功烈震主者聞命而釋兵羣雄相視不敢去臣位尚數十年教道之結人心如此今代遭聖神爾袁得聖君俾爾由庠序踐古人之迹天下治則撢禮樂以陶吾民一有不幸尤當仗大節為臣死忠為子死孝使人有所賴且有所法是惟朝家教學之意若夫弄筆墨以徼利達而已豈徒二三子之羞抑亦為國者之憂歐曽王學記敘三代之學甚詳此獨點明一筆從忠孝大節發明朱子謂其從大處起議論者也而詞旨嚴鍊鋒鍔迫人有振衣千仞之概比歐曽王應突過之按撢玉篇他甘他紺二切周禮有撢人掌誦王志
