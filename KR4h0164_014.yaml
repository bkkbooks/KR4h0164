body:
  text: 古文雅正卷十四禮部侍郎蔡世逺編孟子講義序張栻學者潛心孔孟必得其門而入愚以為莫先於義利之辨蓋聖學無所為而然也無所為而然者命之所以不已性之所以不偏教之所以無窮也凡有所為而然者皆人欲之私而非天理之所存此義利之分也自未嘗省察者言之終日之間鮮不為利矣非特名位貨殖而後為利也斯須之頃意之所向一涉于有所為雖有淺深之不同而其徇已自私則一而巳如孟子所謂內交要譽惡其聲之類是也是心日滋則善端遏塞欲邇聖賢之門牆以求自得豈非却行以望及前人乎使談高說妙不過茫渺臆度譬猶無根之木無本之水其何益乎學者當立志以為先持敬以為本而精察於動靜之間毫釐之差審其為霄壤之判則有以用吾力矣學然後知不足平時未覺吾利欲之多也灼然有見於義利之辨將日救過不暇由是而不舍則趣益深理益明而不可以已也孔子曰古之學者為已今之學者為人為人者無適而非利為已者無適而非義曰利雖在己之事亦為人也曰義則施諸人者亦莫非為己也嗟乎義利之辨大矣豈特學者治已之所當先施之天下國家一也王者所以建立邦本垂裕無疆以義故也而伯者所以陷溺人心貽毒後世以利故也孟子當戰國橫流之時發揮天理遏止人欲深切著明撥亂反正之大綱也其微辭奧義備載七篇之書如某者雖曰服膺而學力未充何足以窺究萬一試以所見與諸君共講之願無忽深思焉學術治術本是一貫說得愈細微愈廣大義利關頭深切著明尤發先儒所未發也道學體統陳淳聖賢所謂道學者初非有至幽難窮之理甚髙難行之事也亦不外乎人生日用之常耳蓋道原於天命之奧而實行乎日用之間在心而言則其體有仁義禮智之性其用有惻隱羞惡辭讓是非之情在身而言則其所具有耳目口鼻四肢之用其所與有父子君臣夫婦兄弟朋友之倫在人事而言則處而修身齊家應事接物出而涖官理國牧民禦衆微而起居言動衣服飲食大而禮樂刑政財賦軍師凡千條萬緒莫不各有當然一定不易之則皆天理自然流行著見而非人之所強為者自一本而萬殊而體用一原也合萬殊而一本而顯微無問也上帝所降之衷即降乎此也生民所秉之彛即秉乎此也以人之所同得乎此而虛靈不昧則謂之明德以人之所共由乎此而無所不通則謂之達道堯舜與途人同一稟也孔子與十室均一賦也聖人之所以為聖生知安行乎此也學者之所以為學講求踐履乎此也謂其君不能賊其君者也謂其民不能賊其民者也自謂其身不能自賊者也操之則存舍之則亡迪之則吉背之則凶蓋皎然易知坦然易行也是豈有離乎日用常行之外别自為一物至幽而難窮甚髙而難行也哉如或外此而他求則皆非大中至正之道聖賢所不道也了然洞然一以貫之朱子門人推勉齊北溪為最勉齊朱子所傳以卒業然北溪下語親切有勝於勉齊處余嘗謂朱子之後議論文字最醇切者北溪西山魯齊三先生也品亦最優嘗舉以質安溪先生先生亦以為然此與下篇俱嚴陵講義也共四首登其二先生吾漳人余家居時嘗與都人士㑹講泮宫每舉以相朂先生雖渺流風猶昨安得吾鄉人有志之士服膺先生教言率由先生之道庶閩學之復興乎用功節目陳淳道之浩浩何處下手聖門用功節目其大要不過曰致知與力行而巳致者推之而至其極之謂致其知者所以明萬理於一心而使之無所疑也力者勉焉而不敢怠之謂力其行者所以復萬善於一己而使之無不備也知不致則真是真非無以辨其行將何所適從必有錯認人欲作天理而不自覺者也行不力則雖精義入神亦徒為空言而盛德至善竟何有於我哉此大學明明德之功必以格物致知為先而誠意正心修身繼其後中庸擇善固執之目必自夫博學審問慎思明辨而篤行之而顔子稱夫子循循善誘人亦唯在於博我以文約我以禮而已無他說也然此二者亦非截然判先後為二事猶之行者目視足履動輒相應蓋亦交進而互相發也故知之明則行愈逹而行之力則知又益精矣其所以為致知力行之地者必以敬為主敬者主一無適之謂所以提撕警省此心使之惺惺乃心之生道而聖學之所以貫動靜徹終始之功也能敬則中有涵養而大本清明由是而致知則心與理相涵而無顛置之患由是而力行則身與事相安而亦不復有扞格之病矣雖然人性均善均可以適道而鮮有能從事於斯者由其有二病一則病於安常習故而不能奮然立志以求自拔一則病於偏執私主而不能豁然虛心以求實見蓋必如孟子以舜為法於天下而我猶未免為鄉人者為憂必期如舜而後已然後為能立志必如顔子以能問於不能以多問於寡有若無實若虛然後為能虛其心既能立志而不肯自棄又能虛心而不敢自是然後聖門用功節目循序而日進日日有惟新之益能升堂入室惟吾之所欲而無所阻矣此又學者所當深自警也立志居敬致知力行為學之要程朱言之甚詳此篇合作一塊醇明切至後段指㸃人立志處頑石亦須㸃頭又併說出虛心更為叮嚀周至余初得此篇時若獲重寶後主鼇峯書院粘于壁間與同人共礪如先生提命在前惟恐失墜也直前奏劄真德秀臣聞君子小人之分義利而巳矣君子之心純乎為義故其得位也將以行其道小人之心純乎為利故其得位也將以濟其欲二者操術不同故所以導其君者亦異為君子者惟恐其君之不受諌為小人者惟恐其君之不拒諫嘗歷考前古凡小人欲排正論大抵數端不曰立異則曰好名不曰賣直則曰歸過而其甚者則曰朋黨也謗訕也蓋為君子者以引君當道為心政有得失必不茍從不茍從則近乎立異矣竭忠論事必合人情既合人情必得時譽如此則又近乎好名矣好直鄰於賣直救過類於歸過乃至持論偶同則可謂之朋黨盡言無隱則可謂之謗訕只此數端皆迷誤君心之鴆毒窒絶言路之榛荆也自非至聖至明未有不為所惑仰惟本朝聖哲相承招徠讜言如恐弗及哲廟初用司馬光之言下詔求諌當時有不欲者豫設六事以排之曰若隂有所懷犯非其分或扇搖事機之重或迎合已行之令上以觀望朝廷之意以徼幸希進下以昡惑流俗之情以干取虛譽若是者必罰無赦光復疏爭之以為此非求諌乃拒諌也人臣惟不言言則入六事矣哲宗宣仁亟俞其請而四方言利病者始獲上聞元祐之治實基乎此若乃指公論為流俗者王安石之私心分上書為邪等者蔡京之奸計斥忠賢為僞黨者韓托胄之狡謀覆轍甚明厥鑒非逺臣愚伏望陛下恢𢎞聖度以來天下之忠言昭晰聖鑒以察羣臣之心術凡在廷之士有勸陛下以親近端良不諱已過者必君子也不惟聽受之又當奬擢之有勸陛下以疑忌人言惡聞闕失者必小人也不惟拒絶之又當擯斥之使鳴鳯之瑞日聞而妖狐之音頓息若是而治功不隆天休不格者非所聞也惟陛下留神反覆愚臣之言此全從窮理閲歷又身受其傷故能曲盡切中如此中引司馬公所駁六事尤為千古炯鑒大學衍義序真德秀臣始讀大學之書見其自格物致知誠意正心修身齊家至於治國平天下其本末有序其先後有倫蓋嘗撫卷三歎曰為人君者不可以不知大學為人臣者不可以不知大學為人君而不知大學無以清出治之源為人臣而不知大學無以盡正君之法既又考觀在昔帝王之治未有不本之身而達之天下者然後知此書所陳實百聖傳心之要典而非孔氏之私言也三代而下此學失傳其書雖存概以傳記目之而巳求治者既莫之或考言治者亦不以望其君獨唐韓愈李翺嘗舉其說見於原道復性之篇而立朝議論曾弗之及蓋自秦漢以後尊信此書者惟愈及翺而亦未知其為聖學之淵源治道之根柢也況其他乎臣嘗妄謂大學一書君天下者之律令格例也本之則必治違之則必亂近世大儒朱熹嘗為章句或問以析其義寧皇之初入侍經帷又嘗以此書進講願治之君儻取其書玩而繹之則凡帝王為治之序為學之本洞然於胸次矣臣不佞竊思所以羽翼是書者故剟取經文二百有五字載於是編而先之以堯典臯謨伊訓與思齊之詩家人之卦者見前聖之規撫不異乎此也繼之以子思孟子荀況董仲舒揚雄周敦頤之說者見後賢之議論不能外乎此也堯舜禹湯文武之學純乎此者也商高宗周成王之學庶幾乎此者也漢唐賢君之所謂學巳不能無悖乎此矣而漢孝元以下數君之學或以技藝或以文辭則甚繆乎此者也上下數千載間治亂存亡皆繇是出臣故斷然以為君天下之律令格例也雖然人君之學必知其要然後有以為用力之地蓋明道術辨人材審治體察民情者人君格物致知之要也崇敬畏戒逸欲者誠意正心之要也謹言行正威儀者修身之要也重妃匹嚴內治定國本教戚屬者齊家之要也四者之道得則治國平天下在其中矣每條之中首以聖賢之明訓參以前古之事蹟得失之鍳炳焉可觀昔時入侍邇英蓋嘗有志乎是比年以來屏居無事乃得翻閲經傳彚而輯之畎畝微忠朝思暮繹所得惟此祕之巾衍以俟時而獻焉其書之指皆本大學前列二者之綱後分四者之目所以推衍大學之義也故題之曰大學衍義云大學衍義一書引經摘史加以剖晰論斷心法治法微顯畢具誠內聖外王之學合古來著書者而集其大成也自天子以至於庶人皆當習復而身體之余嘗謂有宋道學五子而外斷推西山為第一體用兼優才德俱茂恨不究其用耳著作亦第一有功南雄州學四先生祠堂記真德秀寶慶三年某月南雄州始立周子二程子朱子之祠於學教授三山陳應龍以書屬建人真某為之記某曰四先生之道高矣美矣抑某之愚未能窺其藩也將何以記之雖然昔嘗聞其略矣道之大原出於天其用在天下其傳在聖賢此子思子之中庸所以有性道教之别也蓋性者智愚所同得道者古今之共由而明道闡教以覺斯人則非聖賢莫能與故自堯舜至於孔子率五百嵗而聖人出孔子既沒曽子子思與鄒孟子復先後而推明之百有餘嵗之間一聖三賢更相授受然後堯舜禹湯文武周公之所以開天常立人紀者粲焉昭陳垂示罔極然則天之生聖賢也夫豈茍然哉不幸戰國嬴秦以後學術泮散無所統盟雖以董相韓文公之賢相望於漢唐而於淵源之正體用之本猶有未究其極者故僅能著衛道之功於一時而無以任傳道之責於萬世天啓聖朝文治休洽於是天禧明道以來迄于中興之世大儒繼出以主張斯文為已任蓋孔孟之道至周子而復明周子之道至二程子而益明二程之道至朱子而大明其視曽子子思鄒孟氏之傳若合符節豈人所能為也哉天也然四先生之學豈若世之立竒見尚新說求出乎前人所未及耶凡亦因乎天而已蓋自荀掦以惡與混為性而不知天命之本然老莊氏以虛無為道而不知天理之至實佛氏以剗滅彞倫為教而不知天叙之不可易周子生乎絶學之後乃獨深探本原闡發幽祕二程子見而知之朱子又聞而知之述作相承本末具備自是人知性不外乎仁義禮智而惡與混非性也道不離乎日用事物而虛無非道也教必本於君臣父子夫婦昆弟而剗滅彞倫非教也闡聖學之户庭祛世人之矇瞶千載相傳之正其不在兹乎嗚呼天之幸斯文也其亦至矣南雄為郡邈在嶠南士習視中州號稱近厚夫以近厚之資迪之以至正之學必將有俯焉自力者然陳君所望於學者果焉屬耶天之命我萬善具全一毫有虧是曠天職昔之君子凜然淵冰沒世弗懈者凡以全吾所受焉耳嗟後之世何其與古戾也利欲之風深入肺腑理義之習目為迂闊巳之良貴弃置如辨髦而軒裳外物則決性命以求之弗舍也吁是可不謂之大惑乎志於道者其將何所用力乎緬觀往昔百聖相傳敬之一言實其心法蓋天下之理惟中為至正惟誠為至極然敬所以中不敬則無中也敬而後能誠不敬則無以為誠也氣之決驟軼於奔駟敬則其銜轡也情之橫放甚于潰川敬則其隄防也故周子主靜之言程子主一之訓皆其為人最切者而子朱子又丁寧反復之學者儻於是而知勉焉思慮未萌必戒必懼事物既接必恭必欽動靜相因無少間斷則天德全而人欲泯大本之所以立達道之所以行其不由此歟陳君幸以為然則願以此刻於祠之壁為學者觀省之助若夫誦其言而不反諸躬惟其名之趍而匪實之踐是豈四先生立教之意哉又豈陳君所望于南邦之士者哉歐曽王學記雖佳那及此篇從聖賢體要學者身心指出的切示人讀此有不猛然刻勵者乎余嘗奉安溪先生命輯五子名篇周子太極圖說明道定性書伊川好學論張子西銘朱子仁說是也採先儒講解及議論附注其間竊謂南軒孟子講義序北溪用工節目篇及西山南雄州四先生祠堂記此三篇最為精切可以附之而無疑也太極西銘巳與通書正䝉為科場取士之用人所珍誦故不入選漳州示學者說真德秀豫既新其郡之學又為之續廩士之費俾誦絃於斯者微一日之輟焉教授陳君瑞甫過余而請曰公之於士也有以安其居又有以足其食顧亡一言以淑之可乎余謝曰此師儒之事也豫何言雖然昔嘗聞之孔氏矣豈不曰古之學者為巳乎自漢以經術求士士為青紫而明經唐以辭藝取士士為科目而業文其去聖人之意逺矣今之學者其果為巳而學歟其亦猶漢唐之士有所利而學也如果為已而學則理不可以不窮性不可以不盡不至聖賢之域弗止也若其有所利而學則茍能操觚吮墨媒爵秩而貿軒裳斯足矣駔賈其心弗顧也夷虜其行弗耻也此學者邪正之岐途也請以是淑吾士可乎瑞甫曰敬聞命矣抑後世之言學者其有得於孔氏之指歟曰後世之言學者其不繆於聖人鮮矣獨嘗於唐之陽子近世之石子尹子有取焉陽子曰學者學為忠孝也石子曰學者學為仁義也尹子曰學者學為人也是三言者庶幾聖門之遺意乎方唐之世士習之陋甚矣陽子一旦倡斯言於末學如天球之音威鳯之鳴學者竦然洗心而易德歸覲其親者踵相躡焉理義之感人如此然則石子之言其有異於陽子歟曰亡以異也仁者孝之原義者忠之幹曰仁義則忠孝在其中矣然則尹子之言其有異於二子歟曰亡以異也夫人與天地並而為三才者也必也兼五常備萬善然後人之道立焉其警世之深為人之切又進乎二子矣敢問所以學為人者奈何曰耳目膚體人之形也仁義禮智人之性也君臣父子昆弟夫婦朋友人之職也必循其性而不悖必盡其職而無愧然後其形可踐也孟子曰人之異乎禽獸者幾希庶民去之君子存之又曰無惻隱之心非人也無是非之心非人也夫天之生斯人也與物亦甚異矣而孟子以為幾希何哉蓋所貴乎人者以其有是心也是心不存則人之形雖具而人之理巳亡矣人之理亡則其與物何別哉故均是人也盡其道之極者聖人之所以參天地也違其理之常者凡民之所以為禽犢也聖愚之分其端甚微而其末甚逺豈不大可懼耶豫故曰尹子之言其警世之深為人之切又進乎二子也吾黨之士茍無意於聖賢之學則巳儻有志焉則反躬內省於人道之當然者有一毫之未至必將皇皇然如渴之欲飲餒之欲食也凛凛然如負針芒而蹈茂棘也吾子幸以為然則願以告夫同志俾知太守之期乎士不在於徼人爵取世資而在乎敬身而成德也瑞甫瞿然曰公之淑吾士者厚矣瑢請揭其言於學以為士之則忠孝仁義所以學為人不然人也而禽獸矣借三子之言以發明之境地特新其苦口婆心以招天下有志之士如聆其懇欵之聲洪氏天目山房記魏了翁寶慶元年吾友洪舜俞自考功郎言事罷歸於潛讀書天目山下寶福僧寺寺靚深舜俞合新故書得萬有三千卷藏之聞復閣下如李氏廬山故事而移書屬余記之余少誦蘇文忠公山房記謂秦漢以來作者益衆書益多學者益以茍簡又謂近嵗市人轉相摹刻書日傳萬紙而士皆束書不觀游談無根嗚呼斯言也所以開警後學不為不切至矣而士之病今未之有瘳也無亦聖逺言湮愈得而愈失時異事改愈變而愈下學士大夫讀之而不知其味行之而不見其端則亦舍之云爾且古之學者始乎禮樂射御書數蓋比物知類求仁入德皆本諸此今禮㥾樂淫射御及數有其名無其義六書之法惟小篆僅存而莫知好之為士者十名九舛不暇問也五三六經之所傳如仁義中誠性命天道鬼神變化此致知格物之要也今往往善柔為仁果敢為義依違以為中鈍魯以為誠氣質以為性六物以為命元虛以為天道也冥漠以為鬼神也有無以為變化也甚則以察為知以蕩為情以貪為欲以反經為權以捷給為才以譎詐為術聖賢之言炳如日星而師異指殊其流弊乃爾若夫先王之制又在所當講而風氣既降名稱亦訛有一事而數說一物而數名學者亦莫之質也井牧居民之良法也而丘乘卒伍之不合則參以管仲穰苴之法封建經國之大務也而百里五百里之不合則託諸歷代之異制賔興之法自遂以降自王畿以外無文則約諸鄉遂之數郊丘禘祫大事也或以郊丘為二或以禘祫為一廟學明堂先務也或以為異所而殊制或以為一廟而八名七世之廟常典也而殷六廟周二祧或親盡而毁或宗無常數莫知折哀三年之喪達禮也而有謂君大夫士廬服異等又有謂君卒哭而除皆莫敢以為非大抵始去籍于周末大壞於秦觖望於漢而盡覆於典午之亂二千年間憑私臆決罔聞於行帝號官儀承秦舛矣郊祧廟室踵漢誤矣衣冠樂律雜胡制矣學校養不賔之士科舉取投刺之人資格用自陳之吏刺平人以為軍而聽其坐食髠農夫以規利而縱其自奉授田無限而豪奪武斷以相尚也出泉輸租而重科覆折以相䝉也嗚呼生斯世也為斯民也而讀聖賢之書以求帝王之法使其心曉然見之且無所於用也況衆言殽亂始以春秋戰國之壤制衷以秦漢晉魏之雜儀終以鄭王諸儒之臆說學者之耳目肺腸為其所搖惑而不得以自信于是根本不立而異端得以乘之利祿得以移之文詞得以溺之則有口道六經而心是佛老篤信而實踐者矣則有心是聖學而輯為文詞隨世以就功名者矣六經之書孔孟未及行也今二干年矣而猶莫之行也余長而有聞晚益多懼舜俞以藏書屬記願以所懼者相與切磋究之嗟乎其亦以余言為過矣乎鶴山與西山當寧理之世為道學人品之宗實能私淑朱子者丰采言論略著朝端而橫遭謗語不究于用然是時正學公論一線未泯擯斥尊崇閒時迭見故雖以理宗之弱而不至于亡至似道擅權日在醉生夢死之中視二公之世反為治朝宜其及也讀鶴山此記知其平日讀書窮理之功一腔復古救時之念令我咨歎不置論人才聚散劄子牟子才國家五星聚奎實主文治列聖相承惟以收覽人才為第一事雖棫朴之能官人卷阿之用吉士不是過也咸平景德之間渾然不見其際所謂人才之太極政事之太和也天聖以來王曽吕夷簡相君子嘗一聚矣未幾而散於景祐百官之一圖又散于慶厯聖德之一詩又散於王拱辰打盡之一網是天聖以來之人才散於忠邪之相激然其害止於散而巳神宗初年富弼復相至和嘉祐之君子未至於散也熙寧之邪說一進而先朝之大臣最先散未幾而議新法不合者盡散未幾而條例司之賢者亦散是元豐之人才散於法令之變更也然其害止於散而巳元祐初司馬光相吕公著文彥博相繼輔政君子又聚矣品流太分事故反覆濫觴於吏額之小爭浸淫於調停之初議滔天於䇿題之分辨而君子之黨盡散極而至於朝堂之榜黨碑之鐫躪躤忠賢曽草菅之不若是元祐之人才散於辨白之太過其為禍蓋不止於散也建中靖國初起范純仁相韓宗彥君子又聚矣天下方以快活差除為善而曽布溫益志在朋奸置政事局而輕元祐重元符進愛助圖而左軾轍右京卞意向一偏而君子遂盡去一皆以邪黨目之是建靖之人才散於中非中而靖非靖其為禍蓋不止于散也中興以來張浚趙鼎為相君子又聚矣未幾秦檜當國力主和議一時讜論如胡銓等三十二人不肯附麗如李綱等八十餘人率皆擯棄或死於囹圄或死於貶所或流棄於魑魅之區纍赦不移或棲遲於林泉之下屏逐不出是紹興之人才散於多主戰而少主和其為禍又不止於散也慶元初趙汝愚相凡一時知名之士朝除暮拜略巳無遺姦憸小人仄目而蹙亟引匪類布居臺諌汝愚引用之人以次而去舉幡六士屏竄朋黨之禁愈嚴士大夫之禍愈酷是慶元之人才散於嫉專門而禁道學其為禍又不止於散也臣嘗通考國朝之人才大抵屢散推移不一僨起相攻撫往興嗟可不先幾而逆致其防哉陛下即位幾三十年君子之類凡三聚而三散矣端平親政一聚散也甲辰改祀二聚散也丁未改化三聚散也今日二相並建公道復明翕若少聚矣然方剛忠鯁者淹之外服魁壘卓傑者屈之家食抱負耿介者多鬱沈謹守端靖者罕拔擢或者猶以為未聚也夫聚之常覺其難而散之常覺其易其聚也常以至誠樂與之實其散也常以疑忌不容之過羣凶窺觀弩羽疊至散之幾也從中倒戈自相觸擊散之幾也意向小異釁隙漸生散之幾也寓意歌詩更相賢聖散之幾也招納黨人平治舊怨散之幾也顯爭力抵激怒忿心散之幾也其造端甚微為禍甚大月暈而風礎汗而雨事有其兆識者隱憂彼豈不知聚而為解散而為屯聚而為泰散而為否然不能不散者上無以保之下無以安之則散亦勢之常也宋代人才之聚散瞭若指掌可覘世變可長學識當理宗之末宋氏氣息奄奄人才消磨殆盡矣子才以直纍忤史嵩之賈似道而不屈發憤上此疏蓋亦忠于謀國者子才李方子之門人也李乃朱門高第正氣歌序文天祥余囚北庭坐一土室室廣八尺深可四尋單扉低小白間短窄汙下而幽暗當此暇日諸氣萃然雨潦四集浮動牀几時則為水氣塗泥半朝蒸漚歷瀾時則為土氣乍晴暴隂風道四塞時則為日氣簷隂薪爨助長炎虐時則為火氣倉腐寄頓陳陳逼人時則為米氣駢肩雜遝面目汙垢時則為人氣或圊溷積臭暴尸或腐鼠惡氣雜出時則為穢氣叠是數氣當之者鮮不為厲而豫以孱弱俯仰其間於兹二年矣審如是殆有養致然爾然亦安知所養何哉孟子曰我善養吾浩然之氣彼氣有七吾氣有一以一敵七吾何患焉況浩然者乃天地之正氣也作正氣歌一首天地有正氣雜然賦流形下則為河嶽上則為日星於人曰浩然沛乎塞蒼冥皇路當清夷含和吐明庭時窮節乃見一一垂丹青在齊太史簡在晉董狐筆在秦張良椎在漢蘇武節為嚴將軍頭為稽侍中血為張睢陽齒為顔常山舌或為遼東帽清操厲氷雪或為出師表鬼神泣壯烈或為渡江楫慷慨吞氐羯或為擊賊笏逆豎頭破裂是氣所旁薄凜烈萬古存當其貫日月生死安足論地維賴以立天柱賴以尊三綱實係命道義為之根嗟豫遘陽九𨽻也實不力楚囚纓其冠傳車送窮北鼎鑊甘如飴求之不可得隂房闃鬼火春院閟天黑牛驥同一皂雞棲鳯凰食一朝蒙露霧分作溝中瘠如此再寒暑百沴自辟易嗟哉沮洳場為我安樂國豈有他繆巧隂陽不能賊顧此耿耿在仰視浮雲白悠悠我心悲蒼天曷有極哲人日巳逺典刑在夙昔風簷展書讀古道照顔色文山以年少對䇿第狀元䇿以法天不息為主一氣呵成數千言主司賞之曰古義若龜鑑忠肝如鐡石敢以是為得人賀則公之正氣自幼學時已養之矣結句曰風簷展書讀古道照顔色以此知養氣者不可不讀書也特不為章句之儒耳歌中又曰皇路當清夷含和吐明庭公豈樂以死節見哉交信録序謝枋得天下有達道不曰朋友而曰朋友之交交者精神有契道德有同非外相慕也夫交以朋友視君臣父子夫婦昆弟則疏矣易大傳曰定其交而後求定者見其心之可交也交亦豈易定哉公卿求士見其才不見其心能負人吾視魏其侯翟廷尉悲之士求公卿見其勢不見其心能汙人吾視掦雄班固蔡雍笑之契之教人曰朋友有信孔門合交與信並言信而交交而愈信亦可以無悔矣同富貴相忌而有九官十臣同貧賤相疏而有仲尼弟子同患難相怨而有東漢黨人此謂交此謂信此朋友得以列於人倫也今人録交曰雲萍雲萍皆無情之物義巳不信交何能堅請名之曰交信録交無上下無貴賤無死生吾盡吾信不敢求諸人百年之間萬世之後儻能無愧天地而謂之人始可見朋友之助始可言交信矣古來所以成為不朽人豪者學問與師友之益耳非學問無以成深造之功非師友無以激厲志氣而日進于精微故朋友得列五倫叠山上不負君下不負友寥寥數語丹心炳如論書之失吳海道之不明學害之也學之不純書害之也今天下之書巳多矣然詩書易禮樂春秋孝經論語大學中庸七篇凡六經聖賢之言未嘗多也商周以下秦漢以來十八代史記紀傳表志編年紀事之不可無者未嘗多也所以多者皆諸子百氏外家雜言異端邪說數之不可計其名讀之畢世不能盡其卷帙無益於心身不資於國家非有補於教化風俗治道徒為多矣況其偏蔽邪曲足以湮正理炫耀反覆足以蠱人心其揣摩計較欺奪足以壞治道使人身心不安順上下不相親福祿不常有皆是書之罪也然其言或放蕩而無涯或幽昧而難窮或狎志而易入或近利而有功故世鮮有不好之者至其詼諧鄙俚隱謬神怪之淺近可笑誕妄不足信者則俗儒賤工又爭取以為博物洽聞夫楊墨老佛諸書六經之賊也管商申韓諸書治道之賊也遺事外傳史氏之賊也蕪詞蔓說文章之賊也竊意上之人有王者作將悉取其書而禁絶之然後讀者得以專其力於聖賢之言精其志於身心之學玩其意於國家得失成敗之數考其實於古今治亂興亡之迹如是則學正而道明而書為有益於世不然者日盛一日世滋一世夫豈有窮哉夫欲禁之必自上始使朝廷大臣通經術者㑹諸儒講論定其品目自經史某書某書及宋道學諸儒之遺言不禁其他則皆禁之諸家文集自先秦以來近世諸儒之文悉皆纂輯類為大全其餘一切除去必祕府不蓄絶其根本然後出令天下非官所定民不得輒藏坊市不得利鬻場屋引用者黜降停革民間文字不得引無稽之言異書既絶數十年之後童稚生長不涉異聞其心志不惑惟經史聖賢之言入者為主於以養德育才廣量成器其效豈小小哉先生名海字朝宗元之隱君子也閩人儀封張先生撫閩時嘗梓其文以行世名聞過齊集行修言醇足以傳世斯篇論屬奇創難行而下語皆可據使讀書者賭此而知要內返而切體不為泛覽徇外之學是一關頭上治道疏許衡民生有欲無主乃亂上天眷命作之君師必與之聰明剛斷之資重厚包容之量使首出庶物而表正萬邦此蓋天以至難任之非豫之可安之地而娛之也堯舜以來聖帝明君莫不兢兢業業小心畏慎日中不暇未明求衣誠知天之所畀至難之任初不可以易心處知其為難而以難處則難或可易不知為難而以易處則它日之難有不可言者矣臣請舉其切而要者欵陳於後人君不患出言之難而患踐言之難昔劉安世見司馬溫公問盡心行巳之要可以終身行之者公曰其誠乎劉公問行之何先公曰自不妄語始劉公初甚易之及退而自隱括日之所行與凡所言自相掣肘矛盾者多矣力行七年而後成自此言行一致表裏相應遇事坦然常有餘裕臣按劉安世一士人也所交者一家之親一鄉之衆同列之臣而止耳況天下之大兆民之衆日有萬幾而人君以一身一世酬酢之欲言無失豈易能哉故有昔之所言而今日不記者今之所命而後日自違者可否異同紛更變易綱紀不得布而法度不得立臣下雖欲黽勉而竟無所持循徒汩沒於瑣碎之中卒於無補茍從古者大學之道以修身為本凡一事之來一言之發必求其所以然與其所當然不牽於愛憎喜怒虛心端意熟思而審處之雖有不中者蓋鮮矣奈何為人上者多樂舒肆為人臣者多事容恱容恱本為私也私心盛則不畏人矣舒肆本為欲也欲心熾則不畏天矣以不畏天之心與不畏人之心感合無間則其所務者皆快心事耳又豈肯兢兢業業以修身為本一言一事熟思而審處之乎此人君踐言之難所以又難於天下之人也人君惟無喜怒也有喜恕則贊其喜以市恩鼓其怒以張勢人君惟無愛憎也有愛憎則假其愛以濟私藉其憎以復怨甚至本無喜也誑之使喜本無怒也激之使怒本不足愛也強譽之使愛本無可憎也强短之使憎若是則進者未必為君子退者未必為小人以至賞罰生殺鮮有得其正者人君不悟日在欺中方仗若曹擲發細隱以防天下之欺尚可防耶大抵人君以知人為貴以用人為急用得其人則無事於防矣既不出此則所近者爭進之人耳好利之人耳無耻之人耳賢者以公為心以愛為心不為利回不為勢屈置之周行則庶事得其正天下被其澤然或遭時不偶務自韜晦有舉一世而人不知者雖或知之而當路之人未有同類不見汲引獨人君有不知者人君雖或知之召之命之泛如厮養而賢者有不屑就者雖或接之以貌待之以禮而其所言不見信用有超然引去者雖或信用復使小人參於其間責小利期近效有用賢之名無用賢之實賢者亦豈肯尸位素餐徒費廩祿取譏誚於天下也雖然此特論難進者然也又有難合者焉人君位處崇高日受容恱大抵樂聞人之過而不樂聞己之過務快己之心而不務快民之心賢者必欲匡而正之扶而安之使如堯舜之正堯舜之安而後巳故其勢難合況姧邪佞幸醜正惡直肆為詆毁多方以陷之將見罪戾之不免又可望庶事得其正天下被其澤邪自古及今端人雅士所以重於進而輕於退者蓋以此爾大禹聖人聞善即拜益戒之曰任賢勿二去邪勿疑二之一言在大禹猶當警省後世人主宜如何哉此任賢之難也姧邪之人其為心險其用術巧人君不察以諂為恭以訐為公以欺為可信以佞為可近愛隆於上威擅於下大臣不敢議近親不敢言毒被天下而莫之知至是而求去之不巳難乎雖然此由人主不悟誤至於此猶有說焉如宇文士及之佞大宗灼見其情而竟不能斥李林甫妬賢明皇洞見其姧而卒不能退邪之惑人有如此者可不畏哉為人君者不喜聞過為人臣者不敢盡言合二者之心以求天下之心則其難得也固宜三代而下稱盛治者無若漢之文景然考之當時天象屢變文景克承天心消弭變異使四十年間海內殷富黎庶樂業臣竊見前年秋孛出西方彗出東方去年冬彗見東方復見西方議者咸謂當除舊布新以應天變臣謂曷若文景之恭儉愛民為理明義正而可信也天之樹君本為下民舉其要則修德用賢愛民三者而巳此謂治本治本立則紀綱可布法度可立治功可必也元世祖至元三年召魯齊至京師命議事中書省魯齊乃上此疏第一條定立國規模當依漢法治之第二條言用人立法之要此第三條也第四條言養農民興教化第五條言定民志皆明暢親切此條尤精故録之魯齊以程朱之的派為正心誠意之學世祖稍用其言其效巳如此使能如先主之用武侯苻堅之用景略治功當不止此世有謂道學為不適於用者盍詳觀元初之事元之立國魯齊與耶律楚材最有功魯齊學正而氣剛以阿哈瑪特之權姧而魯齊劾之所由與匡衡孔光等懸絶也與竇先生書許衡老病侵尋歸心急迫思所以上請未得其門也邇來相從實望見教不意復有引薦之言聞之踧踖且驚且懼邸舍中懇陳所以不可之故至於再三始䝉惠許違别三數日復慮他說間之不終前惠是用喋喋重陳向來懇禱不可之意嘗謂天下古今一治一亂治無常治亂無常亂亂之中有治焉治之中有亂焉亂極而入於治治極而入於亂亂之終治之始也治之終亂之始也治亂相循天人交勝天之勝質掩文也人之勝文勝質也天勝不巳則復而至於平平則文著而行矣故凡善惡得失之應無妄然者而世謂之治治非一日之為也其來有素也人勝不巳則積而至於偏偏則文沒不用矣故凡善惡得失之迹若謬焉者而世謂之亂亂非一日之為也其來有素也析而言之有天焉有人焉究而言之莫非命也命之所在時也時之所向勢也勢不可為時不可犯順而處之則進退出處窮逹得喪莫非義也古之所謂聰明睿智者唯能識此也所謂神武而不殺者惟能體此也或者橫加巳意欲先天而開之拂時而舉之是揠苗也是代大匠斫也揠苗則害稼代匠則傷手是豈成己成物之道哉即其違順之多寡乃其吉凶悔吝之多寡也生平拙學認此為的信而守之罔敢自異今先生直欲以助長之力擠之傷手之地是果相知者所為耶無益清朝徒重後悔豈交游泛泛不足為之慮耶抑真以樗散為可用之材也相愛之深未應乃爾若夫春日池塘秋風禾黍夏未雨蠶老麥收冬將寒囷盈箱積門喧童稚架滿琴書山色水光詩懷酒興拙謀或可以辦此也是以心思意嚮日日在此安此樂此言亦此書亦此百周千折必期得此而後巳先生不此之助而彼之助是不可其所可而可其所不可也其可哉將愛之實害之萬惟恕察言不能櫽􅀢悚息待罪士必有難進易退之節而後可勝天下國家之重先生倡絶學於南北未通之日及被遇元世祖為儒宗為名世而屢召屢辭今觀此書中懷恬退乃爾王文忠所謂或躬耕太行之麓或判事中書之堂鍾鼎山林蓋有不加不損者在矣案中統書已酉竇默與王鶚靣論王文統不宜在相位薦衡代之書疑作於此疑道山房記吳澄永平鄭侯鵬南嚴重清謹為時名流而不以所能自足也謂仕必資於學學必志於道别業在滕州築山房為游居之所取子思子之語而扁之曰凝道不逺二千里走書徴言於豫夫世之成室屋者往往有記記者紀其棟宇之規制營構之嵗月而巳稍能文辭者可命也而奚以豫言為侯之意寧不以豫嘗講聞於儒先之緒論而欲俾言其所謂凝道者乎嗚呼道不易言也言之易者未必真有見也非真有見不言是妄言也而豫何敢夫子曰為之難言之得無訒乎雖然侯之意不可以不答也詎容巳於言哉請言其似道在天地間猶水之在大海道之中有人猶水之中有器浸灌此器者水也納受此水者器也水中之器或沉或浮而器中之水或入或出器與水未合一也水在器中凝而為水則器與水永不相離而水為器所有矣人之於道猶是也有以凝之則道在我無以凝之則道自道我自我道豈我之有哉人之生也或智或愚或賢或不肖均具此性則均受此道不於賢智而豐不於愚不肖而嗇也愚不肖之不賢智若者何也能凝不能凝之異耳嗚呼子思子言道所以有貴於能凝者歟凝之之方尊德性而道問學也德性者我得此道以為性尊之如父母尊之如神明則存而不失養而不害矣然又有進修之功焉蓋德性之內無所不備而理之固然不可不知也事之當然不可不行也欲知所固然欲行所當然舍學問奚可德性一而學問之目八子思子言之詳矣不待豫言也廣大精微髙明中庸故也親也厚也禮也皆德性之固然當然者盡之極之溫之知之問學以進吾所知也致之道之敦之崇之問學以修吾所行也尊德性一乎敬而道問學兼乎知與行一者立其本兼者互相發也問學之力到功深則德性之體全用博道之所以凝也夫雖然此非可以虛言言亦在夫實為之而巳矣斯道也人人可得而有也況如侯之卓卓者哉其凝之也豫將驗侯之所為侯名雲翼今為江南行御史臺都事延祐四年臨川吳澄記草廬先生雖倡為主靜之談如篇中尊德性一乎敬數語圎通無礙固非溺於陸學者又著本心樓記及尊德性道問學齊記以譏切為朱陸之學者並失其師旨似亦未為病朱也觀其贊晦菴先生方之景星慶雲泰山喬嶽所以欽崇之者至矣無極而太極說吳澄太極者何也曰道也道而稱之曰太極何也曰假借之辭也道不可名也故假借可名之器以名之也以其天地萬物之所共由也則名之曰道道者大路也以其條派縷脉之微密也則名之曰理理者玉膚也皆假借而為稱者也貞實無妄曰誠全體自然曰天主宰造化曰帝妙用不測曰神付與萬物曰命物受以生曰性得此性曰德具於心曰仁天地萬物之統㑹曰太極道也理也誠也天也帝也神也命也性也德也仁也太極也名雖不同其實一也極屋棟之名也屋之脊檁曰棟就一屋而言惟脊檁至高至上無以加之故曰極而凡物之統㑹處因假借其義而名為極焉辰極皇極之類是也道者天地萬物之統㑹至尊至貴無以加者故亦假借屋棟之名而稱之曰極也然則何以謂之太曰太之為言大之至甚也夫屋極者屋棟為一屋之極而巳辰極者北辰為天體之極而巳皇極者人君一身為天下衆人之極而已以至設官為民之極京師為四方之極皆不過指一物一處而言也道者天地萬物之極也雖假借極之一字强為稱號而曽何足以擬議其髣佛哉故又盡其辭而曰太極者蓋曰此極乃甚大之極非若一物一處之極也然彼一物一處之極極之小者耳此天地萬物之極極之至大者也故曰太極邵子曰道為太極太祖問曰何物最大答者曰道理最大其斯之謂歟然則何以謂之無極道為天地萬物之體而無體謂之太極而非有一物在一處可得而指名之也故曰無極易曰神無方易無體詩曰上天之載無聲無臭其斯之謂歟然則無極而太極何也曰屋極辰極皇極民極四方之極凡物之號為極者皆有可得而指名者也是則有所謂極也道也者無形無象無可執著雖稱曰極而無所謂極也雖無所謂極而實為天地萬物之極故曰無極而太極朱子太極圖說言簡而該北溪字義雖詳哉言之然體是訓詁言不雅馴先生自云鑽研於文義毫分縷析猶以陳為未精也足徴其說之精當矣元兩文正時稱南有草廬北有魯齊先生於經學尤邃虞伯生稱其辨傳注之得失而達羣經之㑹同考據援引博極古今各得其當四經三禮皆有序録惜通志堂僅刋易書纂言儀禮逸經傳孝經定本四種也克復堂記虞集克己復禮之說在聖門惟顔子得聞之當是時七十子者蓋有不及盡聞者矣後學小子乃得誦其言於方冊之中聞其說於千載之下豈非幸歟蓋豫嘗反而求之沈冥於物欲之途者固無與乎此也而知致力焉者僅足以為原憲之所難而已其拔本塞原脫然不逺而能復者世甚鮮也然則茍有志於聖賢者舍此奚適矣然而難言也昔者程伯子少而好獵及見周子而有得焉自以為此好絶於胸中矣而周子曰是何言之易也復十餘年程子見獵者於道傍不覺有喜意夫然後知周子識察之精也嗚呼自顔子而降若程子之髙明而敦厚純粹而精微一人而巳其為學也必不為原氏之剛制也明矣其十數年間豈無所用其功哉而是好也深潛密伏於纎微之際不能不發見於造次之間噫亦微矣鄉非周子識察之精固不足以知其必動於十數年之前非程子致察之密亦何足以自覺其動於十數年之後是固不可與迂生曲學者論也而衆人乃欲以鹵莽茍且之功庶幾近似其萬一可乎此則豫之所甚懼而旦暮不忘者也國子伴讀康生敏以克復名其堂而來求文以為記豫既嘉其慕尚之高逺而又懼其易之也故著其說使置諸壁間固得以觀覽而資其行逺升高之一二也闡濂洛之微言證克復之妙義所謂痛癢語也泰定初嘗行經筵之制取經史用國語漢文兩進讀邵菴先生時為祕書少監為反覆古今名物之辨以通之晉翰林直學士每承顧問必委曲盡言或隨事規諫古文雅正卷十四
