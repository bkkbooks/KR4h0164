body:
  text: 古文雅正卷四禮部侍郎蔡世逺編賜馮異敕建武二年漢光武三輔遭王莾更始之亂重以赤眉延岑之酷元元塗炭無所依訴今之征伐非必略地屠城要在平定安集之耳諸將非不健鬬然好虜掠卿本能御吏士念自修敕無為郡縣所苦帝王之言孟子所謂不嗜殺人者能一之也此以異代鄧禹也禹已入長安復不能制赤眉故以異代之異至禹復邀與同戰又敗禹歸異能自破赤眉始以盆子降異不伐不殺又有戰功誠中興賢將也中興戰功昆陽之捷帝有神授王郎之破耿弇父子有力焉弇最英武又有平劉永張步之功鄧禹首贊大計有關中之功冦恂有餽運之功吳漢來歙岑彭等有平隴蜀之功然余所最喜者馬伏波也伏波英爽有學問恨光武不使之治國耳如平交趾即能安定區處耕種使數世猶守馬將軍故事此其治行當過冦恂矣伏波其人豪哉賜竇融璽書建武五年融遣使奉書獻馬帝喜答賜璽書漢光武制詔行河西五郡大將軍事屬國都尉勞鎮守邊五郡兵馬精彊倉庫有蓄民庶殷富外則折挫羌胡內則百姓䝉福威德流聞虛心相望道路隔塞邑邑何已長史所奉書獻馬悉至深知厚意今益州有公孫子陽天水有隗將軍方蜀漢相攻權在將軍舉足左右便有輕重以此言之欲相厚豈有量哉諸事具長史所見將軍所知王者迭興千載一㑹欲遂立桓文輔微國當勉卒功業欲三分鼎足連衡合從亦冝以時定天下未并吾與爾絶域非相吞之國今之議者必有任囂效尉他制七郡之計王者有分土無分民自適巳事而巳當與文帝與南粵王璽書參看文帝仁厚渾璞不露光武寬厚略露英敏之氣其足以服逺則一也文帝文章無修飾此篇却極作意其為帝王之言則一也曹子建髙光論謂光武優於髙祖此確論也髙祖挾智任術光武寬厚長者即廢郭后一節雖為盛德之纍然比釀成吕后之禍懸殊矣石勒乃尊髙而並光特以其能駕䇿羣雄耳與公孫述書六年漢光武圖䜟言公孫即宣帝也代漢者當塗髙君豈髙之身邪乃復以掌文為瑞王莾何足效乎君非吾賊臣亂子倉卒時人皆欲為君事耳何足數也君日月已逝妻子弱小當早為定計可以無憂天下神器不可力爭宜留三思心恕詞嚴筆挾風霜述及囂兵敗窮促時光武猶屢降手書不忍破滅帝誠仁人哉書辭有言簡而意切者如宋太祖時伐北漢劉鈞復書曰河東土地狹小本不足以當中國但我家世非叛者區區守此蓋懼漢氏之不血食也太祖憐之故終鈞之世不加兵今讀此數語誠可哀憐不然太祖何不以卧榻之側對乎報臧宫馬武詔二十七年漢光武黃石公記曰柔能制剛弱能制强舍近謀逺者勞而無功舍逺謀近者逸而有終故曰務廣地者荒務廣德者强有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復欲逺事邊外乎孔子曰吾恐季孫之憂不在顓臾且北狄尚强而屯田警備傳聞之事恆多失實誠能舉天下之半以滅大冦豈非至願茍非其時不如息人存仁心識大體愛飬黎元不事窮黷所以馴致建武永平之盛也此詔視輪臺之悔其曲突徙薪者歟自後有騖逺邀功者馴至安帝之初國虛耗而民死亡雖以和熹太后節約為心猶不能弭羌禍愈烈追思此詔宛如逆睹晉宋南渡後並有不共之仇不得忘秣厲之心然亦須內飬既充相時而動餘凡好事邊功者未有不敗悔者也南朝元嘉之業衰由于王元謨等北伐致六州蕭條宋賈似道及二趙則義不量力而挑兵以速其亡兵可易言哉祀明堂詔永平二年漢明帝今令月吉日宗祀光武皇帝於明堂以配五帝禮備法物樂和八音詠祉福舞功德班時令敕羣后事畢升靈臺望元氣吹時律觀物變羣僚藩輔宗室子孫衆郡奉計百蠻貢職烏桓濊貊咸來助祭單于侍子骨都侯亦皆陪位斯固聖祖功德之所致也朕以暗陋奉承大業親執圭璧恭祀天地仰惟先帝受命中興撥亂反正以寧天下封泰山建明堂立辟雍起靈臺恢𢎞大道被之八極而嗣子無成康之質羣臣無吕旦之謀盥洗進爵踧踖惟慙素性頑鄙臨事益懼故君子坦蕩蕩小人長戚戚其令天下自殊死已下謀反大逆皆赦除之百僚師尹其勉修厥職順行時令敬若昊天以綏兆人詞既典重心復抑畏明帝治化之盛優於文帝但文帝仁厚恭儉性質非明帝所及東京節義全是光武明章三帝所培養而成然明帝功尤多如尊師傅興學校至使胸奴亦遣子入學則三代以下所未有也手詔東平王國傳十一年漢明帝辭别之後獨坐不樂因就車歸伏軾而吟瞻望永懷實勞我心誦及采菽以增歎息日者問東平王處家何等最樂王言為善最樂其言其大副是要腹矣今送列侯印十九枚諸王子年五嵗已上能趨拜者皆令帶之細玩此篇欲歌欲泣使孝弟之心油然而生為善最樂傳家之寶報有司詔建初元年欲封諸舅后不聽明年夏大旱言事者以不封外戚故有司上請后報云明德馬皇后凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封其時黃霧四塞不聞㴻雨之應又田蚡竇嬰寵貴橫恣傾覆之禍為世所傳故先帝防慎舅氏不令在樞機之位諸子之封裁令半楚淮陽諸國常謂我子不當與先帝子等今有司奈何欲以馬氏比隂氏乎吾為天下母而身服大練食不求甘左右但著帛布無香薰之飾者欲身率下也以為外親見之當傷心自敕但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如遊龍倉頭衣緑褠領袖正白顧視御者不及逺矣故不加譴怒但絶嵗用而已兾以默愧其心而猶懈怠無憂國忘家之慮知臣莫若君况親屬乎吾豈可上負先帝之旨下虧先人之德重襲西京敗亡之禍哉語語出肝膈千百載而下試為切已雒誦數遍而不能去其奢淫之心者鮮矣重請封諸舅報帝重請曰太后誠存謙虛奈何令臣不加恩於舅乎后報云明德馬皇后吾反覆念之思令兩善豈徒欲獲謙謙之名而使帝受不外施之嫌哉昔竇太后欲封王皇后之兄丞相條侯言受髙祖約無軍功非劉氏不侯今馬氏無功於國豈得與隂郭中興之后等邪嘗觀富貴之家祿位重疊猶冉實之木其根必傷且人所以願封侯者欲上奉祭祀下求溫飽耳今祭祀則受四方之珍衣食則蒙御府餘資斯豈不足而必當得一縣乎吾計之熟矣勿有疑也夫至孝之行安親為上今數遭變異榖價數倍憂惶晝夜不安坐卧而欲先營外封違慈母之拳拳乎吾素剛急有胸中氣不可不順也若隂陽調和邊境清靜然後行子之志吾但當含飴弄孫不能復關政矣文有欵情則佳情欵則其詞兼勝令人冉三反覆千百讀而不厭也讀至末幅與敬姜論勞逸篇吾冀汝朝夕修我一段使我長言詠歌嗟歎猶不足矣東京賢后推馬鄧然鄧后臨朝內則災荒外有羌禍亦緣后賢故足以弭之然專政之心不可掩也豈明德之比哉漢唐宋后之最賢者漢則明德馬皇后唐則文德長孫皇后宋則宣仁髙太后詔三公元和二年漢章帝方春生養萬物莩甲宜助萌陽以育時物其令有司罪非殊死且勿案驗及吏人條書相告不得聽受兾以息事寧人敬奉天氣立秋如故夫俗吏矯飾外貌似是而非揆之人事則悅耳論之隂陽則傷化朕甚饜之甚苦之安靜之吏悃愊無華日計不足月計有餘如襄城令劉方吏人同聲謂之不煩雖未有它異斯亦殆近之矣間敕二千石各尚寬明而今富姦行賂於下貪吏枉法於上使有罪不論而無過被刑甚大逆也夫以苛為察以刻為明以輕為德以重為威四者或興則下有怨心吾詔書數下冠蓋接道而吏不加理人或失職其咎安在勉思舊令稱朕意焉光武明章之世最多循吏章帝尤為長者故詔書敦厚如此浸淫及于桓靈權奸宦寺専朝非徒根本壞也賄賂請託公行守令俱以貪虐為事故民不聊生黃巾等賊相繼而起西漢成哀之世朝政壞而吏治未盡蠧故人心思漢光武一舉而中興東漢桓靈之世朝綱亡而吏治不堪言故終至于不可救吏治之切于國計民生也如此章帝最惠民之政人賜胎榖三斛則不受澤之家鮮矣兩漢賦薄而賞賜多祿俸厚何也無養兵故也皇后紀序後漢書夏殷以上后妃之制其文略矣周禮王者立后三夫人九嬪二十七世婦八十一女御以備內職焉后正位宫闈同體天王夫人坐論婦禮九嬪掌教四德世婦主喪祭賓客女御序于王之燕寢頒官分務各有典司女史彤管記功書過居有保阿之訓動有環珮之響進賢才以輔佐君子衷窈窕而不淫其色所以能述宣隂化修成內則閨房肅雍險謁不行也故康王晚朝關雎作諷宣后晏起姜氏請愆及周室東遷禮序凋缺諸侯僣縱軌制無章齊桓有如夫人者六人晉獻升戎女為元妃終于五子作亂冡嗣遘屯爰逮戰國風憲逾薄適情任欲顛倒衣裳以至破國忘身不可勝數斯固輕禮弛防先色後德者也秦并天下多自驕大宫備七國爵列八品漢興因循其號而婦制莫釐髙祖帷薄不修孝文祍席無辨然而選納尚簡飾玩少華自武元之後世增淫費至乃掖庭三千增級十四妖幸毁政之符外姻亂邦之迹前史載之詳矣及光武中興斫雕為朴六宫稱號唯皇后貴人貴人金印紫綬奉不過粟數十斛又置美人宫人采女三等並無爵秩嵗時賞賜充給而巳漢法常因八月算人遣中大夫與掖度丞及相工於洛陽鄉中閲視良家童女年十三以上二十以下姿色端麗合法相者載還後宫擇視可否乃用登御所以明慎聘納詳求淑哲明帝聿遵先旨宫教頗修登建嬪后必先令德內無出閫之言權無私溺之授可謂矯其弊矣向使因設外戚之禁編著甲令改正后妃之制貽厥方來豈不休哉雖御已有度而防間未篤故孝章以下漸用色授恩隆好合遂忘淄蠧自古雖主幼時艱王家多釁必委成冡宰簡求忠賢未有専任婦人斷割重器唯秦芊太后始攝政事故穰侯權重于昭王家富于嬴國漢仍其謬知患莫改東京皇統屢絶權歸女主外立者四帝臨朝者六后莫不定䇿帷帟委事父兄貪孩童以久其政抑明賢以専其威任重道悠利深禍速身犯霧露于雲臺之上家嬰縲絏于圄犴之下湮滅連踵傾輈繼路而赴蹈不息燋爛為期終于陵夷大運淪亡神寶詩書所歎略同一揆故考列行跡以為皇后本紀雖成敗事異而同居正號者並列于篇其以私恩追尊非當時所奉者則隨它事附出親屬别事各依列傳其餘無所見則係之此紀以纘西京外戚云爾漢之大害外戚與宦官耳外戚之橫則由母后專政始也西漢既誤東漢冉誤蔚宗原本言之整贍中有徑健氣有警摯筆洵足追蹤漢魏非五代人所能學步也齊王縯傳贊後漢書大丈夫之鼓動拔起其志致蓋逺矣若夫齊武王之破家厚士豈游俠下客之為哉其慮將存乎配天之絶業而痛明堂之不祀也及其發舉大謀在倉卒擾攘之中使信先成於敵人赦岑彭以顯義若此足以見其度矣志髙慮逺禍發所忽嗚呼古人以蜂蠆為戒蓋畏此也詩云敬之敬之命不易哉以伯升之英武豁達而舉事不成天也伯升頗類孫伯符兄不成而弟繼之但仲謀不能及光武帝耳又頗類項梁但梁烏能及伯升羽之卒無成又不必論也贊語道出伯升心事極為惋惜無限低徊河北說光武帝鄧禹更始雖都關西今山東未安赤眉青犢之屬動以萬數三輔假號往往羣聚更始既未有所挫而不自聽斷諸將皆庸人屈起志在財幣爭用威力朝夕自快而已非有忠良明智深慮逺圖欲尊主安民者也四方分崩離析形勢可見明公雖建藩輔之功猶恐無所成立於今之計莫如延攬英雄務悅民心立髙祖之業救萬民之命以公而慮天下不足定也此篇當與韓信初對髙祖孔明初對先主同看皆首定大計者禹有大臣之度不比耿弇吳漢等徒為戰將最後與膠東固始三人獨參朝議隱然柱石老臣貢舉議時陳事者多言郡國貢舉率非功次故守職益懈而吏事寖疏咎在州郡下朝臣議彪因上言韋彪伏惟明詔憂勞百姓垂恩選舉務得其人夫國以簡賢為務賢以孝行為首孔子曰事親孝故忠可移於君是以求忠臣必於孝子之門夫人才行少能相兼是以孟公綽優於趙魏老不可以為滕薛大夫忠孝之人持心近厚煆鍊之吏持心近薄三代之所以直道而行者在其所以磨之故也士宜以才行為先不可純以閥閲然其要歸在於選二千石二千石賢則貢舉皆得其人探本之論漢舉孝亷以守相主之魏立九品中正以本郡薦紳有才望者主之所舉以行亦自有見然其究也上品無寒門純重閥閲勢使然也六朝皆循行此法故門第最重至隋始行進士科開科舉試文之局不關行誼唐初立法猶有十科後只用進士明經二科以進士為重如每嵗合一百人大約明經八十人進士二十人也五代及宋俱依此然唐無彌封又無禁挾書至宋太宗用彌封再傳又用謄録防間愈密矣明太祖始定三年一試王命論班彪昔在帝堯之禪曰咨爾舜天之厯數在爾躬舜亦以命禹暨于稷契咸佐唐虞光濟四海奕世載德至於湯武而有天下雖其遭遇異時禪代不同至於應天順人其揆一焉是故劉氏承堯之祚氏族之世著於春秋唐據火德而漢紹之始起沛澤則神母夜號以彰赤帝之符由是言之帝王之祚必有明聖顯懿之德豐功厚利積纍之業然後精誠通於神明流澤加於生民故能為鬼神所福饗天下所歸往未見運世無本功德不紀而得崛起在此位者也世俗見高祖興於布衣不達其故以為適遭暴亂得奮其劒逰說之士至比天下於逐鹿幸捷而得之不知神器有命不可以智力求悲夫此世之所以多亂臣賊子者也若然者豈徒暗於天道哉又不覩之於人事矣夫餓饉流𨽻飢寒道路思有䄈褐之襲擔石之蓄所願不過一金終於轉死溝壑何則貧窮亦有命也況乎天子之貴四海之富神明之祚可得而妄處哉故雖遭罹厄㑹竊其權柄勇如信布强如項籍成如王莽然卒潤鑊伏鑕烹醢分裂又況么麼不及數子而欲暗干天位者乎是故駑蹇之乘不騁千里之塗燕雀之疇不奮六翮之用楶棁之材不荷棟梁之任斗筲之子不秉帝王之重易曰鼎折足覆公餗不勝其任也當秦之末豪傑共推陳嬰而王之嬰母止之曰自吾為子家婦而世貧賤卒富貴不祥不如以兵屬人事成少受其利不成禍有所歸嬰從其言而陳氏以寧王陵之母亦見項氏之必亡而劉氏之將興也是時陵為漢將而母獲於楚有漢使來陵母見之謂曰願告吾子漢王長者必得天下子謹事之無有二心遂對漢使伏劍而死以固勉陵其後果定於漢陵為宰相封侯夫以匹婦之明猶能推事理之致探禍福之機全宗祀於無窮垂䇿書於春秋而況大丈夫之事乎是故窮達有命吉凶由人嬰母知廢陵母知興審此二者帝王之分決矣蓋在髙祖其興也有五一曰帝堯之苖裔二曰體貌多竒異三曰神武有徴應四曰寬明而仁恕五曰知人善任使加之以信誠好謀達於聽受見善如不及用人如由已從諫如順流趣時如響起當食吐哺納子房之䇿拔足揮洗揖酈生之說悟戌卒之言斷懷土之情髙四皓之名割肌膚之愛舉韓信於行陳收陳平於亡命英雄陳力羣䇿畢舉此髙祖之大略所以成帝業也若乃靈瑞符應又可略聞矣初劉媪妊髙祖而夢與神遇震電晦冥有龍蛇之怪及長而多靈有異於衆是以王武感物而折契呂公覩形而進女秦王東逰以厭其氣吕后望雲而知其處始受命則白蛇分西入關則五星聚故淮隂留侯謂之天授非人力也歷古今之得失驗行事之成敗稽帝王之世運考五者之所謂取舍不厭斯位符瑞不同斯度而茍昧權利越次妄據外不量力內不知命則必喪保家之主失天年之壽遇折足之凶伏斧鉞之誅英雄誠知覺寤畏若禍戒超然逺覽淵然深識收陵嬰之明分絶信布之覬覦距逐鹿之瞽說審神器之有授毋貪不可兾為二母之所笑則福祚流於子孫天祿其永終矣蒼鬱古茂不及西京其排偶處開六朝法派其轉折疏暢處開八家之風然辭嚴義正氣格髙舉不可攀躋余嘗謂西京過秦論東京王命論二論不可不熟讀賈以雄偉勝班以健爽勝皆千古絶調讀之能令人神酣氣爽議答北胸奴疏班彪臣聞孝宣皇帝敕邊守尉曰胸奴大國多變詐交接得其情則却敵折衡應對失其數則反為輕欺今北胸奴見南單于來附懼謀其國故數乞和親又逺驅牛馬與漢合市重遣名王多所貢獻斯皆外示富强以相欺誕也臣見其獻益重知其國益虛歸親愈數為懼愈多然今既未獲助南則亦不冝絶北羈縻之義禮無不答謂可頗加賞賜略與所獻相當明加曉告以前世呼韓邪郅支行事報答之辭令必有適今立槀草并上曰單于不忘漢恩追念先祖舊約欲修和親以輔身安國計議甚高為單于嘉之往者胸奴數有乖亂呼韓郅支自相讐隙並蒙孝宣皇帝埀恩救萱故各遣侍子稱藩保塞其後郅支忿戾自絶皇澤而呼韓附親忠孝彌著及漢滅郅支遂保國傳嗣子孫相繼今南單于攜衆南向欵塞歸命自以呼韓嫡長次第當立而侵奪失職猜疑相背數請兵將歸掃北庭䇿謀紛紜無所不至惟念斯言不可獨聽又以北單于比年貢獻欲修和親故拒而未許將以成單于忠孝之義漢秉威信總率萬國日月所照皆為臣妾殊俗百蠻義無親疏服順者褒賞畔逆者誅罰善惡之效呼韓郅支是也今單于欲修和親欵誠已達何嫌而欲率西域諸國俱來獻見西域國屬胸奴與屬漢何異單于數連兵亂國內虛耗貢物裁以通禮何必獻馬裘今齎雜繒五百匹弓鞬韇丸一矢四發遣遺單于又賜獻馬左骨都侯右谷蠡王雜繒各四百匹斬馬劍各一單于前言先帝時所賜呼韓邪竽瑟空侯皆敗願復裁賜念單于國尚未安方厲武節以戰攻為務竽瑟之用不如良弓利劍故未以齎朕不愛小物於單于便冝所欲遣驛以聞裁答得體中其忌諱亦以漢威素著故也范文正與元昊書高自位置諄諭懇懇反遭其侮耳無他漢强而宋弱也諫原陵顯節陵起縣邑疏東平王蒼光武皇帝躬履儉約之行深覩始終之分勤勤懇懇以葬制為言孝明皇帝大孝無違奉承貫行謙德之美於斯為盛臣愚以園邑之興起自强秦古者丘隴且不欲其著明豈況築郭邑建都郛哉上違先帝聖心下造無益之功虛費國用動搖百姓非所以致和氣祈豐年也陛下履有虞之至性追祖禰之深思臣蒼誠傷二帝純德之美不暢於無窮也漢賢王推河間獻王德東平獻王蒼河間有功經學可以配享文廟東平好善始終一德今讀此疏言簡意長仁孝之用心藹如可誦論喪服疏元初三年詔大臣得行三年喪服闋還職至建光中尚書令祝諷等奏以為孝文皇帝定約禮之制光武皇帝絶告寧之典誠不可改宜復建武故事忠上疏云陳忠臣聞之孝經始於愛親終於哀戚上自天子下至庶人尊卑貴賤其義一也夫父母於子同氣異息一體而分三年乃免於懷抱先聖緣人情而著其節制服二十五月是以春秋臣有大喪君三年不呼其門閔子雖要絰服事以赴公難退而致位以究私恩故稱君使之非也臣行之禮也周室陵遲禮制不序蓼莪之人作詩自傷曰瓶之罄矣惟罍之恥言已不得終竟子道者亦上之恥也髙祖受命蕭何創制大臣有寧告之科合于致憂之義建武之初新承大亂凡諸國政多趣簡易大臣既不得告寧而羣司營祿念私鮮循三年之喪以報顧復之恩者禮義之方實為雕損大漢之興雖承衰敝而先王之制稍以施行故籍田之耕起於孝文孝亷之貢發於孝武郊祀之禮定於元成三雍之序備於顯宗大臣終喪成乎陛下聖功美業靡以尚兹孟子有言老吾老以及人之老幼吾幼以及人之幼天下可運於掌臣願陛下登髙北望以甘陵之思揆度臣子之心則海內咸得其所疏入宦豎不便之竟寢忠奏而從諷等議遂著于令三代以下有志行三年喪者晉武帝北魏孝文帝宋孝宗耳至情大禮何意漠然者之多也陳忠此疏運以經術本以至情文亦入西京之室上王暢奏記張敞五教在寬著之經典湯去三面八方歸仁武王入殷先去炮烙之刑髙祖鑒秦惟定三章之法孝文皇帝感一緹縈蠲除肉刑卓茂文翁召父之徒皆疾惡嚴刻務崇溫厚仁賢之政流聞後世夫明哲之君網漏吞舟之魚然後三光明於上人物悅於下言之若迂其效甚近發屋伐樹將為嚴烈雖欲懲惡難以聞逺以明府上智之才日月之曜敷仁惠之政則海內改觀實有折枝之易而無挾山之難郡為舊都侯甸之國園廟出於章陵三后生自新野士女沾教化黔首仰風流自中興以來功臣將相繼世而隆愚以為懇懇用刑不如行恩孳孳求姦未若禮賢舜舉臯陶不仁者逺隨㑹為政晉盜奔秦虞芮入境讓心自生化人在德不在用刑暢深疾贓吏責令自首有隱伏者使吏發屋伐樹敞故諫之詞旨溫厚尚德緩刑可以迎導善氣永為酷吏之砭劾中官疏傅燮臣聞天下之禍不由於外皆興於內是故虞舜升朝先除四凶然後用十六相明惡人不去則善人無由進也今張角起於趙魏黃巾亂於六州此皆釁發蕭牆而禍延四海者也臣受戎任奉辭伐罪始到潁川戰無不尅黃巾雖盛不足為廟堂憂也臣之所懼在於治水不自其源末流彌增其廣耳陛下仁德寬容多所不忍故閹竪弄權忠臣不進誠使張角梟夷黃巾變服臣之所憂甫益深耳何者夫邪正之人不宜共國亦猶氷炭不可同器彼知正人之功顯而危亡之兆見皆將巧辭飾說共長虛僞夫孝子疑於屢至市虎成於三夫若不詳察真僞忠臣將復有杜郵之戮矣陛下宜思虞舜四罪之舉速行讒倿放殛之誅則善人思進姦凶自息臣聞忠臣之事君猶孝子之事父也子之事父焉得不盡其情使臣身被鈇鉞之戮陛下少用其言國之福也漢末如張綱傳燮皆至性男子也綱有埋輪之舉又能撫張嬰燮有中官之劾又能死節讀斯篇忠義之氣將以悃誠唐裴中立軍中一疏謂朝中奸黨盡去則逆賊不討自平情事如一陳便冝䇿荀爽夫喪親自盡孝之終也今之公卿及二千石三年之喪不得即去殆非所以增崇孝道也往者孝文勞謙行過乎儉故有遺詔以日昜月此當時之宜不可貫之萬世古今之制雖有損益而諒暗之禮未嘗改移以示天下莫遺其親今公卿羣寮皆政教所瞻而父母之喪不得奔赴昔丞相翟方進以自備宰相而不敢踰制至遭母憂三十六日而除夫失禮之源自上而始古者大喪三年不呼其門所以崇國厚俗篤化之道也事失冝正過勿憚改天下通喪可如舊禮夫婦人倫之始王化之端故文王作易上經首乾坤下經首咸恆孔子曰天尊地卑乾坤定矣夫婦之道所謂順也堯典曰釐降二女于媯汭嬪于虞降者下也嬪者婦也言雖帝堯之女下嫁於虞猶屈體降下勤修婦道易曰帝乙歸妹以祉元吉婦人謂嫁曰歸言湯以娶禮歸其妹於諸侯也春秋之義王姫嫁齊使魯主之不以天子之尊加於諸侯也今漢承秦法設尚主之儀以妻制夫以卑臨尊違乾坤之道夫陽唱之義且詩初篇實首關雎禮始冠婚先正夫婦天地六經其旨一揆宜改尚主之制以稱乾坤之性遵法堯湯式是周孔合之天地而不謬質之鬼神而不疑人事如此則嘉瑞降天吉符出地五韙咸備各以其叙矣昔者聖人建天地之中而謂之禮禮者所以興福祥之本而止禍亂之源也人能枉欲從禮者則福歸之順情廢禮者則禍歸之推禍福之所應知興廢之所由來也衆禮之中婚禮為首故天子娶十二天之數也諸侯以下各有等差事之降也陽性純而能施隂體順而能化以禮濟樂節宣其氣故能豐子孫之祥致老壽之福及三代之季淫而無節瑶臺傾宫陳妾數百陽竭於上隂隔於下後世之人好福不務其本惡禍不易其軌傳曰截趾適屨孰云其愚何與斯人追欲喪軀誠可痛也臣竊聞後宫采女五六千人從官侍使復在其外冬夏衣服朝夕稟糧耗費縑帛空竭府藏徴調增倍十而稅一空賦不辜之民以供無用之女百姓窮困於外隂陽隔塞於內故感動和氣災異屢臻臣愚以為諸非禮聘未曽幸御者一皆遣出使成妃合一曰通怨曠和隂陽二曰省財用實府藏三曰修禮制綏眉壽四曰配陽施祈螽斯五曰寬役賦安黎民此誠國家之𢎞利天人之大福也夫寒熱晦明所以為嵗尊卑奢儉所以為禮故以晦明寒暑之氣尊卑侈約之禮為其節也易曰天地節而四時成孝經曰安上治民莫善於禮禮者尊卑之差上下之制也洪範曰惟辟作威惟辟作福惟辟玉食凡此三者君所獨行而臣不得同也今臣僣君服下食上珍所謂害于而家凶于而國者也宜略依古禮尊卑之差及董仲舒制度之别嚴篤有司必行其命此則禁亂善俗足用之要四事皆人倫之本禮制之要秦漢以來失之大者拘儒曲生吹疵文義庸才俗吏督急簿書失得之數莫得而本夢夢千載正坐此耳漢世重經術故政教雖失于上而風俗猶茂于下若關西楊氏父子荀氏八龍兄弟其尤賢者也東京奏疏文多簡重整肅頗少疏宕然滌浮言固緣此時風氣或者以為被范蔚宗刪節固然至三國以後専修飾雅鍊略帶神韻惟諸葛公出師表忠愛從肺腑流出竟為至文曹子建髙才出羣文筆超絶沿至六朝遂成排偶矣唐初陳伯玉雖有興文之功然未見其岸異張燕公未脫排偶能加以典重耳栁冕李翰筆頗疏快而氣力尚薄獨孤及梁肅等自以為作手終有愧于古也如叙人文集必摘其某篇佳者而列之序中各下評語此最是中唐習氣韓栁興始大復古韓公神矣亦緣學識冠絶一代也惟李習之近似皇甫湜李漢孫樵但以刻琢字句為事本領亦薄劉復愚則又専主于超脫潏怪别一種也前漢紀論荀悅古者什一而稅以為天下之中正也今漢民或百一而稅可謂鮮矣然豪强富人占田逾侈輸其賦大半官收百一之稅民收大半之賦官家之惠優於三代豪强之暴酷於亡秦是上惠不通威福分於豪强也今不正其本而務除租稅適足以資富强夫土地者天下之本也春秋之義諸侯不得専封大夫不得專地今豪民占田或至數百千頃富過王侯是自専封也買賣由已是自專地也孝武時董仲舒嘗言宜限民占田至哀帝時乃限民占田不得過三十頃雖有其制卒不得施然三十頃有不平矣且夫井田之制冝於民衆之時地廣民稀勿為可也然欲廢之於寡立之於衆土地既富列在豪强卒而規之並有怨心則生紛亂制度難行由是觀之若高帝初定天下及光武中興之後民人稀少立之易矣就未悉備井田之法宜以口數占田為立科限民得耕種不得買賣以瞻貧弱以防兼并且為制度張本不亦宜乎雖古今異制損益隨時然綱紀大略其致一也憂深探本之論三代以下第一經濟也朱子深以為然其後周隋之間稍見施行至唐租庸調而法始備遺黃瓊書李固聞已度伊洛近在萬嵗亭豈即事有漸將順王命乎蓋君子謂伯夷隘栁下惠不恭故傳曰不夷不惠可否之間蓋聖賢居身之所珍也誠遂欲枕山棲谷擬跡巢由斯則可矣若當輔政濟民今其時也自生民以來善政少而亂俗多必待堯舜之君此為志士終無時矣嘗聞語曰嶢嶢者昜缺皎皎者易汙陽春之曲和者必寡盛名之下其實難副近魯陽樊君被徴初至朝廷設壇席猶待神明雖無大異而言行所守亦無所缺而毁謗布流應時折減者豈非觀聽望深聲名太盛乎自頃徴聘之士胡元安薛孟嘗朱仲昭顧季鴻等其功業皆無所採是故俗論皆言處士純盜虛聲願先生𢎞此逺謨令衆人歎服一雪此言耳商量出處處饒有情悃文之曲折清挺猶有西京風氣徵辟之風至漢末極盛是時士尚風節敦行誼至用世濟民之學末敢概許也李固存亡關于社稷誠不愧斯言哉漢末重節義如三李杜皆不得免時事可知矣獨黃瓊稍重厚雖直言無隱保全善類然獲保其身以太尉終如陳蕃所薦五處士皆不至又翩然逺矣三李杜謂李固杜喬李雲杜衆李膺杜密也五處士謂徐稚袁閎姜肱韋著李曇也與胡廣趙戒書李固固受國厚恩是以竭其股肱不顧死亡志欲扶持王室比隆文宣何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗乎漢家衰微從此始矣公等受主厚祿顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言權文公謂西漢之亡亡于張禹東漢之亡亡于胡廣者以此然禹罪尤浮于廣也廣等與孔光同醜耳諫召外兵何進規誅宦官事久不決紹等又為畫策多召四方猛將及諸豪傑引兵入京以脅太后琳諫云陳琳易稱即鹿無虞諺有掩目捕雀夫微物尚不可欺以得志況國之大事其可以詐立乎今將軍總皇威握兵要龍驤虎步髙下在心此猶鼓洪爐燎毛髮耳夫違經合道天人所順而反委釋利器更徴外助大兵聚㑹强者為雄所謂倒持干戈授人以柄功必不成秪為亂階數語道破琳誠先見哉孔融傳贊後漢書昔諫大夫陳昌有言山有猛獸者藜藿為之不採是以孔父正色不容弒虐之謀平仲立朝有紓盜齊之望若夫文舉之髙志直情其足以動義概而忤雄心故使移鼎之迹事隔於人存代終之規啓機於身後也夫嚴氣正性覆折而已豈其負園委屈可以每其生哉凛凛焉皓皓焉其與琨玉秋霜比質可也余初讀子瞻贊北海文推尊特甚以為出自子瞻之創論北海千載下苐一知巳也及讀後漢書乃知蔚宗已先言之一結既出以沉痛末數語風調更佳似雪鶴灑翮天空自訟疏孔僖凡言誹謗者謂實無此事而虛加誣之也至如孝武皇帝政之美惡顯在漢史坦如日月是為直說書傳實事非虛謗也夫帝者為善為惡天下莫不知斯皆有以致之故不可以誅於人也且陛下即位以來政教未過而德澤有加天下所具知也臣等獨何譏刺哉假使所非實是則固應悛改儻其不當亦宜含容又何罪焉陛下不推原大數深自為計徒肆私忿以快其意臣等受戮死即死耳顧天下之人必回視易慮以此事窺陛下心自今以後茍見不可之事終莫復言者矣齊桓公親揚其先君之惡以倡管仲然後羣臣得盡其心今陛下乃欲以十世之武帝逺諱實事豈不與桓公異哉臣恐有司卒然見搆銜恨䝉枉不得自叙使後世論者擅以陛下有所方比寧可復使子孫追掩之乎謹詣闕伏待重誅古人質直不事忌諱左氏不諱魯司馬氏不諱漢班氏父子猶漢臣也作漢書亦不諱後世非異代不可為史矣此疏痛快直捷且為不能光揚前烈徒好掩諱者發矇古文雅正卷四
