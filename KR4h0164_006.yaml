body:
  text: 古文雅正巻六禮部侍郎蔡世逺編訓子孫遺令王祥夫生之有死自然之理吾年八十有五啓手何恨不有遺言使爾無述吾生值季末登庸歴試無毗佐之勲沒無以報氣絶但洗手足不須沐浴勿纒尸皆澣故衣隨時所服所賜山元玉佩衞氏玉玦綬笥皆勿以斂西芒上土自堅貞勿用甓石勿起墳隴穿深二丈椁取容棺勿作前堂布几筵置書箱鏡奩之具棺前但可施牀榻而已糒脯各一盤𤣥酒一杯為朝夕奠家人大小不須送喪大小祥乃設特牲無違余命高柴泣血三年夫子謂之愚閔子除喪出見援琴切切而哀仲尼謂之孝故哭泣之哀日月降殺飲食之宜自有制度夫言行可覆信之至也推美引過徳之至也揚名顯親孝之至也兄弟怡怡宗族欣欣悌之至也臨財莫過乎讓此五者立身之本顔子所以為命未之思也夫何逺之有君本孝子故其言儉質朴厚末段懇切淳誠尤為修身齊家之要文字古質非復魏晉以下音響王覽傳晉書覽字元通母朱遇祥無道覽年數嵗見祥被楚撻輙涕泣抱持至於成童每諫其母其母少止凶虐朱屢以非理使祥覽輙與祥俱又虐使祥妻覽妻亦趨而共之朱患之乃止祥喪父之後漸有時譽朱深疾之密使酖祥覽知之徑起取酒祥疑其有毒爭而不與朱遽奪反之自後朱賜祥饌覽輙先嘗朱懼覽致斃遂止覽孝友恭恪名亞於祥及祥仕進覽亦應本郡之召稍遷司徒西曹掾清河太守五等建封即丘子邑六百戸泰始末轉太中大夫禄賜與卿同咸寧初詔曰覽少篤至行服仁履義貞素之操長而彌固其以覽為宗正卿頃之上疏乞骸骨詔以太中大夫歸老賜錢二十萬後轉光禄大夫門施行馬咸寧四年卒年七十三謚曰貞有六子祥固純孝覽亦至友孝友之家和氣所積善氣所迎其後必昌祥覽子孫貴顯數百年而覽尤昌導即覽孫也讓開府表羊祜臣伏聞恩詔拔臣使同台司臣自出身以來適十數年受任外内每極顯重之任常以智力不可頓進恩寵不可乆謬夙夜戰悚以榮為憂臣聞古人之言徳未為人所服而受高爵則使才臣不進功未為人所歸而荷厚禄則使勞臣不勸今臣身託外戚事連運㑹誡在過寵不患見遺而猥降發中之詔加非次之榮臣有何功可以堪之何心可以安之身辱高位傾覆尋至願守先人敝廬豈可得哉違命誠忤天威曲從即復若此葢聞古人申於見知大臣之節不可則止臣雖小人敢縁所䝉念存斯義今天下自服化以來方漸八年雖側席求賢不遺幽賤然臣不能推有徳逹有功使聖聽知勝臣者多未達者不少假令有遺徳於版築之下有隐才於屠釣之間而朝議用臣不以為非臣處之不以為愧所失豈不大哉臣忝竊雖乆未若今日兼文武之極寵等宰輔之高位也且臣雖所見者狹據今光禄大夫李憙執節高亮在公正色光禄大夫魯芝潔身寡欲和而不同光禄大夫李𦙍清亮簡素立身在朝皆服事華髪以禮終始雖歴位外内之寵不異寒賤之家而猶未蒙此選臣更越之何以塞天下之望少益日月是以誓心守節無茍進之志今道路未通方隅多事乞留前恩使臣得速還屯不爾留連必於外虞有闕匹夫之志有不可奪六朝人物推羊公為第一觀其虚衷讓位薦賢若渴流風猶堪百世也薦賢為事君第一義羅列諸賢正色以陳本朝魏環極先生薦十賢一疏可以方此謝石謚議𢎞之雅正好學時與禮官議謝石之謚范𢎞之石階藉門䕃屢登崇顯總司百揆翼贊三臺閑練庻事勤勞匪懈内外僉議皆曰與能當淮肥之㨗勲拯危墜雖皇威遐震狡冦天亡因時立功石亦與焉又開建學校以延胄子雖盛化未洽亦愛禮存羊然古之賢輔大則以道事君侃侃終日次則厲身奉國夙夜無怠下則愛人惜力以濟時務此數者然後可以免惟塵之譏塞素飱之責矣今石位居朝端任則論道倡言無忠國之謀守職則容身而已不可謂事君貨黷京邑聚斂無厭不可謂厲身坐擁大衆侵食百姓大東流於逺近怨毒結於衆心不可謂愛人工徒勞於土木思慮殫於機巧䊵綺盡於婢妾財用縻於絲桐不可為惜力此人臣之大害有國之所去也先王所以正風俗理人倫者莫尚乎節儉故夷吾受謗乎三歸平仲流美於約已自頃風軌陵遲奢僭無度亷恥不興利競交馳不可不深防原本以絶其流漢文襲弋綈之服諸侯猶侈武帝焚雉頭之裘靡麗不息良由儉徳雖彰而威禁不肅道自我建而刑不及物若存罰其違亡貶其惡則四維必張禮義行矣按謚法因事有功曰襄貪以敗官曰墨宜謚曰襄墨易曰開國承家小人勿用石固武臣之常態耳不宜使在髙位𢎞之此論詞嚴義正可立臣極不虞于六朝中得之歸去來辭陶潛歸去來兮田園將蕪胡不歸既自以心為形役奚惆悵而獨悲悟已往之不諫知來者之可追實迷途其未逺覺今是而昨非舟遥遙以輕颺風飄飄而吹衣問征夫以前路恨晨光之熹微乃瞻衡宇載欣載奔僮僕懽迎稚子候門三徑就荒松菊猶存携㓜入室有酒盈罇引壺觴以自酌眄庭柯以怡顔倚南牕以寄傲審容膝之昜安園日涉以成趣門雖設而常闗䇿扶老以流憩時矯首而遐觀雲無心以出岫鳥倦飛而知還景翳翳以將入撫孤松而盤桓歸去來兮請息交以絶遊世與我而相遺復駕言兮焉求悦親戚之情話樂琴書以消憂農人告余以春及將有事乎西疇或命巾車或棹孤舟既窈窕以尋壑亦﨑嶇而經丘木欣欣以向榮泉涓涓而始流善萬物之得時感吾生之行休已矣乎寓形宇内復幾時曷不委心任去留胡為遑遑欲何之富貴非吾願帝鄉不可期懐良辰以孤往或植杖而耘耔登東臯以舒嘯臨清流而賦詩聊乘化以歸盡樂夫天命復奚疑元亮峻節高風獨步千古管㓜安一流人物也元亮更有詩文堪令千載下玩味朱子一生最好讀出師表歸去來辭及杜子美詩晩年尤甚葢朱子當高孝光寧之時刻刻欲為國家復仇故喜讀出師表又不見用而懐歸念切故喜讀歸去來辭好讀子美詩亦是忠君愛國之心喜得同調也千古詩人推陶杜第一葢詩以道性情性情離不得倫常陶杜之髙節純忠發之于詩故可傳誦不然格調辭句雖工畢竟是程子所云閒言語耳案此篇晉書宋書南史㣲有異同今從文選前燕慕容恪傳晉書慕容恪字元恭皝之第四子也㓜而謹厚沉深有大度母高氏無寵皝未之竒也年十五身長八尺七寸容貌魁傑雄毅嚴重每所言及輙經綸世務皝始異焉乃授之以兵數從皝征伐臨機多竒䇿使鎮遼東甚有威惠高句麗憚之不敢為冦皝使恪與雋俱伐夫餘雋居中指授而已恪身當矢石推鋒而進所嚮輙潰皝將終謂雋曰今中原未一方建大事恪智勇俱濟汝其委之及雋嗣位彌加親任累戰有大功封太原王拜侍中假節大都督録尚書雋寢疾引恪與慕容評屬以後事及暐之世總攝朝權初建業聞雋死曰中原可圖矣桓温曰慕容恪尚存所憂方為大耳慕輿根之就誅也内外危懼恪容止如常神色自若出入往還一人步從或有諫之者恪曰人情懐懼且當自安以靖之吾復不安則衆何瞻仰哉於是人心稍定恪虚襟待物諮詢善道量才處任使人不踰位朝廷謹肅進止有常度雖執權政每事必諮之於評罷朝歸第則盡心色養手不釋巻其百寮有過未嘗顯之自是庶僚化徳稀有犯者恪之圍洛陽也秦中大震苻堅親將以備潼闗軍迴乃定恪為將不尚威嚴専以恩信御物務於大略不以小令勞衆軍士有犯法密縱舍之捕斬賊首以令軍營内不整似可犯而防禦甚嚴終無喪敗臨終暐親臨問以後事恪曰臣聞報恩莫大薦士板築猶可而况國之懿藩吳王文武兼才管蕭之亞陛下若任之以政國其少安不然臣恐二冦必有闚𨵦之計言終而死當時之傑推慕容元恭與王景畧二人景略之才較為揮霍然元恭徳器似有過之無不及也傳中載罷朝歸第盡心色養手不釋巻其孝如此則知無根之木不可以繁昌也其勤如此則知世有一仕便廢學者事業所就固可想見景略臨終戒堅以未可圖晉元恭臨終囑緯以用吳王垂皆反其言而敗不旋踵知者明于事理諒哉前秦王猛傳晉書王猛字景略北海劇人也家於魏郡少貧賤以鬻畚為業瓌姿儁偉博學好兵書謹重嚴毅氣度雄逺細事不干其慮自不參其神契畧不與交通是以浮華之士咸輕而笑之猛悠然自得不以屑意少逰於鄴都時人罕能識也惟徐統見而竒之召為功曹遁而不應遂隱于華隂山懐佐世之志希龍顔之主待時而動桓温入闗猛被褐而詣之談當世之事捫蝨而言旁若無人温察而異之問曰吾奉天子之命率鋭師十萬杖義討逆為百姓除殘賊而三秦豪傑未有至者何也猛曰公不逺數千里深入冦境長安咫尺而不渡灞水百姓未見公心故也所以不至温黙然温之將還賜猛車馬拜高官督䕶請與俱南猛還山諮師師曰卿與桓温豈並世哉猛乃止苻堅將有大志聞猛名遣吕婆樓招之一見便若平生語及廢興大事異符同契若𤣥徳之遇孔明也及堅僭位以猛為中書侍郎時始平多枋頭西歸之人豪右縱横刼盜充斥乃轉猛為始平令猛下車明法峻刑澄察善惡禁勒强豪鞭殺一吏百姓上書訟之有司劾奏檻車徵下廷尉詔獄堅親問之曰為政之體徳化為先莅任未幾而殺戮無數何其酷也猛曰臣聞宰寧國以禮治亂邦以法陛下不以臣不才任臣以劇邑謹為明君揃除凶猾始殺一姦餘尚萬數若以臣不能肅清骫法者敢不甘心鼎鑊酷政之刑臣實未敢受之堅謂羣臣曰王景略固是夷吾子産之儔也於是赦之時猛年三十六嵗中五遷權傾内外宗戚舊臣皆害其寵尚書仇騰丞相長史席寳數譖毁之堅大怒黜騰寶上下咸服莫有敢言遷尚書令累讓不許轉司徒録尚書事猛辭以無功不拜後率諸軍討慕容暐軍禁嚴明師無私犯猛之未至鄴也刦盜公行及猛之至逺近帖然燕人安之軍還以功進封清河郡侯賜以美妾女妓車馬猛固辭不受時既留鎮冀州堅遣猛于六州之内聽以便宜從事簡召英俊以補闗東守宰居數月上疏曰臣前所以朝聞夕拜不顧艱虞者正以方難未夷軍機權速庶竭命戎行敷宣皇威今聖徳格於皇天威靈被於八表竊敢披貢丹誠請避賢路設官分職各有司存豈應孤任愚臣以速傾敗若以臣有鷹犬㣲勤未忍捐棄者乞待罪一州效盡力命堅不許遣其侍中梁讜喻旨猛乃視事如前俄入為丞相加都督中外諸軍事猛表讓乆之堅曰卿昔螭蟠布衣朕龍潛弱冠屬世事紛紜朕竒卿於暫見儗卿為臥龍卿亦異朕於一言迴考槃之雅志豈不精契神交千載之會雖傅巖入夢姜公悟兆今古一時亦不殊也自卿輔政幾將二紀内釐百揆外蕩羣凶天下向定彛倫始叙朕且欲從容於上望卿勞心於下𢎞濟之務非卿而誰遂不許後數年復授司徒猛復上疏曰臣聞乾象盈虚惟后則之位稱以才官非則曠鄭武翼周仍世載詠王叔昧寵政替身亡雖陛下私臣其如天下何願迴日月之鑒矜臣後悔堅竟不從猛乃受命軍國内外萬機之務事無巨細莫不歸之猛宰政公平流放尸素拔幽滯顯賢才外修兵革内崇儒學勸課農桑教以亷恥無罪而不刑無才而不任於是兵强國富垂及升平猛之力也堅常敕其太子宏長樂公丕等曰汝事王公如事我其見重如此猛寢疾堅親祈南北郊宗廟社稷分遣侍臣禱河嶽諸祀靡不周備猛疾未瘳乃大赦其境内殊死以下猛疾甚因上疏謝恩并言時政多所𢎞益堅覽之流涕悲慟左右及疾篤堅親臨省病問以後事猛曰晉雖僻陋吳越乃正朔相承親仁善鄰國之寳也臣沒之後願不以晉為圖鮮卑羌虜我之仇也終為人患宜漸除之以便社稷言終而死時年五十一堅哭之慟比斂三臨謂太子宏曰天不欲使吾平一六合邪何奪吾景略之速也贈侍中丞相餘如故給東園温明秘器帛三千匹穀萬石謁者僕射監䕶喪事葬禮一依漢大將軍故事謚曰武侯朝野巷哭三日景略之治國養民興化以及削平將畧具載在苻堅記此記多叙其與堅之神契隆遇耳作者分明比之于孔明故處處著筆嗚呼君臣相得前有伊管後有葛王令人神往矣此外惟唐文皇之于魏文貞或庶幾焉故能馴致貞觀之治此記成于唐初君臣極力摹冩鋪揚意者其有感而興起乎與彭城王勰書北魏孝文帝教風密微禮政嚴嚴若不深心日勸何以敬諸每欲立一宗師肅我元族汝親則宸極位乃中監風標才器實足師範屢有口敕仍執冲遜難違清挹荏苒至今宗制之重捨汝誰寄便委以宗儀責成汝躬有不遵教典隨事以聞吾别肅治之若宗室有愆隱而不舉鍾罰汝躬綱維相厲庶有勸改吾朝聞夕逝不為恨也三代以下推北魏孝文帝為令主不讓漢孝文也此書見其惇叙九族處論文體書李諤臣聞古先哲王之化民也必變其視聽防其嗜欲塞其邪放之心示以淳和之路五教六行為訓民之本詩書禮昜為道義之門故能家復孝慈人知禮讓正俗調風莫大于此其有上書獻賦制誄鐫銘皆以褒徳序賢明勲證理茍非懲勸義不徒然降及後代風教漸落魏之三祖更尚文詞忽君人之大道好雕蟲之小藝下之從上有同影響競騁文華遂成風俗江左齊梁其弊彌甚貴賤賢愚唯務吟詠遂復遺理存異尋虚逐㣲競一韻之竒爭一字之巧連篇累牘不出月露之形積案盈箱惟是風雲之狀世俗以此相高朝廷據兹擢士禄利之路既開愛尚之情愈篤于是閭里童昏貴遊總丱未窺六甲先製五言至如羲皇舜禹之典伊傅周孔之説不復闗心何嘗入耳以傲誕為清虚以縁情為勲績指儒素為古拙用詞賦為君子故文筆日繁其政日亂良由棄大聖之軌模搆無用以為用也損本逐末流徧華壤逓相師祖乆而愈扇及大隋受命聖道聿興屏出輕浮遏止華偽自非懐經抱質志道依仁不得引預搢紳参厠纓冕開皇四年普詔天下公私文翰並宜實録其年九月泗洲刺史司馬㓜之文表華艶付所司治罪自是公卿大臣咸知正路莫不鑽仰墳素棄絶華綺擇先王之令典行大道於兹世如聞外州逺縣仍踵敝風選吏舉人未遵典則至有宗黨稱孝鄉曲歸仁學必典謨交不茍合則擯落私門不加收齒其學不稽古逐俗隨時作輕薄之篇章結朋黨而求譽則選充吏職舉送天朝葢由縣令刺史未行風教猶狹私情不存公道臣既忝憲司職當紏察若聞風即劾恐挂網者多請勒諸司普加搜訪有如此者具狀送臺上下不知敦行尊經徒以清虚綺靡相先此五代所以速亡也漢唐宋明所以能享國長乆者以能尊經耳夫立之學官用以取士行之既乆猶慮士子撮摘勦襲不知反已于是有謂非兼鄉舉里選不可者況相尚虚無專取浮薄而不速亡者未之有也士恢此論可謂鳴岡之鳯矣自贊劉炫通人司馬相如揚子雲馬季長鄭康成等皆自叙風徽傳芳來葉余豈敢仰均先達貽笑後昆徒以日迫桑榆大命將近故友飄零門徒雨散溘死朝露埋魂朔野親故莫照其心後人不見其迹殆及餘喘薄言胸臆貽及行邁傳示州里使夫將來俊哲知余鄙志耳余從綰髪以來迄於白首嬰孩為慈親所恕捶楚未嘗加從學為明師所矜榎楚弗之及暨乎敦叙邦族交結等夷重物輕身先人後已昔在㓜弱樂參長者爰及耆艾數接後生學則服而不厭誨則勞而不倦幽情寡適心事方違内省生平顧循終始其大幸有四其深恨有一性本愚蔽蒙業貧窶為父兄所饒厠搢紳之末遂得博覽典誥窺涉今古小善著於丘園虚名聞於邦國其幸一也隱顯人間沉浮世俗數忝徒勞之職乆執城旦之書名不挂於白簡事不染於丹筆立身立行慚恧實多啓手啓足庶幾可免其幸二也以此庸虚屢動神眷以此卑賤每升天府齊鑣驥騄比翼鵷鴻整緗素於鳯池記言動於麟閣參謁宰輔造請羣公厚禮殊恩增榮改價其幸三也晝漏方盡大耋已嗟退反初服歸骸故里翫文史以怡神閲魚鳥以散慮觀省野物登臨園沼緩步代車無罪為貴其幸四也仰休明之盛世慨道教之陵遲蹈先儒之逸軌傷羣言之蕪穢馳騖墳典釐改僻謬修撰始畢圖事適成天違人願途不我與世路未夷學校盡廢道不備於當時業不傳於身後銜恨泉壤實在兹乎其深恨一也却不是文人弄筆中多肝膈之要其深恨處露出絶大眼孔絶大志向令我憮然論孔庭之法文中子門人有問姚義孔庭之法曰詩曰禮不及四經何也姚義曰嘗聞諸夫子矣春秋斷物志定而後及也樂以和徳全而後及也書以制法從事而後及也易以窮理知命而後及也故不學春秋無以主斷不學樂無以知和不學書無以議制不學易無以通理四者非具體不能及故聖人後之豈養蒙之具耶或曰然則詩禮何為而先也義曰夫教之以詩則出辭氣斯逺暴慢矣約之以禮則動容貌斯立威嚴矣度其言察其志考其行辨其徳志定則發之以春秋於是乎斷而能變徳全則導之以樂於是乎和而知節可從事則達之以書於是乎可以立制知命則申之以易於是乎可與盡性若驟而語春秋則蕩志輕義驟而語樂則喧徳敗度驟而語書則狎法驟而語易則玩神是以聖人知其必然故立之以宗列之以次先成諸已然後備諸物先濟乎近然後形乎逺亶其深乎子聞之曰姚子得之矣説來皆有至理在聖門當為入室弟子中説勝法言逺甚法言只是摹擬于辭句之間中説却是由心得而發之或者以其擬論語啓人之議取唐初名臣為弟子啓人之疑要當五季波靡之餘忽然要作聖人讀其書簡質明徹非精思力行者不足語此也可謂奮乎百世之下矣諫伐高麗遺疏房元齡老子曰知足不辱知止不殆陛下威名功徳亦可足矣拓地開彊亦可止矣且陛下每決一重囚必令三覆五奏進素食止音樂者重人命也今驅無罪之士卒委之鋒刃之下使肝腦塗地獨不足愍乎向使高麗違失臣節誅之可也侵擾百姓滅之可也它日能為中國患除之可也今無此三條而坐煩中國内為舊主雪恥外為新羅報讎豈非所存者小所損者大乎願陛下許高麗自新焚陵波之船罷應募之衆自然華夷慶賴逺邇肅安臣旦夕入地倘蒙録此哀鳴死且不朽首段戒以止足次段動以仁心已乃熟籌高麗之不必伐意慮周盡房之善謀此可概見矣栁芳稱房為賢相善歸人主無跡可尋此其絶筆故遂傳於世尤足珍也方太宗東伐之初李大亮以遺表諫此則於其冄興師役時也二表遂為後世大臣臨終上表之始房元齡杜如晦傳賛新唐書唐栁芳有言帝定禍亂而房杜不言功王魏善諫而房杜讓其直英衛善兵而房杜濟以文持衆美效之君是後新進更用事元齡身處要地不吝權善始以終此其成令名者諒其然乎如晦雖任事日淺觀元齡許與及帝所親欵則謨謀果有大過人者方君臣明良志叶議從相資以成固千載之遇蕭曹之勛不足進焉雖然宰相所以代天者也輔賛彌縫而藏諸用使斯人由而不知非明哲曷臻是哉彼揚已取名瞭然使戸曉者葢房杜之細邪新唐書傳賛係宋子京所作其餘表志等乃歐陽公所作子京作傳語多造作欲簡鍊而欠穩者頗多若其賛語則立意既正詞亦新鍊足追古作者歐公文以舒暢勝使之作賛未必能過子京也房杜賛最為得體文亦凝縮矯勁上十思疏魏徵臣聞求木之長者必固其根本欲流之逺者必浚其泉源思國之安者必積其徳義源不深而望流之逺根不固而求木之長徳不厚而思國之理臣雖下愚知其不可而况於明哲乎人名當神器之重居域中之大將崇極天之峻永保無疆之休不念居安思危戒奢以儉徳不處其厚情不勝其欲斯亦伐根以求木茂塞源而欲流長者也凡百元首承天景命莫不殷憂而道著功成而徳衰有善始者實繁能克終者葢寡豈取之易而守之難乎昔取之而有餘今守之而不足何也夫在殷憂必竭誠以待下既得志則縱情以傲物竭誠則胡越為一體傲物則骨肉為行路雖董之以嚴刑震之以威怒終茍免而不懐仁貌恭而不心服怨不在大可畏惟人載舟覆舟所宜深慎奔車朽索其可忽乎君人者誠能見可欲則思知足以自戒將有作則思知止以安人念髙危則思謙冲而自牧懼滿溢則思江海下百川樂盤遊則思三驅以為度憂懈怠則思慎始而敬終慮壅蔽則思虚心以納下想讒邪則思正身以黜惡恩所加則思無因喜以謬賞罰所及則思無因怒而濫刑總此十思𢎞兹九徳簡能而任之擇善而從之則智者盡其謀勇者竭其力仁者播其惠信者效其忠文武爭馳君臣無事可以盡豫遊之樂可以養松喬之壽鳴琴垂拱不言而化何必勞神苦思代下司職役聰明之耳目虧無為之大道哉貞觀致治幾如三代全是一魏文貞由其學問充非徒膽識過人也讀十思一疏與聖賢格致省克之功何殊其對君正直凝定亦大有浩然之氣在十思以開其始十漸以勗其終魏𤣥成其賢矣哉上十漸疏魏徵臣觀自古帝王垂拱巖廊布政天下其語道也必先淳樸而抑浮華其論人也必貴忠良而鄙邪佞言制度則絶奢靡而崇儉約談物産則重穀帛而賤珍竒然受命之初皆遵之以成治稍安之後多反之而敗俗其故何哉豈不以居萬乗之尊有四海之富出言而莫已逆所為而人必從公道溺於私情禮節虧於嗜欲故也語曰非知之難行之惟難非行之難終之斯難斯言信矣伏惟陛下年甫弱冠大拯横流肇開帝業貞觀之初時方克壯抑損嗜欲躬行節儉論功則湯武不足方語徳則堯舜未為逺臣自擢居左右十有餘年每侍帷幄屢奉明旨常許仁義之道守之而不失儉約之志始終而不渝一言興邦斯之謂也徳音在耳敢忘之乎而頃年已來稍乖曩志敦樸之理漸不克終謹以所聞列之於左陛下貞觀之初無為無欲清靜之化逺被遐荒考之於今其風漸墜聽言則逺超於上聖論事則未踰於中主何以言之漢文晉武俱非上哲漢文辭千里之馬晉武焚雉頭之裘今則求駿馬於萬里市珍竒於域外此其漸不克終一也書曰民惟邦本本固邦寧為人上者奈何不敬陛下貞觀之始視人如傷恤其勤勞愛民猶子每存簡約無所營為頃年以來意在奢縱輕用人力乃云百姓無事則驕逸勞役則昜使自古以來未有由百姓逸樂而致傾敗者也何有逆畏其驕逸而故欲勞役者哉此其漸不克終二也陛下貞觀之初損已以利物至於今日縱欲以勞人雖憂人之言不絶於口而樂身之事日切於心或時有所營慮人致諫乃云若不為此不便我身人臣之情何可復争此直意在杜諫者之口豈曰擇善而行者乎此其漸不克終三也立身成敗在於所染蘭芷鮑魚與之俱化慎乎所習不可不思陛下貞觀之初砥礪名節不私於物唯善是與親愛君子踈斥小人今則不然輕䙝小人禮重君子重君子也敬而逺之輕小人也狎而近之近之則不見其非逺之則莫知其是莫知其是則不間而自疎不見其非則有時而自昵此其漸不克終四也書曰不作無益害有益功乃成不貴異物賤用物人乃足陛下貞觀之初動遵堯舜反樸還淳頃年以來好尚竒異難得之貨無逺不臻珍玩之作無時能止上好奢靡而望下敦樸未之有也末作滋興而求豐實其不可得亦已明矣此其漸不克終五也貞觀之初求賢如渇善人所舉信而任之取其所長恒恐不及近嵗以來由心好惡或衆善舉而用之或一人毁而棄之或積年任而用之或一朝疑而逺之夫行有素履事有成跡所毁之人未必可信於所舉積年之行不應頓失於一朝君子之懷蹈仁義而𢎞大徳小人之性好讒佞以為身謀陛下不審察其根源而輕為之臧否是使守道者日踈干求者日進所以人思茍免莫能盡力此其漸不克終六也陛下初登大位事惟清靜心無嗜慾數載之後不能固志雖無十旬之逸或過三驅之禮遂使盤遊之娛見譏於百姓鷹犬之貢逺及於四夷以馳騁為歡莫慮不虞之變事之不測其可救乎此其漸不克終七也孔子曰君使臣以禮臣事君以忠然則君之待臣義不可薄陛下初踐大位敬以接下君恩下流臣情上達頃年以來多所忽略或外官充使奏事入朝思覩闕庭將陳所見欲言則顔色不接欲請又恩禮不加間因所短詰其細過雖有聰辯之畧莫能申其忠欵而望上下同心君臣交泰不亦難乎此其漸不克終八也傲不可長欲不可縱樂不可極志不可滿四者前王所以致福通賢以為申誡陛下貞觀之初孜孜不怠屈已從人恒若不足頃年以來微有矜放恃功業之大意蔑前王負聖智之明心輕當代此傲之長也欲有所為皆取遂意縱或抑情從諫終是不能忘懷此欲之縱也志在嬉遊情無厭倦雖未全妨政事不復専心治道此樂將極也率土乂安四夷欵服仍逺勞士馬聞罪遐裔此志將滿也親狎者阿旨而不肯言疎逺者畏威而莫敢諫積而不已將虧聖徳此其漸不克終九也昔陶唐成湯之時非無災患而稱其聖徳者以其有始有終無為無欲遇災則極其憂勤時安則不驕不逸故也貞觀之初頻年霜旱畿内户口並就闗外攜負老㓜來往數千曾無一户逃亡一人怨苦此誠由識陛下矜育之懷所以至死無攜貳頃年以來疲於徭役闗中之人勞弊尤甚雜匠之徒夏日悉留和雇正兵之輩上番多别驅使和市之物不絶於鄉閭遞送之夫相繼於道路既有所弊易為驚擾脱因水旱榖麥不收恐百姓之心不能如前日之寧帖此其漸不克終十也臣聞禍福無門惟人所召人無釁焉妖不妄作伏惟陛下統天御㝢十有三年道洽寰中威加海外年榖豐稔禮教聿興暨乎今嵗天災流行炎氣致旱乃逺被於郡國兇醜作孽忽近起於轂下夫天何言哉垂象示誡斯誠陛下驚懼之辰憂勤之日也若見誡而懼擇善而從同周文之小心追殷湯之罪已前王所以致理者勤而行之今時所以敗徳者思而改之與物更新易人視聽則寳祚無疆普天幸甚疏奏太宗下旨褒嘉列為屏障又録付史官令千載之下識君臣之義賜徵黄金十觔廏馬二疋禹曰安汝止惟幾惟康舜亦曰敕天之命惟時惟幾漸也者幾之已見者也人君有謹幾之學人臣有杜漸之忠惟文貞有此誠直惟太宗有此虚公非徒列為屏障且録付史官而又賞之貞觀之治太宗之名所以冠絶近古也幾於君臣一徳之風矣東都拒建徳議薛收世充據東都府庫充實所將之兵皆江淮精鋭即日之患但乏糧食耳以是之故為我所持求戰不得守則難乆建徳親帥大衆逺來赴援亦當極其精鋭若縱之至此兩冦合從轉河北之粟以饋洛陽則戰爭方始偃兵無日混一之期殊未有涯也今宜分兵守洛陽深溝髙壘世充出兵慎勿與戰大王親率驍鋭先據成臯厲兵訓士以待其至以逸待勞決可克也建徳既破世充自下不過二旬兩賊就縳矣竇建徳既破天下以次平定矣收道衡之子實為河汾高第河汾陳爼豆之事未嘗談軍旅而收值大敵決大計瞭若觀紋是役為有唐混一要著則收此議當與留侯固陵之䇿同功文若諫阻官渡之師未足云也中説附録中又載太宗欲興禮樂而魏鄭公等媿無素業已乃歎曰使董薛而在㑹不至此薛謂收也收資兼文武可謂閎儒天不假年使貞觀文物畫於綿蕞惜哉古文雅正巻六
