body:
  text: 古文雅正巻七禮部侍郎蔡世逺編論奉親享廟襲封樂工等䟽馬周微臣每讀前史見賢者忠孝事未嘗不廢巻長想思履其迹臣不幸早失父母犬馬之養已無所施顧來事可為者唯忠義而已是以徒步二千里歸於陛下陛下不以臣愚過垂齒録竊自顧瞻無階答謝輒以微軀丹欵惟陛下所擇臣伏見大安宫在宫城之西而其牆宇門闕之制方之紫極尚為卑小臣伏以東宫皇太子之宅猶處城中大安乃至尊所居反在城外雖太上皇存心道素志在清儉陛下重違慈旨愛惜人力而蕃夷朝見及四方觀聽有不足者臣願營築雉堞修起門觀務從高顯以稱萬國之望則大孝昭乎天下矣臣又伏見明敕以二月二日幸九成宫臣竊惟太上皇春秋已高陛下宜朝夕視膳而晨昏起居今所幸宫去宫三百餘里鑾輿駐蹕俄經旬日非可以旦暮至也儻太上皇情或思感而欲即見陛下者將何以逮之且車駕今行本為避暑然則太上皇尚留熱所而陛下自逐涼處温凊之道臣竊未安然敕書既出業已成就願示速反之期以開衆惑臣又見詔書令宗室功臣悉就藩國貽厥子孫嗣守其政非有大故無或絀免臣竊惟陛下封植之者誠愛之重之欲其世嗣承守與國無疆也臣以為必如詔旨者陛下宜思所以安存之富貴之何必使世官也何則以堯舜之父猶有朱均之子儻在孩童嗣職萬一驕愚則兆庶被其殃而家國蒙其患正欲絶之也則子文之治猶在也正欲存之也則欒黶之惡已彰也與其毒害於見存之百姓則寧使割恩於已亡之一臣明矣然則向所謂愛之者乃適所以傷之也臣謂宜賦以茅土疇其戸邑必有材行隨噐方授則雖其翰翮非强亦可以獲免尤累昔漢光武不任功臣以吏事所以終全其世者良得其術也願陛下深思其宜使得奉大恩而子孫終其福禄也臣又聞聖人之化天下莫不以孝為本故曰孝莫大於嚴父嚴父莫大於配天國之大事在祀與戎孔子亦云吾不與祭如不祭是聖人之重祭祀也如此自陛下踐阼以來宗廟之享未曾親事伏縁聖情獨以鑾輿一出勞費無藝所以忍其孝思以便百姓遂使一代之史不書皇帝入廟之事將何以貽厥孫謨垂則來葉臣知大孝誠不在爼豆之間然聖人之訓人固有屈已以從物特願聖恩顧省愚欵臣又聞致化之道在於求賢審官為政之基必自揚清激濁故孔子曰惟名與器不可以假人是言慎舉之為重也臣伏見王長通白明逹本自樂工輿皂雜類韋槃提斛斯正則更無他材獨解調馬縱使術踰儕輩能有可取止可賜金帛以富其家豈宜列預士流超受高爵遂使朝㑹之位萬國來庭騶子倡人鳴玉曳組與夫朝賀君子比肩而立同坐而食臣竊恥之然成命既往縱不可追謂宜不可使在朝班預於仕伍也不見激昻但見懇欵告君之極則也丁南湖謂貞觀將相皆隋室舊臣獨周出處純乎無玷余更喜其奏疏韓魏公所謂主于理勝而以至誠將之者也三陣對高宗御武成殿問兵家三陣員對云員半千臣聞古者星宿孤虚天陣也山川向背地陣也偏伍彌縫人陣也臣謂不然夫師以義出沛若時雨得天之時為天陣足食約費且畊且戰得地之利為地陣舉三軍士如子弟之從父兄得人之和為人陣捨是則何以戰言簡義正出以老健之筆自是絶調陳銓選之弊疏魏元同人君之體當委任而責成功所委者當則所用者自精矣故周穆王命伯冏為大僕正曰慎簡乃僚是使羣司各求其小者而天子命其大者也乃至漢氏得人皆自州縣補署五府辟召然後升於天朝自魏晉以來始専委選部夫以天下之大士人之衆而委之数人之手用刀筆以量才案簿書而察行借使平如權衡明如冰鏡猶力有所極照有所窮況所委非人而有愚闇阿私之弊乎願略依周漢之規以捄魏晉之失唐時選法始集而試觀其書判已試而銓察其身言已銓而注已注而唱然後類以為甲裴行儉所定也遂為永制時又有劉曉者䟽言取士専用文章為甲乙故士皆捨徳行而趨文藝夫日誦萬言何闗理體文成七步未足化人況盡心卉木之間極筆煙霞之際以斯成俗豈非大謬後世取士弊吏之法縱未得悉復三代之舊若二䟽者所當權輿其意而行之者已姚崇宋璟傳賛新唐書姚崇以十事要説天子而後輔政顧不偉哉而舊史不傳觀開元初皆已施行信不誣已宋璟剛正又過於崇𤣥宗素所尊憚常屈意聽納故唐史臣稱崇善應變以成天下之務璟善守文以持天下之正二人道不同同歸於治此又所以佐唐使中興也嗚呼崇勸天子不求邊功璟不肯當邉臣而天寳之亂卒陷其害可謂先見矣然唐三百年輔弼者不為少獨前稱房杜後稱姚宋何哉君臣之遇合葢難矣夫宋廣平剛正為唐朝第一非徒過姚崇也崇之才惟李文饒可以方之而崇為較醇亦其遭際勝文饒也賛語能見其大宋公遺愛碑頌張説維唐御天下九十有八載蒼生賁乎海隅元澤漫乎荒外天子念窮鄉之僻陋徼道之修阻吏或不率不馴人或不康不若乃命舊相廣平公宋璟鎮兹裔壤式是南州篤五管之政教總三軍之旗鼓幅員萬里馴致九譯詔書下日靡然順風曷由臻斯威名之先路也公曩日執白簡登瑣闥推誠謇諤不私形骸忤英主之龍鱗蹹奸臣之虎尾挫二張之鋭則聲怛寰域折三思之角則氣葢風雲由是極有四星維帝之輔地有五嶽維天之柱其入宰也君之股肱其出守也人之父母至於此邦之長人也飲食有節衣服有常清心而庶務簡正色而羣下一瑟兮僴兮赫兮咺兮固以不怒而威不言而信雖有文身鑿齒被髪儋耳衣卉麫木巢山館水種落異俗而化齊言語不通而心喻矣其率人版築教人陶瓦室皆塗塈晝遊則華風可觀家徹茅茨夜作而災火不發棟宇之利也自今始徂國之舶車海琛雲萃物無二價路有遺金殊裔胥易其迴途逺人咸内我邊郡交昜之坦也有如此故能言之士舉為美談葢㣲子去殷以後王者襄公代楚將得諸侯尚書東漢之雅望黄門北齊之令徳宋氏世名公其濟美詩所謂無念爾祖聿修厥徳廣平有焉若夫往者屈也來者伸也往來相召而哀樂繼之鴻飛遵渚於女信處龍章袞衣以我公歸鬱陶乎人思嗟嘆之不足廣府司馬譚瓌番禺耆老某乙等相與刻石傳徽斯文予春秋之徒也豈將茍其辭哉雅敬宋公王臣之重次嘉譚子贊徳之義遙感耆舊去思之勤越裳變風知周公之才之美吉甫作頌見申伯于蕃于宣觀政將來惡可廢也頌曰降王宰兮逺國靈歌北户兮舞南溟酌七徳兮考六經政畫一兮言不冄草木育兮魚鱉寧變蓬屋兮改籬牆魚鱗瓦兮鳥翼堂洞日華兮皎夜光火莫燎兮風莫颺事有近兮惠無疆崑崙寶兮西海財幾萬里兮嵗一來舟如島兮貨為臺市無欺兮路無盜旅忘家兮扃夜開越井岡兮石門道金鼔愁兮旌斾好來何暮兮去何早犦牛牲兮菌雞卜神降福兮公壽考大手筆人方有此大文章唯廣平公足以當之昌黎公未出以前推燕公為巨手未能去排偶之習然典重矜貴有兩漢之風味而無六朝之綺靡擅名一代不虛也經生家學作古文多虚率寒儉尤當學此一種上姚令公書張九齡日月左拾遺張九齡奏記紫㣲令梁公閣下公登廟堂運天下者久之矣人之情偽事之得失所更多矣非曲學之説小子之慮所能損益亦已明矣然而意有不盡未可息區區之懐或以見容亦猶用九九之術今君侯秉天下之鈞為聖朝之佐大見信用渴日太平千載一時胡可遇也加以明若鏡中運如掌上朝暮羲軒之時何云伊呂而已際㑹易失功業垂成而前弊未盡往往擬議愚用惜焉夫見勢則附俗人之所能也與不妄受志士之所難也君侯察其不茍附及不輕受就而厚之因而用之則禽息之首為知已而必碎豫讓之身感國士而能漆至於合如市道亷公之門客虚盈勢比雀羅廷尉之交情貴賤初則許之以死殉體面俱柔終乃背之而飽飛身名已遂小人恒態不可不察自君侯職相國之重持用人之權而淺中弱植之徒已延頸企踵而至諂親戚以求譽媚賓客以取容情結笑言談生羽翼萬事至廣千變難知其間豈不有才所失在於無恥君侯或棄其所短收其所長人且不知深旨之若斯便謂盡私於此輩其有議者則曰不識宰相無以得遷不因交遊無以求售明主在上君侯為相安得此言且人可誠感難可户説為君侯之計謝媒介之徒專謀選衆之舉古人有言禦寒莫若重裘止謗莫如自修修之至極何謗不息勿曰無害其禍將大夫長才廣度珠濳璧匿無先容以求達雖後時而自安今豈無之何近何逺但問於其類人焉庾哉雖不識之有何不可是知女不私人可以為婦矣士不茍進可以為臣矣固知山藏海納言之無咎是以不敢黙黙而已也願無以人故而廢其言以傷君侯之明幸甚幸甚曲江人物風度翩翩乎唐代也觀其上書規勗姚元之處知其識量絶人矣中所云其間豈不有才所失在于無恥奔名者對之悚然又云何逺何近但問於其類求才者讀之爽然與徐給事論文書栁冕文章本於教化形於治亂繫於國風故在君子之心為志形君子之言為文論君子之道為教昜云觀乎人文以化成天下此君子之文也自屈宋以降為文者本於哀豔務於恢誕亡於比興失古義矣雖揚馬形似曹劉骨氣潘陸藻麗文多用寡則是一技君子不為也昔武帝好神仙而相如為大人賦以諷帝覽之飄然有凌雲之氣故揚雄病之曰諷則諷矣吾恐不免於勸也葢文有餘而質不足則流才有餘而雅不足則蕩流蕩不返使人有淫麗之心此文之病也雄雖知之不能行之行之者惟荀孟賈生董仲舒而已僕自下車為外事所感感而應之為文不覺成巻意雖復古而不逮古則不足以議古人之文噫古人之文不可及之矣得見古人之心在於文乎茍無文又不得見古人之心故未能忘言亦志之所之也先生論文五六篇皆傑然自命大約謂文以經世明道為主盡掃尋章摘句恢誕華藻之陋韓李未出之先誠翹楚也獨孤及梁肅輩尚未之及焉登此以見唐文之興有由來矣宇文融韋堅楊慎矜王鉷傳賛新唐書開元中宇文融始以言利得幸於時天子見海内完治偃然有攘郤四夷之心融度帝方調兵食故議取隱户剰田以中主欲私説一開天子恨得之晩不十年而取宰相雖後得罪而追恨融才猶所未盡也孟子所謂上下征利而國危者可不信哉天寳以來外奉軍興内蠱豔妃所費愈不貲計於是韋堅揚慎矜王鉷楊國忠各以裒刻進剥下益上嵗進羡緡百億萬為天子私藏以濟横賜而天下經費自如帝以為能故重官累使尊顯烜赫然天下流亡日多於前有司備員不復事而堅等所欲既充還用權媚以相屠脅四族皆覆為天下笑夫民可安而不可擾私可通而不可竭觀數子乃欲擾而竭之歛怨基亡則向所謂利者顧不反哉鉷國忠後出横虐最甚當方毒天下復思融云唐至天寶言利之徒進矣至於徳宗時税間架除陌錢抑又甚焉小人不憚覆國亡身進利説以榮寵一時愚亦甚矣王荆舒非奉君貪位者青苖均輸與此輩同譏故術不可不慎辭太尉䟽郭子儀太尉職雄任重竊憂非據輙敢上聞伏奉詔書未允誠懇臣疇昔之分早知止足今兹累請竊懼盈滿義實由衷事非矯飾志之所至敢不盡言自兵亂以來紀綱寖壞時多躁競俗少亷隅徳薄而位尊功㣲而賞厚實繁有衆不可殫論臣每見之深以為念昔范宣子讓其下皆讓欒黶為汰不敢違也臣誠薄劣竊慕古人務欲以身率先大變浮俗是用勤勤懇懇願罷此官庶禮讓興行由臣而致也臣位為上相爵為真王參啓沃之謀受腹心之寄恩榮已極功業已成尋合乞骸保全餘齒但以冦讎在近家國未安臣子之心不敢寧處茍西戎即叙懐恩就擒疇昔官爵誓無所受必當追蹤范蠡繼迹留侯臣之鄙懐切在於此汾陽有大功于宗社不必言即如進退惟君緩則置之急則用之毫無芥蔕陶士行李臨淮等對之有愧多矣田承嗣跋扈强藩玩王命如弁髦接其書即拜回紇感誠朝恩服善非至誠而能若是乎此䟽足覘學問深醇忠誠亦流露筆墨間郭子儀傳贊新唐書天寳末盜發幽陵外阻内訌子儀自朔方提孤軍轉戰逐北誼不還顧當是時天子西走唐祚若贅斿而能輔太子冄造王室及大難略平遭讒惎詭奪兵柄然朝聞命夕引道無纎介自嫌及被圍涇陽單騎見虜壓以至誠猜忍沮謀雖唐命方永亦由忠貫日月神明扶持者哉及光弼等畏逼不終而子儀完名高節爛然獨著福禄永終雖齊桓晉文比之為褊唐史臣裴垍稱權傾天下而朝不忌功葢一世而上不疑侈窮人欲而議者不之貶嗚呼垍誠知言其子孫多以功名顯葢盛徳後云小時初讀通鑑綱目問家大人曰諸葛武侯郭令公程純公朱文公雖不同一格要其立心行事幾於聖否大人低徊久之曰未敢即以為聖然汝所言亦自有見今二十餘年矣詳觀四公行事果是三代以下所難令公雖學術無徵非天資粹美涵養充到者能之乎宋子京摹冩得出筆亦酷摹班范然所引裴垍侈窮人欲之言下字過當令公不過厚奉養多侍妾耳居將相王侯之位亦非過分者烏得為侈窮人欲哉條奏貢舉䟽時進士不鄉舉但試辭賦浮文綰秉政首言人才之本廷議偉之楊綰國之選士必藉賢良葢取孝友純備言行敦實居常育徳動不違仁體忠信之資履謙恭之操藏器則未嘗自伐虚心而所應必誠夫如是故能率已從政化人鎮俗者也自叔世澆詐兹道寖㣲争尚文辭互相矜衒馬卿浮薄竟不偶於任用趙壹虚誕終取擯於鄉閭自時厥後其道彌盛不思實行皆徇空名敗俗傷教備載前史古人比文章於鄭衞葢有由也近煬帝始制進士之科當時猶試䇿而已至高宗朝劉思立為考功員外郎又奏進士加雜文明經加帖經從此積弊寖而成俗㓜能就學皆誦當代之詩長而博文不越諸家之集遞相黨與用致虚聲六經則未嘗開巻三史則皆同挂壁況復徵以孔門之道責其君子之儒者哉祖習既深奔競為務矜藝者曾無愧色勇進者但欲凌人以毁讟為常談以向背為已任投刺干謁驅馳於要津露才揚已喧騰於當代古之賢良方正豈有如此者乎朝之公卿以此待士家之長老以此垂訓欲其返淳朴懐禮讓守忠信識亷隅何可得也譬之於水其流已濁若不澄本何當復清方今聖徳御天再寧寰宇四海之内顒顒向化皆延頸舉踵思聖朝之理也不以此時而理之則太平之政又乖矣凡國之大柄莫不先擇下臣古先哲后皆側席待賢今之取人令將牒自舉非經國之體也望請依古制縣令察孝亷審知在鄉閭有孝悌及信義亷恥之行加以經業才堪䇿試者以孝亷為名薦之於州刺史當以禮待之試其所通之學其通者送名於省自縣至省不得令舉人輙自陳牒其所習經左傳公羊榖梁禮記周禮儀禮尚書毛詩周易任通一經務取深義奥旨通諸家之義試日差諸司官有儒學者對問每經問義十條問畢對䇿三道其䇿皆問古今理體及當時要務取堪行用者其經義并䇿全通為上第望付吏部便與官其經義通八䇿通二為中第與出身下第罷歸其國子監舉人亦請准此如有行業不著所由妄相推薦請量加貶黜所冀數年之間人倫一變既歸實學當識大猷居家者自修徳業從政者皆知亷恥浮競自止敦龎自勸教人之本實在兹焉事若施行即别立條例詔左右丞諸司侍郎御史大夫中丞給舍同議聞奏西漢舉孝亷舉秀才皆論實行未嘗試也秀才者即博士弟子員彚送太常太常籍異等秀才上之為郎故名秀才賢良方正為特科有試䇿至東漢順帝時用左雄言諸生試家法文吏課章奏亦時使然耳綰此議極善然末代無不試之法試經試䇿必不可少行業必著所由此為切要惜乎綰卒而唐竟不行也奏百官論事䟽顔真卿御史中丞李進等傳宰相語稱奉進止縁諸司官奏事頗多朕不憚省覽但所奏多挾私讒毁自今論事者諸司官皆須先白長官長官白宰相宰相定可否然後奏聞者臣自聞此語以來朝野囂然人心亦多衰退何則諸司長官皆達官也言皆專達於天子也郎官御史陛下腹心耳目之臣也故其出使天下事無巨細得失皆令訪察迴日奏聞所以明四目達四聰也今陛下欲自屏耳目使不聰明則天下何述焉詩云營營青蠅止於棘讒言㒺極交亂四國以其能變白為黑變黑為白也詩人深惡之故曰取彼讒人投畀豺虎豺虎不受投畀有北昔夏之伯明楚之無極漢之江充皆讒人也孰不惡之陛下何不深迴聽察其言虚誣者則讒人也因誅殛之其言不虚者則正人也因奬勵之舍此不為使衆人皆謂陛下倦於聽覽拒其諫諍臣竊為陛下痛惜之臣聞太宗勤於聽覽庶政以理故著司門式以防壅閉天寶已後李林甫威權日盛羣臣不先諮宰相輙奏事者仍託以他故中傷之又閹官袁思藝日宣詔至中書𤣥宗動静必告林甫先意奏請𤣥宗驚喜若神以此權寵日甚下情不達漸致潼闗之禍陵夷至於今日天下之弊盡萃於聖躬豈陛下招致之乎葢其所從來者漸矣自艱難之初百姓尚未彫弊太平之理立可便致屬李輔國用權宰相專政遞相姑息莫肯直言大開三司不安反側將士北走黨項合集土賊至今為患偽將更相驚恐因思明危懼扇動却反又今相州敗散東都陷没先帝繇此憂勤至於損壽臣每思之痛切心骨天下兵戈未戢瘡痏未平陛下豈得不日聞讜言以廣視聽而欲頓隔忠讜之路乎臣聞君子難進易退朝廷開不韙之路猶恐不言況懐厭怠令宰相宣進止使御史臺作條目不令直進從此人人不敢奏事則陛下聞見只此三數人耳天下之士方箝口結舌陛下後見無人奏事必謂朝廷無事可論豈知懼不敢進即林甫國忠復起矣如今日之事曠古未有雖李林甫楊國忠猶不敢公然如此陛下不早覺悟漸成孤立後縱悔之無及矣臣實知忤大臣者罪在不測不忍有負陛下無任懇廹之至公骨骾敢言如此仗節死義當于平日犯顔敢諫中求之段秀實顔真卿傳贊新唐書唐人栁宗元稱世言段太尉大抵以為武人一時奮不慮死以取名非也太尉為人姁姁常低首拱手行步言氣卑弱未嘗以色待物人視之儒者也遇不可必逹其志決非偶然者宗元不妄許人諒其然也非孔子所謂仁者必有勇乎當禄山反哮噬無前魯公獨以烏合嬰其鋒功雖不成其志有足稱者晚節偃蹇為奸臣所擠見殞賊手毅然之氣折而不沮可謂忠矣詳觀二子行事當時亦不能信於君及臨大節蹈之無貳色何耶彼忠臣義士寧以未見信於人要返諸已得其正而後慊於中而行之也嗚呼雖千五百嵗其英烈言言如嚴霜烈日可畏而仰哉段公不死于郭晞之悍卒而死于朱泚更得所矣顔公不死于禄山之强兵而死于希烈有足悲矣然二公精魄萬古史稱其嚴霜烈日可畏而仰凛凛乎猶有生氣哉奉天改元大赦詔平朱泚後改元陸贄致理興化必在推誠忘已濟人不恡改過朕嗣守丕構君臨萬方失守宗祧越在草莽不念率徳誠莫追于既往永言思咎期有復於將來惟我烈祖邁徳庇人致俗化于和平拯生靈於塗炭重熙積慶垂二百年伊爾卿尹庶官洎億兆之衆代受亭育以迄于今肆予小子獲纉鴻業懼徳不嗣罔敢怠荒然以長于深宫之中暗于經國之務不知稼穡之艱難不察征戍之勞苦猶昧省已遂用興戎徵師四方轉餉千里暴命峻于誅求疲甿空于杼軸天譴于上而朕不寤人怨于下而朕不知馴致亂階變興都邑賊臣乗釁肆逆滔天萬品失序九廟震驚痛心靦貌罪實在予賴天地降佑神人叶謀將相竭誠爪牙宣力屏除大盜載張皇維將𢎞永圖必布新命朕晨興夕惕惟念前非自今以後中外所上書奏不得更稱聖神文武之號與人更始以答天休可大赦天下改建中五年為興元元年自正月一日昧爽以前大辟罪已下罪無輕重咸赦除之李希烈田悦王武俊李納等有以忠勞任膺將相有以勲舊繼守藩維朕撫馭乖方致令疑懼朕實不君人則何罪並與洗滌各復爵位朱滔雖與賊泚連坐路逺未必同謀如能效順亦與維新其河南北諸軍兵馬並宜各于本道自固封疆勿相侵軼朱泚大為不道棄義蔑恩反易天常盜竊名器暴犯陵寢所不忍言獲罪祖宗朕不敢赦其應被朱泚脇從將士官吏百姓及諸色人等有遭其煽誘有廹以兇威茍能自新一切不問人之行業或未必兼搆大厦者方集于羣材建竒功者不限於常檢茍在適用則無棄人況黜免之人沉鬱既乆朝過夕改仁何逺哉流移降黜亡官失爵配𨽻人等有材能著聞者特加録用勿拘常例諸軍使諸道赴奉天及進收京城將士等或百戰摧敵或萬里勤王濟危難者其節著復社禝者其業崇我圖爾功特加彛典宜並賜名奉天定難功臣身有過犯逓減罪三等子孫有過犯遞減罪二等見危致命先哲攸貴掩骼埋胔禮典所先雖效用而或殊在惻隱而何間諸道將士有死王事者各委所在州縣給遞送歸本管官為葬祭其有因戰陣殺戮及擒獲伏辜暴骨原野者並委所在逐近便收葬自頃軍旅所給賦役繁興吏因為姦人不堪命汔可小康與之休息其墊陌及税間架竹木茶漆㩁鐵等諸色名目悉冝停罷京畿之内屬此冦戎攻刼焚燒靡有寧室王師仰給人以重勞時宜減放今年夏税之半朕以兇醜犯闕遽用于征爰度近郊息駕兹邑軍儲克辦師旅攸寧式當襃旌以志吾過其奉天宜升為赤縣百姓並給復五年尚徳者教化之所先求賢者邦家之大本永言兹道夢想増懐而澆薄之風趨競不息幽棲之士寂寞無聞葢誠所未孚故求之不至天下有隱居行義才徳高逺晦迹丘園不求聞達者委所在長吏具姓名聞奏當備禮邀致諸色人中有賢良方正能直言極諫及博通墳典達於教化并洞識韜略堪任將帥者委常參官及所在長吏聞薦天下孤老鰥寡惸獨不能自活者並委州縣長吏量事優恤其有年九十已上者刺史縣令就門存問義夫節婦孝子順孫旌表門閭終身勿事大兵之後内外耗竭貶食省用宜自朕躬當節乘輿之服御絶宫室之華飾率已師儉為天下先諸道貢獻自非供宗廟軍國之用一切並停布澤行賞仰惟舊章今以餘孽未平帑藏空竭有乖慶賜深愧于懷赦書有所未該者委所司類例條件聞奏敢以赦前事相言告以其罪罪之亡命山澤挾藏軍器百日不首復罪如初赦書日行五百里布告遐邇咸使聞知公謂感人以言其本已淺況言又不誠乎因冄作此詔書深痛明備後李節度來朝言山東將士見詔感泣臣于是知賊不足平也總是推誠改過四字盡之唐朝學術文章以韓公為第一經濟奏議以陸公為第一其忠誠正大姚元之李鄴侯尚不及也論前所答奏未施行狀陸贄立國之本在乎得衆得衆之要在乎見情情有通塞故否泰生情有厚薄故損益生昜象乾下坤上則曰泰坤下乾上則曰否損上益下則曰益損下益上則曰捐乾為天為君坤為地為臣天在下而地處上於位乖矣而反謂之泰者上下交故也君在上而臣處下於義順矣而反謂之否者上下不交故也損益之義亦由是焉上約己而裕於人人必悦而奉上矣豈不謂之益乎上蔑人而肆諸已人必怨而叛上矣豈不謂之損乎然則上下交而泰不交而否自損者人益自益者人損情之得失豈容昜哉是以古先聖王之居人上也必以其心從天下之心而不敢以天下之人從其欲自昔王業盛衰君道得失史冊盡在粲然可徵與衆同欲靡不興違衆自用靡不廢從善納諫靡不固逺賢恥過靡不危善惡從類端如貫珠成敗象行明若觀火此歴代之元龜也太宗武定禍亂文致太平然猶兢兢畏慎每戒臣下獻規𤣥宗躬定大難開懐納忠侈心一萌邪道並進大盜一興至今為梗肅宗懲致冦之由虚受廣納故得來蘇之望允塞配天之業勃興陛下以明威照臨以嚴法制斷君臣意乖上下情隔由是人各隱情以言為諱至於變亂將起億兆同憂獨陛下恬然不知方謂太平可致列聖升降之效歴歴如彼當今理亂之由昭昭如此未有不興於得衆殆於失人裕於僉諧蔽於偏信濟美因乎納諫虧徳由乎自賢善始本乎憂勤失全萌乎安泰今將悔禍徼福去危從安若不循太宗創業之規襲肅宗中興之理鑒天寳致亂之所以懲今者遷幸之所由則何以孚聖懐彰令聞新逺邇之聽歸反側之心乎不勝愚誠懇欵謹復布露以聞泰否言君臣也損益言君民也上下交則泰損上益下則益羲文周孔之治法也宣公明切指出遂為百代之藥石蓍龜宣公經濟名臣經學最為精通世有讀史而不窮經者終為無本之學即徒玩宋儒之書而不湛深經學猶無本也但恐涉于訓詁記誦故必體究宋儒則經學更字字切已耳請數對羣臣兼許令論事狀陸贄天子之道與天同方天不以地有惡木而廢發生天子不以時有小人而廢聴納昔人有因噎而廢食者又有懼溺而自沉者其為矯枉防患之慮豈不過哉臣聞人之所助在乎信信之所立由乎誠蚩蚩之徒或昏或鄙然而上之得失靡不辨上之好惡靡不知上之所秘靡不傳上之所為靡不效故馭之以智則人詐示之以疑則人偷接不以禮則徇義之意輕撫不以恩則效忠之情薄惟天下至誠為能盡其性能盡其性則能盡人之性是知誠信之道不可斯須去身願陛下慎守而行之有加恐非所以為悔也仲虺述成湯之徳曰用人惟已改過不吝吉甫美宣王之功曰袞職有闕惟仲山甫補之成湯聖君也仲虺聖輔也以聖輔而贊揚聖君不稱其無過而稱其改過周宣中興之賢主也吉甫文武之賢臣也以賢臣而歌誦賢主不美其無闕而美其補闕是則聖賢之意較然著明惟以改過為能不以無過為貴中古以降淳風浸微臣既尚諛君亦自聖掩盛徳而行小道於是有入則造膝出則詭辭之態興矣姦由此滋善由此沮帝王之意由此惑諫臣之罪由此生媚道一行為害斯甚太宗文皇帝以虚受為理本以直言為國華存致雍熙之化沒齊堯舜之名向若太宗聞過則羞已之短納諫又畏人之知雖有悔過之意必無從諫之名且以太宗有底定禍亂之武有致理太平之功然而人到於今稱詠以為道冠前古澤被無窮者則從諫改過為其首焉陛下所謂諫官論事少能慎密例自矜衒歸過於朕者臣以為不密自矜信非忠厚其於聖徳固亦無虧陛下若納諫不違則傳之適足増美陛下若違諫不納又安能禁止勿傳伏願以貞觀故事為楷模使太宗風烈重光於聖代臣聞虞舜察邇言故能成聖化晉文聽輿誦故能恢霸功大雅有詢于芻蕘之言洪範有謀及庶人之義是則聖賢為理務徇衆心不敢忽細㣲不敢侮鰥寡遜于志者不必然逆于心者不必否辭拙而效速者不必愚言甘而利重者不必智是皆考之以實慮之以終其用無他惟善所在陛下所謂比見奏對論事皆是雷同道聽塗説者臣竊以衆多之議足見人情必有可行亦有可畏恐不宜一槩輕侮而莫之省納也陛下又謂試加質問即便辭窮者臣竊以陛下雖窮其辭而未窮其理能服其口而未服其心臣每讀史書見亂多理少因懐感歎竊謂為下者莫不願忠為上者莫不求理然而下恒苦上之難達上恒苦下之難知若是者何九弊不去故也所謂九弊者上有其六而下有其三好勝人恥聞過騁辯給衒聰明厲威嚴恣彊愎此六者君上之弊也諂諛顧望畏懦此三者臣下之弊也上好勝必甘於佞辭上恥過必忌于直諫如是則下之諂諛者順旨而忠實之語不聞矣上騁辯必勦説而折人以言上衒明必臆度而虞人以詐如是則下之顧望者自便而切磨之辭不盡矣上厲威必不能降情以接物上恣愎必不能引咎以受規如是則下之畏懦者避辜而情理之説不申矣夫自黎獻而上獲覩至尊之光景者踰億兆而無一焉就獲覩之中得接言議者又千萬無一幸而得接者猶有九弊居其間則上下之情所通鮮矣亂多理少從古以然考其初心不必淫暴亦在乎兩情相阻馴致其失以至於艱難者焉伏願廣接下之道開奨善之門𢎞納諫之懐勵推誠之美待之以禮煦之以和求之若不及用之懼不周以能改其過為善以得聞其過為明諫者之狂誣明我之能恕諫者之漏泄彰我之能從諫者有失中而君無不美如此則徳光而義孚矣臣所以屢屢塵凟而不能自抑者葢以陛下有拯亂之志而多難未平有務理之誠而庶績未乂故每中夜自思竊歎而深惜也惟陛下詳省所闕亟行所宜宗社無疆之休也用賢聴言治國之要而其本在於誠信大學所謂誠正為修齊治平之本也宣公學有原本言曲而中以視韓公子說難其揣摩物情則均而彼則一派私利之心此則一片公誠千載猶將見之謝密旨狀因論所宣事狀陸贄顧少連向臣説云聖旨察臣孤貞猶謂清慎太過都絶諸道饋遺却恐事情不通如不能納諸財物至如鞭靴之類受亦無妨者臣性實凡鄙寧忘顧私家本寠貧安能無欲所以深自刻慎勉修亷隅者葢由負戴厚恩尸竊大位既不克導揚風教致俗清淳又未能減息征徭濟人窮困由是茍行特操杜絶交私陛下責臣以清謹太過斯謂聖明陛下慮事之不通有乖理道夫以胥吏末流苞苴㣲貺茍或違道臣猶知慚况公卿大臣之間方岳連帥之任豈資納賄然後致誠若因財利交歡是以姑息為事既乖直道必有過求遂之則法度浸隳阻之則􅔵望彌甚為害如此國何賴焉髙祖太宗著法垂制監臨受賄盈尺有刑豈不以貪饕為弊殘蠧最深至於士吏之㣲尚當嚴禁矧居風化之首反可通行凡上之所為以導下也若上為之下亦為之固其理也又可禁乎朝廷取之于方鎮方鎮復取之於州州取之于縣縣取之于鄉鄉將安取哉是皆出于疲人之肝腦筋髓耳自大盜猾夏天下常屯百萬之師坐受衣食農夫蠶婦凍而織餓而耕殫力忍死以供十倍之賦日月引頸望覩昇平之化惠恤之恩凡四十九年矣薦屬多故有加無瘳而又交通私賄扇起貪風是令已困之甿重遭過分之擾也亦冀陛下詳察其理普澄其源𢎞清浄無欲之風守慈儉不貪之寳是將感人心而天下服何有事情不通之患乎夫賄道一開展轉滋甚鞭靴不已必及金璧日見可欲何能自窒於心已與交私固難中絶其意是以涓流不止谿壑成災毫末既差丘山聚釁臣竊料郡府之不願行賄于朝廷猶鄉閭之不願輸貨于郡府也但以行之者有利不行者有虞故為安身保位之謀耳假如四方俱賂於朝廷受其三而却其一有所受有所却二端相反則遇却者或有意疑乎見拒而不通焉四方俱賄于朝廷朝廷俱辭而不受則咸知不受者乃朝廷之常理適所以服其心而誘其善復何嫌阻之有乎陛下嗣位之初躬行節儉郡國無來獻朝廷無私求四方風動幾致清平旋以刑峻賦繁兵連禍結泊大憝殱夷皇運興復征伐之役頗息於前時清約之風亦虧於往日曩興師徒人困暴賦今罷征伐人困私求是乃殘瘁之餘永無蘇息之望使萬方黎獻當陛下休明之代不登富壽不洽雍熙追懐前修實用心熱禮記曰理亂持危朝聘以時厚往而薄來所以懐諸侯也是知懐撫之道貴徳賤財始於朝廷行於郡國郡國斯乂朝廷益尊是皆無賄之致也及夫王綱浸壞徳化陵夷然後滅公議而徇私情盛誅求而崇饋獻故禮記曰天子微諸侯僭於是相覿以貨相賂以利而天下之禮亂矣是知傷風害禮莫甚於私暴物殘人莫大於賂利於絶私去賄者莫先於君主務于愛人助理者莫切於輔臣君臣之間固不可語及于私賄矣況躬行乎周官弊吏以亷為首故大學戒務財孟子懲懐利賄賂行而國不可為矣余觀春秋時晉主夏盟靈成景厲之世雖用人行政有失猶不失為盟主至昭公頃定時賄賂公行如魯昭以受賂不得入十八國㑹召陵以求賄不果伐楚晉伯微而春秋亦自是為戰國矣嗚呼獄訟以貨賄為重輕舉措以貨賄為用舍莊生所謂哀莫大于心死者宣公此疏尤為深痛陸宣公集序權徳輿嘗讀賈誼書觀其經制人文鋪陳帝業術亦至矣待之宣室恨得後時遇亦深矣然竟不能達四聰而盡其善排羣議而試厥謀道之難行亦已久矣東陽絳灌何代無之噫一薫一蕕善齊不能同其器方鑿圓枘良工無以措巧心所以理世少而亂日多大雅衰而正聲寖漢道未融既失之于賈傅吾唐不幸復擯棄於陸公公諱贄字敬輿吳郡蘇人溧陽令偘之子年十八登進士第應博學宏辭科授鄭縣尉非其好也省母歸壽春刺史張鎰有名於時一獲晤言大加賞識暨别鎰以泉貨萬數為賮曰願以此奉太夫人一日之膳公悉辭之領新茶一串而已是嵗以書判拔萃調渭南簿御史府以監察換之徳宗皇帝春宫時知名召對翰林即日為學士由詞部員外轉考功郎中朱泚之亂從幸奉天時車駕播遷詔書旁午公灑翰即成不復起草初若不經思慮及成而奏無不曲盡事情中於機㑹倉卒填委同職者無不拱手嘆服不能復有所助嘗從容奏曰此時詔書陛下宜痛自引過以感人心昔禹湯以罪已勃興楚昭以善言復國陛下誠能不恡改過以言謝天下俾臣草辭無諱庶幾羣盜革心上從之故行在詔書始下雖武人悍卒無不揮涕激發議者以徳宗克平冦亂不惟神武之功爪牙宣力葢亦資文徳腹心之助焉及還京師李抱真來朝奏曰陛下在山南時山東士卒聞書詔之辭無不感泣思奮臣節臣知賊不足平也公自行在帶本職拜諫議大夫中書舍人精敏小心未嘗有過艱難扈從行在輙隨啓沃謀猷特所親信有時讌語不以公卿指名但呼陸九而已初幸梁洋棧道危狹從官前後相失上夜次山館召公不至泫然號於禁旅曰得陸贄者賞千金頃之公至太子親王皆賀丁韋夫人憂去職持喪於洛遣人䕶溧陽之柩附葬河南上遣中使監䕶其事四方賻遺數百萬公一無所取素與蜀帥韋南康布衣友善韋令每月置遺公奏而受之服闋復内職權知兵部侍郎覲見之日天子為之興改容叙弔内外屬望旦夕俟其輔政為竇參忌嫉故緩之真拜兵部侍郎知貢舉得人之盛公議稱之貞元八年拜中書侍郎平章事公以少年入侍内殿特蒙知遇不可與衆浮沉茍且自愛事有不可必諍之上察物太精躬臨庶政失其大體動與公違姦諛從而間之屢至不悦親友或規之公曰吾上不負天子下不負吾所學不恤其他公精于吏事斟酌剖決不爽錙銖其經綸制度具在徳宗實録户部侍郎判度支裴延齡以姦回得幸害時蠧政物議莫敢指言公獨以身當之屢言不可翰林學士吳通元忌公先達每切中傷隂結延齡互言公短宰相趙憬公之引拔升為同列以公排邪守正心復異之羣邪沮謀直道不勝十年退公為賓客罷政事明年夏旱芻糧不給軍校訴於上延齡奏曰此皆陸贄輩怨望鼓扇軍人也貶公忠州别駕上怒不可測賴陽城張萬福救之獲免蜀帥抗表請以贄代已嵗賂資糧公在南賓閉門却掃郡人稀識其面復避謗不著書惟考校醫方撰集驗方五十巻行於世永貞初與鄭餘慶陽城同徴還公已薨殁時年五十二公之秉筆内署也㩁古揚今雄文藻思敷之為文誥伸之為典謨俾􅘀狡向風懦夫増氣則有制誥集一十巻潤色之餘論思獻納軍國利害巨細必陳則有奏草七巻其在相位也推賢與能舉直錯枉將幹璿衡而揭日月清氛沴而平泰階敷其道也與伊説争衡考其文也與典謨接軫則有中書奏議七巻古人以士之遇也其要有四焉才位時命也仲尼有才而無位其道不行賈生有時而無命終于一慟惟公才不謂不長位不謂不達逢時而不盡其道非命歟裴氏之子焉能使公不遇哉説者又以房魏姚宋逢時遇主克致清平陸君亦獲幸時君而不能與房魏争烈葢道未至也應之曰道雖在我𢎞之在人蜚蝗竟天農稷不能善稼奔車覆轍孔孟亦廢規行若使四君與公昜時而相則一否一臧未可知也而致君不及貞觀開元者葢時不幸也豈公不幸哉以為其道未至不亦誣乎公之文集有詩文賦集表狀為别集十五卷其闗於時政昭昭然與金石不朽者惟制誥奏議乎今以類相從冠于編首兼略書其官氏景行以為序引俾後之君子覽公制作效之為文為臣事君之道不其偉歟權文公在當時以文章著名然尚未脱排偶氣為宰相雖無甚建明然亦與庸碌者迥别此篇序宣公議論兼叙事可歌可誦吾喜宣公之為人故讀權公此篇更低徊不忍釋也兩漢辨亡論權徳輿言兩漢所以亡者皆曰莽卓予以為莽卓簒逆汙神器以亂齊民自賈夷滅天下耳目顯然聞知静徴厥初則亡西京者張禹亡東京者胡廣皆以假道儒術得伸其邪心徼一時大名致位公輔辭氣所發損益繫之而多方善柔保位持禄或陷時君以滋厲階或附兇沴以結禍胎故其蕩覆之機簒奪之兆皆指導馴致之雖年祀相逺猶手授頤指之然也其為賊害豈直莽卓之比乎禹以經術為帝師身備漢相特見尊信當主臣之重極儒者之貴永始元延之間天地之眚屢見言事者皆譏切王氏專政時成帝亦悔懼天變而未有以決駕至禹第辟左右以問之須其一言以為律度為禹計者亦宜陳大昜堅冰之誡誦小雅十月之刺乗其嚮納痛言得失反以罕言命不語怪為辭致成帝不疑之心授王氏寖盛之勢上下恬然䁆忽亡國儻帝慮不至是猶當開陳切劘面别廷辨矧當就第宴閒之際虚懐訪決之時方且眩小男于牀下官子壻於近郡欵然用家人匹婦為心以身圖安不恤國患致使羣盜弄權迭執魁柄禍稔毒流至於新都不可遏也斯可憤也逮至東都順桓之間國統三絶胡廣以巨儒柄用位極上台初梁冀席外戚之重貪戾當國既鴆質帝議立嗣君公卿大臣皆以清河王蒜年長有徳屬最尊親可以靖人亦既定䇿冀乃憚其明哲且不利長君私於蠡吾獨異羣議為廣計者亦當中立如石介然不回率趙誡之徒同李杜所守然後三事百工正辭於朝雖冀之暴恣豈能一旦盡誅漢廷羣公耶反徇一息之安首䑕畏懦竟使清河徙廢蠡吾為梗邦家陵夷漢道日蹙結黨錮之獄成閹寺之禍禍亂循環以至董卓赫赫漢室化為堂塗葢棟橈鼎折之所由來久矣彼梅福以孤逺上疏張綱以卑秩埋輪獨何人哉而不是思也向者西京抑損王氏尊君卑臣則庶乎無哀平之壞東京登庸清河主明臣忠則庶乎無靈獻之亂大漢之祚未昜知也或以國之興亡皆有隂隲之數非人謀能亢則但取瞽聾者而相之立土木偶而尊之被以章組列于廊廟斯可矣何堯舜之或咨或吁殷周之或夢或卜憂勤日昃之若是然後為理耶予因𨽻古史且嗜春秋褒貶之學心所憤激因辨其所以然此論堪為朱雲李固吐氣亦使世上有一種假儒者無骨氣人見之羞死古文雅正卷七
