body:
  text: 古文雅正卷二禮部侍郎蔡世逺編條災異封事劉向臣前幸得以骨肉備九卿奉法不謹乃復蒙恩竊見災異並起天地失常徵表為國欲終不言念忠臣雖在甽畝猶不忘君惓惓之義也況重以骨肉之親又加以舊恩未報乎一杼愚意死無所恨臣聞舜命九官濟濟相讓和之至也衆賢和於朝則萬物和於野故簫韶九成而鳯凰來儀擊石拊石百獸率舞四海之內靡不和寧及至周文開基西郊雜遝衆賢罔不肅和崇推尚之風以銷分爭之訟文王既沒周公思慕歌詠文王之德其詩曰於穆清廟肅雍顯相濟濟多士秉文之德當此之時武王周公繼政朝臣和于內萬國歡于外故盡得其歡心以事其先祖其詩曰有來雍雍至止肅肅相維辟公天子穆穆言四方皆以和來也諸侯和於下天應報於上故周頌曰降福穰穰又曰飴我釐牟釐牟麥也始自天降此皆以和致和獲天助也下至幽厲之際朝廷不和轉相非怨詩人疾而憂之曰民之無良相怨一方衆小在位而從邪議歙歙相是而背君子故其詩曰歙歙訿訿亦孔之哀謀之其臧則具是違謀之不臧則具是依君子獨處守正不撓衆枉勉強以從王事則反見憎毒讒訴故其詩曰密勿從事不敢告勞無罪無辜讒口嗸嗸當是之時日月薄蝕而無光其詩曰朔月辛卯日有蝕之亦孔之醜又曰日月鞠凶不用其行四國無政不用其良天變見于上地變動于下水泉沸騰山谷易處其詩曰百川沸騰山冢卒崩髙岸為谷深谷為陵哀今之人胡憯莫懲霜降失節不以其時其詩曰正月繁霜我心憂傷民之訛言亦孔之將言民以是為非甚衆大也此皆不和賢不肖易位之所致也自此之後天下大亂篡殺殃禍並作厲王奔彘幽王見殺至乎平王末年魯隱之始即位也周大夫祭伯乖離不和出奔於魯而春秋為諱不言來奔傷其禍殃自此始也是後尹氏世卿而專恣諸侯背畔而不朝周室卑微二百四十二年之間日食三十六地震五山陵崩陀二彗星三見夜常星不見夜中星隕如雨一火災十四長狄入三國五石隕墜六鶂退飛多麋有蜮蜚鸜鵒來巢者皆一見李梅冬實七月霜降草木不死八月殺菽大雨電雨雪當是時禍亂輒應弒君三十六亡國五十二諸侯奔走不得保其社稷者不可勝數也周室多禍晉敗其師于貿戎伐其郊鄭傷桓王戎執其使遂至凌夷不能復興由此觀之和氣致祥乖氣致異天地之常經古今之通義也今陛下開三代之業招文學之士優遊寬容使得並進章交公車人滿北軍往往羣朋將同心以陷正臣正臣進者治之表也正臣陷者亂之機也乘治亂之機未知孰任而災異數見此臣所以寒心者也初元以來六年矣案春秋六年之中災異未有稠如今者原其所以然者讒邪並進也夫執孤疑之心者來讒賊之口持不斷之意者開羣枉之門讒邪進則衆賢退羣枉盛則正士消故易有否泰否者閉而亂也泰者通而治也詩又云雨雪麃麃見晛聿消與易同義昔者鯀共工歡兜與舜禹雜處堯朝周公與管蔡並居周位當是時迭進相毁流言相謗豈可勝道哉帝堯成王能賢舜禹周公而消共工管蔡故以大治榮華至今孔子與季孟偕仕于魯李斯與叔孫俱宦于秦定公始皇賢季孟李斯而消孔子叔孫故以大亂汚辱至今故治亂榮辱之端在所信任信任既賢在于堅固而不移詩云我心匪石不可轉也言守善篤也易曰渙汗其大號言號令如汗汗出而不反者也今出善令未能踰時而反是反汗也用賢未能三旬而退是轉石也論語曰見不善如探湯今二府奏佞讇不當在位歷年而不去故出令則如反汗用賢則如轉石去佞則如拔山如此望隂陽之調不亦難乎是以羣小窺見間隙流言飛文譁於民間故詩云憂心悄悄愠于羣小小人成羣誠足愠也昔孔子與顔淵子貢更相稱譽不為朋黨禹稷與臯陶傳相汲引不為比周何則忠于為國無邪心也故賢人在上位則引其類而聚之于朝易曰飛龍在天大人聚也在下位則思與其類俱進易曰拔茅茹以其彚征吉今佞邪與賢臣並在交戟之內歙歙訿訿以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也自古明聖未有無誅而治者也故舜有四放之罰而孔子有兩觀之誅然後聖化可得而行也今以陛下明知誠深思天地之心迹察兩觀之誅覽否泰之卦觀雨雪之詩歷周唐之所進以為法原秦魯之所消以為戒杜閉羣枉之門廣開衆正之路決斷狐疑分别猶豫使是非炳然可知則百異消滅而衆祥並至太平之基萬世之利也臣謹重封昧死上時蕭望之自殺天子甚悼恨之周堪與弟子張猛俱進用大見信任恭顯數譛毁焉向懼其傾危乃上封事諌恭顯見其書愈與許史比而怨向等婆心苦口刻酷重疊聲淚俱并此篇意旨大類元符初范華陽一疏漢元信恭顯而疏堪猛之迹巳露宋哲將用熙豐舊臣而疏范吕之迹亦巳露故危詞反復直抉所以特此篇用經文字古雅范疏言時事文字明暢其深切刻露則一也後皆果如其言不幸而中豈忠臣之心哉文字用經解經最典據雅醇此篇用蟬聫法最有風致賈長沙兩司馬文皆有段落明白董江都劉子政文段落不甚明然皆渾古之氣案是時左氏春秋及毛詩皆未列于學官宣帝時詔向受榖梁春秋及子歆校祕書見古文春秋左氏傳大好而治之數以難向向不能非而猶自持其榖梁義篇中以茅戎為貿戎六鷁為六鶂皆榖梁文也玉篇鶂鷁同水鳥善髙飛説文但收鶂字引春秋傳六鶂退飛五歷切焦氏易林則或作鷁或作鶂而藝文類聚引左氏遂亦作鶂也又所引詩多與毛傳不同疑皆韓詩惟朔月辛卯宋本朱傳猶然元板乃誤為日案學齋占畢云注云朔日也而乃謂之朔月蓋月朔之反辭猶書之月正元日乃正月元日也魏了翁正朔考云夫十月之交則十一月矣是周人朔月也故曰朔月辛卯正朔日食古人所忌故曰亦孔之醜周人以十一月為朔月未嘗改為正月也立説不同要未嘗以月為日矣後漢書有作朔日者傳寫誤耳極諫外家封事王氏專恣上無繼嗣向上書極諫劉向臣聞人君莫不欲安然而常危莫不欲存然而常亡失御臣之術也夫大臣操權柄持國政未有不為害者也昔晉有六卿齊有田崔衛有孫寧魯有季孟常掌國事世執朝柄終後田氏取齊六卿分晉崔杼弒其君光孫林父寧殖出其君衎弒其君剽季氏八佾舞于庭三家者以雍徹並專國政卒逐昭公周大夫尹氏管朝事濁亂王室子朝子猛更立連年乃定故經曰王室亂又曰尹氏殺王子克甚之也春秋舉成敗録禍福如此類甚衆皆隂盛而陽微下失臣道之所致也故書曰臣之有作威作福害于而家凶于而國孔子曰祿去公室政逮大夫危亡之兆秦昭王舅穰侯及涇陽葉陽君專國擅勢上假太后之威三人者權重於昭王家富于秦國國甚危殆賴寤范雎之言而秦復存二世委任趙髙專權自恣壅蔽大臣終有閻樂望夷之禍秦遂以亡近事不逺即漢所代也漢興諸吕無道擅相尊王吕産吕祿席太后之寵據將相之位兼南北軍之衆擁梁趙王之尊驕盈無厭欲危劉氏賴忠正大臣絳侯朱虛侯等竭誠盡節以誅滅之然後劉氏復安今王氏一姓乘朱輪華轂者二十三人青紫貂蟬充盈幄內魚鱗左右大將軍秉事用權五侯驕奢僣盛並作威福擊斷自恣行汙而寄治身私而託公依東宫之尊假甥舅之親以為威重尚書九卿州牧郡守皆出其門管執樞機朋黨比周稱譽者登進忤恨者誅傷遊談者助之説執政者為之言排擯宗室孤弱公族其有智能者尤非毁而不進逺絶宗室之盛不令得給事朝省恐其與巳分權數稱燕王蓋主以疑上心避諱吕霍而弗肯稱內有管蔡之萌外假周公之論兄弟據重宗族磐互歷上古至秦漢外戚僣貴未有如王氏者也雖周皇甫秦穰侯漢武安吕霍上官之屬皆不及也物盛必有非常之變先見為其人徵象孝昭帝時冠石立于泰山仆栁起于上林而孝宣帝即位今王氏先祖墳墓在濟南者其梓柱生枝葉扶疏上出屋根垂地中雖立石起栁無以過此之明也事藝不兩大王氏與劉氏亦且不並立如下有泰山之安則上有纍卵之危陛下為人子孫守持宗廟而令國祚移于外親降為皂隸縱不為身奈宗廟何婦人內夫家外父母家此亦非皇太后之福也孝宣皇帝不與舅平昌樂昌侯權所以全安之也夫明者起福於無形銷患于未然宜發明詔吐德音援近宗室親而納信黜逺外戚毋授以政皆罷令就第以則效先帝之所行厚安外戚全其宗族誠東宫之意外家之福也王氏永存保其爵祿劉氏長安不失社稷所以褒睦外內之姓子子孫孫無疆之計也如不行此䇿田氏復見于今六卿必起於漢為後嗣憂昭昭甚明不可不深圖不可不蚤慮易曰君不密則失臣臣不密則失身幾事不密則害成唯陛下深留聖思審固幾密覽往事之戒以折中取信居萬安之實用保宗廟久承皇太后天下幸甚危言激論如睹新莽之禍然讀者但見其懇誠不見其過激也告君而出之過激以之快一時傳後世則得矣于當時未必有濟然忠肝義膽有時忍不住亦初不自覺也過秦論上賈誼秦孝公據殽函之固擁雍州之地君臣固守而窺周室有席卷天下包舉宇內囊括四海之意并吞八荒之心當是時商君佐之內立法度務耕織修守戰之備外連衡而鬭諸侯于是秦人拱手而取西河之外孝公既沒惠王武王蒙故業因遺册南兼漢中西舉巴蜀東割膏腴之地北收要害之郡諸侯恐懼會盟而謀弱秦不愛珍器重寶肥美之地以致天下之士合從締交相與為一當是時齊有孟嘗趙有平原楚有春申魏有信陵此四君者皆明智而忠信寬厚而愛人尊賢重士約從離衡并韓魏燕楚齊趙宋衛中山之衆於是六國之士有寧越徐尚蘇秦杜赫之屬為之謀齊明周最陳軫昭滑樓緩翟景蘇厲樂毅之徒通其意吳起孫臏帶他兒良王廖田忌亷頗趙奢之朋制其兵嘗以十倍之地百萬之衆叩關而攻秦秦人開關延敵九國之師逡巡遁逃而不敢進秦無亡矢遺鏃之費而天下諸侯巳困矣於是從散約解爭割地而奉秦秦有餘力而制其敝追亡逐北伏尸百萬流血漂鹵因利乘便宰割天下分裂河山強國請服弱國入朝延及孝文王莊襄王享國日淺國家無事及至秦王續六世之餘烈振長䇿而御宇內吞二周而亡諸侯履至尊而制六合執捶柎以鞭笞天下威振四海南取百越之地以為桂林象郡百越之君俯首繫頸委命下吏乃使蒙恬北築長城而守籓籬却胸奴七百餘里胡人不敢南下而牧馬士不敢彎弓而報怨于是廢先王之道焚百家之言以愚黔首墮名城殺豪俊收天下之兵聚之咸陽銷鋒鑄鐻以為金人十二以弱黔首之民然後斬華為城因河為津據億丈之城臨不測之溪以為固良將徑弩守要害之處信臣精卒陳利兵而誰何天下以定秦王之心自以為關中之固金城千里子孫帝王萬世之業也秦王既沒餘威振于殊俗陳涉甕牖繩樞之子氓隸之人而遷徙之徒才能不及中人非有仲尼墨翟之賢陶朱猗頓之富躡足行伍之間而倔起什伯之中率罷散之卒將數百之衆而轉攻秦斬木為兵揭竿為旗天下雲集響應贏糧而景從山東豪俊遂並起而亡秦族矣且夫天下非小弱也雍州之地殽函之固自若也陳涉之位非尊于齊楚燕趙韓魏宋衛中山之君鋤耰棘矜非錟于鈎戟長鎩也適戍之衆非抗于九國之師深謀逺慮行軍用兵之道非及鄉時之士也然而成敗異變功業相反也試使山東之國與陳涉度長潔大比權量力則不可同年而語矣然秦以區區之地干乘之權招八州而朝同列百有餘年矣然後以六合為家殽函為宫一夫作難而七廟墮身死人手為天下笑者何也仁義不施而攻守之勢異也勢如崩崖縮之勿墜氣如奔濤蓄之復注議論既正出以絶大魄力使讀者酣快異常陸士衡辨亡論酷意摹擬筆力弱不及矣宋潛溪隋室興亡論筆力又不及士衡惟權文公兩漢辨亡論歸罪張禹胡廣出以他體反復可觀文章固不貴襲也治安䇿賈誼臣竊惟事藝可為痛哭者一可為流涕者二可為長太息者六若其他背理而傷道者難遍以疏舉進言者皆曰天下巳安已治矣臣獨以為未也曰安且治者非愚則諛皆非事實知治亂之體者也夫抱火厝之積薪之下而寢其上火未及然因謂之安方今之藝何以異此本末舛逆首尾衡決國制搶攘非甚有紀胡可謂治陛下何不一令臣得孰數之于前因陳治安之䇿試詳擇焉夫射獵之娛與安危之機孰急使為治勞智慮苦身體乏鐘鼓之樂勿為可也樂與今同而加之諸侯軌道兵革不動民保首領胸奴賔服四荒鄉風百姓素朴獄訟衰息大數既得則天下順治海內之氣清和咸理生為明帝沒為明神名譽之美垂於無窮禮祖有功而宗有德使顧成之廟稱為太宗上配太祖與漢亡極建久安之藝成長治之業以承祖廟以奉六親至孝也以幸天下以育羣生至仁也立經陳紀輕重同得後可以為萬世法程雖有愚幼不肖之嗣猶得蒙業而安至明也以陛下之明達因使少知治體者得佐下風致此非難也其具可素陳于前願幸毋忽臣謹稽之天地驗之往古按之當今之務日夜念此至孰也雖使舜禹復生為陛下計亡以易此夫樹國固必相疑之藝下數被其殃上數爽其憂甚非所以安上而全下也今或親弟謀為東帝親兄之子西鄉而擊今吳又見告矣天子春秋鼎盛行義未過德澤有加焉猶尚如是況莫大諸侯權力且十此者乎然而天下少安何也大國之王幼弱未壯漢之所置傅相方握其事數年之後諸侯之王大抵皆冠血氣方剛漢之傅相稱病而賜罷彼自丞尉以上遍置私人如此有異淮南濟北之為邪此時而欲為治安雖堯舜不治黃帝曰日中必􅡢操刀必割今令此道順而全安甚易不肯早為已乃墮骨肉之屬而抗剄之豈有異秦之季世乎夫以天子之位乘今之時因天之助尚憚以危為安以亂為治假設陛下居齊桓之處將不合諸侯而匡天下乎臣又知陛下有所必不能矣假設天下如曩時淮隂侯尚王楚黥布王淮南彭越王梁韓信王韓張敖王趙貫髙為相盧綰王燕陳豨在代令此六七公者皆無恙當是時而陛下即天子位能自安乎臣有以知陛下之不能也天下殽亂髙皇帝與諸公併起非有仄室之藝以豫席之也諸公幸者乃為中涓其次廑得舍人材之不逮至逺也髙皇帝以明聖威武即天子位割膏腴之地以王諸公多者百餘城少者乃三四十縣德至渥也然其後十年之間反者九起陛下之與諸公非親角材而臣之也又非身封王之也自髙皇帝不能以是一嵗為安故臣知陛下之不能也然尚有可諉者曰疏臣請試言其親者假令悼惠王王齊元王王楚中子王趙幽王王淮陽共王王梁靈王王燕厲王王淮南六七貴人皆亡恙當是時陛下即位能為治乎臣又知陛下之不能也若此諸王名雖為臣實皆有布衣昆弟之心慮亡不帝制而天子自為者擅爵人赦死罪甚者或戴黃屋漢法令非行也雖行不軌如厲王者令之不肯聽召之安可致乎幸而來至法安可得加動一親戚天下圜視而起陛下之臣雖有悍如馮敬者適啓其口匕首巳陷其胸矣陛下雖賢誰與領此故疏者必危親者必亂巳然之效也其異姓負強而動者漢巳幸勝之矣又不易其所以然同姓襲是迹而動既有徵矣其執盡又復然殃禍之變未知所移明帝處之尚不能以安後世將如之何屠牛垣一朝解十二牛而芒刃不頓者所排擊剝割皆衆理解也至於髖髀之所非斤則斧夫仁義恩厚人主之芒刃也權藝法制人主之斤斧也今諸侯王皆衆髖髀也釋斤斧之用而欲嬰以芒刃臣以為不缺則折胡不用之淮南濟北藝不可也臣竊迹前事大抵強者先反淮隂王楚最強則最先反韓信倚胡則又反貫髙因趙資則又反陳豨兵精則又反彭越用梁則又反黥布用淮南則又反盧綰最弱最後反長沙乃在二萬五千户耳功少而最完藝疏而最忠非獨性異人也亦形藝然也曩令樊酈絳灌據數十城而王今雖巳殘亡可也令信越之倫列為徹侯而居雖至今存可也然則天下之大計可知巳欲諸王之皆忠附則莫若令如長沙王欲臣子之勿菹醢則莫若令如樊酈等欲天下之治安莫若衆建諸侯而少其力力少則易使以義國小則亡邪心令海內之藝如身之使臂臂之使指莫不制從諸侯之君不敢有異心輻湊並進而歸命天子雖在細民且知其安故天下咸知陛下之明割地定制令齊趙楚各為若干國使悼惠王幽王元王之子孫畢以次各受祖之分地地盡而止及燕梁他國皆然其分地衆而子孫少者建以為國空而置之須其子孫生者舉使君之諸侯之地其削頗入漢者為徙其侯國及封其子孫也所以數償之一寸之地一人之衆天下亡所利焉誠以定治而巳故天下咸知陛下之亷地制一定宗室子孫莫慮不王下無倍畔之心上無誅伐之志故天下咸知陛下之仁法立而不犯令行而不逆貫髙利幾之謀不生柴竒開章之計不萌細民鄉善大臣致順故天下咸知陛下之義卧赤子天下之上而安植遺腹朝委裘而天下不亂當時大治後世誦聖一動而五業附陛下誰憚而久不為此天下之勢方病大瘇一脛之大幾如要一指之大幾如股平居不可屈信一二指搐身慮亡聊失今不治必為錮疾後雖有扁鵲不能為巳病非徒瘇也又苦􅏓盩元王之子帝之從弟也今之王者從弟之子也惠王親兄子也今之王者兄子之子也親者或亡分地以安天下疏者或制大權以逼天子臣故曰非徒病瘇也又苦􅏓盩可痛哭者此病是也今民賣僮者為之繡衣絲履偏諸緣內之間中是古天子后服所以廟而不宴者也而庶人得以衣婢妾白縠之表薄紈之裏緁以偏諸美者黼繡是古天子之服今富人大賈嘉會召客者以被牆古者以奉一帝一后而節適今庶人屋壁得為帝服倡優下賤得為后飾然而天下不屈者殆未有也且帝之身自衣皂綈而富民牆屋被文繡天子之后以緣其領庶人孽妾緣其履此臣所謂舛也夫百人作之不能衣一人欲天下亡寒胡可得也一人耕之十人聚而食之欲天下亡飢不可得也飢寒切於民之肌膚欲其亡為姦邪不可得也國巳屈矣盜賊直須時耳然而獻計者曰毋動為大耳夫俗至大不敬也至亡等也至冒上也進計者猶曰母為可為長太息者此也商君遺禮義棄仁恩并心於進取行之二嵗秦俗日敗故秦人家富子壯則出分家貧子壯則出贅借父耰鉏慮有德色母取箕帚立而誶語抱哺其子與公併倨婦姑不相説則反脣而相稽其慈子嗜利不同禽獸者亡幾耳然并心而赴時猶曰蹶六國兼天下功成求得矣終不知反亷愧之節仁義之厚信并兼之法遂進取之業天下大敗衆掩寡智欺愚勇威怯壯陵衰其亂至矣是以大賢起之威震海內德從天下曩之為秦者今轉而為漢矣然其遺風餘俗猶尚未改今世以侈靡相競而上亡制度棄禮誼捐亷恥日甚可謂月異而嵗不同矣逐利不耳慮非顧行也今其甚者殺父兄矣盜者剟寢户之簾搴兩廟之器白晝大都之中剽吏而奪之金矯偽者出幾十萬石粟賦六百餘萬錢乘傳而行郡國此其亡行義之尤至者也而大臣特以簿書不報期會之間以為大故至於俗流失世壞敗因恬而不知怪慮不動于耳目以為是適然耳夫移風易俗使天下回心而鄉道類非俗吏之所能為也俗吏之所務在于刀筆筐篋而不知大體陛下又不自憂竊為陛下惜之夫立君臣等上下使父子有禮六親有紀此非天之所為人之所設也夫人之所設不為不立不植則僵不修則壞管子曰禮義亷恥是謂四維四維不張國乃滅亡使管子愚人也則可管子而少知治體則是豈可不為寒心哉秦滅四維而不張故君臣乖亂六親殃戮姦人並起萬民離叛凡十三嵗而社稷為虛今四維猶未備也故姦人幾幸而衆心疑惑豈如今定經制令君君臣臣上下有差父子六親各得其宜姦人亡所幾幸而羣臣衆信上不疑惑此業一定世世常安而後有所持循矣若夫經制不定是猶度江河亡維楫中流而遇風波船必覆矣可為長太息者此也夏為天子十有餘世而殷受之殷為天子二十餘世而周受之周為天子三十餘世而秦受之秦為天子二世而亡人情不甚相逺也何三代之君有道之長而秦無道之暴也其故可知也古之王者太子乃生固舉以禮使士負之有司齊肅端冕見之南郊見於天也過闕則下過廟則趨孝子之道也故自為赤子而教固已行矣昔者成王幼在襁抱之中召公為太保周公為太傅太公為太師保保其身體傅傅之德義師道之教訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也故乃孩提有識三公三少固明孝仁禮義以道習之逐去邪人不使見惡行於是皆選天下之端士孝悌博聞有道術者以衛翼之使與太子居處出入故太子乃生而見正事聞正言行正道左右前後皆正人也夫習與正人居之不能毋正猶生長于齊不能不齊言也習與不正人居之不能毋不正猶生長於楚之地不能不楚言也故擇其所嗜必先受業乃得嘗之擇其所樂必先有習乃得為之孔子曰少成若天性習貫如自然及太子少長知妃色則入於學學者所學之官也學禮曰帝入東學上親而貴仁則親疏有序而恩相及矣帝入南學上齒而貴信則長幼有差而民不誣矣帝入西學上賢而貴德則聖智在位而功不遺矣帝入北學上貴而尊爵則貴賤有等而下不隃矣帝入太學承師問道退習而考于太傅太傅罰其不則而匡其不及則德智長而治道得矣此五學者既成于上則百姓黎民化輯于下矣及太子既冠成人免於保傅之嚴則有記過之史徹膳之宰進善之旌誹謗之木敢諫之鼓瞽史誦詩工誦針諫大夫進謀士傳民語習與智長故切而不愧化與心成故中道若性三代之禮春朝朝日秋暮夕月所以明有敬也春秋入學坐國老執醬而親餽之所以明有孝也行以鸞和步中采齊趨中肆夏所以明有度也其于禽獸見其生不食其死聞其聲不食其肉故逺庖厨所以長恩且明有仁也夫三代之所以長久者以其輔翼太子有此具也及秦而不然其俗固非貴辭讓也所上者告訐也固非貴禮義也所上者刑罰也使趙髙傅胡亥而教之獄所習者非斬劓人則夷人之三族也故胡亥今日即位而明日射人忠諫者謂之誹謗深計者謂之妖言其視殺人若艾草菅然豈惟胡亥之性惡哉彼其所以道之者非其理故也鄙諺曰不習為吏視巳成事又曰前車覆後車誡夫三代之所以長久者其巳事可知也然而不能從者是不法聖智也秦世之所以亟絶者其轍迹可見也然而不避是後車又將覆也夫存亡之變治亂之機其要在是矣天下之命縣于太子太子之善在于早諭教與選左右夫心未濫而先諭教則化易成也開於道術智誼之指則教之力也若其服習積貫則左右而巳夫胡粵之人生而同聲耆欲不異及其長而成俗纍數譯而不能相通行者雖死而不相為者則教習然也臣故曰選左右早諭教最急夫教得而左右正則太子正矣太子正而天下定矣書曰一人有慶兆民賴之此時務也凡人之智能見巳然不能見將然夫禮者禁於將然之前而法者禁于巳然之後是故法之所用易見而禮之所為至難知也若夫慶賞以勸善刑罰以懲惡先王執此之政堅如金石行此之令信如四時據此之公無私如天地耳豈顧不用哉然而曰禮云禮云者貴絶惡于未萌而起教于微眇使民日遷善逺罪而不自知也孔子曰聽訟吾猶人也必也使母訟乎為人主計者莫如先審取舍取舍之極定于內而安危之萌應于外矣安者非一日而安也危者非一日而危也皆以積漸然不可不察也人主之所積在其取舍以禮義治之者積禮義以刑罰治之者積刑罰刑罰積而民怨背禮義積而民和親故世主欲民之善同而所以使民善者或異或道之以德教或驅之以法令道之以德教者德教洽而民氣樂驅之以法令者法令極而民風哀哀樂之感禍福之應也秦王之欲尊宗廟而安子孫與湯武同然而湯武廣大其德行六七百嵗而弗失秦王治天下十餘嵗則大敗此無他故矣湯武之定取舍審而秦王之定取舍不審矣夫天下大器也今人之置器置諸安處則安置諸危處則危天下之情與器亡以異在天子之所置之湯武置天下於仁義禮樂而德澤洽禽獸草木廣裕德被蠻貊四夷纍子孫數十世此天下所共聞也秦王置天下于法令刑罰德澤亡一有而怨毒盈于世下憎惡之如仇讐禍幾及身子孫誅絶此天下之所共見也是非其明效大驗耶人之言曰聽言之道必以其事觀之則言者莫敢妄言今或言禮誼之不如法令教化之不如刑罰人主胡不引殷周秦事以觀之也人主之尊譬如堂羣臣如陛衆庶如地故陛九級上亷逺地則堂髙陛亡級亷近地則堂卑髙者難攀卑者易陵理勢然也故古者聖王制為等列內有公卿大夫士外有公侯伯子男然後有官師小吏延及庶人等級分明而天子加焉故其尊不可及也里諺曰欲投鼠而忌器此善諭也鼠近于器尚憚不投恐傷其器況于貴臣之近主乎亷恥節禮以治君子故有賜死而亡戮辱是以黥劓之罪不及大夫以其離主上不逺也禮不敢齒君之路馬蹴其芻者有罰見君之几杖則起遭君之乘車則下入正門則趨君之寵臣雖或有過刑戮之罪不加其身者尊君之故也此所以為主上豫逺不敬也所以體貌大臣而厲其節也今自王侯三公之貴皆天子之所改容而禮之也古天子之所謂伯父伯舅也而令與衆庶同黥劓髠刖笞罵棄市之法然則堂不亡陛乎被戮辱者不泰迫乎亷恥不行大臣無乃握重權大官而有徒隸亡恥之心乎夫望夷之事二世見當以重法者投鼠而不忌器之習也臣聞之履雖鮮不加于枕冠雖敝不以苴履夫嘗巳在貴寵之位天子改容而體貌之矣吏民嘗俯伏以敬畏之矣今而有過帝令廢之可也退之可也賜之死可也滅之可也若夫束縛之係緤之輸之司寇編之徒官司寇小吏詈罵而榜笞之殆非所以令衆庶見也夫卑賤者習知尊貴者之一旦吾亦乃可以加此也非所以習天下也非尊尊貴貴之化也夫天子之所嘗敬衆庶之所嘗寵死而死耳賤人安宜得如此而頓辱之哉豫讓事中行之君智伯伐而滅之移事智伯及趙滅智伯豫讓釁面吞炭必報襄子五起而不中人問豫子豫子曰中行衆人畜我我故衆人事之智伯國士遇我我故國士報之故此一豫讓也反君事讐行若狗彘巳而抗節致忠行出乎列士人主使然也故主上遇其大臣如遇犬馬彼將犬馬自為也如遇官徒彼將官徒自為也頑頓亡恥詬亡節亷恥不立且不自好茍若而可故見利則逝見便則奪主上有敗則因而挺之矣主上有患則吾茍免而巳立而觀之耳有便吾身者則欺賣而利之耳人主將何便於此羣下至衆而主上至少也所託財器職業者粹于羣下也俱亡恥俱茍妄則主上最病故古者禮不及庶人刑不上大夫所以厲寵臣之節也古者大臣有坐不亷而廢者不謂不亷曰簠簋不飾坐汙穢淫亂男女亡别者不曰汙穢曰帷薄不修坐罷軟不勝任者不謂罷軟曰下官不職故貴大臣定有其罪矣猶未斥然正以呼之也尚遷就而為之諱也故其在大譴大何之域者聞譴何則白冠氂纓盤水加劍造請室而請罪耳上不執縛係引而行也其有中罪者聞命而自弛上不使人頸盩而加也其有大罪者聞命則北面再拜跪而自裁上不使捽抑而刑之也曰子大夫自有過耳吾遇子有禮矣遇之有禮故羣臣自喜嬰以亷恥故人矜節行上設亷恥禮義以遇其臣而臣不以節行報其上者則非人類也故化成俗定則為人臣者主耳忘身國耳忘家公耳忘私利不苟就害不茍去唯義所在上之化也故父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守圄扞敵之臣誠死城郭封疆故曰聖人有金城者比物此志也彼且為我死故吾得與之俱生彼且為我亡故吾得與之俱存夫將為我危故吾得與之皆安顧行而忘利守節而仗義故可以託不御之權可以寄六尺之孤此厲亷恥行禮誼之所致也主上何喪焉此之不為而顧彼之久行故曰可為長太息者此也賈子天下才也首言藩封之過制必至畔亂果有七國之禍主父偃竊其説以行于武帝諸侯始安次言治胸奴去侈靡興禮義張四維教太子興教化禮大臣皆本忠誠之心發為經國逺猷胸有成局一筆寫出雲矗波湧雄健暢達經濟文章千古無兩汲黯列傳史記汲黯字長孺濮陽人也其先有寵于古之衛君至黯七世世為卿大夫黯以父任孝景時為太子洗馬以莊見憚孝景帝崩太子即位黯為謁者東越相攻上使黯往視之不至至吳而還報曰越人相攻固其俗然不足以辱天子之使河內失火延燒千餘家上使黯往視之還報曰家人失火屋比延燒不足憂也臣過河內河內貧人傷水旱萬餘家或父子相食臣謹以便宜持節發河南倉粟以振貧民臣請歸節伏矯制之罪上賢而釋之遷為滎陽令黯恥為令病歸田里上聞乃召拜為中大夫以數切諌不得久留內遷為東海太守黯學黃老之言治官理民好清靜擇丞史而任之其治責大指而巳不苛小黯多病卧閨閣內不出嵗餘東海大治稱之上聞召以為主爵都尉列於九卿治務在無為而巳𢎞大體不拘文法黯為人性倨少禮面折不能容人之過合巳者善待之不合己者不能忍見士亦以此不附焉然好學遊俠任氣節內行修潔好直諌數犯主之顔色常慕傅柏袁盎之為人也善灌夫鄭當時及宗正劉棄亦以數直諌不得久居位當是時太后弟武安侯蚡為丞相中二千石來拜謁蚡不為禮然黯見蚡未嘗拜常揖之天子方招文學儒者上曰吾欲云云黯對曰陛下內多欲而外施仁義奈何欲效唐虞之治乎上默然怒變色而罷朝公卿皆為黯懼上退謂左右曰甚矣汲黯之戅也羣臣或數黯黯曰天子置公卿輔弼之臣寧令從諛承意陷主于不義乎且已在其位縱愛身奈辱朝廷何黯多病病且滿三月上常賜告者數終不愈最後病莊助為請告上曰汲黯何如人哉助曰使黯任職居官無以踰人然至其輔少主守城深堅招之不來麾之不去雖自謂賁育亦不能奪之矣上曰然古有社稷之臣至如黯近之矣大將軍青侍中上倨厠而視之丞相𢎞燕見上或時不冠至如黯見上不冠不見也上嘗坐武帳中黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此張湯方以更定律令為廷尉黯數質責湯于上前曰公為正卿上不能褒先帝之功業下不能抑天下之邪心安國富民使囹圄空虛二者無一焉何乃取髙皇帝約束紛更之為公以此無種矣黯時與湯論議湯辨常在文深小苛黯抗厲守髙不能屈忿發罵曰天下謂刀筆吏不可以為公卿果然必湯也令天下重足而立側目而視矣是時漢方征胸奴招懷四夷黯務少事乘上間常言與胡和親無起兵上方向儒術尊公孫𢎞及事益多吏民巧弄上分别文法湯等數奏決讞以幸而黯常毁儒面觸𢎞等徒懷詐飾智以阿人主取容而刀筆吏專深文巧詆陷人于罪使不得反其真以勝為功上愈益貴𢎞湯𢎞湯深心疾黯唯天子亦不説也欲誅之以事𢎞為丞相乃言上曰右內史界部中多貴人宗室難治非素重臣不能任請徙黯為右內史為右內史數嵗官事不廢大將軍青既益尊姊為皇后然黯與抗禮人或説黯曰自天子欲羣臣下大將軍大將軍尊重益貴君不可以不拜黯曰夫以大將軍有揖客反不重耶大將軍聞愈賢黯數請問國家朝廷所疑遇黯過于平生淮南王謀反憚黯曰好直諌守節死義難惑以非至如説丞相𢎞如發蒙振落耳天子既數征胸奴有功黯之言益不用始黯列為九卿而公孫𢎞張湯為小吏及𢎞湯稍益貴與黯同位黯又非毁𢎞湯等巳而𢎞至丞相封為侯湯至御史大夫故黯時丞相史皆與黯同列或尊用過之黯褊心不能無少望見上前言曰陛下用羣臣如積薪耳後來者居上上默然有間黯罷上曰人果不可以無學觀黯之言也日益甚後黯坐小法會赦免官於是黯隱于田園居數年會更五銖錢民多盜鑄錢楚地尤甚上以為淮陽楚地之郊乃召拜黯為淮陽太守黯伏謝不受印詔數強豫然後奉詔召見黯黯為上泣曰臣自以為填溝壑不復見陛下不意陛下復收用之臣常有狗馬病力不能任郡事臣願為中郎出入禁闥補過拾遺臣之願也上曰君薄淮陽邪吾今召君矣顧淮陽吏民不相得吾徒得君之重卧而治之黯既辭行過大行李息曰黯棄居郡不得與朝廷議也然御史大夫張湯智足以拒諌詐足以飾非務巧佞之語辨數之辭非肯正為天下言專阿主意主意所不欲因而毁之主意所欲因而譽之好興事舞文法內懷詐以御主心外挾賊吏以為威重公列九卿不早言之公與之俱受其僇矣息畏湯終不敢言黯居郡如故治淮陽政清後張湯果敗上聞黯與息言抵息罪令黯以諸侯相秩居淮陽七嵗而卒卒後上以黯故官其弟汲仁至九卿子汲偃至諸侯相三代而下直臣推汲魏汲之學術經濟或不如魏然正性徑氣過之録此以見直臣之風且知紀傳正體凡紀傳直敘到底者正局也間以議論者變體也伯夷屈原傳是也墓志表狀亦然韓歐志表多以議論行文倣屈原等傳也上尚德緩刑書路溫舒臣聞齊有無知之禍而桓公以興晉有驪姬之難而文公用伯近世趙王不終諸吕作亂而孝文為太宗繇是觀之禍亂之作將以開聖人也故桓文扶微興壞尊文武之業澤加百姓功潤諸侯雖不及三王天下歸仁焉文帝永思至德以承天心崇仁義省刑罰通關梁一逺近敬賢如大賔愛民如赤子內恕情之所安而施之于海內是以囹圄空虛天下太平夫繼變化之後必有異舊之恩此賢聖所以昭天命也往者昭帝即世而無嗣大臣憂戚焦心合謀皆以昌邑尊親援而立之然天不授命淫亂其心遂以自亡深察禍變之故乃皇天之所以開至聖也故大將軍受命武帝股肱漢國披肝膽決大計黜亡義立有德輔天而行然後宗廟以安天下咸寧臣聞春秋正即位大一統而慎始也陛下初登至尊與天下合符宜改前世之失正始受命之統滌煩文除民疾存亡繼絶以應天意臣聞秦有十失其一尚存治獄之吏是也秦之時羞文學好武勇賤仁義之士貴治獄之吏正言者謂之誹謗遏過者謂之妖言故盛服先生不用于世忠良切言皆鬱于胸譽諛之聲日滿于耳虛美熏心實禍蔽塞此乃秦之所以亡天下也方今天下賴陛下恩厚亡金革之危飢寒之患父子夫妻戮力安家然太平未洽者獄亂之也夫獄者天下之大命也死者不可復生􅓟者不可復屬書曰與其殺不辜寧失不經今治獄吏則不然上下相毆以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離于市被刑之徒比肩而立大辟之計嵗以萬數此仁聖之所以傷也太平之未洽凡以此也夫人情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾辭以視之吏治者利其然則指道以明之上奏畏卻則鍛鍊而周內之蓋奏當之成雖咎繇聽之猶以為死有餘辜何則成練者衆文致之罪明也是以獄吏專為深刻殘賊而亡極偷為一切不顧國患此世之大賊也故俗語曰畫地為獄議不入刻木為吏期不對此皆疾吏之風悲痛之辭也故天下之患莫深于獄敗法亂正離親塞道莫甚乎治獄之吏此所謂一尚存者也臣聞烏鳶之卵不毁而後鳯凰集誹謗之罪不誅而後良言進故古人有言山藪藏疾川澤納汙瑾瑜匿惡國君含垢惟陛下除誹謗以招切言開天下之口廣針諌之路掃亡秦之失尊文武之德省法制寬刑罰以廢治獄則太平之風可興于世永履和樂與天亡極天下幸甚漢初蕭何為律令多襲秦法文帝除肉刑寬厚幾於三代矣而峻厲之氣猶存武帝動輒族誅任用武健吏酷虐等于亡秦故父子相殘京師流血孝宣時雖多循吏而趙蓋韓楊之死凛烈可畏則爾時漢法之重可知讀長君此疏仁厚之心慘痛之辭可感木石以此坊民後世猶有貪吏得賂以上下其刑罰者漢世太守便操斷殺之柄無上聞之事後世雖流絞亦上聞經法司議定奏允而後行此則慎刑之過於古人處但要守令得人耳古文雅正卷二
