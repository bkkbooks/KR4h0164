body:
  text: 古文雅正卷九禮部侍郎蔡世逺編段太尉逸事狀柳宗元太尉始為涇州刺史時汾陽王以副元帥居蒲王子晞為尚書領行營節度使寓軍邠州縱士卒無賴邠人偷嗜暴惡者率以貨竄名軍伍中則肆志吏不得問日羣行丐取於市不嗛輒奮擊折人手足推釡鬲甕盎盈道上把臂徐去至撞殺孕婦人邠寧節度使白孝德以王故戚不敢言太尉自州以狀白府願計事至則曰天子以生人分公理公見人被暴害因恬然且大亂若何孝德曰願奉教太尉曰某為涇州甚適少事今不忍人無寇暴死以亂天子邊事公誠以都虞候命某者能為公已亂使公之人不得害孝德曰幸甚如太尉請既署一月晞軍士十七人入市取酒又以刃刺酒翁壞釀器酒流溝中太尉列卒取十七人皆斷頭注槊上植市門外晞一營大譟盡甲孝德震恐召太尉曰將奈何太尉曰無傷也請辭於軍孝德使數十人從太尉太尉盡辭去解佩刀選老躄者一人持馬至晞門下甲者出太尉笑且入曰殺一老卒何甲也吾戴吾頭來矣甲者愕因諭曰尚書固負若屬耶副元帥固負若屬耶奈何欲以亂敗郭氏為白尚書出聽我言晞出見太尉太尉曰副元帥勳塞天地當務始終今尚書恣卒為暴暴且亂亂天子邊欲誰歸罪罪且及副元帥今邠人惡子弟以貨竄名軍籍中殺害人如是不止幾日不大亂大亂由尚書出人皆曰尚書倚副元帥不戢士然則郭氏功名其與存者幾何言未畢晞再拜曰公幸教晞以道恩甚大願奉軍以從顧叱左右曰皆解甲散還火伍中敢譁者死太尉曰吾未晡食請假設草具既食曰吾疾作願留宿門下命持馬者去旦日來還卧軍中晞不解衣戒候卒擊柝衛太尉旦俱至孝德所謝不能請改過邠州由是無禍先是太尉在涇州為營田官涇大將焦令諶取人田自占數十頃給與農曰且熟歸我半是嵗大旱野無草農以告諶諶曰我知入數而已不知旱也督責益急且飢死無以償即告太尉太尉判狀辭甚巽使人來諭諶諶甚怒召農者曰我畏段某耶何敢言我取判鋪背上以大杖擊二十垂死輿來庭中太尉大泣曰乃我困汝即自取水洗去血裂裳衣瘡手注善藥旦夕自哺農者然後食取騎馬賣市榖代償使勿知淮西寓軍帥尹少榮剛直士也入見諶大罵曰汝誠人耶涇州野如赭人且飢死而必得榖又用大杖擊無罪者段公仁信大人也而汝不知敬今段公唯一馬賤賣市榖入汝汝又取不恥凡為人傲天災犯大人擊無罪者又取仁者榖使主人出無馬汝將何以視天地尚不愧奴𨽻耶諶雖暴抗然聞言則大愧流汗不能食曰吾終不可以見段公一夕自恨死及太尉自涇州以司農徴戒其族過岐朱泚幸致貨幣慎勿納及過泚固致大綾三百匹太尉壻韋晤堅拒不得命至都太尉怒曰果不用吾言晤謝曰處賤無以拒也太尉曰然終不以在吾第以如司農治事堂棲之梁木上泚反太尉終吏以告泚取視其故封識具存段公忠義明決叙得懍懍有生氣文筆酷似子長歐蘇亦未易得此古峭也先殺十七人而後見晞事似太爽快近危道公蓋知晞可與言者又不如此而先見晞恐不足以彌之然公是時義激于中生死總不計及不然笏擊逆泚豈自分不死耶唐陸文通先生墓表柳宗元孔子作春秋千五百年以名為傳者五家今用其三焉秉觚牘焦思慮以為論注疏說者百千人矣攻訐狠怒以辭氣相擊排冒沒者其為書處則充棟宇出則汗牛馬或合而隱或乖而顯後之學者窮老盡氣左視右顧莫得而本則專其所學以訾其所異黨枯竹護朽骨以至於父子傷夷君臣詆悖者前世多有之甚矣聖人之難知也有吳郡人陸先生質以其師友天水啖助洎趙匡能知聖人之㫖故春秋之言及是而光明使庸人小童皆可積學以入聖人之道傳聖人之教是其德豈不侈大矣哉先生字某既讀書得制作之本而獲其師友於是合古今散同異聨之以言纍之以文蓋講道者二十年書而志之者又十餘年其事大備為春秋集注十篇辨疑七篇微指二篇明章大中發露公器其道以聖人為主以堯舜為的苞羅旁魄膠轕下上而不出於正其法以文武為首以周公為翼揖讓升降好惡喜怒而不過乎物既成以授世之聰明之士使陳而明之故其書出焉而先生為巨儒用是為天子爭臣尚書郎國子博士給事中皇太子侍讀皆得其道刺二州守人知仁永貞年侍東宫言其所學為古君臣圖以獻而道達乎上是嵗嗣天子踐阼而理尊優師儒先生以疾聞臨問加禮某月日終于京師某月日葬于某郡某里嗚呼先生道之存也以書不及施於政道之行也以言不及覩其理門人世儒是以增慟將葬以先生為能文聖人之書通于後世遂相與諡曰文通先生後若干祀有學其書者過其墓哀其道之所由乃作石以表碣仲尼祖述堯舜憲章文武而作春秋陸氏蓋知此意以求其道法之原非若他家莫得而本者也此文醇深峻整雖西京藝文志殆不是過文通字元冲本名淳避憲宗諱賜今名所著春秋三種兼採啖趙時益以已見啖趙之專家久不孤行其所存者恃此而已解春秋者三傳之外有唐三傳啖助趙匡陸淳三家是也始能繹經而不專信傳最得春秋體要宋程伊川胡康侯劉原父最善余尤喜原父之說宋末家氏鉉翁亦明快宜為文信國所心賞之人送澥序柳宗元人咸言吾宗宜碩大有積德焉在髙宗時並居尚書省二十二人遭諸武以故衰耗武氏敗猶不能興為尚書吏者間十數嵗乃一人永貞年吾與族兄登並為禮部屬吾黜而季父公綽更為刑部郎則加稠焉又觀宗中為文雅者炳炳然以十數仁義固其素也意者復興乎自吾為僇人居南鄉後之頴然出者吾不見之也其在道路幸而過余者獨得澥澥質厚不諂敦朴有裕若器焉必隆然大而後可以有受擇所以入之者而已矣其文蓄積甚富好慕甚正若墻焉必基之廣而後可以有蔽擇其所以出之者而已矣勤聖人之道輔以孝悌復嚮時之美吾於澥焉是望汝往哉見諸宗人為我謝而勉焉無若大山之麓止而不得升也其唯川之不已乎吾去子終老於夷矣柳州一斥之悔過不但文章政事殊絶駸駸乎有道德之氣矣此序意理韻調俱勝可歌可泣也答韋中立論師道書柳宗元辱書云欲相師僕道不篤業甚淺近環顧其中未見可師者雖嘗好言論為文章甚不自是也不意吾子自京師來蠻夷間乃幸見取僕自卜固無取假令有取亦不敢為人師為衆人師且不敢况敢為吾子師乎孟子稱人之患在好為人師由魏晉以下人益不事師今之世不聞有師有輒譁笑之以為狂人獨韓愈奮不顧流俗犯笑侮收召後學作師說因抗顔而為師世果羣怪聚罵指目牽引而憎與為言詞愈以是得狂名居長安炊不暇熟又挈挈而東如是者數矣屈子賦曰邑犬羣吠吠所怪也僕往聞庸蜀之南恆雨少日日出則犬吠豫以為過言前六七年僕來南二年冬幸大雪踰嶺被南越中數州數州之犬皆蒼黃吠噬狂走者纍日至無雪乃已然後始信前所聞者今韓愈既自以為蜀之日而吾子又欲使吾為越之雪不以病乎非獨見病亦以病吾子然雪與日豈有過哉顧吠者犬耳度今天下不吠者幾人而誰敢街怪於羣目以召閙取怒乎僕自謫過以來益少志慮居南中九年增腳氣病漸不喜閙豈可使呶呶者早暮咈吾耳騷吾心則固僵仆煩憒愈不可過矣平居望外遭齒舌不少獨缺為人師耳抑又聞之古者重冠禮將以責成人之道是聖人所尤用心者也數百年來人不復行近有孫昌嗣者獨發憤行之既成禮明日造朝至外廷薦笏言於卿士曰某子冠畢應之者咸憮然京兆尹鄭叔則怫然曵笏却立曰何預我耶廷中皆大笑天下不以非鄭尹而快孫子何哉獨為所不為也今之命師者大類此吾子行厚而辭深凡所作皆恢恢然有古人形貌雖僕敢為師亦何所增加也假而以僕年先吾子聞道著書之日不後誠欲往來言所聞則僕固願悉陳中所得者吾子茍自擇之取某事去某事則可矣若定是非以教吾子僕材不足而又畏前所陳者其為不敢也決矣吾子前所欲見吾文既悉以陳之非以耀明於子聊欲以觀子氣色誠好惡何如也今書來言者皆太過吾子誠非佞譽誣諛之徒直見愛甚故然耳始吾幼且少為文章以辭為工及長乃知文者以明道是故不茍為炳炳烺烺務采色夸聲音而以為能也凡吾所陳皆自謂近道而不知道之果近乎逺乎吾子好道而可吾文或者其於道不逺矣故吾每為文章未嘗敢以輕心掉之懼其剽而不留也未嘗敢以怠心易之懼其弛而不嚴也未嘗敢以昏氣出之懼其昧沒而雜也未嘗敢以矜氣作之懼其偃蹇而驕也抑之欲其奧揚之欲其明疏之欲其通廉之欲其節激而發之欲其清固而存之欲其重此吾所以羽翼夫道也本之書以求其質本之詩以求其恆本之禮以求其宜本之春秋以求其斷本之易以求其動此吾所以取道之原也參之榖梁氏以厲其氣參之孟荀以暢其支參之莊老以肆其端參之國語以博其趣參之離騷以致其幽參之太史以著其潔此吾所以旁推交通而以為之文也凡若此者果是耶非耶有取乎抑其無取乎吾子幸觀焉擇焉有餘以告焉茍亟來以廣是道子不有得焉則我得矣又何以師云爾哉取其實而去其名無招越蜀吠怪而為外廷所笑則幸矣此篇當與昌黎答李翊書參看見古人以文章名家皆由苦心力索之功我輩才不逮古人而用物取精不能及其一二偃然欲以文章自命不亦深可愧哉顧其自言曰文以明道又曰羽翼乎道則全未全未觀其自言讀書苦心不過以為作文之資何嘗有探討服行之功朱子嘗曰聖學失傳天下之士徒以文章為事業余更曰天下之士徒以文章為道術也蓋漢唐五代之際人不知道傑者猶復不免程朱以後而道始明知讀其書者便知其體段但不能加克已力行之功究竟與道無與耳然則程朱之功誠不在禹下深有望於立志者諫用皇甫鏄程异為相二人以言財賦幸俄得宰相度上書極言不可裴度鏄异皆錢榖俗吏佞巧小人陛下一旦置之相位中外駭笑况鏄在度支專以豐取刻與為務中外仰給之人無不思食其肉比者裁損江西糧料幾至潰亂程异雖人品庸下然心事和平可處繁劇不宜為相臣若不退天下謂臣無恥臣若不言天下謂臣負恩今退既不許言又不聽臣如烈火燒心衆鏑叢體所可惜者淮西蕩定河北底寧承宗斂手削地韓𢎞輿疾討賊豈朝廷之力能制其命哉直以處置得宜能服其心耳陛下建升平之業十已八九何忍還自墮壞使四方解體乎晉公為數朝元老以身繫天下安危如郭令公者三十年韓魏公論唐室名臣最宗仰之余初意其恢擴𢎞逺人也讀其奏疏激切乃爾直欲聲淚俱下論魏𢎞簡等疏時元稹顯結宦官魏𢎞簡求執政度上表論之裴度臣度言臣聞主聖臣直今既遇聖主輒為直臣上答殊私下塞羣望誓除國蠧無以家為茍獻替之可行何性命之足惜伏惟文武孝德皇帝陛下纂承丕業光啓雄圖方殄頑人之風以立太平之事而逆竪構亂震驚山東奸臣作朋撓亂國政陛下欲掃蕩幽鎮先宜肅清朝廷何者為患有大小議事有先後河朔逆賊只亂山東禁闈奸臣必亂天下是則河朔患小禁闈患大小者臣等與諸道戎臣必能翦滅大者非陛下制斷非陛下覺悟無計驅除今文武百寮中外萬品有心者無不憤忿有口者無不咨嗟直以威權方重奬用方深有所畏避不敢抵觸臣比猶懷隱忍不願發明一則以罪惡如山怨謗如雷伏料聖君必自誅殛一則以四方無事萬樞且過紀綱潛壞賄賂公行待其貫盈必自顛覆今屬凶徒擾攘宸哀憂軫凡有制命繫於安危痛此奸臣恣其欺罔干亂聖略非止一途又與翰苑近臣結為朋黨陛下聽其所說則必訪於近臣不知近臣已先計㑹更唱迭和蔽惑聰明所以臣自兵興以來所陳章疏皆是至切所奉書詔多有參差䝉陛下委寄之意不輕被奸臣抑損之心不少但欲令臣失所使臣無成則天下理亂山東勝負悉不顧矣以臣愚見若朝中奸臣盡去則河北逆賊不討而自平若朝中奸臣盡在則河朔逆賊雖平益熾臣伏讀國史知代宗之朝蕃戎侵軼直在畿甸代宗不知蓋被程元振壅蔽幾危社稷當時柳伉乃太常一博士耳猶抗表歸罪為國除害今臣所任兼總將相豈可坐觀凶邪有曀日月天鑒孔明照臣肝血但得天下之人知臣不負陛下則臣雖死之日猶生之年微之與樂天齊名初年直節文章尡耀一代嘐嘐之志甚是不屑未路困于外郡法曹思得髙官彼非貪榮者但欲見經濟以展抱負耳不知作相僅三月經濟未見而失身宦官難免正人之議矣即微晉公參劾亦難自解免世之抱負不凡者尚其立定腳根哉余讀元相傳最為惋惜屢取與蔡中郎同論以見吾黨出處不可一毫自茍也復性書下篇李翺晝而作夕而休者凡人也作乎非作者也與物皆作休乎非休者也與物皆休吾則不類于凡人晝無所作夕無所休作非吾作也作有物休非吾休也休有物作邪休邪二皆離而不存豫之所存者終不亡且離矣人之不力於道也昏不思也天地之間萬物生焉人之於萬物一物也其所以異於鳥獸蟲魚者豈非道德之性全乎哉受一氣而成形一為物而一為人得之甚難也生乎世又非深長之年也以非深長之年行甚難得之身而不專專於大道肆其心之所為其所以自異於禽獸蟲魚者亡矣昏而不思其昏也終不明矣吾之生二十有九年矣思十九年時如朝日也思九年時亦如朝日也人之受命其長者不過七十八十年九十百年者則稀矣當百年之時而視乎九十年時也與吾此日之思於前也逺近其能大相懸邪其又能逺於朝日之時邪然則人之生也雖享百年若雷電之驚相激也若風之飄而旋也可知矣况千百人而無一及百年之年者哉故吾之終日志於道德猶懼未及也彼肆其心之所為者獨何人耶韓李並稱韓之外知道者推李氏此篇懇切而出以蕭疏大堪警世韓上宰相書時年二十八李作復性書年二十九讀此二書似韓鋭於功名李志於道德要亦隨事而見之文耳然習之稟性較寧淡祭韓文公文李翺孔氏云逺楊朱恣行孟軻距之乃壞於成戎風混華異學魁橫兄常辨之孔道益明建武以還文卑質喪氣萎體敗剽剝不讓儷華鬭葉顛倒相上及兄之為思動鬼神撥去其華得其本根開合怪駭驅濤湧雲包劉越嬴並武同殷六經之學絶而復新學者有歸大變於文兄之仕宦罔辭於艱疏奏輒斥去而復遷並黜不改正言亟聞貞元十二兄佐汴州我游自徐始得兄交視我無能待余以友文析道為益之厚二十九年不知其久兄以疾休我病卧室三來視我笑語窮日何荒不耕㑹之以一人心樂生皆惡言凶兄之在病則齊其終順化以盡靡惑於中欲别千萬意如不窮臨喪大號決裂肝胸老𥅆言夀死而不亡兄名之垂星斗之光我撰兄行下於太常聲殫天地誰云不長喪車來東我刺廬江君命有嚴不見兄喪遣使奠斚百酸攪腸音容若在曷日而忘考公于翺籍輩每蓄之為弟子二子祭文及詩則以友待之古人所謂師友之間者原有此種要其推崇服教之心已極其至非習之亦不能為此文也程子辨橫渠為表叔非受業者朱子待蔡西山為老友西山則事之為嚴師吕原明與程子年位相埒首以師禮事之觀宋儒淵源亦足見韓李之心各有未虛處應賢良方正能直言極諫科䇿劉蕡褐衣小生沐浴齊戒伏於彤庭之內謹頓首上言皇帝陛下臣誠不佞有匡國致君之術無位而不得行有犯顔敢諫之心無路而不得達尚欲與庶人議於道商賈謗於市得通上聽一悟主心雖被妖言之罪無所悔焉况逢陛下以至德嗣興詢求過闕制詔中外舉直言極諫臣辱斯舉敢不悉意以言至於上所忌時所禁權幸所諱惡有司所與奪臣愚不識大體伏惟陛下少加優容謹昧死以對謹按春秋元者氣之始也春者嵗之元也春秋以元加於嵗以春加於王明王者當奉若天道以謹其始也又舉時以終嵗舉月以終時春秋雖無事必書首月以存時明王者當奉若天道以謹其終也陛下既能謹其始又能謹其終懋而修之勤而行之則可以執契而居簡無為而不宰矣臣所憂者宫闈將變社稷將危天下將傾四海將亂夫帝業既艱難而成之固不可容易而守之太祖肇其基髙祖勤其績太宗定其業𤣥宗繼其明至於陛下二百餘載其間聖明相因擾亂繼作未有不用賢士近正人而能紹興其徽烈者矣春秋閽弒吳子餘祭書其名譏疏逮賢士眤近刑人有不君之道伏惟陛下思祖宗開國之勤念春秋繼故之戒逺刀鋸之殘親骨鯁之直輔相得以專其任庶僚得以守其官奈何以䙝近五六人總天下之大政威攝朝廷勢傾海內羣臣莫敢指其狀天子不得制其心禍稔蕭墻奸生帷幄臣恐曹節侯覽復生於今日矣臣謹按春秋定公元年春王不言正月者春秋以為先君不得正其終則後君不得正其始故曰定無正也今忠賢無腹心之寄閽寺專廢立之權陷先帝不得正其終致陛下不得正其始况皇儲未建郊祀未修威柄凌夷藩臣跋扈首亂者以安君為名稱兵者以逐惡為義典刑不由天子征伐必自諸侯故樊噲排闥而雪涕袁盎當車以抗詞京房發憤而殞身竇武不顧而畢命此皆陛下明知之矣臣謹按春秋晉狐射姑殺陽處父書襄公殺之者以其君漏言夫上漏其情則下未敢盡意上泄其事則下莫敢盡言故傳有造膝詭詞之文易有失身害成之戒今公卿大臣非不欲為陛下言之慮陛下不能用也陛下既忽而不用必泄其言臣下既言而不行必嬰其禍適足鉗直臣之口而重姦臣之威是以欲盡其言則有失身之懼欲盡其意則有害成之憂故低回鬱塞以須陛下惑悟然後盡其啓沃耳陛下何不以聽朝之餘時御便殿召當世賢相與舊德老臣訪持變扶危之謀制侵凌迫脅之心復門戶掃除之役則可以䖍奉典謨克承丕構終任賢之效無旰食之憂昔秦之亡也失於强暴漢之亡也失於微弱强暴則姦臣畏死而害上微弱則强臣竊權而震主伏見敬宗不虞亡秦之禍不翦其萌伏惟陛下深軫亡漢之憂以杜其漸則祖宗之鴻業可紹三五之遐軌可追矣臣聞國君之所以尊者重其社稷也社稷之所以重者存其百姓也百姓者陛下之赤子宜令慈仁者親育之如保傳焉如乳哺焉如師之教導焉今或不然親近貴幸分曹建署補除卒吏召致賔客因其貨賄假以氣勢大者統藩方小者為牧守居上無清惠之政而有叨餮之害居下無忠誠之節而有奸欺之罪加以國權兵柄專於左右貪臣聚斂以固寵奸吏因緣而辨法官亂人貧盜賊並起即不幸因之以病癘繼之以凶荒臣恐陳勝吳廣不獨起於秦赤眉黃巾不獨生于漢臣謹按春秋齊桓公盟諸侯不以日而葵丘之㑹特以日著美其能宣明天子之禁率奉王官之法故春秋備而書之法宜畫一官宜正名今又分外官中官之員立南司北司之局或犯禁於南則亡命於北或正刑於外則破律於中法出多門人無所措由兵農勢異中外法殊也臣聞古也因井田而制軍賦間農事以修武備提封約卒乘之數命將在公卿之列故兵農一致文武同方可以保又邦家式遏亂略洎太宗皇帝肇建邦典亦置府兵省臺軍衛文武參掌居閒嵗則櫜弓力穡將有事則釋耒荷戈所以修復古制不廢舊物今則不然夏官不知兵籍止于奉朝請大將不舉兵事止於養勳封軍容合中官之政戎律附內臣之職首戴武辨疾文吏如仇讐足蹈軍門視農夫如草芥謀不足以翦除凶逆而詐足以抑揚威福勇不足以鎮衛社稷而暴足以侵軼閭里羈紲藩臣干凌宰輔隳裂王度汩亂朝經張武夫之威上以制君父假天子之命下以御英豪有藏奸觀釁之心無仗節死難之義豈先王經文緯武之㫖耶臣願陛下貫文武之道均兵農之功正貴賤之名一中外之法自邦畿以刑下國始天子而達諸侯則可以制豪猾之强無踰檢之患矣臣聞朝錯為漢畫削諸侯之䇿非不知禍之將至忠臣之心壯夫之節茍利社稷死無悔焉臣今非不知言發而禍應計行而身戮蓋痛社稷之危哀人生之困豈忍姑息時忌竊陛下一命之寵哉謹對制䇿漢推董江都唐推劉蕡宋推文信國兹篇忠忱憤氣噴薄而出又兼鮑司𨽻言王氏一疏胡淡菴言王倫一疏而有之魄力洵堪萬古因原䇿太長節之以便誦讀要其精處已盡于此答問兵勢張巡今與賊戰雲合烏散變態不恆數步之間勢有同異臨機應猝在於呼吸之間而動詢大將事不相及非知兵之變者也故吾使兵識將意將識士情投之而往如手之使指兵將相習人自為戰不亦可乎睢陽行兵不依古法教戰陳令本將各以其意教之人問其故公對云云然所云兵識將意將識士情雖三代仁義節制之師不出是道弔古戰場文李華浩浩乎平沙無垠敻不見人河水縈帶羣山糾紛黯兮慘悴風悲日曛蓬斷草枯凜若霜晨鳥飛不下獸挺亡羣亭長告余曰此古戰場也常覆三軍往往鬼哭天隂則聞傷心哉秦歟漢歟將近代歟吾聞夫齊魏徭戍荆韓召募萬里奔走連年暴露沙草晨牧河冰夜渡地濶天長不知歸路寄身鋒創腷臆誰訴秦漢而還多事四夷中州耗斁無世無之古稱戎夏不抗王師文教失宣武臣用竒竒兵有異於仁義王道迂濶而莫為嗚呼噫嘻吾想夫北風振漠胡兵伺便主將驕敵期門受戰野竪旄旗川回組練法重心駭威尊命賤利鏃穿骨驚沙入面主客相搏山川震眩聲折江河勢崩雷電至若窮陰凝閉凜冽海隅積雪沒脛堅冰在鬚鷙鳥休巢征馬踟蹰繒纊無溫墮指裂膚當此苦寒天假强胡憑凌殺氣以相翦屠徑截輜重橫攻士卒都尉新降將軍復沒尸填巨港之岸血滿長城之窟無貴無賤同為枯骨可勝言哉鼓衰兮力盡矢竭兮弦絶白創交兮寶刀折兩軍蹙兮生死决降矣哉終身夷狄戰矣哉暴骨沙礫鳥無聲兮山寂寂夜正長兮風淅淅魂魄結兮天沉沉鬼神聚兮雲幕幕日光寒兮草短月色苦兮霜白傷心慘目有如是耶吾聞之牧用趙卒大破林胡開地千里遁逃丐奴漢傾天下財殫力痡任人而已其在多乎周逐獫狁北至太原既城朔方全師而還飲至䇿勳和樂且閒穆穆棣棣君臣之間秦起長城竟海為關荼毒生靈萬里朱殷漢擊丐奴雖得隂山枕骸遍野功不補患蒼蒼蒸民誰無父母提攜捧負畏其不夀誰無兄弟如足如手誰無夫婦如賔如友生也何恩殺之何咎其存其沒家莫聞知人或有言將信將疑睊睊心目寢寐見之布奠傾觴哭望天涯天地為愁草木凄悲弔祭不至精魂何依必有凶年人其流離鳴呼噫嘻時耶命耶從古如斯為之奈何守在四夷若徒以錘字鍊響見長六朝以來儘可充棟說得大有關係驚心動魄使秦皇漢武見之民命其有瘳乎孟子云善戰者服上刑此文可作注腳悲痛之聲徹於萬古禮樂志論新唐書由三代而上治出於一而禮樂達於天下由三代而下治出於二而禮樂為虛名古者宫室車輿以為居衣裳冕辨以為服尊爵俎豆以為器金石絲竹以為樂以適郊廟以臨朝廷以事神而治民其嵗時聚㑹以為朝覲聘問歡欣交接以為射鄉食饗合衆興事以為師田學校下至里閭田畝吉凶哀樂凡民之事莫不一出於禮由之以教其民為孝慈友悌忠信仁義者常不出於居處動作衣服飲食之間蓋其朝夕從事者無非乎此也此所謂治出於一而禮樂達天下使天下安習而行之不知所以遷善逺罪而成俗也及三代已亡遭秦變古後之有天下者自天子百官名號位序國家制度宫車服器一切用秦舊其間雖有欲治之主思所改作不能超然逺復三代之上而牽其時俗稍即以損益大抵安於茍簡而已其朝夕從事則以簿書獄訟兵食為急曰此為政也所以治民至於三代禮樂具其名物而藏於有司時出而用之郊廟朝廷曰此為禮也所以教民此所謂治出於二而禮樂為虛名故自漢以來史官所記事物名數降登揖讓拜俯伏興之節皆有司之事爾所謂禮之末節也然用之郊廟朝廷自搢紳大夫從事其間者皆莫能曉習而天下之人至於老死未嘗見也况欲識禮樂之盛曉然諭其意而被其教化以成俗乎嗚呼習其器而不知其意忘其本而存其末又不能備具所謂朝覲聘問射鄉食饗師田學校冠昏喪葬之禮在者幾何自梁以來始以其當時所行傅於周官五禮之名各立一家之學唐初即用隋禮至太宗時中書令房元齡祕書監魏徴與禮官學士等因隋之禮增以天子上陵朝廟養老大射講武讀時令納皇后皇太子入學太常行陵合朔陳兵大社等為吉禮六十一篇賓禮四篇軍禮二十篇嘉禮四十二篇凶禮十一篇是為貞觀禮髙宗又詔太尉長孫無忌中書令杜正倫李義府中書侍郎李友益黃門侍郎劉祥道許圉師太子賔客許敬宗太常卿韋琨等增之為一百三十卷是為顯慶禮其文雜以式令而義府敬宗方得幸多希㫖傅㑹事既施行議者皆以為非上元三年詔復用貞觀禮由是終髙宗世貞觀顯慶二禮兼行而有司臨事逺引古義與二禮參考增損之無復定制武氏中宗繼以亂敗無可言者博士掌禮備官而已𤣥宗開元十年以國子司業韋縚為禮儀使以掌五禮十四年通事舍人王嵒上疏請刪去禮記舊文而益以今事詔付集賢院議學士張說以為禮記不刋之書去聖久逺不可改易而唐貞觀顯慶禮儀注前後不同宜加折衷以為唐禮乃詔集賢院學士右散騎常侍徐堅左拾遺李鋭及太常博士施敬本撰述歷年未就而鋭卒蕭嵩代鋭為學士奏起居舍人王仲丘撰定為一百五十卷是為大唐開元禮由是唐之五禮之文始備而後世用之雖時小有損益不能過也貞元中太常禮院修撰王涇考次歷代郊廟沿革之制及其工歌祝號而圖其壇屋陟降之序為郊祀録十卷元和十一年祕書郎修撰韋公肅又録開元已後禮文損益為禮閣新儀三十卷十三年太常博士王彥威為曲臺新禮三十卷又採元和以來三公士民婚祭喪葬之禮為續曲臺禮三十卷嗚呼考其文記可謂備矣以之施于貞觀開元之間亦可謂盛矣而不能至三代之隆者具其文而意不在焉此所謂禮樂為虛名也哉原本洞徹叙次明整學識筆力兩擅其勝余家居十年嘗私纂為通行之禮行之一族與同志共勉之後見髙安朱可亭先生儀禮節略一書廣大精詳歎為化民成俗之助殊自愧淺陋不敢以示人夫禮者先王所以防未萌之欲故橫渠張子為以禮教人名為有志於學而不能由禮是猶學農而不執耒耜也簡易可行情理允協是所望于復古者食貨志論新唐書古之善治其國而愛養斯民者必立經常簡易之法使上愛物以養其下下勉力以事其上上足而下不困故量人之力而授之田量地之産而取以給公上量其入而出之以為用度之數是三者常相須以濟而不可失失其一則不能守其二及暴君庸主縱其佚欲而茍且之吏從之變制合時以取寵於其上故用於上者無節而取於下者無限民竭其力而不能供由是上食不足而下愈困則財利之說興而聚斂之臣用記曰寧畜盜臣盜臣誠可惡然一人之害爾聚斂之臣用則經常之法壞而下不勝其弊焉唐之始時授人以口分世業田而取之以租庸調之法其用之也有節蓋其畜兵以府衛之制故兵雖多而無所損設官有常貟之數故官不濫而易祿雖不及三代之盛時然亦可以為經常之法也及其弊也兵冗官濫為之大蠧自天寶以來大盜屢起方鎮數叛兵革之興纍世不息而用度之數不能節矣加以驕君昏主姦吏邪臣取濟一時屢更其制而經常之法蕩然盡矣由是財利之說興聚斂之臣進蓋口分世業之田壞而為兼并租庸調之法壞而為兩稅至於鹽鐵轉運屯田和糴鑄錢括苗𣙜利借商進奉獻助無所不為矣蓋愈煩而愈弊以至於亡焉租庸調府兵之法北魏宇文周時頗已施行特至唐初而制度方備耳余嘗謂商鞅之罷井田楊炎之定兩稅一變而不可復固變法者之過亦世變使然也酌行限田之制量減養兵之費勤恤時聞簡任賢司牧以涖之亦庶乎其可矣藝文志論新唐書自六經焚於秦而復出於漢其師傳之道中絶而簡編脫亂訛缺學者莫得其本真於是諸儒章句之學興焉其後傳注箋解義疏之流轉相講述而聖道粗明然其為說固已不勝其繁矣至於上古三皇五帝以來世次國家興滅終始僣竊僞亂史官備矣而傳記小說外暨方言地理職官氏族皆出于史官之流也自孔子在時方修明聖經以絀謬異而老子著書論道德接乎周衰戰國遊談放蕩之士田駢慎到列莊之徒各極其辨而孟軻荀卿始專修孔氏以折異端然諸子之論各成一家自前世皆存而不絶也夫王迹熄而詩亡離騷作而文辭之士興歷代盛衰文章與時髙下然其變態百出不可窮極何其多也自漢以來史官列其名氏篇第以為六藝九種七略至唐始分為四類曰經史子集而藏書之盛莫盛于開元其著録者五萬三千九百一十五卷而唐之學者自為之書又二萬八千四百六十九卷嗚呼可謂盛矣六經之道簡嚴易直而天人備故其愈久而益明其餘作者衆矣質之聖人或離或合然其精深閎博各盡其術而怪竒偉麗往往震發於其間此所以使好竒博愛者不能忘也然凋零磨滅亦不可勝數豈其華文少實不足以行逺歟而俚言俗說猥有存者亦其有幸不幸者歟今著于篇有其名而無其書者十蓋五六也可不惜哉作藝文志論非論學術也故以含蓄委折之筆出之然上下數千百年原委明而尊尚亦正
