body:
  text: 古文雅正卷十二禮部侍郎蔡世逺編上殿劄子明道程子臣伏謂君道之大在乎稽古正學明善惡之歸辨忠邪之分曉然趨道之正故在乎君志先定君志定而天下之治成矣所謂定志者一心誠意擇善而固執之也夫義理不先盡則多聽而易惑志意不先定則守善而或移惟在以聖人之訓為必當從先王之治為必可法不為後世駁雜之政所牽制不為流俗因循之論所遷惑自知極於明信道極於篤任賢勿貳去邪勿疑必期致世如三代之隆而後巳也然天下之事患常生於忽㣲而志亦戒乎漸習是故古之人君雖出入從容閒燕必有誦訓箴諫之臣左右前後無非正人所以成其德業伏願陛下禮命老成賢儒不必勞以職事俾日親便座講論道義以輔聖德又擇天下賢俊使得陪侍法從朝夕延見開陳善道講磨治體以廣聞聽如是則聖智益明王猷允塞矣今四海靡靡日入偷薄末俗嘵嘵無復廉恥葢亦朝廷尊德樂道之風未孚而篤誠忠厚之教尚鬱也惟陛下稽聖人之訓法先王之治一心誠意體乾剛健而力行之則天下幸甚此等文字是大人格君第一要著坐而言即可起而行論王霸劄子所以大其規模此所以培其根本也三代以下最可惜機㑹是宋神宗時以神宗有致治之鋭心諸臣如程張司馬等皆非三代以下人物乃為介甫所誤諸賢廢棄惜哉吾得之胡敬齋云請修學校尊師儒取士劄子明道程子臣伏謂治天下以正風俗得賢才為本宋興百餘年而教化未大醇人情未盡美士人㣲謙退之節鄉閭無廉恥之行刑雖繁而奸不止官雖冗而材不足者此葢學校之不修師儒之不尊無以風勸養勵之使然耳竊以去聖乆逺師道不立儒者之學幾於廢熄惟朝廷崇尚教育之道則不日而復古者一道德以同俗茍師學不正則道德何從而一方今人執私見家為異說支離經訓無復統一道之不明不行乃在於此臣謂宜先禮命近侍賢儒各以類舉及百執事方岳州縣之吏悉心推訪凡有明先王之道德業克備足為師表者其次有篤志好學材良行修者皆以名聞其高蹈之士朝廷當厚禮延聘其餘命州縣敦遣萃於京師館之寛閒之宇豐其廩餼䘏其家之有無以大臣之賢典領其事俾羣儒朝夕相與講明正學其道必本於人倫明乎物理其教自小學灑掃應對以往修其孝悌忠信周旋禮樂其所以誘掖激勵漸摩成就之道皆有節序其要在於擇善修身至於化成天下自鄉人而可至於聖人之道其學行皆中於是者為成德又其次取材識明達可進於善者使日授其業稍乆則舉其賢傑以備高任擇其學業大明德義可尊者為太學之師次以分教天下之學始自藩府至於列郡擇士之願學民之俊秀者入學皆優其廩給而蠲其身役凡其有父母骨肉之養者亦通其優游往來以察其行其大不率教者斥之從役漸自大學及州郡之學擇其道業之成可為人師者使教於學縣之學如州郡之制異日則十室之鄉達於黨遂皆當修其庠序之制為之立師學者以次而察焉縣令每嵗與學之師以鄉飲之禮㑹其鄉老學者衆推經明行修材能可任之士升於州之學以觀其實學荒行虧者罷歸而罪其吏與師其升於州而當者復其家之役郡守又嵗與學之師行鄉飲酒之禮大㑹郡士以經義性行材能三物賔興其士於太學太學又聚而教之其學不明行不修與材之下者罷歸以為郡守學師之罪升於太學者亦聽其以時還鄉里復來於學太學嵗論其賢者能者於朝謂之選士朝廷問之經以考其言試之職以觀其材然後辨論其才差而命之秩凡處郡縣之學者皆滿三嵗然後得充薦其自州郡升於太學者一嵗而後薦其有學行超卓衆所信服者雖未處於學或處學而未久亦得備數論薦凡選士之法皆以性行端潔居家孝悌有廉恥禮遜通明學業曉達治道者凡公卿大夫子弟皆入學在京師者入太學在外者各入其所在州之學謂之國子其有當補廕者並如舊制惟不選於學者不授以職臣謂既一以道德仁義教育之又專以行實材學升進之去其聲律小碎糊名騰録一切無義理之弊不數年間學者靡然丕變矣豈惟得士浸廣天下風俗將日入醇正王化之本也臣謂帝王之道莫尚於此願陛下特留宸意為萬世行之董江都賢良三䇿重教化一學術可謂美矣程子此篇規模廣大法度詳明下語切至尤可以坐而言起而行也胡敬齋謂此篇規模比朱子貢舉私議更廣大可行諒哉北宋文質厚南宋文軟暢此篇氣味不惟直逼西京且追周官之遺經術學術之闗于文章也大哉先博訪名儒萃於京師講明教授然後擇其賢者以主太學及藩府列郡之學又就郡學中擇其賢者以主列縣之學而升之州郡之京師試而官之條理井然荅横渠論定性書明道程子承教諭以定性未能不動猶累於外物此賢者慮之熟矣尚何俟小子之言然嘗思之矣敢貢其說于左右所謂定者動亦定靜亦定無將迎無内外茍以外物為外牽已而從之是以己性為有内外也且以性為隨物於外則當其在外時何者為在内是有意於絶外誘而不知性之無内外也既以内外為二本則又烏可遽語定哉夫天地之常以其心普萬物而無心聖人之常以其情順萬事而無情故君子之學莫若廓然而大公物來而順應易曰貞吉悔亡憧憧徃來朋從爾思茍規規于外誘之除將見滅於東而生於西也非惟日亦不足顧其端無窮不可得而除也人之心各有所蔽故不能適道大率患在於自私而用智自私則不能以有為為應迹用智則不能以明覺為自然今以惡外物之心而求照無物之地是反鑑而索照也易曰艮其背不獲其身行其庭不見其人孟氏亦曰所惡于智者為其鑿也與其非外而是内不若内外之兩忘也兩忘則澄然無事矣無事則定定則明明則尚何應物之為累哉聖人之喜以物之當喜聖人之怒以物之當怒是聖人之喜怒不繫於心而繫於物也是則聖人豈不應於物哉烏得以從外者為非而更求在内者為是也今以自私用智之喜怒而視聖人喜怒之正為如何哉夫人之情易發而難制者惟怒為甚苐能于怒時遽忘其怒而觀理之是非亦可見外誘之不足惡而於道亦思過半矣心之精㣲口不能宣加之素拙於文辭又吏事匆匆未能精慮當否佇報然舉大要亦當近之矣道近求逺古人所非惟聰明裁之張子苦心力索之功多涵泳完養之功少明道示以定性之學包内外兼體用此厯聖傳心之要也篇中却未說出工夫工夫何在曰戒懼慎獨以致中和而巳吾性定而天地萬物位育矣自私用智鑿性之病根在此正與中和反看七情中獨指出怒一端言之葢以怒最易壊性也朱子解云忘怒則公觀理則順又程子平日嘗曰克已可以治怒明理可以治懼當與叅看論經筵劄子伊川程子古之人君守成業而致盛治者莫如周成王其所以成德則由乎周公周公之輔成王也幼而習之所見必正事所聞必正言左右前後皆正人故習與性長化與心成今陛下春秋方富輔養之道不可不至也所謂輔養之道非謂告詔以言過而後諫也尤在涵養薫陶之而已矣今夫一日之間接賢士大夫之時多親寺人宦官之時少則氣質自化德器自成臣欲謹選賢德之士以侍勸講講讀既罷常留以備訪問從容燕語不獨漸磨德義至於人情物態稼穡艱難日積既久自然通達比之深處宫闈為益多矣夫傅德義者在乎防聞見之非節嗜慾之過保身體者在乎適起居之宜存畏謹之心故左右近侍宜選老成重厚小心之人服飾器用皆須朴質之物俾華巧靡麗不至於前淺俗之言不入於耳凡動作言語必使勸講者知之庶幾隨事箴規應時諫正調䕶聖躬莫過於此矣人君居崇髙之位持威福之柄百官畏懼而莫敢仰視萬方崇奉而所欲必得茍非知道畏義所養如此其成則中常之君無不驕肆英明之主自然滿假此古今同患治亂所由也秦漢以下諸儒告君文字有能說得如此平實該贍純粹無罅者否伊訓説命差堪比擬伊川先生上仁宗書時年方十八勸仁宗以王道為心生民為念志則大矣然下手工夫尚未著實至代太中上英宗皇帝書分為立志用賢責任深切懇到與經筵等疏字字可見之施行誠内聖外王本領學以年進又貴深造不已信哉案先生集中有乞再上殿論經筵事劄子又進劄子三道此括三道之意為一篇乃粹言本也貼黄云天下重任唯宰相與經筵天下治亂係宰相君德成就責經筵可謂深切著明顔子所好何學論伊川程子聖人之門其徒三千獨稱顔子為好學夫詩書六藝七十子非不習而通也然則顔子所獨好者何學也學以至聖人之道也聖人可學而至歟曰然學之道如何曰天地儲精得五行之秀者為人其本也真而靜其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動于中矣其中動而七情出焉曰喜怒哀樂愛惡欲情既熾而益蕩其性鑿矣是故覺者約其情使合於中正其心養其性故曰性其情愚者則不知制之縱其情而至於邪僻梏其性而亡之故曰情其性凡學之道正其心養其性而已中正而誠則聖矣君子之學必先明諸心知所養然後力行以求至所謂自明而誠也故學必盡其心盡其心則知其性知其性反而誠之聖人也故洪範曰思曰睿􅌖作聖誠之之道在乎信道篤信道篤則行之果行之果則守之固仁義忠信不離乎心造次必於是顛沛必於是出處語黙必於是久而弗失則居之安動容周旋中禮而邪僻之心無自生矣故顔子所事則曰非禮勿視非禮勿聽非禮勿言非禮勿動仲尼稱之則曰得一善則拳拳服膺而弗失之矣又曰不遷怒不貳過有不善未嘗不知知之未嘗復行也此其好之篤學之之道也視聽言動皆禮矣所異于聖人者葢聖人則不思而得不勉而中從容中道顔子則必思而後得必勉而後中故曰顔子之與聖人相去一息孟子曰充實而有光輝之謂大大而化之之謂聖聖而不可知之謂神顔子之德可謂充實而有光輝矣所未至者守之也非化之也以其好學之心假之以年則不日而化矣故仲尼曰不幸短命死葢傷其不得至於聖人也所謂化之者入於神而自然不思而得不勉而中之謂也孔子曰七十而從心所欲不踰矩是也或曰聖人生而知之者也今謂可學而至其有稽乎曰然孟子曰堯舜性之也湯武反之也性之者生而知之者也反之者學而知之者也又曰孔子則生而知也孟子則學而知也後人不逹以謂聖本生知非學可至而為學之道遂失不求諸已而求諸外以博聞强記巧文麗辭為工榮華其言鮮有至於道者則今之學與顔子所好異矣篇中論顔子所好之學大約謂光明之心知所養而力行以求至於誠耳擊壤集自序邵子擊壤集伊川翁自樂之詩也非惟自樂又能樂時與萬物之自得也伊川翁曰子夏謂詩者志之所之也在心為志發言為詩情動於中而形於言聲成其文而謂之音是知懐其時則謂之志感其物則謂之情發其志則謂之言揚其情則謂之聲言成章則謂之詩聲成文則謂之音然後聞其詩聽其音則人之志情可知之矣且情有七其要在二二謂身也時也謂身則一身休慼也謂時則一時之否泰也一身之休慼則不過貧富貴賤而巳一時之否泰則在夫興廢治亂者焉是以仲尼刪詩十去其九諸侯千有餘國風取十五西周十有二王雅取其六葢垂訓之道善惡明著者存焉耳近世詩人窮慼則職于怨憝榮逹則專于滛泆身之休戚發于喜怒時之否泰出于愛惡殊不以天下大義而為言者故其詩大率溺于情好也噫情之溺人也甚于水古者謂水能載舟亦能覆舟是覆載在水也不在人也載則為利覆則為害是利害在人也不在水也不知覆載能使人有利害耶利害能使水有覆載耶二者之間必有處焉就如人能踏水非水能踏人也然而有稱善踏者未始不為水之所害人若外利而踏水之情亦由人之情也若利内而踏水利而壊之患立至于前又何必分乎人焉水焉其傷性害命一也性者道之形體也性傷則道亦從之矣心者性之郛郭也心傷則性亦從之矣身者心之區宇也身傷則心亦從之矣物者身之舟車也物傷則身亦從之矣是知以道觀性以性觀心以心觀身以身觀物治則治矣然猶未離乎害者也不若以道觀道以性觀性以心觀心以身觀身以物觀物則雖欲相傷其可得乎若然則以家觀家以國觀國以天下觀天下亦從而可知之矣予自壯嵗業于儒術謂人世之樂何嘗有萬之一二而謂名教之樂固有萬萬焉況觀物之樂復有萬萬者焉雖生死榮辱轉戰于前曽未入于胸中則何異四時風花雪月一過乎眼也誠為能以物觀物而兩不相傷者焉葢其間情累都忘去爾所未忘者獨有詩在焉然而雖曰未忘其實亦若忘之矣何者謂其所作異人之所作也所作不限聲律不沿美惡不立固必不希名譽如鑑之應形如鐘之應聲其或經道之餘因靜照物因時起志因物寓言因志發詠因言成詩因詠成聲因詩成音是故哀而未嘗傷樂而未嘗滛雖曰吟咏性情曽何累于情哉鐘鼓樂也玉帛禮也與其嗜鍾鼓玉帛則斯言也不能無陋矣必欲廢鐘鼓玉帛則其如禮樂何人謂風雅之道行于古而不行于今殆非通論牽于一身而為言者也吁獨不念天下為善者少害善者多造危者衆而持危者寡志士在畎畆則以畎畆言故其詩名之曰伊川擊壤集朱子曰諸先生説這道理却不似邵子説得最著實邵子忽自於擊壤序内說出幾句云性者道之形體也心者性之郛郭也身者心之區宇也物者身之舟車也此說極好較之横渠心統性情尤宻又云不易之論此等語秦漢以下人道不到又云康節這數句極好葢道即理也如父子有親君臣有義是也然非性何以見理之所在故曰道之形體仁義禮智性也理也而具此理者心也故曰心者性之郛郭又云以道觀性者道是自然底道理性則有剛柔善惡參差不齊處是道不能以該盡此性也性有仁義禮智之善心却千思萬慮出入無時是性不能以該盡此心也心欲如此而身却不能如此是心有不能撿其身處以一身而觀物亦有不能盡其情狀變態此則未離乎害之意也且以一事言之者好人之所好惡人之所惡是以觀物者也又或問以道觀道等語是物各付物之意否曰然葢自家都不犯手之意進資治通鑑表初進通志八卷英宗悦之命公續其書十五年而成上之司馬光先奉勅編集歴代君臣事迹又奉聖㫖賜名資治通鑑今已了畢者伏念臣性識愚魯學術荒疎凡百事為皆出人下獨於前史粗嘗盡心自㓜至老嗜之不厭每患遷固以來文字繁多自布衣之士讀之不徧況於人主日有萬幾何暇周覽臣嘗不自揆欲刪削冗長舉其大要取闗國家興衰繫生民休戚善可為法惡可為戒者為編年一書使先後有倫精粗不雜私家力薄無由可成伏遇英宗皇帝資睿智之性敷文明之治思歴覽古事用恢張大猷爰詔下臣俾之編集臣夙昔所願一朝獲伸踊躍奉承惟懼不稱先帝仍命自選辟官屬於崇文院置局許借龍圖天章閣三館秘閣書籍賜以御府筆墨繒帛及御前錢以供果餌以内臣為承受眷遇之榮近臣莫及不幸書未進御先帝遺棄羣臣陛下紹膺大統欽承先志寵以冠序鍚之嘉名每開經筵常令進讀臣雖頑愚荷兩朝知待如此其厚隕身喪元未足報塞茍智力所及豈敢有遺㑹差知永興軍以衰疾不任治劇乞就冗官陛下俯從所欲曲賜容養差判西京留司御史臺及提舉嵩山崇福宫前後六任仍聽以書局自隨給之禄秩不責職業臣既無他事得以研精極慮窮竭所有日力不足繼之以夜徧閱舊史旁採小說簡牘盈積浩如煙海抉摘幽隠校計毫釐上起戰國下終五代凡一千三百六十二年修成二百九十四卷又畧舉事目年經國緯以備檢尋為目録三十卷又參考羣書詳其同異俾歸一塗為考異三十卷合三百五十四卷自治平開局迨今始成嵗月淹久其間牴牾不敢自保罪負之重固無所逃重念臣違離闕庭十有五年雖身處於外區區之心朝夕寤寐何嘗不在陛下左右顧以駑蹇無施而可是以專事鉛槧用酬大恩庶竭㳙塵少俾海岳臣今筋骸癯瘁目視昬近齒牙無幾神識衰耗目前所為旋踵遺忘臣之精力盡於此書伏望陛下寛其妄作之誅察其願忠之意以清閒之燕時賜省覽監前世之興衰考當今之得失嘉善矜惡取是捨非足以懋稽古之盛德躋無前之至治俾四海羣生咸蒙其福則臣雖委骨九泉志願永畢矣謹奉表陳進以聞自叙編校苦心要歸總欲神宗留意監古讀至末段忠君愛國之心情見乎詞與著書立說誇耀後世者不可同年而語矣其文氣懇切古茂直逼兩京宋人少有也温公作通鑑其功不在左氏下朱子因之為綱目其功不在春秋下千百世治亂興衰得失具見於此切巳讀之所以長益經濟啓發忠義者不少名為讀書人而二書有不及見者可不謂大哀乎答程子書司馬光承問及張子厚謚倉卒奉對以漢魏以來此例甚多無不可者退有所未盡竊惟子厚平生用心欲率今世之人復三代之禮者也漢魏以下葢不足法郊特牲曰古者生無爵死無謚爵謂大夫以上者檀弓記禮所由失以為士之有誄自縣賁父始子厚官比諸侯之大夫則巳貴宜有謚矣然曽子問賤不誄貴㓜不誄長禮也唯天子稱天以誄之諸侯相稱非禮也況弟子而誄其師乎孔子之沒哀公誄之不聞弟子復為之諡也子路欲使門人為臣孔子以為欺天門人厚𦵏顔淵孔子嘆不得視猶子也君子愛人以禮今闗中諸君欲諡子厚而不合於古禮非子厚之志與其以陳文範陶靖節王文中孟貞曜為比其尊之也曷若以孔子為比乎簡而茂樸而有華東京以返無此風標温公奏疏史論甚多忠謇明暢有闗治要獨選此最古淡一篇此等文筆在宋朝推為絶調且足見程張司馬邵吕文富諸君子之相聚不偶然也鳴呼令人神徃矣論聽政宣仁太后崩祖禹慮小人乗間害政乃上疏范祖禹臣等伏以天下不幸大行太皇太后登遐陛下號慕哀毁孝性天至在廷聞者無不摧隕今總覽庶政延見羣臣四方之民傾耳而聽拭目而視此乃宋室隆替之本社稷安危之基天下治亂之端生民休戚之始君子小人消長進退之際天命人心去就離合之時也嗚呼可不慎哉可不慎哉臣等久備講讀職在論思首當獻言以助萬一陛下宜先誠意正心推廣聖孝發為德音行為仁政以慰荅天下生民之望昔周公以成王㓜弱故位冡宰治天下七年制禮作樂以致太平周公殁成王追念其勛勞賜魯天子禮樂使世世祀周公天下莫不歸心漢大將軍霍光尊立宣帝霍光既殁宣帝亦𦵏以天子之禮帝始親政事又思報大將軍功德夫周公霍光皆人臣也有非常之功故成王宣帝皆報以非常之禮而況太皇太后英宗之配神宗之母陛下之祖母有大功于宗廟社稷有大德於億兆人民於陛下之恩與天地無極豈人臣之比哉然則今陛下所宜先者莫如報太皇太后之德也自仁宗以來三后臨朝皆有大功章獻明肅之於仁宗慈聖光獻之於英宗鞠育扶持勤勞艱難亦未得如太皇太后之於陛下也元豐之末神宗寢疾已不能出號令陛下年始十嵗太皇太后内定大䇿擁立陛下儲位遂定陛下之有天下乃得之於太皇太后也聽政之初詔令所下百姓無不歡呼鼓舞自古母后多私外家惟太皇太后未嘗有毫髪假借族人不惟族人而巳徐王魏王皆親子也以朝廷之故疎逺隔絶魏王病既沒然後一徃太皇太后疾已革然後徐王得入進退羣臣必從天下人望不以已意為喜怒賞罰焦勞刻苦以念生民凡皆為趙氏社稷宋室宗廟專心一意以保祐陛下也陛下如欲報太皇太后之德莫若循其法度而謹守之祖宗以來唯以德澤結百姓之心欲四海安靜無事仁宗行之四十二年天下至今思之恭惟太皇太后之政事乃仁宗之政事也然而仁宗聖性寛裕不忍拒人内降濫恩其後亦比比而有惟太皇太后嚴正至靜不可干犯故能外斥逐奸邪以清朝廷内裁抑僥倖以肅宫禁故雖德澤深厚結於百姓而小人怨者亦不為少矣今必有小人進言曰太皇太后不當改先帝之政逐先帝之臣此乃離間之言陛下不可不察也當陛下嗣位之初太皇太后同聽政中外臣民上書者以萬數皆言政令有不便者太皇太后因天下人心欲改故與陛下同改之非以己之私意而改也既改其法則作法之人及主其法者有罪當逐陛下與太皇太后亦以衆言而逐之其所逐者皆上負先帝下負萬民天下之所仇疾衆庶所欲同去者也太皇太后豈有憎愛於其間哉顧不如此則天下不安耳惟陛下清心照理辨察是非斥逺佞人深拒邪說有敢以姦言惑聖聽者明正其罪付之典刑痛懲一人以儆羣慝則帖然無事矣陛下若稍入其語不正其罪則恐姧言邪説繼進不巳萬一追報之禮小有不至此於太皇太后聖德無損而於陛下孝道有虧必大失天下之心陛下豈不見司馬光以公忠正直為天下所信服陛下與太皇太后用以為相海内之人無不欣悦光殁之日無不悲哀乃至茶坊酒肆之中亦事其畫像光所以得人心如此者為其能輔佐陛下與太皇太后功及天下也以光之功比之太皇太后止是萬分之一而百姓思之如此而況太皇太后有天地之恩於陛下若聽小人讒説或追報有所不至或輕改其政事豈不大失天下人心乎夫小人之情非為朝廷之計亦非為先帝之事皆為其身之利也日夜伺候欲逞其憾者久矣此等既上悮先帝今又欲復悮陛下天下之事豈堪小人再破壊耶臣等恭聞陛下自太皇太后寢疾躬親藥膳衣不解帶變故以來哀慕毁瘠又下詔發揚太皇太后盛德推恩高氏至親之際無所間然然而臣等猶言及此者竊以小人衆多恐置陛下於有過之地也如臣等所言雖萬萬無之然不敢不慮於未然或有纎芥流聞於外則臣等上負陛下不先言之罪大矣不勝憂國愛君之至惟陛下深留聖思當宣仁時元豐大臣洶洶乗機播弄范忠宣吕微仲巳有調停之議宣仁崩諸君子知必不免宣仁臨終時數言亦知必不免也范公此疏正直委婉欲以先入之言早杜其萌篇中所言如親見後來紹述之禍而語語對針宜乎子瞻見此疏即自毁其稿列名以進也古今第一可恨事莫如元祐之變為紹述指君子為小人空國貶竄亦巳極矣甚至有欲追廢宣仁毁司馬公之棺者事雖不果足見鄙夫之心無所不至不觀後來之禍不知此疏之佳處然公之心豈意其至此哉自古忠言讜論銷患于未形禆益人家國者莫可名言也族譜引蘇洵蘇氏之譜譜蘇氏之族也蘇氏出自高陽而蔓延於天下唐神龍初長史味道刺眉州卒於官一子留於眉眉之有蘇氏自是始而譜不及焉者親盡也親盡則曷為不及譜為親作也凡子得書而孫不得書何也以著代也自吾之父以及吾之髙祖仕不仕娶某氏享年幾某日卒皆書而他不書何也詳吾之所自出也自吾之父以至吾之高祖皆曰諱某而他則遂名之何也尊吾之所自出也譜為蘇氏作而獨吾之所自出得詳與尊何也譜吾作也嗚呼觀吾之譜者孝弟之心可以油然而生矣情見乎親親見於服服始於衰而至於緦麻而至於無服無服則親盡親盡則情盡情盡則喜不慶憂不弔喜不慶憂不弔則塗人也吾之所以相視如塗人者其初兄弟也兄弟其初一人之身也悲夫一人之身分而至於塗人此吾譜之所以作也其意曰分而至於塗人者勢也勢吾無如之何也已幸其未至於塗人也使之無至於忽忘焉可也嗚呼觀吾之譜者孝弟之心可以油然而生矣系之以詩曰吾父之子今為吾兄吾疾在身兄呻不寧數世之後不知何人彼死而生不為戚欣兄弟之情如足於手其能幾何彼不相能彼獨何心明允文章多雜以縱横刑名之習五經等論尤駁而未純獨此篇效公糓體至性流露文筆委折可歌可誦即不必觀其譜讀其引孝悌之心有不油然而生乎安溪先生嘗曰以父母之心為心則天下無不友之兄弟以祖宗之心為心則天下無不和之族人以天地之心為心則天下無不愛之民物此語最要切正易傳所謂體仁足以長人程子所謂滿腔惻隠者也余嘗書此語于祠堂以勉族人讀眉山斯引更為感動范文正公文集序蘇軾慶厯三年軾始總角入鄉校士有自京師來者以魯人石守道所作慶厯聖德詩示鄉先生軾從旁竊觀則能誦習其詞問先生以所頌十一人者何人也先生曰童子何用知之軾曰此天人也耶則不敢知若亦人耳何為其不可先生奇軾言盡以告之且曰韓范富歐陽此四人者人傑也時雖未盡了則巳私識之矣嘉祐二年始舉進士至京師則范公沒既𦵏而墓碑出讀之至流涕曰吾得其為人葢十有五年而不一見其面豈非命也歟是嵗登第始見知於歐陽公因公以識韓富皆以國士待軾曰恨子不識范文正公其後三年過許始識公之仲子今丞相堯夫又六年始見其叔彞叟京師又十一年遂與其季德孺同僚於徐皆一見如舊且以公遺槀見屬為序又十三年乃克為之嗚呼公之功德葢不待文而顯其文亦不待序而傳然不敢辭者自以八嵗知敬愛公今四十七年矣彼三傑者皆得從之遊而公獨不識以為平生之恨若獲挂名其文字中以自託於門下士之末豈非疇昔之願也哉古之君子如伊尹太公管仲樂毅之流其王伯之略皆素定於畎畝中非仕而後學者也淮隂侯見高帝於漢中論劉項短長畫取三秦如指諸掌及佐帝定天下漢中之言無一不酬者諸葛孔明卧草廬中與先主䇿曹操孫權規取劉璋因蜀之資以爭天下終身不易其言此豈口傳耳受嘗試為之而僥倖其或成者哉公在天聖中居太夫人憂則巳有憂天下致太平之意故為萬言書以遺宰相天下傳誦至用為將擢為執政考其平生所為無出此書者今其集二十卷為詩賦二百六十八為文一百六十五其於仁義禮樂忠信孝弟葢如飢渇之於飲食欲須㬰忘而不可得如火之熱如水之濕葢其天性有不得不然者雖弄翰戲語率然而作必歸於此故天下信其誠爭師尊之孔子曰有德者必有言非有言也德之發於口者也又曰我戰則克祭則受福非能戰也德之見於怒者也余生平最喜諸葛公范文正公稱公之文亦酣玩不置陳壽上諸葛公文集表數百讀不厭蘇長公序范文正公亦數百讀不厭固以其文之佳亦以其人故也長公文以雄偉閎暢勝此篇更出以簡勁六一居士集序蘇軾夫言有大而非夸達者信之衆人疑焉孔子曰天之將喪斯文也後死者不得與於斯文也孟子曰禹抑洪水孔子作春秋而予距楊墨葢以是配禹也文章之得喪何與於天而禹之功與天地並孔子孟子以空言配之不巳夸乎自春秋作而亂臣賊子懼孟子之言行而楊墨之道廢天下以為是固然而不知其功孟子既沒有申商韓非之學違道而趨利殘民以厚主其説至陋也而士以是罔其上上之人僥倖一切之功靡然從之而世無大人先生如孔子孟子者推其本末權其禍福之輕重以救其惑故其學遂行秦以是喪天下陵夷至於勝廣劉項之禍死者十八九天下蕭然洪水之患葢不至此也方秦之未得志也使復有一孟子則申韓為空言作於其心害於其事作於其事害於其政者必不至若是烈也使楊墨得志於天下其禍豈減於申韓哉由此言之雖以孟子配禹可也太史公曰葢公言黄老賈誼晁錯明申韓錯不足道也而誼亦為之予以是知邪説之移人雖豪傑之士有不免者況衆人乎自漢以來道術不出於孔氏而亂天下者多矣晉以老莊亡梁以佛亡莫或正之五百餘年而後得韓愈學者以愈配孟子葢庶幾焉愈之後三百有餘年而後得歐陽子其學推韓愈孟子以逹於孔氏著禮樂仁義之實以合於大道其言簡而明信而通引物連類折之於至理以服人心故天下翕然師尊之自歐陽子之存世之不説者譁而攻之能折困其身而不能屈其言士無賢不肖不謀而同曰歐陽子今之韓愈也宋興七十餘年民不知兵富而教之至天聖景祐極矣而斯文終有媿於古士亦因陋守舊論卑而氣弱自歐陽子出天下爭自濯磨以通經學古為高以救時行道為賢以犯顔納諫為忠長育成就至嘉祐末號稱多士歐陽子之功為多嗚呼此豈人力也哉非天其孰能使之歐陽子没十有餘年士始為新學以佛老之似亂周孔之真識者憂之頼天子明聖詔修取士法風厲學者專治孔氏黜異端然後風俗一變考論師友淵源所自復知誦習歐陽子之書予得其詩文七百六十六篇於其子棐乃次而論之曰歐陽子論大道似韓愈論事似陸贄記事似司馬遷詩賦似李白此非余言也天下之言也歐陽子諱修字永叔既老自謂六一居士云長公氣節文章照耀千古謂之知道則未也觀其推崇歐陽子不喜程正叔本領具見然讀此篇非具千古隻眼者不能是何等識力筆力潮州韓文公廟碑蘓軾匹夫而為百世師一言而為天下法是皆有以叅天地之化闗盛衰之運其生也有自来其逝也有所為矣故申吕自嶽降而傳説為列星古今所傳不可誣也孟子曰我善養我浩然之氣是氣也寓於尋常之中而塞乎天地之間卒然遇之則王公失其貴晉楚失其富良平失其智賁育失其勇儀秦失其辯是孰使之然哉其必有不依形而立不恃力而行不待生而存不隨死而亡者矣故在天為星辰在地為河嶽幽則為鬼神而明則復為人此理之常無足怪者自東漢以來道喪文弊異端並起歴唐貞觀開元之盛輔以房杜姚宋而不能救獨韓文公起布衣談笑而麾之天下靡然從公復歸於正葢三百年於此矣文起八代之衰而道濟天下之溺忠犯人主之怒而勇奪三軍之帥此豈非參天地闗盛衰浩然而獨存者乎葢嘗論天人之辨以謂人無所不至惟天不容偽智可以欺王公不可以欺豚魚力可以得天下不可以得匹夫匹婦之心故公之精誠能開衡山之雲而不能回憲宗之惑能馴鱷魚之暴而不能弭皇甫鎛李逢吉之謗能信於南海之民廟食百世而不能使其身一日安於朝廷之上葢公之所能者天也所不能者人也始潮人未知學公命進士趙德為之師自是潮之士皆篤于文行延及齊民至於今號稱易治信乎孔子之言君子學道則愛人小人學道則易使也潮人之事公也飲食必祭水旱疾疫凡有求必禱焉而廟在刺史公堂之後民以出入為艱前守欲請諸朝作新廟不果元祐五年朝散郎王君滌來守是邦凡所以養士治民者一以公為師民既悦服則出令曰願新公廟者聽民讙趨之卜地於州城之南七里期年而廟成或曰公去國萬里而謫於潮不能一嵗而歸沒而有知其不眷戀於潮審矣軾曰不然公之神在天下者如水之在地中無所徃而不在也而潮人獨信之深思之至焄蒿悽愴若或見之譬如鑿井得泉而曰水專在是豈理也哉元豐七年詔封公昌黎伯故榜曰昌黎伯韓文公之廟潮人請書其事於石因作詩以遺之使歌以祀公上半總論韓文公後半方是潮州廟碑精力全注在上半後半只淡淡冩來耳韓文公范文正公歐陽文忠公三大人物其碑記序文得蘇文忠公以崇論閎議精思浩氣搆之大人物得此大手筆快哉代張方平諫用兵書蘇軾臣聞好兵猶好色也傷生之事非一而好色者必死賊民之事非一而好兵者必亡此理之必然者也夫惟聖人之兵皆出於不得巳故其勝也享安全之福其不勝也必無意外之患後世用兵皆得巳而不巳故其勝也則變遲而禍大其不勝也則變速而禍小是以聖人不計勝負之功而深戒用兵之禍何者興師十萬日費千金内外騷動殆於道路者百千萬家内則府庫空虚外則百姓窮匱飢寒逼廹其次必有盜賊之憂死傷愁怨其終必致水旱之報上則將帥擁衆有跋扈之心下則士衆久役有潰叛之志變故百出皆由用兵至於興事首議之人𠖇謫尤重葢以平民無故縁兵而死怨氣充積必有任其咎者是以聖人畏之重之非不得巳不敢用也自古人主好動干戈由敗而亡者不可勝數臣今不敢復言請為陛下言其勝者秦始皇既平六國復事吳越戍役之患被於四海雖拓地千里逺過三代而墳土未乾天下怨叛二世被害子嬰被擒滅亡之酷自古所未之有也漢武帝承文景富溢之餘首挑匈奴兵連不解遂使侵奪及於諸國嵗嵗調發所至成功建元之間兵禍始作是時蚩尤旗出長與天等其春戾太子生自是師行三十餘年死者無數及巫蠱事起京師流血僵尸數萬太子父子皆敗故班固以為太子生長於兵與之終始帝雖悔悟自克而殁身之恨巳無及矣隋文帝既下江南繼事夷狄焬帝嗣位此志不衰皆能誅滅彊國威震萬里然而兵怨盜起亡不旋踵唐太宗神武無敵尤喜用兵既巳破滅突厥高昌吐谷渾等猶且未厭親駕遼東皆志在立功非不得巳而用其後武氏之難唐室凌遲不絶如綫葢用兵之禍物理難逃不然太宗仁聖寛厚克己裕人幾至刑措而一傳之後子孫塗炭此豈為善之報也哉由此觀之漢唐用兵於寛仁之後故勝而僅存秦隋用兵於殘暴之餘故勝而遂滅臣每讀書至此未嘗不掩卷流涕傷其計之過也若使此四君者方其用兵之初隨即敗衂愓然戒懼知用兵之難則禍敗之興當不至此不幸每舉輙勝故使狃于功利慮患不深臣故曰勝則變遲而禍大不勝則變速而禍小不可不察也昔仁宗皇帝覆育天下無意于兵將士惰媮兵革朽鈍元昊乗間竊發西鄙延安涇原麟府之間敗者三四所喪動以萬計而海内晏然兵休事巳而民無怨言國無遺患何者天下臣庶知其無好兵之心天地鬼神諒其有不得巳之實故也今陛下天鍚勇智意在富強即位以來繕甲治兵伺候鄰國羣臣窺見此指多言用兵其始也弼臣執國命者無憂深思逺之心樞臣當國論者無慮害持難之識在臺諫之職者無獻替納忠之議從微至著遂成厲階既而薛向為横山之謀韓絳效深入之計陳升之吕公弼等隂興之協力師徒喪敗財用耗屈較之寳元慶厯之敗不及十一然而天怒人怨邊兵皆叛京師騷然陛下為之旰食者累月何者用兵之端陛下作之是以吏士無怒敵之意而不直陛下也尚頼祖宗積累之厚皇天保佑之深故使兵出無功感悟聖意然淺見之士方且以敗為恥力欲求勝以稱上心於是王韶搆禍於熙河章惇造釁於梅山熊本發難於渝瀘然此等皆戕殺巳降俘纍老弱困弊腹心而取空虚無用之地以為武功使陛下受此虚名而忽於實禍勉强砥礪奮於功名故沈起劉彞復發於安南使十餘萬人暴露瘴毒死者十而五六道路之人斃於輸送貲糧器械不見敵而盡以為用兵之意必且少衰而李憲之師復出於洮州矣今師徒克㨗銳氣方盛陛下喜於一勝必有輕視四夷陵侮敵國之意天意難測臣寔畏之且夫戰勝之後陛下可得而知者凱旋㨗奏拜表稱賀赫然耳目之觀耳至於逺方之民肝腦屠於白刃筋骨絶於餽餉流離破産鬻賣男女薫眼折臂自經之狀陛下必不得而見也慈父孝子孤臣寡婦之苦聲陛下必不得而聞也譬猶屠殺牛羊刳臠魚鱉以為膳羞食者甚美死者甚苦使陛下見其號呼於梃刃之下宛轉於刀几之間雖八珍之美必將投筯而不忍食而況用人之命以為耳目之觀乎且使陛下將卒精强府庫充實如秦漢隋唐之君則既勝之後禍亂方興尚不可救而況所任將吏罷軟凡庸較之古人萬萬不逮而數年以來公私窘乏内府累世之積掃地無餘州郡征税之儲上供殆盡百官廩俸僅而能繼南郊賞給久而未辦以此舉動雖有智者無以善其後矣且饑疲之後所在盜賊蠭起京東河北尤不可言若軍事一興横歛隨作民窮而無告其勢不為大盜無以自全邊事方深内患復起則勝廣之形將在於此此老臣所以終夜不寐臨食而歎至於慟哭而不能自止也且臣聞之凡舉大事必順天心天之所向以之舉事必成天之所背以之舉事必敗葢天心向背之迹見於災祥豐歉之間今自近嵗日蝕星變地震山崩水旱癘疫連年不解民死將半天心之向背可以見矣而陛下方且斷然不顧興事不已譬如人子得過於父母惟有恭順靜黙引咎自責庶幾可解今乃紛然詰責奴婢恣行箠楚以此事親未有見赦於父母者故臣願陛下逺覽前世興亡之迹深察天心向背之理絶意兵革之事保疆睦鄰安靜無為為社稷長久之計上以安二宫朝夕之養下以濟四方億兆之命則臣雖老死溝壑瞑目於地下矣昔漢祖破滅羣雄遂有天下光武百戰百勝祀漢配天然至白登被圍則講和親之議西域請吏則出謝絶之言此二帝者非不知兵也葢經變既多則慮患深逺今陛下深居九重而輕議討伐老臣庸懦私竊以為過矣然而人臣納説於君因其既厭而止之則易為力迎其方鋭而折之則難為功凡有血氣之倫皆有好勝之意方其氣之盛也雖布衣賤士有不可奪自非智識特達度量過人未有能於勇鋭奮發之中舍己從人惟義是聽者也今陛下盛氣於用武勢不可回臣非不知而獻言不已者誠見陛下聖德寛大聽納不疑故不敢以衆人好勝之常心望於陛下且意陛下他日親見用兵之害必將哀痛悔恨而追咎左右大臣未嘗一言臣亦將老且死見先聖於地下亦有以藉口矣惟陛下哀而察之弔古戰塲文讀之令人心酸此篇讀之令人神悚此種文直是闗係數千百世國運數十百萬生靈者至文也諸葛公六出祁山宋高宗耑主和議又當别論篇中故有得已不得已之分神宗以用兵故前後喪師至六十萬聞報傍徨歎悼悔艾無及以隕其身此疏痛切言之其驗若劵志林論始皇蘇軾秦始皇時趙髙有罪蒙毅按之當死始皇赦而用之長子扶蘇好直諫上怒使北監蒙恬兵於上郡始皇東遊㑹稽並海走瑯琊次子胡亥李斯蒙毅趙髙從道病使䝉毅還禱山川未及還上崩李斯趙高矯詔立胡亥殺扶蘇䝉恬蒙毅卒以亡秦蘇子曰始皇制天下輕重之勢使内外相形以禁姦備亂可謂密矣蒙恬將三十萬人威震北方扶蘇監其軍而蒙毅侍帷幄為謀臣雖有大姦賊敢睥睨其間哉不幸道病禱祠山川尚有人也而遣䝉毅故高斯得成其謀始皇之遣毅毅見始皇病太子未立而去左右皆不可以言智雖然天之亡人國其禍敗必出於智之所不及聖人為天下不恃智以防亂恃其無致亂之道耳始皇致亂之道在用趙高夫閹尹之禍如毒藥猛獸未有不裂肝碎首也自有書契以來惟東漢吕彊後唐張承業此二人號稱善良豈可望一二于千萬以取必亡之禍哉然世主皆甘心而不悔如漢桓靈唐肅代猶不足稱怪始皇漢宣皆英主亦沉於趙髙恭顯之禍彼自以為聰明人傑也奴僕薫腐之餘何能為及其亡國亂朝乃與庸主不異吾故表而出之以戒後世人主如始皇漢宣者或曰李斯佐始皇治天下不可謂不智扶蘇始皇子秦人戴之久矣陳勝假其名猶足以亂天下而蒙恬持重兵在外使二人不即受誅而復請之則斯高無遺類矣以斯之智而不慮此何哉蘇子曰嗚呼秦之失道有自來矣豈獨斯高之罪自商鞅變法以誅死為輕典以參夷為常法人臣狼顧脅息以得死為幸何暇復請方其法之行也求無不獲禁無不止鞅自以為軼堯舜而駕湯武矣及其出亡而無所舍然後知為法之弊夫豈獨鞅悔之秦亦悔之矣荆軻之變持兵者熟視始皇環柱而走而莫之救者以法重故也李斯之立胡亥不復忌二人者知威令之素行而臣子不敢復請也二人之不敢復請亦知始皇之鷙悍而不可回也豈料其偽也哉周公曰平易近民民必歸之孔子曰有一言而終身行之其恕矣乎夫以忠恕為心而以平易為政則上易知下易逹雖有賣國之姧無所投其隙倉卒之變無自發焉然其令行禁止葢有不及商鞅者矣而聖人終不以此易彼商鞅立信于徙木立威于棄灰刑其親戚師傅積威信之極以至始皇秦人視其君如雷電鬼神不可測識也古者公族有罪三宥而後致刑今至使人矯殺其太子而不忌太子亦不敢請則威信之過也故夫以法毒天下者未有不反中其身及其子孫者也漢武始皇皆果于殺者也故其子如扶蘇之仁則寧死而不請如戾太子之悍則寜反而不訴知訴之不察也戾太子豈欲反者哉計出於無聊也故為二君之子者有死與反而巳李斯之智葢足以知扶蘇之必不反也吾又表而出之以戒後世人主之果於殺者因始皇而忽及漢宣漢武所以勗人謹㣲勉人存厚者實為良鑑文亦雄偉宕逸自行自止承接之迹都化此等文惟韓集原道等篇有之桞歐曽王未數數也臣事䇿一蘇轍天下有權臣有重臣二者其迹相近而難明天下之人知惡夫權臣之專而世之重臣亦遂不容於其間夫權臣者天下不可一日而有而重臣者天下不可一日而無也天下徒見其外而不察其中見其皆侵天子之權而不察其所為之不類是以舉皆嫉之而無所喜此亦已太過也今夫權臣之所為者重臣之所切齒而重臣之所取者權臣之所不顧也將為權臣耶必將内悦其君之心委曲聽順而無所違戾外竊其生殺予奪之柄黜陟天下以見已之權而没其君之威惠内能使其君歡愛悦懌無所不順而安馬之上外能使其公卿大夫百官庶吏無所不歸命而爭為之腹心上愛下順合而為一然後權臣之勢遂成而不可㧞至於重臣則不然君有所為不可則必爭爭之不能而其事有所必不可聽則專行而不顧待其成敗之迹著則上之心將釋然而自解其在朝廷之中天子為踧然而有所畏士大夫不敢安肆怠惰於其側爵禄慶賞已得以議其可否而不求以為己之私惠刀鋸斧鉞巳得以叅其輕重而不求以為己之私勢要以使天子有所不可必為而羣下有所震懼而已不與其利何者為重臣者不待天下之歸巳而為權臣者亦無所事天子之畏巳也故各因其行事而觀其意之所在則天下誰可欺者臣故曰為天下安可一日無重臣也且今使天下而無重臣則朝廷之事惟天子之所為而無所可否雖天子有納諫之明而百官畏懼戰慄無平昔尊重之勢誰肯觸忌諱冐罪戾而為天下言者惟其小小得失之際乃敢上章讙譁而無所憚至於國之大事安危存亡之所繫則將卷舌而去誰敢發而受其禍此人主之所大患也悲夫後世之君徒見天下之權臣出入唯唯以為有禮而不知此乃所以潜潰其國徒見天下之重臣剛毅果敢喜逆其意則以為不遜而不知其有社稷之慮二者淆亂於心而不能辨其邪正是以喪亂相仍而不悟何足傷也昔者衛太子聚兵以誅江充武帝震怒發兵而攻之京師至使丞相太子相與交戰不勝而走又使天下極其所往而翦滅其迹當此之時茍有重臣出身而當之擁䕶太子以待上意之少解徐發其所蔽而開其所怒則其父子之際尚可得而全也惟無重臣故天下皆知之而不敢言臣愚以為凡為天下宜有以養其重臣之威使天下百官有所畏忌而緩急之間能有所堅忍持重而不可奪者竊觀方今四海無變非常之事宜其息而不作然及今日而慮之則可以無異日之患不然者誰能知其果無有也而不為之計哉抑臣聞之今世之弊在於法禁太密一舉足不如律令法吏且以為言而不問其意之所屬是以雖天子之大臣亦安敢有所為於法律之外以安天下之大事故為天子之計莫若少寛其法使大臣得有所守而不為法之所奪昔申屠嘉為丞相至召天子之倖臣鄧通立之堂下而詰責其過是時通幾至於死而不救天子知之亦不一為怪而申屠嘉亦卒非漢之權臣由此觀之重臣何損於天下哉論既切中筆復閎暢蘇氏之長技也然權臣重臣二者最難辨唯在人君之明哲信任耳嘗試約而論之漢之有申屠嘉霍光諸葛亮此重臣也若周亞夫蕭望之王嘉楊震李固杜喬則可為重臣而卒以忠死者也房魏之在太宗李徳裕之在武宗此重臣也若禇遂良長孫無忌以重臣而死陸贄以重臣而貶裴度以重臣而終不得行其志者也宋之王旦李沆韓琦司馬光此重臣也若范仲淹父子趙鼎李綱趙汝愚則以重臣而或疎逺不用且或貶死者也即以偏安者論之燕之用慕容恪秦之用王猛周之用王朴此重臣也郭崇韜雖非純臣然在莊宗時亦可為重臣以讒見殺唐禍以速嗚呼可不慎哉貽蘇軾書畢仲游孟軻不得巳而後辨孔子欲無言古人所以精謀極慮固功業而養壽命者未嘗不出乎此天下論君之文如孫臏之用兵扁鵲之醫疾固所指名者矣雖無是非之言猶有是非之疑又況其有邪官非諫臣職非御史危身觸諱以游其間殆猶抱石而拯溺也杜祁公衍有一門人將作外吏素好激論者公戒之曰無益于事徒取禍耳與此同意文忠亮節雄文光逺有耀其亡也李廌嘗悼之曰皇天后土識一生忠義之心名山大川還千古英靈之氣文忠足以當之然徃徃以言語得罪少停蓄泓㴠亦其完養有未至處論恢復疏岳飛金人所以立劉豫於江南葢欲荼毒中原以中國攻中國尼堪因得休兵觀釁臣欲陛下假臣日月便則提兵趨京洛據河陽陜府潼闗以號召五路叛將叛將既還遣王師前進彼必棄汴而走河北京畿陜右可以盡復然後分兵濬滑經畧兩河如此則劉豫成擒金人逺遁社稷長久之計寔在此舉成筭在胸武穆之功非徒破金也如李成楊太諸劇賊皆擁數十萬衆非武穆孰能破滅武穆折節讀書惟守忠孝二字行已公正無取禍之道乃為賊檜所殺死時年方三十九痛哉宋朝有二大可恨事一則變元祐為紹聖諸賢貶斥為黨人是也一則秦檜殺武穆是也使江文通著筆作賦不知更如何恨乎先儒謂孔明不死三年可以取魏乃功未成而卒于軍天也武穆累㨗恢復方張乃召之回而又殺之人也天乎胡致堂謂漢武時若用董仲舒為相汲黯為御史大夫最得余謂髙宗朝若用李忠定為相岳武穆為將何仇之不復哉送程復亨序朱松廣平程某復亨為余外兄從余游於閩者二年余語以安逸憂患知之詳矣將歸省其母及其祖母其可以無言司徒文子問于子思曰親喪三年未𦵏則何服子思曰三年而未𦵏則服不除也故告之一曰𦵏吾舅而後加吉服夫子失魯司冦將之荆先之以子夏申之以冉有曰喪不欲其速貧古之君子以失位于諸侯曰喪喪不欲其速貧若是其急也故告之二曰葺爾居以寧爾親蓬生麻中不扶自直植之榛莽則與之靡然故告之三曰非爾父之類者勿親也江出岷山自荆之楚汪洋千里而至於海者大川三百小川三干以為之助也故告之四曰廣學問以資見聞傳曰宴安鴆毒不可懐也君子非獨惡懐安之敗名惡其敗性也故告之五曰勿懐安禮曰男子生則以桑弧蓬矢射天地四方示志也夫不資之軀豈其浮沉鄉里而名不稱故告之六曰無忘四方之志夫齊之善味者淄澠之合能辨之淄澠之合均是水也子歸矣他日執經而來問予能入于常流而不變其味乎尚能為君辨之送行之序別有良規另一格調贈人以言此本之老子贈孔子及回路二子相請贈與處最是古意後世滿紙虚詞多譽少規失之逺矣古文雅正卷十二
