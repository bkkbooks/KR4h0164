body:
  text: 古文雅正卷三禮部侍郎蔡世逺編賢良䇿一並依朱子通鑑綱目刪本董仲舒臣謹案春秋之中視前世巳行之事以觀天人相與之際甚可畏也國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君而欲止其亂也自非大亡道之世者天盡欲扶持而全安之事在強勉而巳矣強勉學問則聞見博而知益明強勉行道則德日起而大有功此皆可使還至而立有效者也道者所繇適于治之路也仁義禮樂皆其具也故聖王巳沒而子孫長久安寧數百嵗此皆禮樂教化之功也夫人君莫不欲安存而惡危亡然而政亂國危者甚衆所任者非其人而所繇者非其道是以政日以仆滅也夫周道衰於幽厲非道亡也幽厲不繇也至於宣王思昔先王之德興滯補弊明文武之功業周道粲然復興上天祐之為生賢佐後世稱誦至今不絶此夙夜不解行善之所致也故治亂廢興在于巳非天降命不可反也臣聞命者天之令也性者生之質也情者人之欲也堯舜行德則民仁夀桀紂行暴則民鄙天有治亂之所生故不齊也王者欲有所為宜求其端于天天道之大者在隂陽陽為德隂為刑刑主殺而德主生是故陽常居大夏而以生育養長為事隂常居大冬而積于空虛不用之處以此見天之任德不任刑也王者承天意以從事故任德教而不任刑也今廢先王德教之官獨任執法之吏而欲德教之被四海難矣為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正逺近莫敢不一于正而亡有邪氣姦其間者是以隂陽調而風雨時羣生和而萬民殖諸福之物可致之祥莫不畢至而王道終矣今陛下貴為天子富有四海行髙而恩厚知明而意美愛民而好士可謂誼主矣然而天地未應而美祥莫至者凡以教化不立而萬民不正也夫萬民之從利如水之走下不以教化隄防之不能止也古之王者莫不以教化為大務立大學以教於國設庠序以化于邑漸民以仁摩民以誼節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也掃除其迹而悉去之復修教化而崇起之教化巳明習俗巳盛子孫循之行五六百嵗尚未敗也至秦滅先聖之道而顓為自恣茍簡之治故立為天子十有四年而亡然其遺毒餘烈至今未滅使習俗薄惡人民嚚頑雖欲善治之亡可奈何法出而姦生令下而詐起譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也漢得天下以來常欲善治而至今不可善治者失之于當更化而不更化也行王道興教化説得深切著明管敬仲對之無色矣況其他乎董子嘗曰仲尼之門五尺童子羞稱五霸惟其有此一副本領故宜其視管子輩若無有也漢世醇儒首推董子諸葛公諸葛公用而董子不盡用諸葛公之才或過于董子至學術之深醇董子優焉賈劉議事非不明快痛切然本領皆不及董匡衡名為儒而所言者多經書之緒餘儒者之皮貌其氣骨又不及賈劉所以有匡張孔馬合傳之譏故知氣節不足稱皆于道原上未徹也賢良䇿二董仲舒臣聞聖王之治天下也少則習之學長則材諸位爵祿以養其德刑罰以威其惡故民曉于禮誼而恥犯其上武王行大誼平殘賊周公作禮樂以文之至於成康囹圄空虛四十餘年此教化之漸而仁義之流也至秦則不然師申韓之説憎帝王之道以貪很為俗誅名而不察實為善者不必免而犯惡者未必刑也是以百官皆飾虛辭而不顧實外有事君之禮內有背上之心造偽飾詐趨利無恥是以刑者甚衆死者相望而姦不息俗化使然也今陛下并有天下莫不率服而功不加于百姓者殆王心未加焉曾子曰尊其所聞則髙明矣行其所知則光大矣髙明光大不在于他在乎加之意而巳願陛下因用所聞設誠于內而致行之則三王何異哉陛下夙寤晨興務以求賢亦堯舜之用心也而未云獲者士素不厲也夫不素養士而欲求賢譬猶不琢玉而求文采也故養士莫大乎太學太學者賢士之所關也教化之本原也願興太學置明師以養天下之士數考問以盡其材則英俊宜可得矣郡守縣令民之師帥所使承流而宣化也師帥不賢則主德不宣恩澤不流今吏既亡教訓于下或不承用主上之法暴虐百姓與姦為市貧窮孤弱寃苦失職甚不稱陛下之意是以隂陽錯繆氛氣充塞羣生寡遂黎民未濟也夫長吏多出于郎中中郎吏二千石子弟選郎吏又以富訾未必賢也且古所謂功者以任官稱職為差非謂積日纍久也故小材雖纍日不離於小官賢材雖未久不害為輔佐是以有司竭力盡知務治其業而以赴功今則不然纍日以取貴積久以致官是以亷恥買亂賢不肖渾殽未得其真也臣愚以為使諸列侯郡守各擇其吏民之賢者嵗貢各二人以給宿衛且以觀大臣之能所貢賢者有賞所貢不肖者有罰夫如是諸侯吏二千石盡心於求賢天下之士可得而官使也毋以日月為功實試賢能為上量材而授官録德而定位則亷恥殊路賢不肖異處矣汲長孺對武帝云陛下內多欲而外施仁義非不切中但語過戅直篇中殆王心未加焉一語何等深摯遂告以設誠致行內聖外王本領也又云興太學置明師以養天下之士令列侯郡守嵗貢二人是何等規模惜乎不究其用也武帝置博士弟子員五十人雖公孫𢎞等上疏成之然實發自董子賢良䇿三董仲舒臣聞天者羣物之祖故遍覆包函而無所殊聖人法天而立道亦溥愛而亡私春者天之所以生也仁者君之所以愛也夏者天之所以長也德者君之所以養也霜者天之所以殺也刑者君之所以罰也孔子作春秋上揆之天道下質諸人情參之于古考之于今故春秋之所譏災害之所加也春秋之所惡怪異之所施也書邦家之過兼災異之變以此見人之所為其美惡之極乃與天地流通而往來相應此亦言天之一端也天令之謂命命非聖人不行質朴之謂性性非教化不成人欲之謂情情非度制不節是故王者上謹于承天意以順命也下務明教化民以成性也正法度之宜别上下之序以防欲也修此三者而大本舉矣人受命于天固超然異于羣生入有父子兄弟之親出有君臣上下之誼會聚相遇有耆老長幼之施粲然有文以相接歡然有恩以相愛故孔子曰天地之性人為貴明於天性知自貴于物然後知仁誼知仁誼然後重禮節重禮節然後安處善安處善然後樂循理樂循理然後謂之君子臣又聞之衆少成多積小致巨故聖人莫不以暗致明以微致顯是以堯發于諸侯舜興呼深山非一日而顯也蓋有漸以致之矣言出于巳不可塞也行發于身不可掩也言行治之大者君子之所以動天地也故盡小者大慎微者著積善在身猶長日加益而人不知也積惡在身猶火銷膏而人不見也此唐虞之所以得令名而桀紂之可為悼懼者也夫樂而不亂復而不厭者謂之道道者萬世亡弊弊者道之失也先王之道必有偏而不起之處故政有眊而不行舉其偏者以補其弊而巳矣三王之道所祖不同非其相反將以救溢扶衰所遭之變然也故王者有改制之名亡變道之實夏上忠殷上敬周上文者所繼之救當用此也道之大原出于天天不變道亦不變是以禹繼舜舜繼堯三聖相受而守一道亡救弊之政也繇是觀之繼治世者其道同繼亂世者其道變今漢繼大亂之後若宜少損周之文致用夏之忠者夫古之天下亦今之天下共是天下以古準今一何不相逮之逺也意者有所失于古之道與有所詭于天之理與夫天亦有所分豫豫之齒者去其角傅其翼者兩其足是所受大者不得取小也古之所豫祿者不食于力不動于末與天同意者也夫巳受大又取小天不能足而況人乎此民之所以囂囂苦不足也身寵而載髙位家溫而食厚祿因乘富貴之資力以與民爭利于下民安能如之哉民日削月朘寖以大窮富者奢侈羡溢貧者窮急愁苦民不樂生安能避罪此刑罰之所以蕃而姦邪不可勝者也天子大夫者下民之所視效逺方之所四面而內望也豈可以居賢人之位而為庶人行哉夫皇皇求財利常恐乏匱者庶人之意也皇皇求仁義常恐不能化民者大夫之意也若居君子之位當君子之行則舍公儀休之相魯亡可為者矣春秋大一統者天地之常經古今之通誼也今師異道人異論百家殊方指意不同是以上亡以持一統法制數變下不知所守臣愚以為諸不在六藝之科孔子之術者皆絶其道勿使並進邪辟之説滅息然後統紀可一而法度可明民知所從矣首言法天盡性而即繼之曰知仁義重禮節安處善樂循理大儒之言原原本本切實可循所謂以不容巳之心行不容巳之事也遂因此而極言之中戒薦紳貪利一節全是發人亷恥之心千載下賕吏見之猶知自飭末段推尊孔子以一學術如太陽經天隂霧盡息蓋學術一則治術自一愚以為定漢家四百年天下之基非過溢也董仲舒傳贊前漢書贅曰劉向稱董仲舒有王佐之材雖伊吕亡以加管晏之屬伯者之佐殆不及也至向子歆以為伊吕乃聖人之耦王者不得則不興故顔淵死孔子曰噫天喪余唯此一人為能當之自宰我子贛子遊子夏不與焉仲舒遭漢承秦滅學之後六經離析下帷發憤潛心大業令後學者有所統一為羣儒首然考其師友淵原所漸猶未及乎遊夏而曰管晏弗及伊吕不加過矣至向曾孫龔篤論君子也以歆之言為然通篇不下斷語只以援引作斷風格既髙神韻亦絶司馬遷傳贊前漢書自古書契之作而有史官其載籍博矣至孔氏纂之上繼唐堯下訖秦繆唐虞以前雖有遺文其語不經故言黃帝顓頊之事未可明也及孔子因魯史記而作春秋而左丘明論輯其本事以為之傳又纂異同為國語又有世本録黃帝以來至春秋時帝王公侯卿大夫祖世所出春秋之後七國並爭秦兼諸侯有戰國䇿漢興伐秦定天下有楚漢春秋故司馬遷據左氏國語采世本戰國䇿述楚漢春秋接其後事訖于天漢其言秦漢詳矣至于采經托傳分散數家之事甚多疏略或有抵梧亦其涉獵者廣博貫穿經傳馳騁古今上下數千載間斯以勤矣又其是非頗繆于聖人論大道則先黃老而後六經序遊俠則退處士而進姦雄述貨殖則崇藝利而羞賤貧此其所蔽也然自劉向揚雄博極羣書皆稱遷有良史之材服其善序事理辨而不華質而不俚其文直其事核不虛美不隱惡故謂之實録嗚呼以遷之博物洽聞而不能以知自全既陷極刑幽而發憤書亦信矣迹其所以自傷悼小雅巷伯之倫夫唯大雅既明且哲能保其身難矣哉子長作論贊不專在斷制多以筆墨勝孟堅作史則意在勸懲斷制極不茍論文筆有疏密之分子長較髙論見識孟堅更勝此篇末段議子長不能保身孟堅卒亦不免何耶但孟堅之于竇氏第憲出征時請使典文章之事非夙有阿附如谷永杜欽之於王氏也朱雲論張禹前漢書成帝時丞相故安昌侯張禹以帝師位特進甚尊重雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下亡以益民皆尸位素餐孔子所謂鄙夫不可與事君茍患失之亡所不至者也臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干遊于地下足矣未知聖朝何如耳御史遂將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直于世使其言是不可誅其言非固當容之臣敢以死爭慶忌叩頭流血上意解然後得巳及後當治檻上曰勿易因而輯之以旌直臣張禹附會經義使成帝不疑王氏與李績阿附髙宗立武后皆所謂一言喪邦者也雲之請尚方豈為過激特其突出竒峯事太爽快履尾批鱗凛凛乎帝猶旌其直以此知成帝之昏猶未甚也然亦賴有辛慶忌之救慶忌誠丈夫哉朱子作綱目書曰左將軍辛慶忌卒以褒之慶忌之救朱雲大類張萬福救陽城同出武臣偉哉疏廣傳前漢書疏廣字仲翁東海蘭陵人也少好學明春秋家居教授學者自逺方至徵為博士太中大夫地節三年立皇太子選丙吉為太傅廣為少傅數月吉遷御史大夫廣徙為太傅廣兄子受字公子亦以賢良舉為太子家令受好禮恭謹敏而有辭宣帝幸太子宫受迎謁應對及置酒宴奉觴上夀辭禮間雅上甚歡説頃之拜受為少傅太子外祖父特進平恩侯許伯以為太子少白使其弟中郎將舜監護太子家上以問廣廣對曰太子國儲副君師友必于天下英俊不冝獨親外家許氏且太子自有太傅少傅官屬巳備今復使舜護太子家視陋非所以廣太子德于天下也上善其言以語丞相魏相相免冠謝曰此非臣等所能及廣繇是見器重數受賞賜太子每朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮在位五嵗皇太子年十二通論語孝經廣謂受曰吾聞知足不辱知止不殆功遂身退天之道也今仕宦至二千石宦成名立如此不去懼有後悔豈如父子相隨出關歸老故鄉以夀命終不亦善乎受叩頭曰從大人議即日父子俱移病滿三月賜告廣遂稱篤上疏乞骸骨上以其年篤老皆許之加賜黃金二十斤皇太子贈以五十斤公卿大夫故人邑子設祖道供帳東都門外送者車數百兩辭決而去及道路觀者皆曰賢哉二大夫或歎息為之下泣廣既歸鄉里日令家共具設酒食請族人故舊賔客與相娛樂數問其家金餘尚有幾所趣賣以共具居嵗餘廣子孫竊謂其昆弟老人廣所愛信者曰子孫幾及君時頗立産業基址今日飲食廢且盡宜從丈人所勸説君買田宅老人即以間暇時為廣言此計廣曰我豈老悖不念子孫哉顧自有舊田廬令子孫勤力其中足以共衣食與凡人齊今復增益之以為贏餘但教子孫怠惰耳賢而多財則損其志愚而多財則益其過且夫富者衆人之怨也吾既亡以教化子孫不欲益其過而生怨又此金者聖主所以惠養老臣也故樂與鄉黨宗族共饗其賜以盡吾餘日不亦可乎於是族人説服皆以夀終二疏所以教太子者未知果能迪以仁孝誠敬之本用賢納諌之要使即聖賢之言切巳而體驗之乎抑徒是章句之末耶然其知止足之分加人一等歸家不買田宅又可為俗下薦紳仕宦而歸便止求田問舍全無潔巳型家之念者下一針砭上得失疏王吉陛下躬聖質總萬方帝王圖籍日陳于前惟思世務將興太平詔書每下民欣然若更生臣伏而思之可謂至恩未可謂本務也欲治之主不世出公卿幸得遭遇其時言聽諌從然未有建萬世之長䇿舉明主于三代之隆者也其務在于期會簿書斷獄聽訟而巳此非太平之基也臣聞聖王宣德流化必自近始朝廷不備難以言治左右不正難以化逺民者弱而不可勝愚而不可欺也聖主獨行于深宫得則天下稱誦之失則天下咸言之行發于近必見于逺故謹選左右審擇所使左右所以正身也所使所以宣德也詩云濟濟多士文王以寧此其本也春秋所以大一統者六合同風九州共貫也今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所繇以意穿鑿各取一切權譎自在故一變之後不可復修也是以百里不同風千里不同俗户異政人殊服詐偽萌生刑罰亡極質朴日銷恩愛寖薄孔子曰安上治民莫善於禮非空言也王者未制禮之時引先王禮宜于今者而用之臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制驅一世之民躋之仁夀之域則俗何以不若成康夀何以不若髙宗竊見當世趨務不合于道者謹條奏唯陛下財擇焉吉正直有學術知本務此疏董賈而後不多見也使其得用過匡韋逺甚矣惜宣帝以其言迂濶不甚寵異吉遂謝病歸宣帝之治未純者以此上哀帝書鮑宣竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷妨賢人路濁亂天下奢泰亡度窮困百姓是以日蝕且十彗星四起危亡之徵陛下所親見也今奈何反覆劇于前乎朝臣亡有大儒骨鯁白首耆艾魁壘之士論議通古今喟然動衆心憂國如飢渴者臣未見也敦外親小童及幸臣董賢等在公門省户下陛下欲與此共承天地安海內甚難今世俗謂不智者為能謂智者為不能昔堯放四罪而天下服今除一吏而衆皆惑古刑人尚服今賞人反惑請寄為姦羣小日進國家空虛用度不足民流亡去城郭盜賊並起吏為殘賊嵗增于前凡民有七亡隂陽不和水旱為災一亡也縣官重責更賦稅租二亡也貪吏並公受取不巳三亡也豪強大姓蠶食亡厭四亡也苛吏繇役失農桑時五亡也部落鼓鳴男女遮迣六亡也盜賊劫略取民財物七亡也七亡尚可又有七死酷吏毆殺一死也治獄深刻二死也寃陷亡辜三死也盜賊橫發四死也怨讎相殘五死也嵗惡飢餓六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪羣臣幸得居尊官食重祿豈有肯加惻隱于細民助陛下流教化者邪志但在營私家稱賔客為姦利而巳以茍容曲從為賢以供默尸祿為智謂如臣宣等為愚陛下擢臣巖穴誠冀有益毫毛豈徒欲使臣美食大官重髙門之地哉天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧養元元視之當如一合尸鳩之詩今貧民菜食不厭衣又穿空父子夫婦不能相保誠可為酸鼻陛下不救將安所歸命乎奈何獨私養外親與幸臣董賢多賞賜以大萬數使奴從賔客漿酒霍肉蒼頭廬兒皆用致富非天意也及汝昌侯傅商亡功而封夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人而望天説民服豈不難哉方陽侯孫寵宜陵侯息夫躬辨足以移衆強可用獨立姦人之雄惑世尤劇者也宜以時罷退及外親幼童未通經術者皆宜令休就師傅急徵故大司馬傅喜使領外親故大司空何武師丹故丞相孔光故左將軍彭宣經皆更博士位皆歷三公智謀威信可與建教化圖安危龔勝為司直郡國皆慎選舉三輔委輸官不敢為姦可大委任也陛下前以小不忍退武等海內失望陛下尚能容亡功德者甚衆曽不能忍武等邪治天下者當用天下之心為心不得自専快意而已也上之皇天見譴下之黎庶怨恨次有諫爭之臣陛下茍欲自薄而厚惡臣天下猶不聽也臣雖愚戇獨不知多受祿賜美食太官廣田宅厚妻子不與惡人結讎怨以安身邪誠迫大義官以諫爭為職不敢不竭愚惟陛下少留神明覽五經之文原聖人之至意深思天地之戒臣宣呐鈍于辭不勝惓惓盡死節而已疏上帝以宣名儒優容之後宣又上書極言帝用其言又以宣為司隸目擊時艱嘔心而出雖無痛哭流涕字面然情迫詞切比賈長沙又甚矣文帝時天下升平長沙為防微逺禍之計哀帝有亡國之兆不得不如此七亡七死等語過于激烈非對君之體然在樂受盡言者得之猶琅玕也匡衡張禹孔光馬宫傳贊前漢書贊曰自孝武興學公孫𢎞以儒相其後蔡義韋賢元成匡衡張禹翟方進孔光平當馬宫及當子晏咸以儒宗居宰相位服儒衣冠傳先王語其醖藉可也然皆持祿保位被阿諛之譏彼以古人之迹見繩烏能勝其任乎非不巋然儒也體察不深操持不決遂依阿以至於此被孟堅數語誚盡嗚呼學儒者可不深自警懼乎明季多尊漢儒而薄宋儒不知漢儒重在講解宋儒重在操履則程朱之澤較宏也匡張孔馬雖不得與董劉比然其派别大都如此戴聖馬融猶被指謫況其他乎諫京師立共皇廟疏依通鑑本師丹聖王制禮取法于天地尊卑者所以正天地之位不可亂也今定陶共皇太后共皇后以定陶共為號者母從子妻從夫之義也欲立官置吏車服與太皇太后並非所以明尊無二上之義也定陶共皇號諡已前定義不得復改禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也為人後者為之子故為所後服斬衰三年而降其父母期明尊本祖而重正統也孝成皇帝聖恩深逺故為共王立後奉承祭祀令共王長為一國太祖萬世不毁恩義已備陛下既繼體先帝特重大宗承天地宗廟社稷之祀義不可復奉定陶共皇祭入其廟今欲立廟於京師使臣下祭之是無主也又親盡當毁空去一國太祖不墮之祀而就無主當毁不正之禮非所以尊厚共皇也立廟京師尚不可況嚴嵩主議乃公然奉肅宗奉興獻主于太廟乎總之古人尚朴重名分抑私情故傅太后雖以祖母之勢抑哀帝然所稱者不過曰帝太太后耳光武用張純朱浮議祠元帝以上於太廟成帝以下長安徙四親廟於舂陵致堂胡氏是之余謂光武中興與他帝不同尊四親為帝無所不可光武不行非薄也古人尚朴也然欲躋四親於太廟置武宣等不祀於義不可故另立廟宜也至宋濮議當主溫公而絀歐陽明大禮議當主揚氏父子而絀張桂此定論也何武王嘉師丹傳贊前漢書贊曰何武之舉王嘉之爭師丹之議考其禍福乃效于後當王莽之作外內咸服董賢之愛疑于親戚武嘉區區以一蕢障江河用沒其身丹與董宏更受賞罰哀哉故曰依世則廢道違俗則危殆此古人所以難受爵位者也不難受爵位多陷于匡張孔馬之譏者可不謂大哀乎未仕而遭亂世則不宜出孔子所謂無道則隱是也既仕而受恩深重則有鞠躬盡瘁死而後已之法在過激以取名壞事固非忠誠謀國之心若觀望遊移以居位天下未有失名節之人而能為國家者也李東陽不同劉謝以去雖有保全善類之解説君子羞之況其他乎儒林列傳序史記太史公曰余讀功令至于廣厲學官之路未嘗不廢書而歎也曰嗟乎夫周室衰而關雎作幽厲微而禮樂壞諸侯恣行政由弱國故孔子閔王路廢而邪道興於是論次詩書修起禮樂適齊聞韶三月不知肉味自衛返魯然後樂正雅頌各得其所世以混濁莫能用是以仲尼于七十餘君無所遇曰茍有用我者期月而巳矣西狩獲麟曰吾道窮矣故因史記作春秋以當王法其辭微而指博後世學者多録焉自孔子卒後七十子之徒散遊諸侯大者為師傅卿相小者友教士大夫或隱而不見故子路居衛子張居陳淡臺子羽居楚子夏居西河子貢終于齊如田子方段干木吳起禽滑釐之屬皆受業於子夏之倫為王者師是時獨魏文侯好學後陵遲以至于始皇天下並爭于戰國儒術既絀焉然齊魯之間學者獨不廢也于威宣之際孟子荀卿之列咸遵夫子之業而潤色之以學顯于當世及至秦之季世焚詩書坑術士六藝從此缺焉陳涉之王也而魯諸儒持孔子之禮器往歸陳王于是孔甲為陳涉博士卒與涉俱死陳涉起匹夫驅瓦合適戍旬月以王楚不滿半嵗竟滅亡其事至微淺然而縉紳先生之徒負孔子禮器往委質為臣者何也以秦焚其業積怨而發憤于陳王也及髙皇帝誅項籍舉兵圍魯魯中諸儒尚講誦習禮樂絃歌之音不絶豈非聖人之遺化好禮樂之國哉故孔子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之夫齊魯之間于文學自古以來其天性也故漢興然後諸儒始得修其經藝講習大射鄉飲之禮叔孫通作漢禮儀因為太常諸生弟子共定者咸為選首于是喟然歎興于學然尚有干戈平定四海亦未暇遑庠序之事也孝惠吕后時公卿皆武力有功之臣孝文時頗徵用然孝文帝本好刑名之言及至孝景不任儒者而竇太后又好黃老之術故諸博士具官待問未有進者及今上即位趙綰王臧之屬明儒學而上亦鄉之于是招方正賢良文學之士自是之後言詩于魯則申培公于齊則轅固生于燕則韓太傅言尚書自濟南伏生言禮自魯髙堂生言易自災川田生言春秋于齊魯自胡母生于趙自董仲舒及竇太后崩武安侯田蚡為丞相絀黃老刑名百家之言延文學儒者數百人而公孫𢎞以春秋白衣為天子三公封以平津侯天下之學士靡然鄉風矣讀此頗知周漢間學術興廢之迹序次頓挫風神雋絶逸氣遄飛酷吏列傳序史記孔子曰導之以政齊之以刑民免而無恥導之以德齊之以禮有恥且格老氏稱上德不德是以有德下德不失德是以無德法令滋章盜賊多有太史公曰信哉是言也法令者治之具而非制治清濁之源也昔天下之網嘗密矣然姦偽萌起其極也上下相遁至于不振當是之時吏治若救火揚沸非武健嚴酷惡能勝其任而愈快乎言道德者溺其職矣故曰聽訟吾猶人也必也使無訟乎下士聞道大笑之非虛言也漢興破觚而為圜斫雕而為朴網漏於吞舟之魚而吏治蒸蒸不至於姦黎民乂安由是觀之在彼不在此太史公所傳酷吏武帝時最多序却説秦時用酷者而以漢興接之寓意深矣西域傳贊前漢書孝武之世圖制胸奴患其兼從西國結黨南羌乃表河曲列四郡開玉門通西域以斷胸奴右臂隔絶南羌月氏單于失援由是逺遁而幕南無王庭遭值文景玄默養民五世天下殷富財力有餘士馬強盛故能睹犀布玳瑁則建珠崖七郡感枸醬竹杖則開牂牁越巂聞天馬蒲陶則通大宛安息自是之後明珠文甲通犀翠羽之珍盈于後宫蒲梢龍文魚目汗血之馬充於黃門巨象師子猛犬大雀之羣食于外囿殊方異物四面而至于是廣開上林穿昆明池營千門萬户之宫立神明通天之臺興造甲乙之帳落以隨珠和璧天子負黼依襲翠被馮玉几而處其中設酒池肉林以饗四夷之客作巴俞都盧海中碭極漫衍魚龍角扺之戲以觀視之及賂遺贈送萬里相奉師旅之費不可勝計至於用度不足乃榷酒酟管鹽鐵鑄白金造皮幣算至車船租及六畜民力屈財用竭因之以凶年冦盜並起道路不通直指之使始出衣繡杖斧斷斬于郡國然後勝之是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉且通西域近有龍堆逺則蔥嶺身熱頭痛縣度之厄淮南杜欽揚雄之論皆以為此天地所以界別區域絶外內也書曰西戎即序禹既就而序之非上威服致其貢物也西域諸國各有君長兵衆分弱無所統一雖屬胸奴不相親附胸奴能得其馬畜旃罽而不能統率與之進退與漢隔絶道里又逺得之不為益棄之不為損盛德在我無取于彼故自建武以來西域思漢威德咸樂內屬唯其小邑鄯善車師界迫胸奴尚為所拘而其大國莎車于闐之屬數遣使置質于漢願請屬都護聖上逺覽古今因時之宜羈縻不絶辭而未許雖大禹之序西戎周公之讓白雉太宗之卻走馬義兼之矣亦何以尚兹贊西域耳而武帝侈心逺略如繪髙文雅調函蓋包孕勸戒昭然蔚宗畢竟多斧鑿痕不能學步也王莽傳贊前漢書王莽始起外戚折節力行以要名譽宗族稱孝師友歸仁及其居位輔政成哀之際勤勞國家直道而行動見稱述豈所謂在家必聞在國必聞色取仁而行違者耶莽既不仁而有佞邪之材又乘四父歷世之權遭漢中微國統三絶而太后夀考為之宗主故得肆其姦慝以成篡盜之禍推是言之亦天時非人力之致矣及其竊位南面處非所據顛覆之勢險於桀紂而莽晏然自以黃虞復出也乃始恣睢奮其威詐滔天虐民窮凶極惡毒流諸夏亂延蠻貉猶未足逞其欲焉是以四海之內囂然喪其樂生之心中外憤怨逺近俱發城池不守支體分裂遂令天下城邑為虛丘壠發掘害遍生民辜及朽骨自書傳所載亂臣賊子無道之人考其禍敗未有如莽之甚者也昔秦燔詩書以立私議莽誦六藝以文姦言同歸殊塗俱用滅亡皆亢龍絶氣非命之運紫色蠅聲餘分閏位聖王之驅除云爾子長項羽贊孟堅王莽贊皆千古絶調子長以疏宕髙簡勝孟堅以縝密蒼鬱勝亦其筆性然也項羽舉事無成猶或惜之其坑秦卒弒義帝酷虐甚矣若王莽之可憎惡又數倍於項羽孟堅作贊極加修飾之功古文雅正卷三
