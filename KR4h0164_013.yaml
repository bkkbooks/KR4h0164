body:
  text: 古文雅正卷十三禮部侍郎蔡世逺編上寧宗疏朱子臣竊惟皇帝陛下祗膺駿命恭御寶圖正位之初未遑他事首以博延儒臣討論經藝為急先之務蓋將求多聞以建事學古訓而有獲非若記問愚儒辭章小技誇多以為博鬭靡以為工而已也則勸講之官所宜遴選顧乃不擇誤及妄庸則臣竊以為過矣臣雖嘗挾䇿讀書妄以求聖賢之遺旨而行之不力老矣無聞況於帝王之學則固未之講也其何以當顧問之勤乎然嘗聞之為學之道莫先於窮理窮理之要必在于讀書讀書之法莫過于循序而致精而致精之本則又在於居敬而持志此不易之理也夫天下事莫不有理有以窮之則自君臣之大以至事物之微莫不知其所以然與其所當然而亡纎芥之疑善則從之惡則去之而無毫髮之纍此為學所以莫先於窮理也至論天下之理則要妙精微各有攸當亘古亘今不可移易惟古之聖人為能盡之而其所行所言無不可為天下後世法其餘則順之者為君子而吉背之者為小人而凶吉之大者則能保四海而可以為法凶之甚者則不能保其身而可以為戒是其燦然之跡必然之效蓋莫不具於經訓史冊之中欲窮天下之理而不即是而求之則是正牆面而立耳此窮理所以必在乎讀書也若夫讀書則其不好者固怠忽間斷而無成矣其好之者又不免貪多而務廣往往未啓其端而遽欲探其終未究乎此而忽巳志乎彼是以雖復終日勤勞而意緒匆匆常若有所奔趨迫逐而無從容涵泳之樂是又安能深信自得常久不厭哉誠鑒此而有以反之則心潛於一久而不移而所讀之書自然漸漬浹洽心與理㑹而善之為勸者深惡之為戒者切矣此循序致精所以為讀書之法也若夫致精之本則在於心而心之為物至虛至靈神妙不測常為一身之主以提萬事之綱一不自覺而馳騖飛揚以徇物欲於軀殼之外則其俯仰顧盻之間巳不自覺其身之所在而況能反覆聖言參考事物以求義理至當之歸乎誠能嚴恭寅畏常存此心使其終日儼然不為物欲之所侵亂則以之讀書以之觀理將無所往而不通以之應事以之接物將無所處而不當矣此居敬持志所以為讀書之本也此數語者皆愚臣平生為學艱難辛苦已試之效竊意聖賢復生所以教人不過如此不獨布衣韋帶之士所當從事蓋雖帝王之學殆亦無以易之特以近年以來風俗薄陋士大夫間聞此語例皆指為道學必排去之而後巳是以食芹之美無路自通每把遺經竊徒慨歎今者乃遇皇帝陛下始初清明無他嗜好獨於問學孜孜不倦而臣當此之時特蒙引對故敢忘其固陋輒以為獻伏惟聖明深賜省覽試以其說驗之於身蚤寤晨興無忘今日之志而自強不息以緝熙於光明使異時嘉靖邦國如商高宗興衰撥亂如周宣王以著明人主講學之效卓然為萬世帝王之標準則臣雖退伏田野與世長辭與有榮矣干冒宸嚴不勝戰栗惟陛下留神財幸朱子生長高宗時歷孝宗光宗而寧宗至是朱子巳老矣自言愚臣平生為學艱難辛苦巳試之效以是而告君嗚呼謂其君不能者賊其君者也幸生朱子之後得讀遺書不以是自奮者自賊之尤者也賀陳丞相書朱子恭聞制書延拜進秉國鈞凡在陶鎔孰不欣賴伏惟明公以大忠壯節早負天下之望自知政事贊襄密勿凡所論執皆繫安危至其甚者輒以身之去就爭之雖未即從而天子之信公益篤天下之望公益深明公所以得此於上下者豈徒然哉今也聽於下風亦既餘月政令之出黜陟之施未有卓然大異於前日則是明公蓋未嘗以中外之望於公者自任而茍焉以就其位矣熹受知之深竊所愧歎未知明公將何以善其後也請得少效其愚而明公擇焉蓋聞古之君子居大臣之位者其於天下之事知之不惑任之有餘則汲汲乎及其時而勇為之知有所未明力有所不足則咨訪講求以進其知扳援汲引以求其助如救火追亡尤不敢以少緩上不敢愚其君以為不足與言仁義下不敢鄙其民以為不足以興教化中不敢薄其士大夫以為不足共成事功一日立乎其位則一日業乎其官一日不得乎其官則不敢一日立乎其位有所愛而不肯為者私也有所畏而不敢為者亦私也屹然中立無一毫私情之纍而惟知為其職之所當為者夫如是是以志足以行道道足以濟時而於大臣之責可以無愧不審明公圖所以善其後者其有合於此乎無乃復有進於此者而熹之愚不足以知之乎願亟圖之庶乎猶足以終慰天下之望願明公留意天下幸甚陳丞相名俊卿朱子知交好友也作相月餘朱子所以朂之者如此古人朋友之義如此大儒作相規模如此與劉共父書朱子熹前幅所稟訪問人材事初若率然既而思之此最急務然其意有未盡者輒詳論之如左云古之大臣以其一身任天下之重非以其一耳目之聰明一手足之勤力為能周天下之事也其所賴以共正君心同斷國論必有待於衆賢之助焉是以君子將以其身任此責者必咨詢訪問取之於無事之時而參伍較量用之於有事之日蓋方其責之必加於巳而未及也無旦暮倉卒之頃則其觀之得以久無利害紛拏之惑則其察之得以精誠心素著則其得之多嵗引月長則其蓄之富自重者無所嫌而敢進則無幽隱之不盡欲進者無所馬而不來則無巧僞之亂真久且精故有以知其短長之實而不差多且富故有以使其更迭為用而不竭幽隱畢逹則讜言日聞而君德修取舍不眩則望實日隆而士心附此古之君子所以成尊主庇民之功於一時而其遺風餘韻猶有稱思於後世者也今之人則不然其於天下之士固有漠然不以為意者矣其求之者又或得之近而不知其遺於逺足於少而不知其缺於多求之備而不知其失於詳也其平居暇日所以自任者雖重而所以待天下之士者不過如此是以勤勞惻怛雖盡於鰥寡孤獨之情而未及乎本根長久之計恩威功譽雖播於兒童走卒之口而未諭乎賢士大夫之心此蓋未及乎有為而天下之士先以訑訑之聲音顔色待之矣至於臨事倉卒而所蓄之材不足以待用乃始欲泛然求已所未知之賢而用之不亦難哉或曰然則未當其任而欲先得天下之賢者宜奈何曰權力所及則察之舉之禮際所及則親之厚之皆不及則稱之譽之又不及則鄉之慕之如是而猶以為未足也又於其類而求之不以小惡掩大善不以衆短棄一長其如此而已抑吾聞之李文公之言曰有人告曰某所有女國色也天下之人必將極其力而求之無所愛也有人告曰某所有人國士也天下之人則不能一􅉨而先焉此豈非好德不如好色者乎嗚呼欲任天下之重者誠反此而求之則亦無患乎士之不至矣薦賢為事君第一義宣尼所以心折于鮑叔子皮而遺恨于臧孫也三代而下推狄梁公王子明吕正獻好善薦賢不遺餘力蓋秉彛之好與忠愛之忱合併而出也朱子與共父此書可謂詳逹而曲盡矣即好善一節亦可以驗君子小人今有人於衆座中稱某人如何行誼如何才略其諄問其姓氏里居者必君子人也其漠然若無關者必庸碌人也其初不深知直從而毁之或素不相識徑從而疑者必為小人無疑矣辨之於其辭色形神故也昔有一人居官頗清慎而終身不薦一賢或問其故對曰與我生者則以不深知而不敢薦與我熟者則以未滿意而不敢薦時存此念而已此種人豈徒寡識游移哉緣好善之心不篤謀國之念不深私已之心勝故也朱子此書可謂明透案共父名珙乾道三年同知樞密院事與陳俊卿同舉朱子待次㑹丁內艱未就職大學章句序朱子大學之書古之大學所以教人之法也蓋自天降生民則既莫不與之以仁義禮智之性矣然其氣質之稟或不能齊是以不能皆有以知其性之所有而全之也一有聰明睿知能盡其性者出於其間則天必命之以為億兆之君師使之治而教之以復其性此伏羲神農黃帝堯舜所以繼天立極而司徒之職典樂之官所由設也三代之隆其法浸備然後王宫國都以及閭巷莫不有學人生八嵗則自王公以下至於庶人之子弟皆入小學而教之以灑掃應對進退之節禮樂射御書數之文及其十有五年則自天子之元子衆子以至公卿大夫元士之適子與凡民之俊秀皆入大學而教之以窮理正心修已治人之道此又學校之教大小之節所以分也夫以學校之設其廣如此教之之術其次第節目之詳又如此而其所以為教則又皆本之人君躬行心得之餘不待求之民生日用彛倫之外是以當世之人無不學其學焉者無不有以知其性分之所固有職分之所當為而各俯焉以盡其力此古昔盛時所以治隆於上俗美於下而非後世之所能及也及周之衰賢聖之君不作學校之政不修教化陵夷風俗頽敗時則有若孔子之聖而不得君師之位以行其政教於是獨取先王之法誦而傳之以詔後世若曲禮少儀內則弟子職諸篇固小學之支流餘裔而此篇者則因小學之成功以著大學之明法外有以極其規模之大而內有以盡其節目之詳者也三千之徒蓋莫不聞其說而曽氏之傳獨得其宗於是作為傳義以發其意及孟子沒而其傳泯焉則其書雖存而知者鮮矣自是以來俗儒記誦詞章之習其功倍於小學而無用異端虛無寂滅之教其高過於大學而無實其他權謀術數一切以就功名之說與夫百家衆技之流所以惑世誣民充塞仁義者又紛然雜出乎其間使其君子不幸而不得聞大道之要其小人不幸而不得蒙至治之澤晦盲否塞反覆沉痼以及五季之衰而壞亂極矣天運循環無往不復宋德隆盛治教休明於是河南程氏兩夫子出而有以接乎孟氏之傳實始尊信此篇而表章之既又為之次其簡編發其歸趣然後古者大學教人之法聖經賢傳之指粲然復明於世雖以熹之不敏亦幸私淑而與有聞焉顧其為書猶頗放失是以忘其固陋采而輯之間亦竊附已意補其闕略以俟後之君子極知僭踰無所逃罪然於國家化民成俗之意學者修己治人之方則未必無小補云上下數千百年治術學術擇焉精語焉詳句句從心得上體勘流露而出曽王學記未免外鑠也叙孟子沒後一段鬱為熱血發為婆心每讀至此未嘗不聲入九霄思通八表中庸章句序朱子中庸何為而作也子思子憂道學之失其傳而作也蓋自上古聖神繼天立極而道統之傳有自來矣其見於經則允執厥中者堯之所以授舜也人心惟危道心惟微惟精惟一允執厥中者舜之所以授禹也堯之一言至矣盡矣而舜復益之以三言者則所以明夫堯之一言必如是而後可庶幾也蓋嘗論之心之虛靈知覺一而巳矣而以為有人心道心之異者則以其或生於形氣之私或原於性命之正而所以為知覺者不同是以或危殆而不安或微妙而難見耳然人莫不有是形故雖上智不能無人心亦莫不有是性故雖下愚不能無道心二者雜於方寸之間而不知所以治之則危者愈危微者愈微而天理之公卒無以勝夫人欲之私矣精則察夫二者之間而不雜也一則守其本心之正而不離也從事於斯無少間斷必使道心常為一身之主而人心每聽命焉則危者安微者著而動靜云為自無過不及之差矣夫堯舜禹天下之大聖也以天下相傳天下之大事也以天下之大聖行天下之大事而其授受之際丁寧告戒不過如此則天下之理豈有以加於此哉自是以來聖聖相承若成湯文武之為君臯陶伊傅周召之為臣既皆以此而接夫道統之傳若吾夫子則雖不得其位而所以繼往聖開來學其功反有賢於堯舜者然當是時見而知之者惟顔氏曽氏之傳得其宗及曽氏之再傳而復得夫子之孫子思則去聖逺而異端起矣子思懼夫愈久而愈失其真也於是推本堯舜以來相傳之意質以平日所聞父師之言更互演繹作為此書以詔後之學者蓋其憂之也深故其言之也切其慮之也逺故其說之也詳其曰天命率性則道心之謂也其曰擇善固執則精一之謂也其曰君子時中則執中之謂也世之相後千有餘年而其言之不異如合符節歷選前聖之書所以提挈綱維開示藴奧未有若是其明且盡者也自是而又再傳以得孟氏為能推明是書以承先聖之統及其沒而遂失其傳焉則吾道之所寄不越乎言語文字之間而異端之說日新月盛以至於老佛之徒出則彌近理而大亂真矣然而尚幸此書之不泯故程夫子兄弟者出得有所考以續夫千載不傳之緒得有所據以斥夫二家似是之非蓋子思之功於是為大而微程夫子則亦莫能因其語而得其心也惜乎其所以為說者不傳而凡石氏之所輯録僅出於其門人之所記是以大義雖明而微言未析至其門人所自為說則雖頗詳盡而多所發明然倍其師說而淫於老佛者亦有之矣熹自蚤嵗即嘗受讀而竊疑之沈潛反復蓋亦有年一旦恍然似有以得其要領者然後乃敢㑹衆說而折其衷既為定著章句一篇以俟後之君子而一二同志復取石氏書刪其繁亂名以輯略且記所嘗論辨取舍之意別為或問以附其後然後此書之旨支分節解脈絡貫通詳略相因巨細畢舉而凡諸說之同異得失亦得以曲暢旁通而各極其趣雖於道統之傳不敢妄議然初學之士或有取焉則亦庶乎行逺升高之一助云爾淳熙巳酉春三月戊申新安朱熹序朱子明道之書此篇最為明盡取虞廷之授受證以孔門之微言下及學統之絶續有志之士心繹而身體之源頭既徹入手有階俗學雜學邪念妄念一齊剗盡矣資治通鑑綱目序朱子先正溫國司馬文正公受詔編集資治通鑑既成又撮其精要之語别為目録三十卷并上之晚病本書太詳目録太簡更著舉要厯八十卷以適厥中而未成也紹興初故侍讀南陽胡文定公始復因公遺藁修成舉要補遺若干卷則其文愈約而事愈備矣然􅉨者得於其家而伏讀之猶竊自病記識之弗彊不能有以領其要而及其詳也故嘗過不自料輒與同志因兩公四書别為義例增損櫽括以就此編蓋表嵗以首年而因年以著統大書以提要而分注以備言使夫嵗年之久近國統之離合事辭之詳略議論之同異通貫曉析如指諸掌名曰資治通鑑綱目凡五十九卷藏之巾笥姑以私便撿閲自備遺忘而巳若兩公述作之本意則有非區區所敢及者雖然嵗周於上而天道明矣統正於下而人道定矣大綱槩舉而監戒昭矣衆目畢張而幾微著矣是則凡為致知格物之學者亦將慨然有感於斯而兩公之志或庶乎其可以默識矣因述其指意條例如此列於篇端以俟後之君子云朱子作綱目功不在春秋下此篇亦集中第一簡古文字綱目一書閲之能令人經濟詳明志氣雄擅忠義激發而且條理井然便於記覽吾友海澄周禾仲嘗謂名為秀才而不能讀五經小學綱目近思録如靣牆一世惜哉案朱子綱目之作其發凡起例皆與執友南軒諸公參定序中所謂與同志别為義例者此也綱下分注則屬門人天台趙師淵訥齊編纂非盡朱子手筆也至義例精微處訥齊有不得預者矣李忠定公奏藁後序朱子嗚呼天之愛人可謂甚矣惟具感於人事之變而迫於氣數屈伸消息之不齊是以天下不能常安常治而或至於亂然及其亂也亦未嘗不為之預出能弭是亂之人以擬其後蓋將以使夫生民之類不至於糜爛泯沒靡有孑遺而為之君者猶有所恃賴憑依以保其國是則古今事變之所同然而天之所以為天者其心固如此也嗚呼若宣和靖康之變吾有以知其非天心之所欲而一時人物若故丞相者其所謂能弭是亂之人非耶蓋聞政宣之際國家隆盛極矣而都城一日大水猝至舉朝相顧莫有敢以變異為言公獨知其必有異域兵戎之禍上疏極言冀有以消弭於未然者不幸謫官以去而間不七年敵騎遂薄都城公於此時又方以眇然一介放逐之餘出負山嶽萬鈞之重首陳至䇿而徽宗決內禪之訃繼發大論而欽廟堅城守之心任公不疑遂却强敵然自重圍既解衆人之心無復逺慮而爭為割地講和之說以茍目前之安公獨以為不然而數陳出師邀擊之可以必勝與其得氣再入之不可以不憂則讒間蜂起逺謫遐荒而不數月間都城亦失守矣建炎再造首登廟堂慨然以內修外攘之事為已任誅僭逆定經制寬民力變士風通下情改弊法招兵買馬經理財賦分布要害繕治城壁建遣張所撫河北傳亮收河東宗澤守京城西顧關陜南葺樊鄧且將益據形便以為必守中原必還二聖之計然在位才七十餘日而又遭讒以去其在紹興因事獻言亦皆畏天恤民自強自治之意而深以議和退避為非䇿懇叩反覆以終其身其言明白正大而纎微曲折究極事情絶去雕飾而變化開闔卓犖竒偉前後二十餘年事變不同而所守一說如出於立談指顧之間顧嘗論之以為使公之言用於宣和之初則都城必無圍迫之憂用於靖康則必無顛覆之禍用於建炎則中原必不至於淪陷用於紹興則旋軫舊京泛掃陵廟以復祖宗之宇而卒報不共載天之讐其已久矣夫豈使王業偏安於江海之澨而尚貽吾君今日之憂哉顧乃使之數困於庸夫孺子之口而不得卒就其志豈天之愛人有時而不勝夫氣數之力抑亦人事之感或深或淺而其相推相蕩固有以迭為勝負之勢而至於然歟嗚呼痛哉昔蒯通每讀樂毅書未嘗不廢書而泣安知異時不有掩卷太息而垂涕於斯者耶雖然今天子方總羣䇿以圖恢復之功使是書也得備清閒之燕而幸有以當上心者焉則有志之士將不恨其不用於前日而知天之所以生公者真非偶然矣三代而下才最大者諸葛君李忠定也宋朝人物當推吾閩最盛而忠定者數百年罕見朱子作序激昂感慨運以大力是文集中第一健舉文字朱子好讀南豐文此篇多長句醇暢似南豐而氣魄過之若合韓蘇為一手仁說朱子天地以生物為心者也而人物之生又各得夫天地之心以為心者也故語心之德雖其總攝貫通無所不備然一言以蔽之則曰仁而巳矣請試詳之蓋天地之心其德有四曰元亨利貞而元無不統其運行焉則為春夏秋冬之序而春生之氣無所不通故人之為心其德亦有四曰仁義禮智而仁無不包其發用焉則為愛恭冝别之情而惻隱之心無所不貫故論天地之心者則曰乾元坤元則四德之體用不待悉數而足論人心之妙者則曰仁人心也則四德之體用亦不待遍舉而該蓋仁之為道乃天地生物之心即物而在情之未發而此體巳具情之既發而其應不窮誠能體而存之則衆善之源百行之本莫不在是此孔門之教所以必使學者汲汲於求仁也其言有曰克己復禮為仁言能克去己私復乎天理則此心之體無不在而此心之用無不行也又曰居處恭執事敬與人忠則亦所以存此心也又曰事親孝事兄弟及物恕則亦所以行此心也又曰求仁得仁則以讓國而逃諌伐而餓為能不失乎此心也又曰殺身成仁則以欲甚於生惡甚於死為能不害乎此心也此心何心也在天地則坱然生物之心在人則溫然愛人利物之心包四德而貫四端者也或曰若子之言則程子所謂愛情仁性不可以愛為仁者非歟曰不然程子之所謂以愛之發而名仁者也吾之所論以愛之理而名仁者也蓋所謂情性者雖其分域之不同然其脈絡之通各有攸屬者則曷嘗判然離絶而不相管哉吾方病夫學者誦程子之言而不求其意遂至於判然離愛而言仁故論此以發明其遺意而子顧以為異乎程子之說不亦誤乎或曰程氏之徒言仁多矣蓋有謂愛非仁而以萬物與我為一為仁之體者矣亦有謂愛非仁而以心有知覺釋仁之名者矣今子之言若是然則彼皆非歟曰彼謂物我為一者可以見仁之無不愛矣而非仁之所以為體之真也彼謂心有知覺者可以見仁之包乎智矣而非仁之所以得名之實也觀孔子之答子貢博施濟衆之問與程子所謂覺不可以訓仁者則可見矣子尚安得復以此而論仁哉抑泛言同體者使人含糊昏緩而無警切之功其弊或至於認物為己者有之矣專言知覺者使人張皇迫躁而無沉潛之味其弊或至於認欲為理者有之矣一忘一助二者蓋胥失之而知覺之云者於聖門所示樂山能守之氣象尤不相似子尚安得復以此而論仁哉因并記其語作仁說朱子此篇最為傳道微言合孔門及程張諸儒之說而透徹親切以示人余主鼇峰書院時鄭魚門年犬以書來謂近日士子廉隅不飭利欲紛心必先啓發其羞惡之心余復書謂啓人羞惡之心誠為切中要必大發其惻隱之心惻隱者仁也四端萬善皆原於此惻隱之心一摯則已私自消親親仁民愛物一以貫之羞惡辭讓是非相因而有是亦切體朱子之言而竊有得者也讀唐志朱子歐陽子曰三代而上治出於一而禮樂達於天下三代而下治出於二而禮樂為虛名此古今不易之至論也然彼知政事禮樂之不可不出於一而未知道德文章之尤不可使出於二也夫古之聖賢其文可謂盛矣然初豈有意學為如是之文哉有是實於中則必有是文於外如天有是氣則必有日月星辰之光耀地有是形則必有山川草木之行列聖賢之心既有是精明純粹之實以旁薄充塞乎其內則其著見于外者亦必自然條理分明光輝發越而不可掩蓋不必託於言語著於簡冊而後謂之文但自一身接於萬事凡其語默動靜人所可得而見者無所適而非文也姑舉其最而言則易之卦畫詩之咏歌書之記言春秋之述事與夫禮之威儀樂之節奏皆已列為六經而垂萬世其文之盛後世固莫能及然其所以盛而不可及者豈無所自來而世亦莫之識也故夫子之言曰文王既沒文不在兹乎蓋雖巳決知不得辭其責矣然猶若逡巡顧望而不能無所疑也至於推其所以興衰則又以為是皆出於天命之所為而非人力之所及此其體之甚重夫豈世俗所謂文者所能當哉孟軻氏沒聖學失傳天下之士背本趨末不知求道養德以充其內而汲汲乎徒以文章為事業然在戰國之時若申商孫吳之術蘇張范蔡之辨列禦寇莊周荀況之言屈平之賦以至秦漢之間韓非李斯陸生賈傳董相史遷劉向班固下至嚴安徐樂之流猶皆先有其實而後託之于言唯其無本而不能一出於道是以君子猶或羞之及至宋玉相如王褒揚雄之徒則一以浮華為尚而無實之可言矣雄之太𤣥法言蓋亦長掦校獵之流而粗變其音節初非實為明道講學而作也東京以降訖於隋唐數百年間愈下愈衰則其去道益逺而無實之文亦無足論韓愈氏出始覺其陋慨然號於一世欲去陳言以追詩書六藝之作而其敝精神縻嵗月又有甚於前世諸人之所為者然猶幸其略知不根無實之不足恃因是頗泝其源而適有㑹焉於是原道諸篇始作而其言曰根之茂者其實遂膏之沃者其光曄仁義之人其言藹如也其徒和之亦曰末有不深於道而能文者則亦庶幾其賢矣然今讀其書則其出于諂諛戲豫放浪而無實者自不為少若夫所原之道則亦徒能言其大體而未見有探討服行之效使其言之為文者皆必由是以出也故其論古人則又直以屈原孟軻馬遷相如掦雄為一等而猶不及於董賈其論當世之弊則但以詞不己出而遂有神徂聖伏之歎至於其徒之論亦但以剽掠僭竊為文之病大振頽風教人自為為韓之功則其師生之間傳授之際蓋未免裂道與文以為兩物而於其輕重緩急本末賔主之分又未免倒縣而逆置之也自是以來又復衰歇數十百年而後歐陽子出其文之妙蓋己不愧於韓氏而其曰治出於一云者則自荀揚以下皆不能及而韓亦未有聞焉是則疑若幾於道矣然考其終身之言與其行事之實則恐其亦未免於韓氏之病也抑又嘗以其徒之說考之則誦其言者既曰吾老將休付子斯文矣而又必曰我所為文必與道俱其推尊之也既曰今之韓愈矣而又必引夫文不在兹者以張其說由前之說則道之與文吾不知其果為一耶為二耶由後之說則文王孔子之文吾又不知其與韓歐之文果若是其班乎否也嗚呼學之不講久矣習俗之謬其可勝言也哉吾讀唐書而有感因書其說以訂之秦漢唐宋之文不觀此論不能具隻眼朱子作綱目書掦雄為莽大夫此篇并其文而亦加貶焉訂韓文考異一字不肯放過蓋愛玩之深也此篇一筆不肯假借蓋見其文而知其心由百世以等百世莫之能違也欲立言君子尚其以體道躬行為重哉王氏續經說朱子道之在天下未嘗亡而其明晦通塞之不同則如晝夜寒暑之相反故二帝三王之治詩書六藝之文後世莫能及之蓋非功效語言之不類乃其本心事實之不侔也雖然維天之命於穆不巳彼所謂道者則固未嘗亡矣而大學之教所謂明德新民止於至善者又巳具有明法若可階而升焉後之讀其書考其事者誠能深思熟講以探其本謹守力行以踐其實至于一旦豁然而晦者明塞者通則古人之不可及者固已倐然而在我矣夫豈患其終不及哉茍為不然而但為模倣假竊之計則不惟精粗懸絶終無可似之理政使似之然於具道亦何足以有所發明此有志為巳之士所以不屑而有所不暇為也王仲淹生乎百世之下讀古聖賢之書而粗識其用則於道之未嘗亡者蓋有意焉而於明德新民之學亦不可謂無其志矣然未嘗深探其本而盡力於其實以求必得夫至善者而止之顧乃挾其窺覘想像之倣佛而謂聖之所以聖賢之所以賢與其所以修身所以治人而及夫天下國家者舉皆不越乎此是以一見隋文而陳十二䇿則既不自量其力之不足以為伊周又不知其君之不可以為湯武且不待其招而往不待其問而告則又輕其道以求售焉及其不遇而歸其年蓋亦未為晚也若能於此反之於身以益求其所未至使明德之方新民之具皆足以得其至善而止之則異時得君行道安知其卒不逮於古人政使不幸終無所遇至於甚不得巳而筆之於書亦必有以發經言之餘藴而開後學於無窮顧乃不知出此而不勝其好名欲速之心汲汲乎日以著書立言為已任則其用心為已外矣及其無以自託乃復捃拾兩漢以來文字言語之陋功名事業之卑而求其天資之偶合與其竊取而近似者依倣六經次第采輯因以牽挽其人强而躋之二帝三王之列今其遺編雖不可見然考之中說而得其規模之大略則彼之贊易是豈足以知先天後天之相為體用而高文武宣之制是豈有精一執中之傳曹劉顔謝之詩是豈有物則秉彛之訓叔孫通公孫𢎞曹褒荀朂之禮樂又孰與伯夷后䕫周公之懿至於宋魏以來一南一北挍功度德蓋未有以相君臣也則其天命人心之向背統緒繼承之偏正亦何足論而欲攘臂其間奪彼豫此以自列於孔子之春秋哉蓋既不自知其學之不足以為周孔又不知兩漢之不足以為三王而徒欲以是區區者比而效之於形似影響之間傲然自謂足以承千聖而詔百王矣而不知其初不足以供兒童之一戲又適以是而自納於吳楚僭王之誅使夫後世知道之君子雖或有取于其言而終不能無恨於此是亦可悲也巳至于假卜筮象論語而强引唐初文武名臣以為弟子是乃福郊福峙之所為而非仲淹之雅意然推原本始乃其平日好高自大之心有以啓之則亦不得為無罪矣或曰然則仲淹之學固不得為孟子之倫矣其視荀揚韓氏亦有可得而優劣者耶曰荀卿之學雜於申商子雲之學本於黃老而其著書之意蓋亦姑託空文以自見耳非如仲淹之學頗近於正而粗有可用之實也至於退之原道諸篇則於道之大原若有非荀揚仲淹之所及者然考其平生意鄉之所在終不免於文士浮華放浪之習時俗富貴利達之求而其覽古今之變將以措諸事業者恐亦未若仲淹之致懇惻而有條理也是以豫於仲淹獨深惜之而有所不暇於三子是亦春秋貴賢者備之遺意也可勝歎哉文中子之學勝于荀掦韓子朱子嘉其懇惻而有條理懇惻者仁也得天地生物之心以為心者也條理者知也明于理而達于事也非從明德新民原本上體究者未能有此體用雖與聖賢大仁大知有别然亦賢矣朱子惜其學可充至于聖人而不免為好髙自大之心所限又以其氣象言語近于聖人恐後世依倣而慕效之者多故詳論之其曰用心為巳外矣學者尤當深警三代而下儼然自以為聖人者隋文中子宋陸子靜明王伯安也三人皆絶世聰明不朽人豪然子靜與朱子同時惜乎不知歸依以折衷於微至伯安事功亦無可議而學術巳差文中則直以孔子自任他聖人猶在所不屑然不免有高大徇外之心夫聖賢心細如髮觀朱子一生行事著作是何等精細是時言道學者有不談孔孟而好言文中子言經濟者不談伊周而好言王景略粗氣乘之也朱子此論直抉本原有功後學不淺又祭張敬夫殿撰文朱子維淳熙七年嵗次庚子六月癸未朔六日丁亥具位朱熹竊聞故友敬夫張兄右文修撰大葬有期謹遣清酌時羞奠於柩前南望拜哭起而言曰嗚呼自孔孟之云逺聖學絶而莫繼得周翁與程子道乃抗而不墜然微言之輟響今未及乎百嵗士各私其所聞巳不勝其乖異嗟惟我之與兄吻志同而心契或靣講而未窮又書傳而不置蓋有我之所是而兄以為非亦有兄之所然而我之所議又有始所共鄉而終悟其偏亦有蚤所同嚌而晚得其味蓋繳紛往反者幾十餘年末乃同歸而一致由是上而天道之微逺而聖言之祕近則進修之方大則行藏之義以兄之明固巳洞照而無遺若我之愚亦幸竊窺其一二然兄喬木之故家而我衡茅之賤士兄高明而宏博我狷狹而迂滯故我嘗謂兄宜以是而行之當時兄亦謂我盍以是而傳之來裔蓋雖隱顯之或殊實則交須而共濟不惟相知之甚審抑亦自靖而無愧嗚呼孰謂乃使兄終在外以違其心豫亦見縻於斯而所願將不遂也政使得間以就其書是亦任左肱而失右臂也傷哉我道之窮豫復何心於此世也惟修身補過以畢餘年庶有以見兄於下地也聞兄之葬而不得臨獨南望長號以寄此酹也惟兄憐而鑒之尚隂有以輔豫之志也嗚呼哀哉朱子第一知交推敬夫與伯恭二人餘如江西陸氏子壽子靜子美兄弟及同甫陳氏往復辨論雖多知契不及此兩人也兩人之中敬夫為最朱子敬畏亦似過于伯恭讀此篇想見聖賢至友道誼知交千載下猶為傷心灑涕古文雅正卷十三
